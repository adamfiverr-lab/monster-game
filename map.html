<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monster World - Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1628; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; cursor: grab; touch-action: none; }
  canvas:active { cursor: grabbing; }
  #tooltip {
    position: fixed;
    background: rgba(10, 20, 40, 0.92);
    border: 2px solid #3388aa;
    border-radius: 12px;
    padding: 12px 16px;
    color: #eee;
    font-size: 14px;
    pointer-events: none;
    display: none;
    max-width: 220px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #tooltip .tt-name { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
  #tooltip .tt-type { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; margin-bottom: 6px; }
  #tooltip .tt-desc { font-size: 12px; opacity: 0.8; line-height: 1.4; }
  #tooltip .tt-level { font-size: 11px; margin-top: 6px; color: #ffcc44; }
  #hud {
    position: fixed; top: 16px; left: 16px;
    color: #aaccdd; font-size: 12px;
    background: rgba(10,20,40,0.7);
    padding: 8px 14px; border-radius: 8px;
    border: 1px solid #223344;
  }
  /* Mobile island info panel (replaces tooltip on tap) */
  #mobileInfo {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10, 20, 40, 0.95);
    border-top: 2px solid #3388aa;
    padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px));
    color: #eee; display: none; z-index: 10;
    backdrop-filter: blur(8px);
  }
  #mobileInfo.active { display: block; }
  #mobileInfo .mi-name { font-size: 20px; font-weight: bold; margin-bottom: 2px; }
  #mobileInfo .mi-type { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 6px; }
  #mobileInfo .mi-desc { font-size: 12px; opacity: 0.8; line-height: 1.4; margin-bottom: 8px; }
  #mobileInfo .mi-level { font-size: 12px; color: #ffcc44; margin-bottom: 12px; }
  #mobileInfo .mi-btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: bold; letter-spacing: 1px;
    background: linear-gradient(135deg, #e94560 0%, #991b1b 100%);
    color: #fff; cursor: pointer;
  }
  #mobileInfo .mi-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none; color: #667; font-size: 22px; cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="map"></canvas>
<div id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-type"></div>
  <div class="tt-desc"></div>
  <div class="tt-level"></div>
</div>
<div id="hud">Drag to pan &middot; Pinch to zoom &middot; Tap an island</div>

<div id="mobileInfo">
  <button class="mi-close" onclick="closeMobileInfo()">&times;</button>
  <div class="mi-name"></div>
  <div class="mi-type"></div>
  <div class="mi-desc"></div>
  <div class="mi-level"></div>
  <button class="mi-btn" onclick="travelToIsland()">Travel Here</button>
</div>

<script>
const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ---- CAMERA ----
let camX = 0, camY = 0, camZoom = 1;
let dragStart = null, dragCam = null;

// Mouse events
canvas.addEventListener('mousedown', e => {
  dragStart = { x: e.clientX, y: e.clientY };
  dragCam = { x: camX, y: camY };
});
canvas.addEventListener('mousemove', e => {
  if (dragStart) {
    camX = dragCam.x + (e.clientX - dragStart.x) / camZoom;
    camY = dragCam.y + (e.clientY - dragStart.y) / camZoom;
  }
  checkHover(e);
});
canvas.addEventListener('mouseup', e => {
  if (dragStart && Math.abs(e.clientX - dragStart.x) < 5 && Math.abs(e.clientY - dragStart.y) < 5) {
    handleClick(e);
  }
  dragStart = null;
});
canvas.addEventListener('wheel', e => {
  const oldZoom = camZoom;
  camZoom *= e.deltaY > 0 ? 0.9 : 1.1;
  camZoom = Math.max(0.3, Math.min(3, camZoom));
  const mx = (e.clientX - W/2) / oldZoom - camX;
  const my = (e.clientY - H/2) / oldZoom - camY;
  camX -= mx * (1/camZoom - 1/oldZoom) * camZoom;
  camY -= my * (1/camZoom - 1/oldZoom) * camZoom;
  e.preventDefault();
}, { passive: false });

// Touch events (drag + pinch zoom)
let lastTouchDist = 0;
let touchStartTime = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const t = e.touches[0];
    dragStart = { x: t.clientX, y: t.clientY };
    dragCam = { x: camX, y: camY };
    touchStartTime = Date.now();
  } else if (e.touches.length === 2) {
    dragStart = null;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragStart) {
    const t = e.touches[0];
    camX = dragCam.x + (t.clientX - dragStart.x) / camZoom;
    camY = dragCam.y + (t.clientY - dragStart.y) / camZoom;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastTouchDist > 0) {
      camZoom *= dist / lastTouchDist;
      camZoom = Math.max(0.3, Math.min(3, camZoom));
    }
    lastTouchDist = dist;
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (e.changedTouches.length === 1 && dragStart) {
    const t = e.changedTouches[0];
    const moved = Math.abs(t.clientX - dragStart.x) + Math.abs(t.clientY - dragStart.y);
    const elapsed = Date.now() - touchStartTime;
    if (moved < 15 && elapsed < 300) {
      handleTap(t.clientX, t.clientY);
    }
  }
  dragStart = null;
  lastTouchDist = 0;
});

function screenToWorld(sx, sy) {
  return { x: (sx - W/2) / camZoom - camX, y: (sy - H/2) / camZoom - camY };
}
function worldToScreen(wx, wy) {
  return { x: (wx + camX) * camZoom + W/2, y: (wy + camY) * camZoom + H/2 };
}

// ---- SEEDED RANDOM ----
let seed = 12345;
function srand(s) { seed = s; }
function rand() {
  seed = (seed * 16807 + 0) % 2147483647;
  return (seed - 1) / 2147483646;
}
function rng(min, max) { return Math.floor(rand() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(rand() * arr.length)]; }

// ---- ISLAND DEFINITIONS ----
const ISLANDS = [
  { name: 'Verdantia', biome: 'forest', x: 0, y: 0, size: 140, color: '#2d8a4e', accent: '#1e6b38', water: '#1a6644',
    desc: 'Lush forests teeming with life. A gentle place to begin your journey.', level: '1-8', types: ['earth'] },
  { name: 'Cinderpeak', biome: 'volcano', x: 420, y: -180, size: 120, color: '#8b3a3a', accent: '#5c2020', water: '#663322',
    desc: 'An active volcano surrounded by ashen wastes and lava flows.', level: '12-20', types: ['fire'] },
  { name: 'Coralheim', biome: 'tropical', x: -350, y: 200, size: 130, color: '#d4a855', accent: '#b8923e', water: '#1188aa',
    desc: 'Sun-bleached shores and coral reefs. Water monsters thrive here.', level: '5-12', types: ['water'] },
  { name: 'Thunderspire', biome: 'mountain', x: 250, y: 280, size: 105, color: '#6a6a7a', accent: '#4a4a5a', water: '#556688',
    desc: 'Jagged peaks where storms never cease. Lightning splits the sky.', level: '15-25', types: ['electric'] },
  { name: 'Gloomveil', biome: 'swamp', x: -200, y: -250, size: 115, color: '#3a4a2a', accent: '#2a3a1a', water: '#334422',
    desc: 'A cursed marshland shrouded in perpetual fog. Beware the shadows.', level: '18-28', types: ['shadow','toxic'] },
  { name: 'Frosthollow', biome: 'ice', x: 500, y: 160, size: 110, color: '#a8c8d8', accent: '#7aa8b8', water: '#4488aa',
    desc: 'Frozen tundra and glacial caves. Only the hardiest survive.', level: '22-32', types: ['ice'] },
  { name: 'Mystvale', biome: 'crystal', x: -50, y: 350, size: 95, color: '#8866aa', accent: '#6644aa', water: '#664488',
    desc: 'Floating crystal formations hum with ancient energy.', level: '28-38', types: ['shadow','electric'] },
  { name: 'Ashenmaw', biome: 'wasteland', x: -420, y: -100, size: 100, color: '#5a4a3a', accent: '#3a2a1a', water: '#443322',
    desc: 'A desolate crater where something terrible once fell from the sky.', level: '32-42', types: ['fire','shadow'] },
  { name: 'Tidecrest', biome: 'reef', x: 150, y: -350, size: 108, color: '#44aa88', accent: '#338866', water: '#2288aa',
    desc: 'A chain of reef islets rich with aquatic life and hidden caves.', level: '10-18', types: ['water','earth'] },
  { name: 'The Apex', biome: 'ancient', x: 0, y: -550, size: 135, color: '#887766', accent: '#665544', water: '#554433',
    desc: 'Ruins of a forgotten civilization. The strongest monsters dwell here.', level: '40-50', types: ['fire','ice','shadow'] },
];

// routes between islands [from, to]
const ROUTES = [
  [0, 2], [0, 4], [0, 1], [0, 3],
  [1, 8], [1, 5], [1, 3],
  [2, 7], [2, 3],
  [3, 5], [3, 6],
  [4, 7], [4, 8],
  [5, 6],
  [7, 9], [8, 9], [6, 9],
];

// generate island terrain shapes (coastline points)
function generateIslandShape(island) {
  srand(island.name.charCodeAt(0) * 1000 + island.name.charCodeAt(1) * 100 + island.size);
  const pts = [];
  const numPts = 24;
  for (let i = 0; i < numPts; i++) {
    const angle = (i / numPts) * Math.PI * 2;
    const baseR = island.size;
    const noise = baseR * (0.7 + rand() * 0.5);
    // make some islands more elongated
    const stretch = 1 + rand() * 0.3;
    const r = noise * (1 + Math.cos(angle * 2) * 0.15) * (Math.abs(Math.cos(angle)) * (stretch - 1) + 1);
    pts.push({
      x: island.x + Math.cos(angle) * r,
      y: island.y + Math.sin(angle) * r
    });
  }
  island.coastline = pts;

  // generate sub-features
  island.trees = [];
  island.mountains = [];
  island.buildings = [];
  island.rocks = [];
  island.lava = [];
  island.crystals = [];
  island.snow = [];

  const featureCount = Math.floor(island.size * 0.3);
  for (let i = 0; i < featureCount; i++) {
    const angle = rand() * Math.PI * 2;
    const dist = rand() * island.size * 0.55;
    const fx = island.x + Math.cos(angle) * dist;
    const fy = island.y + Math.sin(angle) * dist;

    switch (island.biome) {
      case 'forest':
        island.trees.push({ x: fx, y: fy, size: 6 + rand() * 10, shade: rand() });
        break;
      case 'volcano':
        if (i < 4) island.lava.push({ x: fx, y: fy, size: 5 + rand() * 8 });
        else island.rocks.push({ x: fx, y: fy, size: 4 + rand() * 6 });
        break;
      case 'tropical':
        if (i % 3 === 0) island.trees.push({ x: fx, y: fy, size: 8 + rand() * 8, palm: true, shade: rand() });
        break;
      case 'mountain':
        island.mountains.push({ x: fx, y: fy, size: 10 + rand() * 15 });
        break;
      case 'swamp':
        island.trees.push({ x: fx, y: fy, size: 5 + rand() * 6, dead: rand() > 0.5, shade: rand() });
        break;
      case 'ice':
        island.snow.push({ x: fx, y: fy, size: 5 + rand() * 10 });
        if (i % 4 === 0) island.mountains.push({ x: fx, y: fy, size: 12 + rand() * 12 });
        break;
      case 'crystal':
        island.crystals.push({ x: fx, y: fy, size: 6 + rand() * 12, hue: rand() });
        break;
      case 'wasteland':
        island.rocks.push({ x: fx, y: fy, size: 5 + rand() * 8 });
        break;
      case 'reef':
        if (i % 2 === 0) island.trees.push({ x: fx, y: fy, size: 6 + rand() * 6, palm: true, shade: rand() });
        else island.rocks.push({ x: fx, y: fy, size: 3 + rand() * 5 });
        break;
      case 'ancient':
        if (i % 3 === 0) island.buildings.push({ x: fx, y: fy, size: 8 + rand() * 10 });
        else island.rocks.push({ x: fx, y: fy, size: 5 + rand() * 7 });
        break;
    }
  }

  // town/landmark position
  island.landmark = { x: island.x, y: island.y - island.size * 0.1 };
}

ISLANDS.forEach(generateIslandShape);

// ---- OCEAN ----
let oceanT = 0;
const wavePoints = [];
for (let i = 0; i < 60; i++) {
  wavePoints.push({ x: -800 + i * 30, y: (Math.random() - 0.5) * 1200, phase: Math.random() * Math.PI * 2, amp: 2 + Math.random() * 3 });
}

function drawOcean() {
  // deep ocean gradient
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H));
  grad.addColorStop(0, '#0e3555');
  grad.addColorStop(0.5, '#0a2844');
  grad.addColorStop(1, '#061828');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // subtle wave patterns
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = '#4488aa';
  ctx.lineWidth = 1;
  for (const wp of wavePoints) {
    const s = worldToScreen(wp.x, wp.y);
    const wave = Math.sin(oceanT * 0.02 + wp.phase) * wp.amp * camZoom;
    ctx.beginPath();
    for (let dx = -200; dx < 200; dx += 5) {
      const wy = wave + Math.sin((dx + oceanT * 0.5) * 0.03 + wp.phase) * 3 * camZoom;
      if (dx === -200) ctx.moveTo(s.x + dx, s.y + wy);
      else ctx.lineTo(s.x + dx, s.y + wy);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// ---- ROUTES ----
function drawRoutes() {
  ctx.save();
  ctx.setLineDash([8 * camZoom, 6 * camZoom]);
  ctx.strokeStyle = '#334466';
  ctx.lineWidth = 2 * camZoom;
  ctx.globalAlpha = 0.5;

  for (const [a, b] of ROUTES) {
    const ia = ISLANDS[a], ib = ISLANDS[b];
    const sa = worldToScreen(ia.x, ia.y);
    const sb = worldToScreen(ib.x, ib.y);
    ctx.beginPath();
    ctx.moveTo(sa.x, sa.y);
    // curved route
    const mx = (sa.x + sb.x) / 2 + (sa.y - sb.y) * 0.15;
    const my = (sa.y + sb.y) / 2 + (sb.x - sa.x) * 0.15;
    ctx.quadraticCurveTo(mx, my, sb.x, sb.y);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

// ---- ISLAND DRAWING ----
function drawIslandCoast(island) {
  const pts = island.coastline.map(p => worldToScreen(p.x, p.y));
  const center = worldToScreen(island.x, island.y);

  // shallow water ring
  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = island.water;
  ctx.beginPath();
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    const dx = p.x - center.x, dy = p.y - center.y;
    const ex = center.x + dx * 1.2, ey = center.y + dy * 1.2;
    if (i === 0) ctx.moveTo(ex, ey);
    else ctx.lineTo(ex, ey);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // beach/shore ring
  ctx.save();
  ctx.fillStyle = island.biome === 'tropical' || island.biome === 'reef' ? '#e8d5a0' :
    island.biome === 'ice' ? '#c8d8e8' :
    island.biome === 'volcano' ? '#4a3a2a' : '#a09060';
  ctx.beginPath();
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    const dx = p.x - center.x, dy = p.y - center.y;
    const ex = center.x + dx * 1.06, ey = center.y + dy * 1.06;
    if (i === 0) ctx.moveTo(ex, ey);
    else ctx.lineTo(ex, ey);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // main landmass
  ctx.save();
  ctx.fillStyle = island.color;
  ctx.beginPath();
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
  ctx.fill();

  // inner gradient for depth
  const grad = ctx.createRadialGradient(center.x, center.y - island.size * camZoom * 0.2, 0,
    center.x, center.y, island.size * camZoom * 0.9);
  grad.addColorStop(0, island.accent + '00');
  grad.addColorStop(1, island.accent + 'aa');
  ctx.fillStyle = grad;
  ctx.fill();

  // coastline stroke
  ctx.strokeStyle = island.accent;
  ctx.lineWidth = 2 * camZoom;
  ctx.stroke();
  ctx.restore();

  // foam/wave line
  ctx.save();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5 * camZoom;
  ctx.globalAlpha = 0.15 + Math.sin(oceanT * 0.03) * 0.05;
  ctx.beginPath();
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    const dx = p.x - center.x, dy = p.y - center.y;
    const wave = Math.sin(oceanT * 0.04 + i * 0.5) * 2 * camZoom;
    const ex = center.x + dx * 1.08 + wave, ey = center.y + dy * 1.08 + wave;
    if (i === 0) ctx.moveTo(ex, ey);
    else ctx.lineTo(ex, ey);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function drawIslandFeatures(island) {
  // trees
  for (const tree of island.trees) {
    const s = worldToScreen(tree.x, tree.y);
    const sz = tree.size * camZoom;
    if (sz < 2) continue;

    if (tree.palm) {
      // palm tree
      ctx.strokeStyle = '#8B7355';
      ctx.lineWidth = sz * 0.15;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y + sz * 0.5);
      ctx.quadraticCurveTo(s.x + sz * 0.15, s.y, s.x - sz * 0.05, s.y - sz * 0.3);
      ctx.stroke();
      // fronds
      ctx.fillStyle = '#2d8844';
      for (let f = 0; f < 5; f++) {
        const fa = (f / 5) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(s.x - sz * 0.05, s.y - sz * 0.3);
        ctx.quadraticCurveTo(
          s.x + Math.cos(fa) * sz * 0.6,
          s.y - sz * 0.3 + Math.sin(fa) * sz * 0.4,
          s.x + Math.cos(fa) * sz * 0.5,
          s.y - sz * 0.1 + Math.sin(fa) * sz * 0.3
        );
        ctx.lineWidth = sz * 0.08;
        ctx.strokeStyle = '#2d8844';
        ctx.stroke();
      }
    } else if (tree.dead) {
      // dead swamp tree
      ctx.strokeStyle = '#4a4a3a';
      ctx.lineWidth = sz * 0.12;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y + sz * 0.3);
      ctx.lineTo(s.x, s.y - sz * 0.4);
      ctx.moveTo(s.x, s.y - sz * 0.2);
      ctx.lineTo(s.x - sz * 0.25, s.y - sz * 0.35);
      ctx.moveTo(s.x, s.y - sz * 0.3);
      ctx.lineTo(s.x + sz * 0.2, s.y - sz * 0.45);
      ctx.stroke();
    } else {
      // regular tree
      const shade = 0.7 + tree.shade * 0.3;
      // trunk
      ctx.fillStyle = '#5a4a30';
      ctx.fillRect(s.x - sz * 0.06, s.y, sz * 0.12, sz * 0.4);
      // canopy
      ctx.fillStyle = `rgb(${Math.floor(40*shade)},${Math.floor(120*shade)},${Math.floor(50*shade)})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y - sz * 0.05, sz * 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgb(${Math.floor(50*shade)},${Math.floor(140*shade)},${Math.floor(55*shade)})`;
      ctx.beginPath();
      ctx.arc(s.x - sz * 0.12, s.y - sz * 0.15, sz * 0.25, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // mountains
  for (const mt of island.mountains) {
    const s = worldToScreen(mt.x, mt.y);
    const sz = mt.size * camZoom;
    if (sz < 3) continue;

    ctx.fillStyle = island.biome === 'ice' ? '#8899aa' : '#6a6a6a';
    ctx.beginPath();
    ctx.moveTo(s.x - sz * 0.6, s.y + sz * 0.3);
    ctx.lineTo(s.x - sz * 0.1, s.y - sz * 0.8);
    ctx.lineTo(s.x + sz * 0.15, s.y - sz * 0.7);
    ctx.lineTo(s.x + sz * 0.5, s.y + sz * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = island.biome === 'ice' ? '#99aabb' : '#555';
    ctx.lineWidth = 1;
    ctx.stroke();
    // snow cap
    if (island.biome === 'ice' || island.biome === 'mountain') {
      ctx.fillStyle = '#e8eef4';
      ctx.beginPath();
      ctx.moveTo(s.x - sz * 0.15, s.y - sz * 0.55);
      ctx.lineTo(s.x - sz * 0.1, s.y - sz * 0.8);
      ctx.lineTo(s.x + sz * 0.15, s.y - sz * 0.7);
      ctx.lineTo(s.x + sz * 0.1, s.y - sz * 0.5);
      ctx.closePath();
      ctx.fill();
    }
  }

  // rocks
  for (const rock of island.rocks) {
    const s = worldToScreen(rock.x, rock.y);
    const sz = rock.size * camZoom;
    if (sz < 2) continue;
    ctx.fillStyle = island.biome === 'wasteland' ? '#4a3a2a' : '#7a7a7a';
    ctx.beginPath();
    ctx.moveTo(s.x - sz * 0.4, s.y + sz * 0.15);
    ctx.lineTo(s.x - sz * 0.2, s.y - sz * 0.3);
    ctx.lineTo(s.x + sz * 0.25, s.y - sz * 0.25);
    ctx.lineTo(s.x + sz * 0.35, s.y + sz * 0.15);
    ctx.closePath();
    ctx.fill();
  }

  // lava pools
  for (const lv of island.lava) {
    const s = worldToScreen(lv.x, lv.y);
    const sz = lv.size * camZoom;
    if (sz < 2) continue;
    const glow = 0.5 + Math.sin(oceanT * 0.05 + lv.x) * 0.2;
    ctx.fillStyle = `rgba(255,${Math.floor(100 + glow * 80)},0,${0.6 + glow * 0.2})`;
    ctx.beginPath();
    ctx.ellipse(s.x, s.y, sz * 0.5, sz * 0.3, lv.x * 0.01, 0, Math.PI * 2);
    ctx.fill();
    // glow
    ctx.save();
    const lg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, sz);
    lg.addColorStop(0, 'rgba(255,120,0,0.15)');
    lg.addColorStop(1, 'transparent');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.arc(s.x, s.y, sz, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // volcano crater
  if (island.biome === 'volcano') {
    const s = worldToScreen(island.x, island.y);
    const sz = island.size * 0.3 * camZoom;
    // mountain
    ctx.fillStyle = '#4a3030';
    ctx.beginPath();
    ctx.moveTo(s.x - sz * 1.5, s.y + sz * 0.5);
    ctx.lineTo(s.x - sz * 0.3, s.y - sz * 1.5);
    ctx.lineTo(s.x + sz * 0.3, s.y - sz * 1.4);
    ctx.lineTo(s.x + sz * 1.3, s.y + sz * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#3a2020';
    ctx.lineWidth = 1.5 * camZoom;
    ctx.stroke();
    // crater glow
    const cGlow = 0.5 + Math.sin(oceanT * 0.03) * 0.3;
    ctx.fillStyle = `rgba(255,80,0,${0.4 + cGlow * 0.3})`;
    ctx.beginPath();
    ctx.ellipse(s.x, s.y - sz * 1.3, sz * 0.35, sz * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();
    // smoke
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#aaa';
    for (let i = 0; i < 4; i++) {
      const sy2 = s.y - sz * 1.5 - i * sz * 0.4 - Math.sin(oceanT * 0.02 + i) * sz * 0.2;
      const sx2 = s.x + Math.sin(oceanT * 0.015 + i * 2) * sz * 0.3;
      ctx.beginPath();
      ctx.arc(sx2, sy2, sz * (0.15 + i * 0.1), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // crystals
  for (const cr of island.crystals) {
    const s = worldToScreen(cr.x, cr.y);
    const sz = cr.size * camZoom;
    if (sz < 2) continue;
    const hue = Math.floor(200 + cr.hue * 120);
    ctx.fillStyle = `hsla(${hue},60%,60%,0.8)`;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y - sz);
    ctx.lineTo(s.x + sz * 0.25, s.y);
    ctx.lineTo(s.x - sz * 0.25, s.y);
    ctx.closePath();
    ctx.fill();
    // glow
    ctx.save();
    const cg = ctx.createRadialGradient(s.x, s.y - sz * 0.5, 0, s.x, s.y - sz * 0.5, sz);
    cg.addColorStop(0, `hsla(${hue},60%,70%,${0.15 + Math.sin(oceanT * 0.04 + cr.hue * 10) * 0.08})`);
    cg.addColorStop(1, 'transparent');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(s.x, s.y - sz * 0.5, sz, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // buildings (ruins)
  for (const b of island.buildings) {
    const s = worldToScreen(b.x, b.y);
    const sz = b.size * camZoom;
    if (sz < 3) continue;
    ctx.fillStyle = '#8a7a66';
    ctx.strokeStyle = '#6a5a46';
    ctx.lineWidth = 1;
    // pillar
    ctx.fillRect(s.x - sz * 0.12, s.y - sz * 0.8, sz * 0.24, sz * 0.8);
    ctx.strokeRect(s.x - sz * 0.12, s.y - sz * 0.8, sz * 0.24, sz * 0.8);
    // top
    ctx.beginPath();
    ctx.moveTo(s.x - sz * 0.22, s.y - sz * 0.8);
    ctx.lineTo(s.x, s.y - sz * 1.1);
    ctx.lineTo(s.x + sz * 0.22, s.y - sz * 0.8);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  // snow patches
  for (const sn of island.snow) {
    const s = worldToScreen(sn.x, sn.y);
    const sz = sn.size * camZoom;
    if (sz < 2) continue;
    ctx.fillStyle = 'rgba(220,235,245,0.4)';
    ctx.beginPath();
    ctx.ellipse(s.x, s.y, sz * 0.6, sz * 0.3, sn.x * 0.01, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawIslandLabel(island) {
  const s = worldToScreen(island.x, island.y + island.size + 20);
  const sz = 12 * camZoom;
  if (sz < 6) return;

  ctx.save();
  ctx.font = `bold ${Math.max(10, sz)}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = 0.85;
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 4;
  ctx.fillText(island.name, s.x, s.y);
  ctx.shadowBlur = 0;

  // level range
  ctx.font = `${Math.max(8, sz * 0.7)}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = '#ffcc44';
  ctx.globalAlpha = 0.6;
  ctx.fillText(`Lv ${island.level}`, s.x, s.y + sz * 1.1);
  ctx.restore();
}

// ---- ISLAND LANDMARK GLOW (clickable indicator) ----
function drawLandmark(island) {
  const s = worldToScreen(island.landmark.x, island.landmark.y);
  const pulse = 0.6 + Math.sin(oceanT * 0.06) * 0.2;
  const sz = 6 * camZoom;

  // glow ring
  ctx.save();
  ctx.strokeStyle = '#ffcc44';
  ctx.lineWidth = 2 * camZoom;
  ctx.globalAlpha = pulse * 0.4;
  ctx.beginPath();
  ctx.arc(s.x, s.y, sz * 2.5 + Math.sin(oceanT * 0.04) * sz * 0.5, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = pulse;
  // dot
  ctx.fillStyle = '#ffcc44';
  ctx.beginPath();
  ctx.arc(s.x, s.y, sz, 0, Math.PI * 2);
  ctx.fill();
  // inner
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(s.x, s.y, sz * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ---- HOVER / CLICK ----
let hoveredIsland = null;

function checkHover(e) {
  const wp = screenToWorld(e.clientX, e.clientY);
  hoveredIsland = null;
  for (const island of ISLANDS) {
    const dx = wp.x - island.x, dy = wp.y - island.y;
    if (Math.sqrt(dx*dx + dy*dy) < island.size * 1.1) {
      hoveredIsland = island;
      break;
    }
  }

  if (hoveredIsland) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.querySelector('.tt-name').textContent = hoveredIsland.name;
    tooltip.querySelector('.tt-type').textContent = hoveredIsland.biome + ' · ' + hoveredIsland.types.join(', ');
    tooltip.querySelector('.tt-desc').textContent = hoveredIsland.desc;
    tooltip.querySelector('.tt-level').textContent = 'Monster Level: ' + hoveredIsland.level;
    tooltip.style.borderColor = hoveredIsland.types.includes('fire') ? '#ff6633' :
      hoveredIsland.types.includes('water') ? '#3399ff' :
      hoveredIsland.types.includes('earth') ? '#88cc44' :
      hoveredIsland.types.includes('electric') ? '#ffcc00' :
      hoveredIsland.types.includes('shadow') ? '#aa66cc' :
      hoveredIsland.types.includes('ice') ? '#88ddff' : '#99cc33';
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = dragStart ? 'grabbing' : 'grab';
  }
}

function handleClick(e) {
  if (hoveredIsland) {
    clickedIsland = hoveredIsland;
    clickFlash = 1;
    console.log('Travel to:', hoveredIsland.name);
  }
}

// Mobile: tap to select island, show bottom panel
let selectedIsland = null;
const mobileInfo = document.getElementById('mobileInfo');

function handleTap(sx, sy) {
  const wp = screenToWorld(sx, sy);
  let tapped = null;
  for (const island of ISLANDS) {
    const dx = wp.x - island.x, dy = wp.y - island.y;
    if (Math.sqrt(dx*dx + dy*dy) < island.size * 1.3) {
      tapped = island;
      break;
    }
  }
  if (tapped) {
    selectedIsland = tapped;
    hoveredIsland = tapped;
    clickedIsland = tapped;
    clickFlash = 1;
    showMobileInfo(tapped);
  } else {
    closeMobileInfo();
  }
}

function showMobileInfo(island) {
  mobileInfo.querySelector('.mi-name').textContent = island.name;
  mobileInfo.querySelector('.mi-type').textContent = island.biome + ' \u00b7 ' + island.types.join(', ');
  mobileInfo.querySelector('.mi-desc').textContent = island.desc;
  mobileInfo.querySelector('.mi-level').textContent = 'Monster Level: ' + island.level;
  const typeColor = island.types.includes('fire') ? '#ff6633' :
    island.types.includes('water') ? '#3399ff' :
    island.types.includes('earth') ? '#88cc44' :
    island.types.includes('electric') ? '#ffcc00' :
    island.types.includes('shadow') ? '#aa66cc' :
    island.types.includes('ice') ? '#88ddff' : '#99cc33';
  mobileInfo.style.borderColor = typeColor;
  mobileInfo.classList.add('active');
}

function closeMobileInfo() {
  mobileInfo.classList.remove('active');
  selectedIsland = null;
  hoveredIsland = null;
}

function travelToIsland() {
  if (selectedIsland) {
    window.location.href = 'island.html';
  }
}

let clickedIsland = null;
let clickFlash = 0;

// ---- CLOUD LAYER ----
const clouds = [];
for (let i = 0; i < 12; i++) {
  clouds.push({
    x: -600 + Math.random() * 1200,
    y: -500 + Math.random() * 1000,
    size: 40 + Math.random() * 80,
    speed: 0.1 + Math.random() * 0.2,
    opacity: 0.03 + Math.random() * 0.05
  });
}

function drawClouds() {
  ctx.save();
  for (const cloud of clouds) {
    cloud.x += cloud.speed;
    if (cloud.x > 900) cloud.x = -700;
    const s = worldToScreen(cloud.x, cloud.y);
    const sz = cloud.size * camZoom;
    ctx.fillStyle = '#aabbcc';
    ctx.globalAlpha = cloud.opacity;
    ctx.beginPath();
    ctx.arc(s.x, s.y, sz, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s.x + sz * 0.6, s.y - sz * 0.1, sz * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s.x - sz * 0.5, s.y + sz * 0.1, sz * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ---- MAIN LOOP ----
function render() {
  oceanT++;
  drawOcean();
  drawRoutes();

  // sort islands by Y for overlap
  const sorted = [...ISLANDS].sort((a, b) => a.y - b.y);

  for (const island of sorted) {
    drawIslandCoast(island);
  }
  for (const island of sorted) {
    drawIslandFeatures(island);
    drawLandmark(island);
  }

  // highlight hovered island
  if (hoveredIsland) {
    const center = worldToScreen(hoveredIsland.x, hoveredIsland.y);
    const pts = hoveredIsland.coastline.map(p => worldToScreen(p.x, p.y));
    ctx.save();
    ctx.strokeStyle = '#ffcc44';
    ctx.lineWidth = 3 * camZoom;
    ctx.globalAlpha = 0.4 + Math.sin(oceanT * 0.08) * 0.15;
    ctx.beginPath();
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      const dx = p.x - center.x, dy = p.y - center.y;
      const ex = center.x + dx * 1.08, ey = center.y + dy * 1.08;
      if (i === 0) ctx.moveTo(ex, ey); else ctx.lineTo(ex, ey);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // click flash
  if (clickedIsland && clickFlash > 0) {
    const center = worldToScreen(clickedIsland.x, clickedIsland.y);
    ctx.save();
    ctx.globalAlpha = clickFlash * 0.4;
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.arc(center.x, center.y, clickedIsland.size * camZoom * 1.5 * (1.5 - clickFlash), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    clickFlash -= 0.02;
  }

  for (const island of sorted) {
    drawIslandLabel(island);
  }

  drawClouds();
  requestAnimationFrame(render);
}

render();
</script>
