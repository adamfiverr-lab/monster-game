<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verdantia — Explore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --abyss: #0b0e17;
    --deep: #111827;
    --panel: #151c2c;
    --card: #1a2236;
    --border: #263046;
    --muted: #4a5568;
    --text: #c9d1d9;
    --bright: #e2e8f0;
    --accent: #ef4444;
    --accent-glow: #f87171;
    --gold: #f59e0b;
    --gold-dim: #92690a;
    --hp-green: #22c55e;
    --hp-yellow: #eab308;
    --hp-red: #ef4444;
    --mana: #3b82f6;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:var(--abyss); color:var(--text); font-family:'Fira Code',monospace; }
  body { display:flex; flex-direction:column; }

  /* ---- SCENE CANVAS ---- */
  #sceneWrap {
    position:relative; flex:1 1 60%; min-height:0;
    overflow:hidden;
    border-bottom: 2px solid var(--border);
  }
  body.in-battle #sceneWrap { flex: 1 1 65%; }

  /* HP bars overlaid on canvas */
  #hpOverlay {
    position:absolute; left:0; right:0; top:0;
    padding:10px 10px 0;
    pointer-events:none; display:none;
    z-index:5;
  }
  #hpOverlay.active { display:flex; flex-direction:column; gap:4px; }
  #scene { width:100%; height:100%; display:block; }

  /* Encounter flash overlay */
  #flash {
    position:absolute; inset:0;
    background: white;
    opacity:0; pointer-events:none;
    transition: opacity 0.08s;
  }
  #flash.active { opacity:0.85; }

  /* Zone name overlay */
  #zoneBadge {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    font-family:'Cinzel',serif; font-weight:700; font-size:15px;
    color:var(--bright); letter-spacing:2px; text-transform:uppercase;
    background: linear-gradient(180deg, rgba(11,14,23,0.85) 0%, rgba(11,14,23,0.4) 100%);
    padding:6px 18px 5px; border-radius:20px;
    border:1px solid var(--border);
    text-shadow:0 1px 6px rgba(0,0,0,0.9);
    white-space:nowrap;
  }

  /* ---- BOTTOM UI ---- */
  #ui {
    flex:0 0 auto;
    background: var(--deep);
    display:flex; flex-direction:column;
    padding:0 0 var(--safe-bottom);
    max-height:45%;
    border-top:1px solid var(--border);
  }

  /* Zone selector */
  #zones {
    display:flex; gap:6px;
    padding:10px 12px 6px;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  #zones::-webkit-scrollbar { display:none; }
  .zone-pill {
    flex:0 0 auto;
    padding:7px 16px; border-radius:20px;
    font-family:'Cinzel',serif; font-weight:500; font-size:12px;
    letter-spacing:1px; text-transform:uppercase;
    background:var(--card); color:var(--muted);
    border:1px solid var(--border);
    cursor:pointer; transition:all 0.2s;
  }
  .zone-pill.active {
    background: linear-gradient(135deg, var(--accent) 0%, #b91c1c 100%);
    color:#fff; border-color:var(--accent);
    box-shadow:0 0 12px rgba(239,68,68,0.3);
  }

  /* Explore mode */
  #exploreUI { padding:12px 16px 16px; text-align:center; }
  #exploreBtn {
    width:100%; max-width:320px;
    padding:18px 0; border:none; border-radius:14px;
    font-family:'Cinzel',serif; font-weight:900; font-size:18px;
    letter-spacing:3px; text-transform:uppercase;
    background: linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow: 0 4px 20px rgba(239,68,68,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: transform 0.1s, box-shadow 0.2s;
    position:relative; overflow:hidden;
  }
  #exploreBtn:active { transform:scale(0.97); box-shadow:0 2px 10px rgba(239,68,68,0.25); }
  #exploreBtn.walking {
    background: linear-gradient(135deg, var(--muted) 0%, #374151 100%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    pointer-events:none;
  }
  #exploreBtn .shimmer {
    position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
    animation: shimmer 2.5s infinite;
  }
  @keyframes shimmer { 0%{left:-100%} 100%{left:100%} }
  #exploreStatus {
    margin-top:10px; font-size:11px; color:var(--muted);
    letter-spacing:1px; min-height:16px;
  }

  /* Battle mode — only moves + flee at bottom */
  #battleUI { display:none; padding:6px 10px 8px; }
  #battleUI.active { display:flex; flex-direction:column; gap:6px; }

  /* HP bars */
  .hp-section {
    display:flex; align-items:center; gap:6px;
    padding:4px 8px; background:rgba(17,24,39,0.85); border-radius:8px;
    border:1px solid var(--border);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  .hp-name {
    font-family:'Cinzel',serif; font-weight:700; font-size:11px;
    color:var(--bright); min-width:0; flex:0 0 auto;
    max-width:72px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .hp-bar-wrap {
    flex:1; height:8px; background:var(--abyss);
    border-radius:4px; overflow:hidden; position:relative;
    border:1px solid var(--border);
  }
  .hp-bar {
    height:100%; border-radius:4px;
    transition:width 0.5s ease, background 0.3s;
    position:relative;
  }
  .hp-bar::after {
    content:''; position:absolute; top:0; left:0; right:0; height:40%;
    background:linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%);
    border-radius:4px 4px 0 0;
  }
  .hp-text {
    font-size:10px; color:var(--muted); flex:0 0 auto;
    font-variant-numeric: tabular-nums;
    min-width:46px; text-align:right;
  }
  .hp-lv {
    font-size:9px; color:var(--gold-dim); flex:0 0 auto;
  }

  /* Moves grid */
  #movesGrid {
    display:grid; grid-template-columns:1fr 1fr; gap:6px;
  }
  .move-btn {
    padding:10px 6px; border:none; border-radius:10px;
    font-family:'Fira Code',monospace; font-size:11px; font-weight:600;
    cursor:pointer; text-align:center;
    background: var(--card);
    color:var(--bright);
    border:1px solid var(--border);
    transition: transform 0.1s, border-color 0.15s;
    position:relative; overflow:hidden;
  }
  .move-btn:active { transform:scale(0.95); }
  .move-btn .mv-name { display:block; margin-bottom:1px; font-size:11px; }
  .move-btn .mv-dmg { display:block; font-size:9px; color:var(--muted); }
  .move-btn.type-fire { border-color:#cc330066; background:linear-gradient(135deg, #1a0a0a 0%, var(--card) 100%); }
  .move-btn.type-water { border-color:#1166cc66; background:linear-gradient(135deg, #0a0a1a 0%, var(--card) 100%); }
  .move-btn.type-earth { border-color:#55772266; background:linear-gradient(135deg, #0a1a0a 0%, var(--card) 100%); }
  .move-btn.type-electric { border-color:#cc990066; background:linear-gradient(135deg, #1a1a0a 0%, var(--card) 100%); }
  .move-btn.type-shadow { border-color:#44226666; background:linear-gradient(135deg, #10061a 0%, var(--card) 100%); }
  .move-btn.type-ice { border-color:#4488aa66; background:linear-gradient(135deg, #0a1218 0%, var(--card) 100%); }
  .move-btn.type-toxic { border-color:#44661166; background:linear-gradient(135deg, #0e1a06 0%, var(--card) 100%); }

  #battleBottom {
    display:flex; gap:6px;
  }
  #runBtn {
    flex:0 0 auto;
    padding:10px 16px; border:none; border-radius:10px;
    font-family:'Cinzel',serif; font-weight:700; font-size:11px;
    letter-spacing:1px; text-transform:uppercase;
    background:var(--card); color:var(--muted);
    border:1px solid var(--border); cursor:pointer;
    transition: transform 0.1s;
  }
  #runBtn:active { transform:scale(0.97); }

  /* Battle log */
  #battleLog {
    flex:1;
    font-size:10px; color:var(--muted); text-align:center;
    display:flex; align-items:center; justify-content:center;
    min-height:14px; padding:0;
    letter-spacing:0.5px;
  }
  #battleLog.hit { color:var(--accent-glow); }
  #battleLog.heal { color:var(--hp-green); }

  /* Damage popup on canvas */
  .dmg-float {
    position:absolute; pointer-events:none;
    font-family:'Cinzel',serif; font-weight:900; font-size:28px;
    color:var(--accent-glow); text-shadow:0 2px 8px rgba(0,0,0,0.8);
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity:1; transform:translateY(0) scale(1.2); }
    100% { opacity:0; transform:translateY(-50px) scale(0.8); }
  }

  /* Victory / defeat overlay */
  #resultOverlay {
    position:fixed; inset:0; background:rgba(11,14,23,0.92);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; z-index:100;
  }
  #resultOverlay.active { display:flex; }
  #resultTitle {
    font-family:'Cinzel',serif; font-weight:900; font-size:32px;
    letter-spacing:4px; text-transform:uppercase; margin-bottom:8px;
  }
  #resultSub { font-size:13px; color:var(--muted); margin-bottom:24px; letter-spacing:1px; }
  #resultBtn {
    padding:16px 48px; border:none; border-radius:12px;
    font-family:'Cinzel',serif; font-weight:700; font-size:16px;
    letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow:0 4px 20px rgba(239,68,68,0.3);
  }
  #resultBtn:active { transform:scale(0.96); }

  /* Screen shake */
  .shake { animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100%{transform:translate(0)} 20%{transform:translate(-4px,2px)} 40%{transform:translate(4px,-2px)} 60%{transform:translate(-3px,3px)} 80%{transform:translate(3px,-1px)}
  }

  /* ---- EXPEDITION UI ---- */
  #expeditionUI { display:none; padding:0; }
  #expeditionUI.active { display:flex; flex-direction:column; }

  #expTopBar {
    display:flex; align-items:center; gap:8px;
    padding:8px 12px 4px;
  }
  #expStepLabel {
    font-family:'Cinzel',serif; font-weight:700; font-size:10px;
    color:var(--gold); letter-spacing:1px; text-transform:uppercase;
    flex:0 0 auto;
  }
  #expProgressWrap {
    flex:1; height:5px; background:var(--abyss);
    border-radius:3px; overflow:hidden; border:1px solid var(--border);
  }
  #expProgressBar {
    height:100%; background:var(--gold); border-radius:3px;
    transition: width 0.5s ease;
  }
  #expHPMini {
    font-size:9px; color:var(--hp-green); flex:0 0 auto;
    font-family:'Fira Code',monospace;
  }

  #expEventBar {
    display:none; padding:4px 12px 8px;
  }
  #expEventBar.active { display:flex; flex-direction:column; gap:6px; }
  #expEventText {
    font-size:12px; color:var(--bright);
    font-family:'Cinzel',serif; font-weight:700;
    letter-spacing:0.5px;
    text-align:center;
  }
  #expEventSub {
    font-size:10px; color:var(--muted); text-align:center;
    letter-spacing:0.3px;
  }
  #expChoices {
    display:flex; gap:6px;
  }
  .exp-btn {
    flex:1; padding:12px 6px; border:none; border-radius:10px;
    font-family:'Cinzel',serif; font-weight:700; font-size:12px;
    letter-spacing:1px; text-transform:uppercase;
    cursor:pointer; transition:transform 0.1s;
    text-align:center; color:#fff;
  }
  .exp-btn:active { transform:scale(0.96); }
  .exp-btn.fight { background:linear-gradient(135deg, var(--accent) 0%, #991b1b 100%); box-shadow:0 3px 10px rgba(239,68,68,0.3); }
  .exp-btn.loot { background:linear-gradient(135deg, #92690a 0%, #b8860b 100%); box-shadow:0 3px 10px rgba(245,158,11,0.2); }
  .exp-btn.heal { background:linear-gradient(135deg, #166534 0%, #15803d 100%); }
  .exp-btn.info { background:var(--card); border:1px solid var(--border); color:var(--text); }
  .exp-btn.walk { background:linear-gradient(135deg, #334155 0%, #475569 100%); }

  #expWalkPrompt {
    text-align:center; padding:6px 12px 10px;
    font-size:11px; color:var(--muted); letter-spacing:1px;
    font-family:'Cinzel',serif;
  }

  /* Toast notification on canvas */
  #expToast {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    background:rgba(11,14,23,0.9); border:1px solid var(--border);
    padding:6px 16px; border-radius:12px;
    font-size:11px; color:var(--gold);
    font-family:'Cinzel',serif; font-weight:700;
    letter-spacing:1px; white-space:nowrap;
    pointer-events:none; opacity:0;
    transition:opacity 0.3s;
    z-index:4;
  }
  #expToast.show { opacity:1; }

  /* Expedition summary overlay */
  #expSummary {
    position:fixed; inset:0; background:rgba(11,14,23,0.95);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; z-index:100; padding:20px;
  }
  #expSummary.active { display:flex; }
  #expSummary h2 {
    font-family:'Cinzel',serif; font-weight:900; font-size:24px;
    color:var(--gold); letter-spacing:3px; text-transform:uppercase;
    margin-bottom:16px;
  }
  .summary-line {
    font-size:12px; color:var(--text); margin-bottom:6px;
    letter-spacing:0.5px;
  }
  .summary-line span { color:var(--gold); font-weight:600; }
  #expSummary button {
    margin-top:20px;
    padding:14px 40px; border:none; border-radius:12px;
    font-family:'Cinzel',serif; font-weight:700; font-size:15px;
    letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow:0 4px 20px rgba(239,68,68,0.3);
  }
</style>
</head>
<body>

<div id="sceneWrap">
  <canvas id="scene"></canvas>
  <div id="flash"></div>
  <div id="expToast"></div>
  <div id="zoneBadge">Verdantia — Beach</div>
  <div id="hpOverlay">
    <div class="hp-section" id="enemyHP">
      <span class="hp-name" id="enemyName">???</span>
      <span class="hp-lv" id="enemyLv">Lv5</span>
      <div class="hp-bar-wrap"><div class="hp-bar" id="enemyBar" style="width:100%;background:var(--hp-green)"></div></div>
      <span class="hp-text" id="enemyHPText">80/80</span>
    </div>
    <div class="hp-section" id="playerHP">
      <span class="hp-name" id="playerName">???</span>
      <span class="hp-lv" id="playerLv">Lv5</span>
      <div class="hp-bar-wrap"><div class="hp-bar" id="playerBar" style="width:100%;background:var(--hp-green)"></div></div>
      <span class="hp-text" id="playerHPText">100/100</span>
    </div>
  </div>
</div>

<div id="ui">
  <div id="zones">
    <div class="zone-pill active" data-zone="beach">Beach</div>
    <div class="zone-pill" data-zone="forest">Forest</div>
    <div class="zone-pill" data-zone="deepwoods">Deep Woods</div>
    <div class="zone-pill" data-zone="cave">Cave</div>
  </div>

  <div id="exploreUI">
    <button id="exploreBtn">
      <span class="shimmer"></span>
      Set Out
    </button>
    <div id="exploreStatus"></div>
  </div>

  <div id="expeditionUI">
    <div id="expTopBar">
      <span id="expStepLabel">1/8</span>
      <div id="expProgressWrap"><div id="expProgressBar" style="width:0%"></div></div>
      <span id="expHPMini">95/95</span>
    </div>
    <div id="expEventBar">
      <div id="expEventText"></div>
      <div id="expEventSub"></div>
      <div id="expChoices"></div>
    </div>
    <div id="expWalkPrompt">Tap to move</div>
    <div id="expExitWrap" style="padding:2px 12px 8px; text-align:right;">
      <button class="exp-btn info" style="flex:0;padding:8px 16px;font-size:10px;" onclick="endExpedition()">Exit</button>
    </div>
  </div>

  <div id="battleUI">
    <div id="movesGrid"></div>
    <div id="battleBottom">
      <button id="runBtn" ontouchend="runFromBattle()" onclick="runFromBattle()">Flee</button>
      <div id="battleLog">&nbsp;</div>
    </div>
  </div>
</div>

<div id="resultOverlay">
  <div id="resultTitle">Victory</div>
  <div id="resultSub">+35 XP gained</div>
  <button id="resultBtn" ontouchend="dismissResult()" onclick="dismissResult()">Continue</button>
</div>

<div id="expSummary">
  <h2>Expedition Complete</h2>
  <div id="summaryContent"></div>
  <button onclick="dismissSummary()">Return</button>
</div>

<script>
// ---- UTILS ----
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[rng(0,a.length-1)]}
function pickN(a,n){return[...a].sort(()=>Math.random()-0.5).slice(0,n)}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('')}
function lighten(h,a){const c=hexToRgb(h);return rgbToHex(c.r+(255-c.r)*a,c.g+(255-c.g)*a,c.b+(255-c.b)*a)}
function darken(h,a){const c=hexToRgb(h);return rgbToHex(c.r*(1-a),c.g*(1-a),c.b*(1-a))}

// ---- CANVAS SETUP ----
const sceneCanvas = document.getElementById('scene');
const ctx = sceneCanvas.getContext('2d');
let W, H;
function resizeCanvas(){
  const r = window.devicePixelRatio || 1;
  const rect = sceneCanvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  sceneCanvas.width = W * r; sceneCanvas.height = H * r;
  sceneCanvas.style.width = W + 'px'; sceneCanvas.style.height = H + 'px';
  ctx.setTransform(r,0,0,r,0,0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ---- GAME STATE ----
let gameState = 'explore'; // 'explore' | 'expedition' | 'walking' | 'encounter' | 'battle'
let animT = 0;
let currentZone = 'beach';
let walkProgress = 0;
let encounterTimer = 0;
let scrollOffset = 0;

// ---- TOP-DOWN FREE-ROAM EXPLORATION ----
const MAP_W = 22, MAP_H = 22;
const TILE_PX = 28;
const VIEW_RAD = 5;
const ENCOUNTER_CHANCE = 0.18;
const MOVE_SPEED = 2.8;

// Tile types
const T = { VOID:0, GRASS:1, TALL:2, PATH:3, TREE:4, WATER:5, ROCK:6, WALL:7, SAND:8 };

const map = {
  tiles: null, seen: null, objects: [], // {gx,gy,type,data,done}
  px:0, py:0, gx:0, gy:0, // player pixel + grid pos
  tgx:0, tgy:0, // target
  path:[], moving:false, facing:1, // 0=up 1=right 2=down 3=left
  camX:0, camY:0,
};
let expStats = { battles:0, loot:[], healed:0, lore:0, gold:0 };
let expToastTimer = null;
let mapInteracting = false;

const ITEMS = {
  beach: [
    { name:'Sea Crystal', effect:'heal', value:20 },
    { name:'Pearl Shard', effect:'gold', value:30 },
    { name:'Coral Crown', effect:'heal', value:40 },
  ],
  forest: [
    { name:'Verdant Root', effect:'heal', value:25 },
    { name:'Hunter\'s Coin', effect:'gold', value:25 },
    { name:'Sylvan Tear', effect:'heal', value:45 },
  ],
  deepwoods: [
    { name:'Shadow Moss', effect:'heal', value:30 },
    { name:'Cursed Doubloon', effect:'gold', value:40 },
    { name:'Heartwood Sap', effect:'heal', value:50 },
  ],
  cave: [
    { name:'Glowstone', effect:'heal', value:25 },
    { name:'Vein Gold', effect:'gold', value:45 },
    { name:'Dragon Scale', effect:'heal', value:50 },
  ],
};

// Zone tile colors
const ZONE_TILES = {
  beach:    { base:T.SAND, block:T.ROCK, grass:['#c2a67a','#b89a6e','#d4b88a'], tall:['#6a8a3a','#5a7a2a'], path:['#a89060','#9a8050'], block_c:'#888877', tree_c:['#8B6914','#3a8a2e'], water:['#1a6688','#2277aa'] },
  forest:   { base:T.GRASS, block:T.TREE, grass:['#3a6a2a','#2d5a20','#4a7a34'], tall:['#2a5a1a','#1d4a10'], path:['#6a5a3a','#5a4a2a'], block_c:'#2a5a1a', tree_c:['#3a2818','#2a6a1a'], water:['#1a5566','#1a6688'] },
  deepwoods:{ base:T.GRASS, block:T.TREE, grass:['#1a3a14','#15301a','#224a1e'], tall:['#102a0a','#0d2208'], path:['#3a3020','#2a2010'], block_c:'#1a3a10', tree_c:['#2a1808','#183a0a'], water:['#0d3344','#104455'] },
  cave:     { base:T.GRASS, block:T.WALL, grass:['#2a2a30','#252530','#333340'], tall:['#1a1a28','#18182a'], path:['#3a3a40','#333338'], block_c:'#1a1a22', tree_c:['#3a3a44','#444450'], water:['#0a1a2a','#0d2030'] },
};

function isWalkable(t) { return t===T.GRASS||t===T.TALL||t===T.PATH||t===T.SAND; }
function tileAt(gx,gy) { return (gx<0||gx>=MAP_W||gy<0||gy>=MAP_H) ? T.VOID : map.tiles[gy*MAP_W+gx]; }

// ---- MAP GENERATION ----
function generateMap(zone) {
  const tiles = new Uint8Array(MAP_W*MAP_H);
  const zt = ZONE_TILES[zone];

  // Fill with blocking
  tiles.fill(zt.block);

  // Random walks to carve open space
  for (let w = 0; w < 5; w++) {
    let cx = Math.floor(MAP_W/2) + rng(-3,3);
    let cy = Math.floor(MAP_H/2) + rng(-3,3);
    for (let s = 0; s < 90; s++) {
      for (let dx = -1; dx <= 1; dx++)
        for (let dy = -1; dy <= 1; dy++) {
          const nx=cx+dx, ny=cy+dy;
          if (nx>0&&nx<MAP_W-1&&ny>0&&ny<MAP_H-1) tiles[ny*MAP_W+nx] = zt.base;
        }
      const d = rng(0,3);
      if(d===0&&cy>2)cy--; if(d===1&&cy<MAP_H-3)cy++;
      if(d===2&&cx>2)cx--; if(d===3&&cx<MAP_W-3)cx++;
    }
  }

  // Cellular automata smoothing (2 passes)
  for (let pass=0; pass<2; pass++) {
    const copy = new Uint8Array(tiles);
    for (let y=1;y<MAP_H-1;y++) for (let x=1;x<MAP_W-1;x++) {
      let open=0;
      for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
        if (isWalkable(copy[(y+dy)*MAP_W+(x+dx)])) open++;
      }
      tiles[y*MAP_W+x] = open>=5 ? zt.base : zt.block;
    }
  }

  // Carve a path from bottom-center to top area
  let px = Math.floor(MAP_W/2), py = MAP_H-3;
  tiles[py*MAP_W+px] = T.PATH;
  while (py > 3) {
    const r = Math.random();
    if (r<0.5&&py>2) py--;
    else if (r<0.75&&px<MAP_W-3) px++;
    else if (px>2) px--;
    tiles[py*MAP_W+px] = T.PATH;
    if (Math.random()<0.3) { // widen path
      if(px+1<MAP_W-1) tiles[py*MAP_W+px+1]=T.PATH;
      if(px-1>0) tiles[py*MAP_W+px-1]=T.PATH;
    }
  }

  // Scatter tall grass (25% of open tiles)
  for (let i=0;i<tiles.length;i++) {
    if (tiles[i]===zt.base && Math.random()<0.25) tiles[i]=T.TALL;
  }

  // Add some water pools
  for (let w=0;w<rng(1,3);w++) {
    const wx=rng(3,MAP_W-4), wy=rng(3,MAP_H-4);
    for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
      if (Math.random()<0.7 && tiles[(wy+dy)*MAP_W+(wx+dx)]!==T.PATH)
        tiles[(wy+dy)*MAP_W+(wx+dx)]=T.WATER;
    }
  }

  // Keep borders as blocking
  for (let x=0;x<MAP_W;x++) { tiles[x]=zt.block; tiles[(MAP_H-1)*MAP_W+x]=zt.block; }
  for (let y=0;y<MAP_H;y++) { tiles[y*MAP_W]=zt.block; tiles[y*MAP_W+MAP_W-1]=zt.block; }

  map.tiles = tiles;
  map.seen = new Uint8Array(MAP_W*MAP_H);

  // Find spawn point (bottom-center path tile)
  map.gx = Math.floor(MAP_W/2); map.gy = MAP_H-3;
  // Ensure spawn is walkable
  tiles[map.gy*MAP_W+map.gx] = T.PATH;
  map.px = map.gx*TILE_PX+TILE_PX/2;
  map.py = map.gy*TILE_PX+TILE_PX/2;
  map.path = []; map.moving = false;

  // Place objects on open tiles away from spawn
  map.objects = [];
  const placedSpots = new Set();
  placedSpots.add(map.gx+','+map.gy);

  function findSpot(minDist) {
    for (let tries=0;tries<200;tries++) {
      const gx=rng(2,MAP_W-3), gy=rng(2,MAP_H-3);
      if (!isWalkable(tiles[gy*MAP_W+gx])) continue;
      const key=gx+','+gy;
      if (placedSpots.has(key)) continue;
      const dx=gx-map.gx, dy=gy-map.gy;
      if (Math.sqrt(dx*dx+dy*dy)<minDist) continue;
      // Check no other object within 3 tiles
      let tooClose = false;
      for (const k of placedSpots) {
        const [ox,oy]=k.split(',').map(Number);
        if (Math.abs(gx-ox)+Math.abs(gy-oy)<3) { tooClose=true; break; }
      }
      if (tooClose) continue;
      placedSpots.add(key);
      return {gx,gy};
    }
    return null;
  }

  // Chests
  for (let i=0;i<rng(2,4);i++) {
    const s=findSpot(3);
    if(s) map.objects.push({...s,type:'chest',data:pick(ITEMS[zone]),done:false});
  }
  // Campfires
  for (let i=0;i<rng(1,2);i++) {
    const s=findSpot(4);
    if(s) map.objects.push({...s,type:'campfire',done:false});
  }
  // NPC
  { const s=findSpot(4); if(s) map.objects.push({...s,type:'npc',done:false}); }
  // Visible monsters
  for (let i=0;i<rng(3,5);i++) {
    const s=findSpot(3);
    if(s) map.objects.push({...s,type:'monster',data:generateEnemy(),done:false});
  }
  // Boss (far from spawn)
  { const s=findSpot(8); if(s) {
    const boss = generateEnemy();
    boss.level = rng(12,18);
    boss.stats.hp = 80+boss.level*8; boss.stats.atk = 25+boss.level*4; boss.stats.def = 15+boss.level*3;
    boss.currentHP = boss.stats.hp;
    boss.body.size = (boss.body?.size||1)*1.3; boss.body.bulk = (boss.body?.bulk||1)*1.2;
    boss.moves.forEach(m => m.damage = Math.floor(m.damage*1.3));
    const names = {beach:['Tidecrusher','Reefmaw'],forest:['Thornking','Mossfang'],
      deepwoods:['Gloomfang','Rotcrown'],cave:['Deepjaw','Cavewyrm']};
    boss.name = pick(names[zone]||names.forest);
    map.objects.push({...s,type:'boss',data:boss,done:false});
  }}

  revealAround(map.gx, map.gy);
}

function revealAround(gx,gy) {
  for (let dy=-VIEW_RAD;dy<=VIEW_RAD;dy++)
    for (let dx=-VIEW_RAD;dx<=VIEW_RAD;dx++) {
      if (dx*dx+dy*dy>VIEW_RAD*VIEW_RAD) continue;
      const tx=gx+dx, ty=gy+dy;
      if (tx>=0&&tx<MAP_W&&ty>=0&&ty<MAP_H) map.seen[ty*MAP_W+tx]=1;
    }
}

// ---- A* PATHFINDING ----
function findPath(sx,sy,ex,ey) {
  if (sx===ex&&sy===ey) return [];
  if (!isWalkable(tileAt(ex,ey))) return [];

  const open = [{x:sx,y:sy,g:0,f:0,p:null}];
  const closed = new Set();
  const key = (x,y)=>y*MAP_W+x;

  while (open.length>0) {
    open.sort((a,b)=>a.f-b.f);
    const cur = open.shift();
    const ck = key(cur.x,cur.y);
    if (closed.has(ck)) continue;
    closed.add(ck);

    if (cur.x===ex&&cur.y===ey) {
      const path=[];
      let n=cur;
      while(n.p) { path.unshift({x:n.x,y:n.y}); n=n.p; }
      return path;
    }

    for (const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx=cur.x+dx, ny=cur.y+dy;
      if (nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) continue;
      if (!isWalkable(tileAt(nx,ny))) continue;
      const nk=key(nx,ny);
      if (closed.has(nk)) continue;
      // Also allow walking onto object tiles (they're walkable tiles with objects on them)
      const g=cur.g+1;
      const h=Math.abs(nx-ex)+Math.abs(ny-ey);
      open.push({x:nx,y:ny,g,f:g+h,p:cur});
    }

    if (closed.size > 400) return []; // safety limit
  }
  return [];
}

// ---- EXPEDITION LIFECYCLE ----
function startExpedition() {
  if (gameState !== 'explore') return;
  generateMap(currentZone);

  expStats = { battles:0, loot:[], healed:0, lore:0, gold:0 };
  mapInteracting = false;
  gameState = 'expedition';

  document.getElementById('exploreUI').style.display = 'none';
  document.getElementById('zones').style.display = 'none';
  document.getElementById('expeditionUI').classList.add('active');
  document.getElementById('expWalkPrompt').textContent = 'Tap to move';
  updateExpUI();
  showWalkPrompt();

  sceneCanvas.addEventListener('click', expTapHandler);
}

function expTapHandler(e) {
  e.preventDefault();
  if (gameState !== 'expedition' || !map.tiles) return;
  if (mapInteracting) return;

  const rect = sceneCanvas.getBoundingClientRect();
  const r = window.devicePixelRatio||1;
  const tapX = e.clientX - rect.left;
  const tapY = e.clientY - rect.top;

  const worldX = tapX + map.camX;
  const worldY = tapY + map.camY;
  const gx = Math.floor(worldX / TILE_PX);
  const gy = Math.floor(worldY / TILE_PX);

  if (gx<0||gx>=MAP_W||gy<0||gy>=MAP_H) return;
  if (!isWalkable(tileAt(gx,gy))) return;

  const path = findPath(map.gx, map.gy, gx, gy);
  if (path.length > 0 && path.length <= 50) {
    map.path = path;
    map.moving = true;
    hideWalkPrompt();
  }
}

function updateExpUI() {
  // Count explored %
  let seen=0;
  if(map.seen) for(let i=0;i<map.seen.length;i++) if(map.seen[i]) seen++;
  const pct = map.seen ? Math.floor(seen/(MAP_W*MAP_H)*100) : 0;
  document.getElementById('expStepLabel').textContent = pct+'%';
  document.getElementById('expProgressBar').style.width = pct+'%';
  document.getElementById('expHPMini').textContent = `${playerMonster.currentHP}/${playerMonster.stats.hp}`;
  document.getElementById('expHPMini').style.color =
    playerMonster.currentHP > playerMonster.stats.hp*0.5 ? 'var(--hp-green)' :
    playerMonster.currentHP > playerMonster.stats.hp*0.2 ? 'var(--hp-yellow)' : 'var(--hp-red)';
}

function showWalkPrompt() {
  document.getElementById('expWalkPrompt').style.display = '';
  document.getElementById('expEventBar').classList.remove('active');
}
function hideWalkPrompt() {
  document.getElementById('expWalkPrompt').style.display = 'none';
}

function showEventUI(title, sub, choices) {
  hideWalkPrompt();
  mapInteracting = true;
  const bar = document.getElementById('expEventBar');
  document.getElementById('expEventText').textContent = title;
  document.getElementById('expEventSub').textContent = sub || '';
  const wrap = document.getElementById('expChoices');
  wrap.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'exp-btn ' + (c.style || 'walk');
    btn.textContent = c.label;
    btn.addEventListener('click', ev => { ev.preventDefault(); c.action(); });
    wrap.appendChild(btn);
  });
  bar.classList.add('active');
}

function resumeMapExplore() {
  mapInteracting = false;
  showWalkPrompt();
  updateExpUI();
}

function showToast(text) {
  const t = document.getElementById('expToast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(expToastTimer);
  expToastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ---- TILE ARRIVAL & INTERACTIONS ----
function handleTileArrival(gx, gy) {
  const tile = map.tiles[gy*MAP_W+gx];

  // Tall grass encounter
  if (tile === T.TALL && Math.random() < ENCOUNTER_CHANCE) {
    map.path = []; map.moving = false;
    showToast('Wild encounter!');
    const flash = document.getElementById('flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 150);
    enemyMonster = generateEnemy();
    expStats.battles++;
    setTimeout(() => {
      document.getElementById('expeditionUI').classList.remove('active');
      startBattle();
    }, 400);
    return;
  }

  // Check object
  const obj = map.objects.find(o => o.gx===gx && o.gy===gy && !o.done);
  if (obj) {
    map.path = []; map.moving = false;
    handleObjectInteraction(obj);
  }
}

function handleObjectInteraction(obj) {
  switch (obj.type) {
    case 'chest':
      showEventUI('Treasure found!', obj.data.name, [
        { label:'Take', style:'loot', action:() => {
          expStats.loot.push(obj.data);
          if (obj.data.effect==='heal') {
            playerMonster.currentHP = Math.min(playerMonster.stats.hp, playerMonster.currentHP+obj.data.value);
            expStats.healed += obj.data.value;
            showToast(obj.data.name+' +'+obj.data.value+' HP');
          } else {
            expStats.gold += obj.data.value;
            showToast(obj.data.name+' +'+obj.data.value+' Gold');
          }
          obj.done = true;
          resumeMapExplore();
        }},
        { label:'Leave', style:'walk', action:() => resumeMapExplore() },
      ]);
      break;

    case 'campfire':
      showEventUI('Campfire', 'Rest and recover?', [
        { label:'Rest', style:'heal', action:() => {
          const heal = Math.floor(playerMonster.stats.hp*0.4);
          playerMonster.currentHP = Math.min(playerMonster.stats.hp, playerMonster.currentHP+heal);
          expStats.healed += heal;
          showToast('+'+heal+' HP restored');
          obj.done = true;
          resumeMapExplore();
        }},
        { label:'Skip', style:'walk', action:() => resumeMapExplore() },
      ]);
      break;

    case 'npc':
      showEventUI('Wandering Traveler', '"Rest a moment, friend."', [
        { label:'Accept aid', style:'heal', action:() => {
          const heal = rng(15,35);
          playerMonster.currentHP = Math.min(playerMonster.stats.hp, playerMonster.currentHP+heal);
          expStats.healed += heal;
          showToast('+'+heal+' HP');
          obj.done = true;
          resumeMapExplore();
        }},
        { label:'Move on', style:'walk', action:() => resumeMapExplore() },
      ]);
      break;

    case 'monster':
    case 'boss':
      showEventUI('Wild '+obj.data.name+'!', 'Lv'+obj.data.level+(obj.type==='boss'?' BOSS':''), [
        { label:'Fight', style:'fight', action:() => {
          enemyMonster = obj.data;
          expStats.battles++;
          obj.done = true;
          const flash = document.getElementById('flash');
          flash.classList.add('active');
          setTimeout(() => flash.classList.remove('active'), 150);
          document.getElementById('expeditionUI').classList.remove('active');
          mapInteracting = false;
          setTimeout(() => startBattle(), 400);
        }},
        ...(obj.type!=='boss' ? [{ label:'Avoid', style:'walk', action:() => resumeMapExplore() }] : []),
      ]);
      break;
  }
}

// ---- PLAYER MOVEMENT ----
function updatePlayerMovement() {
  if (!map.moving || map.path.length===0) { map.moving=false; return; }

  const next = map.path[0];
  const tx = next.x*TILE_PX+TILE_PX/2;
  const ty = next.y*TILE_PX+TILE_PX/2;
  const dx = tx-map.px, dy = ty-map.py;
  const dist = Math.sqrt(dx*dx+dy*dy);

  // Update facing
  if (Math.abs(dx)>Math.abs(dy)) map.facing = dx>0?1:3;
  else map.facing = dy>0?2:0;

  if (dist < MOVE_SPEED) {
    map.px = tx; map.py = ty;
    map.gx = next.x; map.gy = next.y;
    map.path.shift();
    revealAround(next.x, next.y);
    handleTileArrival(next.x, next.y);
  } else {
    map.px += (dx/dist)*MOVE_SPEED;
    map.py += (dy/dist)*MOVE_SPEED;
  }
}

function updateMapCamera() {
  const targetX = map.px - W/2;
  const targetY = map.py - H/2;
  map.camX += (targetX-map.camX)*0.12;
  map.camY += (targetY-map.camY)*0.12;
  map.camX = clamp(map.camX, 0, Math.max(0, MAP_W*TILE_PX-W));
  map.camY = clamp(map.camY, 0, Math.max(0, MAP_H*TILE_PX-H));
}

// ---- EXPEDITION END ----
function endExpedition() {
  gameState = 'explore';
  sceneCanvas.removeEventListener('click', expTapHandler);
  map.moving = false;

  const content = document.getElementById('summaryContent');
  content.innerHTML = `
    <div class="summary-line">Battles: <span>${expStats.battles}</span></div>
    <div class="summary-line">Items: <span>${expStats.loot.length}</span></div>
    <div class="summary-line">Gold: <span>${expStats.gold}</span></div>
    <div class="summary-line">HP restored: <span>${expStats.healed}</span></div>
  `;
  document.getElementById('expeditionUI').classList.remove('active');
  document.getElementById('expSummary').classList.add('active');
}

function dismissSummary() {
  document.getElementById('expSummary').classList.remove('active');
  document.getElementById('exploreUI').style.display = '';
  document.getElementById('zones').style.display = '';
  document.getElementById('exploreBtn').innerHTML = '<span class="shimmer"></span>Set Out';
  map.tiles = null; map.seen = null; map.objects = [];
  playerMonster.currentHP = playerMonster.stats.hp;
}

// ---- TOP-DOWN TILE RENDERING ----
function drawTile(type, sx, sy, gx, gy, zone) {
  const zt = ZONE_TILES[zone];
  const v = ((gx*7+gy*13)&3); // variation

  switch(type) {
    case T.GRASS: case T.SAND:
      ctx.fillStyle = zt.grass[v%zt.grass.length];
      ctx.fillRect(sx,sy,TILE_PX,TILE_PX);
      // Subtle grass tufts
      ctx.save(); ctx.globalAlpha=0.3; ctx.strokeStyle=zt.grass[(v+1)%zt.grass.length]; ctx.lineWidth=0.8;
      if(v<2){ ctx.beginPath(); ctx.moveTo(sx+8,sy+TILE_PX-4); ctx.lineTo(sx+10,sy+TILE_PX-10); ctx.stroke(); }
      if(v>0){ ctx.beginPath(); ctx.moveTo(sx+20,sy+TILE_PX-6); ctx.lineTo(sx+18,sy+TILE_PX-12); ctx.stroke(); }
      ctx.restore();
      break;
    case T.TALL:
      ctx.fillStyle = zt.grass[v%zt.grass.length];
      ctx.fillRect(sx,sy,TILE_PX,TILE_PX);
      // Swaying tall grass blades
      ctx.save(); ctx.globalAlpha=0.8;
      const sw = Math.sin(animT*0.06+gx*2+gy)*2;
      for (let b=0;b<4;b++) {
        const bx = sx+5+b*6+((gx+gy+b)%3)*2;
        const by = sy+TILE_PX-2;
        ctx.strokeStyle = zt.tall[b%zt.tall.length]; ctx.lineWidth=1.5; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(bx,by);
        ctx.quadraticCurveTo(bx+sw,by-8,bx+sw*1.2,by-14-((gx+b)%3)*2);
        ctx.stroke();
      }
      ctx.restore();
      break;
    case T.PATH:
      ctx.fillStyle = zt.path[v%zt.path.length];
      ctx.fillRect(sx,sy,TILE_PX,TILE_PX);
      ctx.save(); ctx.globalAlpha=0.15; ctx.fillStyle='#000';
      if(v===0){ ctx.beginPath(); ctx.arc(sx+8,sy+10,2,0,Math.PI*2); ctx.fill(); }
      if(v===2){ ctx.beginPath(); ctx.arc(sx+18,sy+20,1.5,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
      break;
    case T.TREE:
      // Ground underneath
      ctx.fillStyle = zt.grass[0]; ctx.fillRect(sx,sy,TILE_PX,TILE_PX);
      // Trunk
      ctx.fillStyle = zt.tree_c[0];
      ctx.fillRect(sx+TILE_PX/2-3,sy+TILE_PX/2,6,TILE_PX/2);
      // Canopy
      ctx.fillStyle = zt.tree_c[1];
      ctx.beginPath(); ctx.arc(sx+TILE_PX/2,sy+TILE_PX/2-2,10,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.globalAlpha=0.3; ctx.fillStyle=lighten(zt.tree_c[1],0.2);
      ctx.beginPath(); ctx.arc(sx+TILE_PX/2-3,sy+TILE_PX/2-5,6,0,Math.PI*2); ctx.fill();
      ctx.restore();
      break;
    case T.ROCK:
      ctx.fillStyle = zt.grass[0]; ctx.fillRect(sx,sy,TILE_PX,TILE_PX);
      ctx.fillStyle = zt.block_c;
      ctx.beginPath();
      ctx.moveTo(sx+4,sy+TILE_PX-4); ctx.lineTo(sx+6,sy+6); ctx.lineTo(sx+TILE_PX-5,sy+4);
      ctx.lineTo(sx+TILE_PX-3,sy+TILE_PX-6); ctx.closePath(); ctx.fill();
      ctx.save(); ctx.globalAlpha=0.3; ctx.strokeStyle='#000'; ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.moveTo(sx+8,sy+10); ctx.lineTo(sx+16,sy+14); ctx.stroke();
      ctx.restore();
      break;
    case T.WALL:
      ctx.fillStyle = zt.block_c;
      ctx.fillRect(sx,sy,TILE_PX,TILE_PX);
      ctx.save(); ctx.globalAlpha=0.2; ctx.strokeStyle='#555'; ctx.lineWidth=0.5;
      ctx.strokeRect(sx+2,sy+2,TILE_PX/2-2,TILE_PX/2-2);
      ctx.strokeRect(sx+TILE_PX/2,sy+TILE_PX/2,TILE_PX/2-2,TILE_PX/2-2);
      ctx.restore();
      break;
    case T.WATER:
      ctx.fillStyle = zt.water[v%zt.water.length];
      ctx.fillRect(sx,sy,TILE_PX,TILE_PX);
      ctx.save(); ctx.globalAlpha=0.2; ctx.strokeStyle='#88bbdd'; ctx.lineWidth=0.8;
      const wv=Math.sin(animT*0.04+gx+gy*2)*3;
      ctx.beginPath(); ctx.moveTo(sx+3,sy+TILE_PX/2+wv); ctx.quadraticCurveTo(sx+TILE_PX/2,sy+TILE_PX/2+wv-3,sx+TILE_PX-3,sy+TILE_PX/2+wv);
      ctx.stroke(); ctx.restore();
      break;
  }
}

function drawMapObject(obj, sx, sy) {
  const cx = sx+TILE_PX/2, cy = sy+TILE_PX/2;
  if (obj.done && obj.type!=='campfire') return; // hide collected items

  switch (obj.type) {
    case 'chest':
      if(obj.done) {
        ctx.save(); ctx.globalAlpha=0.4;
        ctx.fillStyle='#5a4510'; ctx.fillRect(cx-7,cy-3,14,8); ctx.restore();
      } else {
        ctx.fillStyle='#8B6914'; ctx.strokeStyle='#5a4510'; ctx.lineWidth=1.5;
        ctx.fillRect(cx-7,cy-4,14,9); ctx.strokeRect(cx-7,cy-4,14,9);
        ctx.fillStyle='#a07818'; ctx.fillRect(cx-7,cy-7,14,4); ctx.strokeRect(cx-7,cy-7,14,4);
        ctx.fillStyle='#daa520'; ctx.beginPath(); ctx.arc(cx,cy-3,2,0,Math.PI*2); ctx.fill();
        // Sparkle
        ctx.save(); ctx.globalAlpha=0.3+Math.sin(animT*0.1)*0.2;
        ctx.fillStyle='#ffdd44'; ctx.beginPath(); ctx.arc(cx+5,cy-8,1.5,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
      break;
    case 'campfire': {
      // Stone ring
      ctx.fillStyle='#555';
      for(let i=0;i<5;i++){
        const a=(i/5)*Math.PI*2;
        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*7,cy+Math.sin(a)*5,2.5,0,Math.PI*2); ctx.fill();
      }
      // Flames
      if(!obj.done) {
        for(let i=0;i<3;i++){
          const fh=5+Math.sin(animT*0.12+i*2)*3;
          ctx.fillStyle=i%2?'#ff6600':'#ffcc00';
          ctx.save(); ctx.globalAlpha=0.7+Math.sin(animT*0.15+i)*0.2;
          ctx.beginPath(); ctx.moveTo(cx-3+i*3,cy+2);
          ctx.quadraticCurveTo(cx-1+i*3,cy-fh,cx+1+i*3,cy+2); ctx.fill(); ctx.restore();
        }
        // Glow
        ctx.save(); ctx.globalAlpha=0.08;
        const fg=ctx.createRadialGradient(cx,cy,0,cx,cy,20);
        fg.addColorStop(0,'#ff8800'); fg.addColorStop(1,'transparent');
        ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(cx,cy,20,0,Math.PI*2); ctx.fill(); ctx.restore();
      }
      break;
    }
    case 'npc':
      // Top-down person
      ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(cx,cy+5,6,3,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#556688'; ctx.beginPath(); ctx.ellipse(cx,cy,5,6,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#d4b896'; ctx.beginPath(); ctx.arc(cx,cy-6,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#3a5a3a'; ctx.beginPath(); ctx.arc(cx,cy-7,5,Math.PI*1.1,Math.PI*1.9); ctx.fill(); // hat brim
      // "?" above
      ctx.save(); ctx.globalAlpha=0.5+Math.sin(animT*0.05)*0.3;
      ctx.fillStyle='#ffcc00'; ctx.font='bold 10px serif'; ctx.textAlign='center';
      ctx.fillText('?',cx,cy-13); ctx.restore();
      break;
    case 'monster':
    case 'boss': {
      if(!obj.done && obj.data) {
        // Shadow
        ctx.save();
        ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath();
        ctx.ellipse(cx,cy+4,8,4,0,0,Math.PI*2); ctx.fill();
        // Draw creature small
        const sc = obj.type==='boss'?0.35:0.25;
        drawCreatureOnScene(obj.data, cx, cy-2, sc, false);
        // Boss glow
        if(obj.type==='boss') {
          ctx.globalAlpha=0.1+Math.sin(animT*0.05)*0.05;
          const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,18);
          bg.addColorStop(0,'#ff3300'); bg.addColorStop(1,'transparent');
          ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }
      break;
    }
  }
}

function drawPlayerTopDown(sx, sy) {
  const moving = map.moving && map.path.length>0;
  const bob = moving ? Math.sin(animT*0.2)*1.5 : 0;
  const step = moving ? animT*0.2 : 0;

  ctx.save();
  ctx.translate(sx, sy+bob);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0,6,7,3,0,0,Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle='#3a3a5a';
  ctx.beginPath(); ctx.ellipse(0,0,6,7,0,0,Math.PI*2); ctx.fill();

  // Cloak/cape
  ctx.fillStyle='#8b2020'; ctx.globalAlpha=0.7;
  ctx.beginPath(); ctx.ellipse(0,1,7,6,0,0.2,Math.PI-0.2); ctx.fill();
  ctx.globalAlpha=1;

  // Head
  ctx.fillStyle='#d4b896';
  ctx.beginPath(); ctx.arc(0,-7,4.5,0,Math.PI*2); ctx.fill();

  // Direction indicator (small triangle)
  ctx.fillStyle='#eee'; ctx.globalAlpha=0.6;
  ctx.save();
  const fAngle = [Math.PI*1.5, 0, Math.PI*0.5, Math.PI][map.facing];
  ctx.translate(Math.cos(fAngle)*9, Math.sin(fAngle)*9);
  ctx.rotate(fAngle);
  ctx.beginPath(); ctx.moveTo(4,0); ctx.lineTo(-2,-2.5); ctx.lineTo(-2,2.5); ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.globalAlpha=1;

  // Walking legs
  if(moving) {
    ctx.strokeStyle='#2a2a3a'; ctx.lineWidth=2; ctx.lineCap='round';
    const ls = Math.sin(step)*3;
    ctx.beginPath(); ctx.moveTo(-2,5); ctx.lineTo(-2+ls,10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2,5); ctx.lineTo(2-ls,10); ctx.stroke();
  }

  ctx.restore();
}

function drawFog(startX, startY, endX, endY) {
  for (let gy=startY;gy<endY;gy++) {
    for (let gx=startX;gx<endX;gx++) {
      if (gx<0||gx>=MAP_W||gy<0||gy>=MAP_H) continue;
      const sx = gx*TILE_PX-map.camX, sy = gy*TILE_PX-map.camY;
      if (!map.seen[gy*MAP_W+gx]) {
        ctx.fillStyle='#0b0e17';
        ctx.fillRect(sx,sy,TILE_PX+1,TILE_PX+1);
      } else {
        // Dim previously-seen tiles outside current view
        const dx=gx-map.gx, dy=gy-map.gy;
        if (dx*dx+dy*dy > VIEW_RAD*VIEW_RAD) {
          ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle='#0b0e17';
          ctx.fillRect(sx,sy,TILE_PX+1,TILE_PX+1); ctx.restore();
        }
      }
    }
  }
}

// ---- MAIN TOP-DOWN DRAW ----
function drawTopDownMap() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0b0e17'; ctx.fillRect(0,0,W,H);

  updateMapCamera();

  const startX = Math.floor(map.camX/TILE_PX);
  const startY = Math.floor(map.camY/TILE_PX);
  const endX = Math.min(MAP_W, startX+Math.ceil(W/TILE_PX)+2);
  const endY = Math.min(MAP_H, startY+Math.ceil(H/TILE_PX)+2);

  // Draw tiles
  for (let gy=startY;gy<endY;gy++) {
    for (let gx=startX;gx<endX;gx++) {
      if (gx<0||gx>=MAP_W||gy<0||gy>=MAP_H) continue;
      if (!map.seen[gy*MAP_W+gx]) continue;
      const sx = gx*TILE_PX-map.camX, sy = gy*TILE_PX-map.camY;
      drawTile(map.tiles[gy*MAP_W+gx], sx, sy, gx, gy, currentZone);
    }
  }

  // Draw grid lines (subtle)
  ctx.save(); ctx.globalAlpha=0.06; ctx.strokeStyle='#fff'; ctx.lineWidth=0.5;
  for (let gx=startX;gx<=endX;gx++) {
    const sx=gx*TILE_PX-map.camX;
    ctx.beginPath(); ctx.moveTo(sx,0); ctx.lineTo(sx,H); ctx.stroke();
  }
  for (let gy=startY;gy<=endY;gy++) {
    const sy=gy*TILE_PX-map.camY;
    ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(W,sy); ctx.stroke();
  }
  ctx.restore();

  // Draw objects
  for (const obj of map.objects) {
    if (!map.seen[obj.gy*MAP_W+obj.gx]) continue;
    const sx = obj.gx*TILE_PX-map.camX, sy = obj.gy*TILE_PX-map.camY;
    if (sx>-TILE_PX&&sx<W+TILE_PX&&sy>-TILE_PX&&sy<H+TILE_PX) {
      drawMapObject(obj, sx, sy);
    }
  }

  // Draw player
  const psx = map.px-map.camX, psy = map.py-map.camY;
  drawPlayerTopDown(psx, psy);

  // Fog
  drawFog(Math.max(0,startX-1), Math.max(0,startY-1), Math.min(MAP_W,endX+1), Math.min(MAP_H,endY+1));

  // Vignette
  ctx.save();
  const vig = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35, W/2,H/2,Math.max(W,H)*0.7);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(11,14,23,0.5)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  ctx.restore();

  // Minimap in top-right corner
  drawMinimap();
}

function drawMinimap() {
  const mw=60, mh=60;
  const mx=W-mw-8, my=8;
  const ts=mw/MAP_W;

  ctx.save();
  ctx.globalAlpha=0.7;
  ctx.fillStyle='rgba(11,14,23,0.85)';
  ctx.fillRect(mx-2,my-2,mw+4,mh+4);
  ctx.strokeStyle='var(--border)'; ctx.lineWidth=1;
  ctx.strokeRect(mx-2,my-2,mw+4,mh+4);

  for (let y=0;y<MAP_H;y++) for (let x=0;x<MAP_W;x++) {
    if (!map.seen[y*MAP_W+x]) continue;
    const t=map.tiles[y*MAP_W+x];
    if(t===T.WATER) ctx.fillStyle='#1a5566';
    else if(isWalkable(t)) ctx.fillStyle=t===T.TALL?'#2a5a1a':'#3a5a2a';
    else ctx.fillStyle='#1a1a22';
    ctx.fillRect(mx+x*ts,my+y*ts,ts+0.5,ts+0.5);
  }

  // Objects on minimap
  for (const obj of map.objects) {
    if (!map.seen[obj.gy*MAP_W+obj.gx]||obj.done) continue;
    if(obj.type==='chest') ctx.fillStyle='#daa520';
    else if(obj.type==='campfire') ctx.fillStyle='#ff6600';
    else if(obj.type==='npc') ctx.fillStyle='#4488ff';
    else if(obj.type==='boss') ctx.fillStyle='#ff2200';
    else ctx.fillStyle='#cc3333';
    ctx.fillRect(mx+obj.gx*ts,my+obj.gy*ts,ts+1,ts+1);
  }

  // Player dot
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(mx+map.gx*ts+ts/2,my+map.gy*ts+ts/2,2,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// ---- BATTLE ANIMATION STATE ----
const battleAnim = {
  playerX: 0, playerY: 0,   // offset from base position
  enemyX: 0, enemyY: 0,
  playerFlash: 0,            // 0-1, white flash on hit
  enemyFlash: 0,
  playerShake: 0,            // shake intensity
  enemyShake: 0,
  cameraZoom: 1,             // zoom punch on big hits
  impactEffects: [],         // {x,y,type,t,maxT,color}
  enemySlideIn: 0,           // 0-1, slide in from right on encounter
  playerSlideIn: 0,
  enemyDeath: 0,             // 0-1, shrink/fade on death
};

function resetBattleAnim() {
  battleAnim.playerX = 0; battleAnim.playerY = 0;
  battleAnim.enemyX = 0; battleAnim.enemyY = 0;
  battleAnim.playerFlash = 0; battleAnim.enemyFlash = 0;
  battleAnim.playerShake = 0; battleAnim.enemyShake = 0;
  battleAnim.cameraZoom = 1;
  battleAnim.impactEffects = [];
  battleAnim.enemySlideIn = 0; battleAnim.playerSlideIn = 0;
  battleAnim.enemyDeath = 0;
}

function tweenTo(obj, prop, target, speed) {
  obj[prop] += (target - obj[prop]) * speed;
  if (Math.abs(obj[prop] - target) < 0.01) obj[prop] = target;
}

function updateBattleAnims() {
  // decay flashes
  battleAnim.playerFlash *= 0.85;
  battleAnim.enemyFlash *= 0.85;
  if (battleAnim.playerFlash < 0.01) battleAnim.playerFlash = 0;
  if (battleAnim.enemyFlash < 0.01) battleAnim.enemyFlash = 0;

  // decay shakes
  battleAnim.playerShake *= 0.8;
  battleAnim.enemyShake *= 0.8;

  // return offsets to 0
  tweenTo(battleAnim, 'playerX', 0, 0.12);
  tweenTo(battleAnim, 'playerY', 0, 0.12);
  tweenTo(battleAnim, 'enemyX', 0, 0.12);
  tweenTo(battleAnim, 'enemyY', 0, 0.12);

  // camera zoom back to 1
  tweenTo(battleAnim, 'cameraZoom', 1, 0.08);

  // slide-in
  if (battleAnim.enemySlideIn < 1) battleAnim.enemySlideIn += 0.04;
  if (battleAnim.playerSlideIn < 1) battleAnim.playerSlideIn += 0.05;

  // update impact effects
  battleAnim.impactEffects = battleAnim.impactEffects.filter(e => {
    e.t++;
    return e.t < e.maxT;
  });
}

function triggerAttackAnim(attacker, moveType) {
  const lungeX = W * 0.12;
  if (attacker === 'player') {
    battleAnim.playerX = lungeX;  // lunge right toward enemy
    battleAnim.playerY = -8;
    // delay hit effect
    setTimeout(() => {
      battleAnim.enemyFlash = 1;
      battleAnim.enemyShake = 8;
      battleAnim.cameraZoom = 1.04;
      spawnImpactEffect(W * 0.62, H * 0.42, moveType);
    }, 120);
  } else {
    battleAnim.enemyX = -lungeX;
    battleAnim.enemyY = -6;
    setTimeout(() => {
      battleAnim.playerFlash = 1;
      battleAnim.playerShake = 8;
      battleAnim.cameraZoom = 1.04;
      spawnImpactEffect(W * 0.22, H * 0.52, moveType);
    }, 120);
  }
}

function spawnImpactEffect(x, y, type) {
  const colors = {
    fire: ['#ff6600','#ffcc00','#ff3300'],
    water: ['#3399ff','#66bbff','#ffffff'],
    earth: ['#88cc44','#ccaa55','#887744'],
    electric: ['#ffee00','#ffffff','#aaddff'],
    shadow: ['#aa66cc','#663399','#4411aa'],
    ice: ['#88ddff','#ffffff','#bbddff'],
    toxic: ['#99cc33','#ccff44','#667722']
  };
  const c = colors[type] || colors.earth;

  // slash lines
  for (let i = 0; i < 3; i++) {
    const angle = -0.5 + Math.random() * 1;
    battleAnim.impactEffects.push({
      x, y, type: 'slash', t: 0, maxT: 18,
      angle, len: 20 + Math.random() * 25,
      color: c[i % c.length]
    });
  }

  // burst particles
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    battleAnim.impactEffects.push({
      x, y, type: 'particle', t: 0, maxT: 22 + Math.random() * 10,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      size: 2 + Math.random() * 4,
      color: c[Math.floor(Math.random() * c.length)]
    });
  }

  // type-specific
  if (type === 'fire') {
    for (let i = 0; i < 6; i++) {
      battleAnim.impactEffects.push({
        x: x + (Math.random()-0.5)*30, y: y + (Math.random()-0.5)*20,
        type: 'flame', t: 0, maxT: 25,
        size: 8 + Math.random() * 12,
        color: i%2 ? '#ffcc00' : '#ff4400'
      });
    }
  } else if (type === 'electric') {
    for (let i = 0; i < 4; i++) {
      battleAnim.impactEffects.push({
        x, y, type: 'lightning', t: 0, maxT: 12,
        points: generateLightningBolt(x, y - 40, x + (Math.random()-0.5)*50, y + 20),
        color: '#ffee44'
      });
    }
  } else if (type === 'water') {
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      battleAnim.impactEffects.push({
        x, y, type: 'droplet', t: 0, maxT: 28,
        vx: Math.cos(angle) * (1+Math.random()*3),
        vy: Math.sin(angle) * 3 - 4,
        size: 3 + Math.random() * 4,
        color: c[Math.floor(Math.random()*c.length)]
      });
    }
  } else if (type === 'shadow') {
    battleAnim.impactEffects.push({
      x, y, type: 'voidCircle', t: 0, maxT: 30,
      size: 35, color: '#663399'
    });
  } else if (type === 'ice') {
    for (let i = 0; i < 5; i++) {
      battleAnim.impactEffects.push({
        x: x + (Math.random()-0.5)*40, y: y + (Math.random()-0.5)*30,
        type: 'crystal', t: 0, maxT: 30,
        size: 6 + Math.random() * 10,
        angle: Math.random() * Math.PI,
        color: c[i%c.length]
      });
    }
  }
}

function generateLightningBolt(x1, y1, x2, y2) {
  const pts = [{x:x1, y:y1}];
  const segments = 5;
  for (let i = 1; i < segments; i++) {
    const t = i / segments;
    pts.push({
      x: lerp(x1, x2, t) + (Math.random()-0.5) * 25,
      y: lerp(y1, y2, t) + (Math.random()-0.5) * 10
    });
  }
  pts.push({x:x2, y:y2});
  return pts;
}

function drawImpactEffects() {
  for (const e of battleAnim.impactEffects) {
    const progress = e.t / e.maxT;
    const alpha = 1 - progress;

    ctx.save();
    ctx.globalAlpha = alpha;

    switch (e.type) {
      case 'slash': {
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 3 * (1 - progress);
        ctx.lineCap = 'round';
        const ext = e.len * Math.min(1, e.t / 5);
        ctx.beginPath();
        ctx.moveTo(e.x - Math.cos(e.angle) * ext * 0.5, e.y - Math.sin(e.angle) * ext * 0.5);
        ctx.lineTo(e.x + Math.cos(e.angle) * ext * 0.5, e.y + Math.sin(e.angle) * ext * 0.5);
        ctx.stroke();
        break;
      }
      case 'particle': {
        e.x += e.vx; e.y += e.vy; e.vy += 0.15;
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size * (1 - progress * 0.5), 0, Math.PI * 2);
        ctx.fill();
        break;
      }
      case 'flame': {
        const s = e.size * (1 - progress * 0.7);
        const fy = e.y - e.t * 1.5;
        ctx.fillStyle = e.color;
        ctx.globalAlpha = alpha * 0.7;
        ctx.beginPath();
        ctx.moveTo(e.x, fy - s);
        ctx.quadraticCurveTo(e.x + s * 0.6, fy - s * 0.3, e.x + s * 0.3, fy + s * 0.5);
        ctx.quadraticCurveTo(e.x, fy + s * 0.2, e.x - s * 0.3, fy + s * 0.5);
        ctx.quadraticCurveTo(e.x - s * 0.6, fy - s * 0.3, e.x, fy - s);
        ctx.fill();
        break;
      }
      case 'lightning': {
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 2.5 * (1 - progress);
        ctx.shadowColor = e.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        e.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.stroke();
        ctx.shadowBlur = 0;
        break;
      }
      case 'droplet': {
        e.x += e.vx; e.y += e.vy; e.vy += 0.2;
        ctx.fillStyle = e.color;
        ctx.globalAlpha = alpha * 0.6;
        ctx.beginPath();
        ctx.ellipse(e.x, e.y, e.size * 0.6, e.size, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      }
      case 'voidCircle': {
        const r = e.size * progress;
        const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
        grad.addColorStop(0, e.color + '88');
        grad.addColorStop(0.6, e.color + '44');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
        ctx.fill();
        break;
      }
      case 'crystal': {
        const s = e.size * (1 - progress * 0.3);
        ctx.fillStyle = e.color;
        ctx.globalAlpha = alpha * 0.8;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.rotate(e.angle);
        ctx.beginPath();
        ctx.moveTo(0, -s); ctx.lineTo(s*0.35, 0); ctx.lineTo(0, s*0.6); ctx.lineTo(-s*0.35, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        break;
      }
    }
    ctx.restore();
  }
}
