<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verdantia — Explore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --abyss: #0b0e17;
    --deep: #111827;
    --panel: #151c2c;
    --card: #1a2236;
    --border: #263046;
    --muted: #4a5568;
    --text: #c9d1d9;
    --bright: #e2e8f0;
    --accent: #ef4444;
    --accent-glow: #f87171;
    --gold: #f59e0b;
    --gold-dim: #92690a;
    --hp-green: #22c55e;
    --hp-yellow: #eab308;
    --hp-red: #ef4444;
    --mana: #3b82f6;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:var(--abyss); color:var(--text); font-family:'Fira Code',monospace; }
  body { display:flex; flex-direction:column; }

  /* ---- SCENE CANVAS ---- */
  #sceneWrap {
    position:relative; flex:1 1 60%; min-height:0;
    overflow:hidden;
    border-bottom: 2px solid var(--border);
  }
  body.in-battle #sceneWrap { flex: 1 1 65%; }

  /* HP bars overlaid on canvas */
  #hpOverlay {
    position:absolute; left:0; right:0; top:0;
    padding:10px 10px 0;
    pointer-events:none; display:none;
    z-index:5;
  }
  #hpOverlay.active { display:flex; flex-direction:column; gap:4px; }
  #scene { width:100%; height:100%; display:block; }

  /* Encounter flash overlay */
  #flash {
    position:absolute; inset:0;
    background: white;
    opacity:0; pointer-events:none;
    transition: opacity 0.08s;
  }
  #flash.active { opacity:0.85; }

  /* Zone name overlay */
  #zoneBadge {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    font-family:'Cinzel',serif; font-weight:700; font-size:15px;
    color:var(--bright); letter-spacing:2px; text-transform:uppercase;
    background: linear-gradient(180deg, rgba(11,14,23,0.85) 0%, rgba(11,14,23,0.4) 100%);
    padding:6px 18px 5px; border-radius:20px;
    border:1px solid var(--border);
    text-shadow:0 1px 6px rgba(0,0,0,0.9);
    white-space:nowrap;
  }

  /* ---- BOTTOM UI ---- */
  #ui {
    flex:0 0 auto;
    background: var(--deep);
    display:flex; flex-direction:column;
    padding:0 0 var(--safe-bottom);
    max-height:45%;
    border-top:1px solid var(--border);
  }

  /* Zone selector */
  #zones {
    display:flex; gap:6px;
    padding:10px 12px 6px;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  #zones::-webkit-scrollbar { display:none; }
  .zone-pill {
    flex:0 0 auto;
    padding:7px 16px; border-radius:20px;
    font-family:'Cinzel',serif; font-weight:500; font-size:12px;
    letter-spacing:1px; text-transform:uppercase;
    background:var(--card); color:var(--muted);
    border:1px solid var(--border);
    cursor:pointer; transition:all 0.2s;
  }
  .zone-pill.active {
    background: linear-gradient(135deg, var(--accent) 0%, #b91c1c 100%);
    color:#fff; border-color:var(--accent);
    box-shadow:0 0 12px rgba(239,68,68,0.3);
  }

  /* Explore mode */
  #exploreUI { padding:12px 16px 16px; text-align:center; }
  #exploreBtn {
    width:100%; max-width:320px;
    padding:18px 0; border:none; border-radius:14px;
    font-family:'Cinzel',serif; font-weight:900; font-size:18px;
    letter-spacing:3px; text-transform:uppercase;
    background: linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow: 0 4px 20px rgba(239,68,68,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: transform 0.1s, box-shadow 0.2s;
    position:relative; overflow:hidden;
  }
  #exploreBtn:active { transform:scale(0.97); box-shadow:0 2px 10px rgba(239,68,68,0.25); }
  #exploreBtn.walking {
    background: linear-gradient(135deg, var(--muted) 0%, #374151 100%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    pointer-events:none;
  }
  #exploreBtn .shimmer {
    position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
    animation: shimmer 2.5s infinite;
  }
  @keyframes shimmer { 0%{left:-100%} 100%{left:100%} }
  #exploreStatus {
    margin-top:10px; font-size:11px; color:var(--muted);
    letter-spacing:1px; min-height:16px;
  }

  /* Battle mode — only moves + flee at bottom */
  #battleUI { display:none; padding:6px 10px 8px; }
  #battleUI.active { display:flex; flex-direction:column; gap:6px; }

  /* HP bars */
  .hp-section {
    display:flex; align-items:center; gap:6px;
    padding:4px 8px; background:rgba(17,24,39,0.85); border-radius:8px;
    border:1px solid var(--border);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  .hp-name {
    font-family:'Cinzel',serif; font-weight:700; font-size:11px;
    color:var(--bright); min-width:0; flex:0 0 auto;
    max-width:72px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .hp-bar-wrap {
    flex:1; height:8px; background:var(--abyss);
    border-radius:4px; overflow:hidden; position:relative;
    border:1px solid var(--border);
  }
  .hp-bar {
    height:100%; border-radius:4px;
    transition:width 0.5s ease, background 0.3s;
    position:relative;
  }
  .hp-bar::after {
    content:''; position:absolute; top:0; left:0; right:0; height:40%;
    background:linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%);
    border-radius:4px 4px 0 0;
  }
  .hp-text {
    font-size:10px; color:var(--muted); flex:0 0 auto;
    font-variant-numeric: tabular-nums;
    min-width:46px; text-align:right;
  }
  .hp-lv {
    font-size:9px; color:var(--gold-dim); flex:0 0 auto;
  }

  /* Moves grid */
  #movesGrid {
    display:grid; grid-template-columns:1fr 1fr; gap:6px;
  }
  .move-btn {
    padding:10px 6px; border:none; border-radius:10px;
    font-family:'Fira Code',monospace; font-size:11px; font-weight:600;
    cursor:pointer; text-align:center;
    background: var(--card);
    color:var(--bright);
    border:1px solid var(--border);
    transition: transform 0.1s, border-color 0.15s;
    position:relative; overflow:hidden;
  }
  .move-btn:active { transform:scale(0.95); }
  .move-btn .mv-name { display:block; margin-bottom:1px; font-size:11px; }
  .move-btn .mv-dmg { display:block; font-size:9px; color:var(--muted); }
  .move-btn.type-fire { border-color:#cc330066; background:linear-gradient(135deg, #1a0a0a 0%, var(--card) 100%); }
  .move-btn.type-water { border-color:#1166cc66; background:linear-gradient(135deg, #0a0a1a 0%, var(--card) 100%); }
  .move-btn.type-earth { border-color:#55772266; background:linear-gradient(135deg, #0a1a0a 0%, var(--card) 100%); }
  .move-btn.type-electric { border-color:#cc990066; background:linear-gradient(135deg, #1a1a0a 0%, var(--card) 100%); }
  .move-btn.type-shadow { border-color:#44226666; background:linear-gradient(135deg, #10061a 0%, var(--card) 100%); }
  .move-btn.type-ice { border-color:#4488aa66; background:linear-gradient(135deg, #0a1218 0%, var(--card) 100%); }
  .move-btn.type-toxic { border-color:#44661166; background:linear-gradient(135deg, #0e1a06 0%, var(--card) 100%); }

  #battleBottom {
    display:flex; gap:6px;
  }
  #runBtn {
    flex:0 0 auto;
    padding:10px 16px; border:none; border-radius:10px;
    font-family:'Cinzel',serif; font-weight:700; font-size:11px;
    letter-spacing:1px; text-transform:uppercase;
    background:var(--card); color:var(--muted);
    border:1px solid var(--border); cursor:pointer;
    transition: transform 0.1s;
  }
  #runBtn:active { transform:scale(0.97); }

  /* Battle log */
  #battleLog {
    flex:1;
    font-size:10px; color:var(--muted); text-align:center;
    display:flex; align-items:center; justify-content:center;
    min-height:14px; padding:0;
    letter-spacing:0.5px;
  }
  #battleLog.hit { color:var(--accent-glow); }
  #battleLog.heal { color:var(--hp-green); }

  /* Damage popup on canvas */
  .dmg-float {
    position:absolute; pointer-events:none;
    font-family:'Cinzel',serif; font-weight:900; font-size:28px;
    color:var(--accent-glow); text-shadow:0 2px 8px rgba(0,0,0,0.8);
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity:1; transform:translateY(0) scale(1.2); }
    100% { opacity:0; transform:translateY(-50px) scale(0.8); }
  }

  /* Victory / defeat overlay */
  #resultOverlay {
    position:fixed; inset:0; background:rgba(11,14,23,0.92);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; z-index:100;
  }
  #resultOverlay.active { display:flex; }
  #resultTitle {
    font-family:'Cinzel',serif; font-weight:900; font-size:32px;
    letter-spacing:4px; text-transform:uppercase; margin-bottom:8px;
  }
  #resultSub { font-size:13px; color:var(--muted); margin-bottom:24px; letter-spacing:1px; }
  #resultBtn {
    padding:16px 48px; border:none; border-radius:12px;
    font-family:'Cinzel',serif; font-weight:700; font-size:16px;
    letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow:0 4px 20px rgba(239,68,68,0.3);
  }
  #resultBtn:active { transform:scale(0.96); }

  /* Screen shake */
  .shake { animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100%{transform:translate(0)} 20%{transform:translate(-4px,2px)} 40%{transform:translate(4px,-2px)} 60%{transform:translate(-3px,3px)} 80%{transform:translate(3px,-1px)}
  }

  /* ---- EXPEDITION UI ---- */
  #expeditionUI { display:none; padding:0; }
  #expeditionUI.active { display:flex; flex-direction:column; }

  #expTopBar {
    display:flex; align-items:center; gap:8px;
    padding:8px 12px 6px;
  }
  #expStepLabel {
    font-family:'Cinzel',serif; font-weight:700; font-size:10px;
    color:var(--gold); letter-spacing:1px; text-transform:uppercase;
    flex:0 0 auto;
  }
  #expProgressWrap {
    flex:1; height:5px; background:var(--abyss);
    border-radius:3px; overflow:hidden; border:1px solid var(--border);
  }
  #expProgressBar {
    height:100%; background:var(--gold); border-radius:3px;
    transition: width 0.5s ease;
  }
  #expBackBtn {
    flex:0 0 auto; padding:4px 10px; border:none; border-radius:8px;
    font-family:'Cinzel',serif; font-weight:700; font-size:9px;
    color:var(--muted); background:var(--card); border:1px solid var(--border);
    cursor:pointer; letter-spacing:1px; text-transform:uppercase;
  }

  #narrativeBox {
    padding:6px 14px;
    font-size:12px; line-height:1.5;
    color:var(--text);
    min-height:36px;
    letter-spacing:0.3px;
  }
  #narrativeBox .event-title {
    font-family:'Cinzel',serif; font-weight:700; font-size:13px;
    color:var(--bright); margin-bottom:3px;
    letter-spacing:1px;
  }
  #narrativeBox .event-desc {
    color:var(--muted); font-size:11px;
  }
  #narrativeBox .loot-line {
    color:var(--gold); font-size:11px; margin-top:4px;
    font-weight:600;
  }
  #narrativeBox .heal-line {
    color:var(--hp-green); font-size:11px; margin-top:4px;
  }
  #narrativeBox .danger-line {
    color:var(--accent); font-size:11px; margin-top:4px;
  }
  #narrativeBox .lore-line {
    color:#8888cc; font-size:11px; margin-top:4px;
    font-style:italic;
  }

  #choicesWrap {
    display:flex; gap:6px;
    padding:6px 12px 10px;
    flex-wrap:wrap;
  }
  .choice-btn {
    flex:1 1 auto; min-width:0;
    padding:12px 8px; border:none; border-radius:10px;
    font-family:'Cinzel',serif; font-weight:700; font-size:12px;
    letter-spacing:1px; text-transform:uppercase;
    cursor:pointer; transition:transform 0.1s;
    text-align:center; line-height:1.2;
    color:var(--bright);
  }
  .choice-btn:active { transform:scale(0.96); }
  .choice-btn.primary {
    background:linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff;
    box-shadow:0 3px 12px rgba(239,68,68,0.3);
  }
  .choice-btn.secondary {
    background:var(--card); border:1px solid var(--border);
    color:var(--text);
  }
  .choice-btn.gold {
    background:linear-gradient(135deg, #92690a 0%, #b8860b 100%);
    color:#fff;
    box-shadow:0 3px 12px rgba(245,158,11,0.25);
  }
  .choice-btn.green {
    background:linear-gradient(135deg, #166534 0%, #15803d 100%);
    color:#fff;
  }
  .choice-btn.blue {
    background:linear-gradient(135deg, #1e3a5f 0%, #1d4ed8 100%);
    color:#fff;
  }
  .choice-btn .choice-sub {
    display:block; font-family:'Fira Code',monospace;
    font-size:8px; font-weight:400; color:rgba(255,255,255,0.6);
    margin-top:2px; text-transform:none; letter-spacing:0;
  }

  /* Expedition summary overlay */
  #expSummary {
    position:fixed; inset:0; background:rgba(11,14,23,0.95);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; z-index:100; padding:20px;
  }
  #expSummary.active { display:flex; }
  #expSummary h2 {
    font-family:'Cinzel',serif; font-weight:900; font-size:24px;
    color:var(--gold); letter-spacing:3px; text-transform:uppercase;
    margin-bottom:16px;
  }
  .summary-line {
    font-size:12px; color:var(--text); margin-bottom:6px;
    letter-spacing:0.5px;
  }
  .summary-line span { color:var(--gold); font-weight:600; }
  #expSummary button {
    margin-top:20px;
    padding:14px 40px; border:none; border-radius:12px;
    font-family:'Cinzel',serif; font-weight:700; font-size:15px;
    letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow:0 4px 20px rgba(239,68,68,0.3);
  }
</style>
</head>
<body>

<div id="sceneWrap">
  <canvas id="scene"></canvas>
  <div id="flash"></div>
  <div id="zoneBadge">Verdantia — Forest</div>
  <div id="hpOverlay">
    <div class="hp-section" id="enemyHP">
      <span class="hp-name" id="enemyName">???</span>
      <span class="hp-lv" id="enemyLv">Lv5</span>
      <div class="hp-bar-wrap"><div class="hp-bar" id="enemyBar" style="width:100%;background:var(--hp-green)"></div></div>
      <span class="hp-text" id="enemyHPText">80/80</span>
    </div>
    <div class="hp-section" id="playerHP">
      <span class="hp-name" id="playerName">???</span>
      <span class="hp-lv" id="playerLv">Lv5</span>
      <div class="hp-bar-wrap"><div class="hp-bar" id="playerBar" style="width:100%;background:var(--hp-green)"></div></div>
      <span class="hp-text" id="playerHPText">100/100</span>
    </div>
  </div>
</div>

<div id="ui">
  <div id="zones">
    <div class="zone-pill active" data-zone="beach">Beach</div>
    <div class="zone-pill" data-zone="forest">Forest</div>
    <div class="zone-pill" data-zone="deepwoods">Deep Woods</div>
    <div class="zone-pill" data-zone="cave">Cave</div>
  </div>

  <div id="exploreUI">
    <button id="exploreBtn">
      <span class="shimmer"></span>
      Set Out
    </button>
    <div id="exploreStatus"></div>
  </div>

  <div id="expeditionUI">
    <div id="expTopBar">
      <span id="expStepLabel">Step 1/8</span>
      <div id="expProgressWrap"><div id="expProgressBar" style="width:0%"></div></div>
      <button id="expBackBtn" onclick="abandonExpedition()">Retreat</button>
    </div>
    <div id="narrativeBox"></div>
    <div id="choicesWrap"></div>
  </div>

  <div id="battleUI">
    <div id="movesGrid"></div>
    <div id="battleBottom">
      <button id="runBtn" ontouchend="runFromBattle()" onclick="runFromBattle()">Flee</button>
      <div id="battleLog">&nbsp;</div>
    </div>
  </div>
</div>

<div id="resultOverlay">
  <div id="resultTitle">Victory</div>
  <div id="resultSub">+35 XP gained</div>
  <button id="resultBtn" ontouchend="dismissResult()" onclick="dismissResult()">Continue</button>
</div>

<div id="expSummary">
  <h2>Expedition Complete</h2>
  <div id="summaryContent"></div>
  <button onclick="dismissSummary()">Return</button>
</div>

<script>
// ---- UTILS ----
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[rng(0,a.length-1)]}
function pickN(a,n){return[...a].sort(()=>Math.random()-0.5).slice(0,n)}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('')}
function lighten(h,a){const c=hexToRgb(h);return rgbToHex(c.r+(255-c.r)*a,c.g+(255-c.g)*a,c.b+(255-c.b)*a)}
function darken(h,a){const c=hexToRgb(h);return rgbToHex(c.r*(1-a),c.g*(1-a),c.b*(1-a))}

// ---- CANVAS SETUP ----
const sceneCanvas = document.getElementById('scene');
const ctx = sceneCanvas.getContext('2d');
let W, H;
function resizeCanvas(){
  const r = window.devicePixelRatio || 1;
  const rect = sceneCanvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  sceneCanvas.width = W * r; sceneCanvas.height = H * r;
  sceneCanvas.style.width = W + 'px'; sceneCanvas.style.height = H + 'px';
  ctx.setTransform(r,0,0,r,0,0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ---- GAME STATE ----
let gameState = 'explore'; // 'explore' | 'expedition' | 'walking' | 'encounter' | 'battle'
let animT = 0;
let currentZone = 'beach';
let walkProgress = 0;
let encounterTimer = 0;

// ---- EXPEDITION SYSTEM ----
let expedition = null;  // current expedition data
let expStep = 0;        // current node index
let expScrollX = 0;     // parallax offset
let expWalking = false;  // walking animation between nodes
let expWalkT = 0;
let expNodeObject = null; // what to draw on canvas at current node
let expStats = { battles: 0, loot: [], healed: 0, lore: 0, gold: 0 };

const EXPEDITION_EVENTS = {
  beach: [
    { type:'path', weight:2 },
    { type:'monster', weight:3 },
    { type:'treasure', weight:2 },
    { type:'campfire', weight:1 },
    { type:'npc', weight:2 },
    { type:'landmark', weight:2 },
    { type:'hazard', weight:1 },
    { type:'fork', weight:1 },
  ],
  forest: [
    { type:'path', weight:2 },
    { type:'monster', weight:3 },
    { type:'treasure', weight:2 },
    { type:'campfire', weight:1 },
    { type:'npc', weight:1 },
    { type:'landmark', weight:2 },
    { type:'hazard', weight:2 },
    { type:'fork', weight:1 },
  ],
  deepwoods: [
    { type:'path', weight:1 },
    { type:'monster', weight:4 },
    { type:'treasure', weight:2 },
    { type:'campfire', weight:1 },
    { type:'npc', weight:1 },
    { type:'landmark', weight:2 },
    { type:'hazard', weight:3 },
    { type:'fork', weight:1 },
  ],
  cave: [
    { type:'path', weight:1 },
    { type:'monster', weight:4 },
    { type:'treasure', weight:3 },
    { type:'campfire', weight:1 },
    { type:'npc', weight:1 },
    { type:'landmark', weight:3 },
    { type:'hazard', weight:2 },
    { type:'fork', weight:1 },
  ],
};

const PATH_NARRATIVES = {
  beach: [
    'Warm sand shifts underfoot as waves lap the shore nearby...',
    'Tide pools glimmer between sun-bleached rocks...',
    'Seabirds circle overhead, calling to each other...',
    'The coastal path follows the curve of the bay...',
    'Salt spray hangs in the air as you push forward...',
  ],
  forest: [
    'Dappled light filters through the canopy above...',
    'Ancient roots wind across the dirt trail...',
    'Birdsong fills the air as the forest deepens...',
    'Ferns brush against your legs as the path narrows...',
    'A stream babbles somewhere to your left...',
  ],
  deepwoods: [
    'The canopy closes overhead, plunging you into twilight...',
    'Thick fog clings to the mossy ground...',
    'Strange luminescent fungi dot the twisted trees...',
    'The silence here is absolute. Unsettling...',
    'You can barely see the sky through the ancient branches...',
  ],
  cave: [
    'Your footsteps echo through the darkness...',
    'Water drips from stalactites into unseen pools...',
    'Crystalline formations catch your faint light...',
    'The passage narrows, then opens into a chamber...',
    'Strange warmth rises from fissures in the rock...',
  ],
};

function weightedPick(events) {
  const total = events.reduce((s, e) => s + e.weight, 0);
  let r = Math.random() * total;
  for (const e of events) {
    r -= e.weight;
    if (r <= 0) return e.type;
  }
  return events[0].type;
}

function generateExpedition(zone) {
  const length = rng(7, 10);
  const nodes = [];
  let lastType = '';

  for (let i = 0; i < length; i++) {
    if (i === 0) {
      nodes.push({ type:'start' });
    } else if (i === length - 1) {
      nodes.push({ type:'boss', zone });
    } else {
      let type;
      // Avoid consecutive same types
      do { type = weightedPick(EXPEDITION_EVENTS[zone]); } while (type === lastType && type !== 'path');
      // Guarantee a campfire before boss
      if (i === length - 2 && !nodes.some(n => n.type === 'campfire')) type = 'campfire';
      // Guarantee at least one fork
      if (i === Math.floor(length / 2) && !nodes.some(n => n.type === 'fork')) type = 'fork';
      nodes.push({ type, zone });
      lastType = type;
    }
  }
  return nodes;
}

function startExpedition() {
  if (gameState !== 'explore') return;
  expedition = generateExpedition(currentZone);
  expStep = 0;
  expScrollX = 0;
  expStats = { battles: 0, loot: [], healed: 0, lore: 0, gold: 0 };
  gameState = 'expedition';

  // Hide explore UI, show expedition UI
  document.getElementById('exploreUI').style.display = 'none';
  document.getElementById('zones').style.display = 'none';
  document.getElementById('expeditionUI').classList.add('active');

  presentNode();
}

function updateExpProgress() {
  const pct = ((expStep + 1) / expedition.length * 100).toFixed(0);
  document.getElementById('expStepLabel').textContent = `Step ${expStep + 1}/${expedition.length}`;
  document.getElementById('expProgressBar').style.width = pct + '%';
}

function presentNode() {
  if (!expedition || expStep >= expedition.length) { endExpedition(); return; }
  updateExpProgress();
  const node = expedition[expStep];
  const zone = currentZone;
  const narrative = document.getElementById('narrativeBox');
  const choices = document.getElementById('choicesWrap');
  choices.innerHTML = '';

  // Update parallax offset for scene variety
  expScrollX = expStep * 60;

  switch (node.type) {
    case 'start': {
      const zoneLabel = { beach:'Beach', forest:'Forest', deepwoods:'Deep Woods', cave:'Cave' }[zone];
      narrative.innerHTML = `<div class="event-title">Setting Out</div>
        <div class="event-desc">You venture into the ${zoneLabel} of Verdantia. Who knows what lies ahead...</div>`;
      expNodeObject = { type:'signpost' };
      addChoice('Onward', 'primary', () => advanceNode());
      break;
    }
    case 'path': {
      const text = pick(PATH_NARRATIVES[zone]);
      narrative.innerHTML = `<div class="event-desc">${text}</div>`;
      expNodeObject = null;
      addChoice('Continue', 'primary', () => advanceNode());
      break;
    }
    case 'monster': {
      enemyMonster = generateEnemy();
      narrative.innerHTML = `<div class="event-title">Wild Encounter!</div>
        <div class="event-desc">A wild <strong>${enemyMonster.name}</strong> (Lv${enemyMonster.level}) blocks the path!</div>`;
      expNodeObject = { type:'monster', data:enemyMonster };
      addChoice('Fight', 'primary', () => {
        expStats.battles++;
        triggerEncounterFromExpedition();
      });
      if (playerMonster.stats.spd > 40) {
        addChoice('Sneak Past', 'secondary', () => {
          if (Math.random() < 0.6) {
            narrative.innerHTML += `<div class="event-desc" style="margin-top:6px">You slip past unnoticed!</div>`;
            choices.innerHTML = '';
            addChoice('Continue', 'primary', () => { enemyMonster = null; advanceNode(); });
          } else {
            narrative.innerHTML += `<div class="danger-line">It spotted you! No choice but to fight!</div>`;
            choices.innerHTML = '';
            setTimeout(() => {
              expStats.battles++;
              triggerEncounterFromExpedition();
            }, 600);
          }
        });
      }
      break;
    }
    case 'treasure': {
      const item = pick(TREASURE_ITEMS[zone]);
      narrative.innerHTML = `<div class="event-title">Treasure Found!</div>
        <div class="event-desc">${item.desc}</div>`;
      expNodeObject = { type:'chest' };
      addChoice('Take It', 'gold', () => {
        expStats.loot.push(item);
        let effectText = '';
        if (item.effect === 'heal') {
          playerMonster.currentHP = Math.min(playerMonster.stats.hp, playerMonster.currentHP + item.value);
          effectText = `<div class="heal-line">+${item.value} HP restored!</div>`;
          expStats.healed += item.value;
        } else if (item.effect === 'gold') {
          expStats.gold += item.value;
          effectText = `<div class="loot-line">+${item.value} Gold!</div>`;
        } else if (item.effect === 'atkBoost') {
          effectText = `<div class="loot-line">+${item.value} ATK for this expedition!</div>`;
          playerMonster.stats.atk += item.value;
        } else if (item.effect === 'defBoost') {
          effectText = `<div class="loot-line">+${item.value} DEF for this expedition!</div>`;
          playerMonster.stats.def += item.value;
        } else if (item.effect === 'spdBoost') {
          effectText = `<div class="loot-line">+${item.value} SPD for this expedition!</div>`;
          playerMonster.stats.spd += item.value;
        }
        narrative.innerHTML = `<div class="event-title">${item.name}</div>
          <div class="event-desc">${item.desc}</div>${effectText}`;
        choices.innerHTML = '';
        expNodeObject = { type:'chestOpen' };
        addChoice('Continue', 'primary', () => advanceNode());
      });
      addChoice('Leave It', 'secondary', () => advanceNode());
      break;
    }
    case 'campfire': {
      const healAmt = Math.floor(playerMonster.stats.hp * 0.4);
      narrative.innerHTML = `<div class="event-title">Campfire</div>
        <div class="event-desc">A sheltered clearing with the remains of a fire. You could rest here.</div>`;
      expNodeObject = { type:'campfire' };
      addChoice(`Rest (+${healAmt} HP)`, 'green', () => {
        playerMonster.currentHP = Math.min(playerMonster.stats.hp, playerMonster.currentHP + healAmt);
        expStats.healed += healAmt;
        narrative.innerHTML = `<div class="event-title">Rested</div>
          <div class="heal-line">You rest by the fire. +${healAmt} HP restored.</div>
          <div class="event-desc">HP: ${playerMonster.currentHP}/${playerMonster.stats.hp}</div>`;
        choices.innerHTML = '';
        addChoice('Continue', 'primary', () => advanceNode());
      });
      addChoice('Skip', 'secondary', () => advanceNode());
      break;
    }
    case 'npc': {
      const npc = pick(NPC_ENCOUNTERS[zone]);
      narrative.innerHTML = `<div class="event-title">${npc.name}</div>
        <div class="event-desc">"${npc.greeting}"</div>`;
      expNodeObject = { type:'npc', name:npc.name };

      if (npc.offer === 'heal') {
        addChoice(`Accept Healing (+${npc.healAmount} HP)`, 'green', () => {
          playerMonster.currentHP = Math.min(playerMonster.stats.hp, playerMonster.currentHP + npc.healAmount);
          expStats.healed += npc.healAmount;
          narrative.innerHTML += `<div class="heal-line">+${npc.healAmount} HP restored!</div>`;
          choices.innerHTML = '';
          addChoice('Thank them & continue', 'primary', () => advanceNode());
        });
      } else if (npc.offer === 'gift') {
        addChoice('Accept Gift', 'gold', () => {
          expStats.loot.push(npc.gift);
          if (npc.gift.effect === 'heal') {
            playerMonster.currentHP = Math.min(playerMonster.stats.hp, playerMonster.currentHP + npc.gift.value);
            expStats.healed += npc.gift.value;
          }
          narrative.innerHTML += `<div class="loot-line">Received: ${npc.gift.name}!</div>`;
          choices.innerHTML = '';
          addChoice('Continue', 'primary', () => advanceNode());
        });
      } else if (npc.offer === 'trade') {
        addChoice(`Accept: ${npc.trade.give}`, 'gold', () => {
          playerMonster.currentHP = Math.min(playerMonster.stats.hp, playerMonster.currentHP + npc.trade.healAmount);
          expStats.healed += npc.trade.healAmount;
          narrative.innerHTML += `<div class="heal-line">+${npc.trade.healAmount} HP from ${npc.trade.give}!</div>`;
          choices.innerHTML = '';
          addChoice('Continue', 'primary', () => advanceNode());
        });
      } else if (npc.offer === 'info') {
        narrative.innerHTML += `<div class="lore-line">"${npc.info}"</div>`;
        addChoice('Continue', 'primary', () => advanceNode());
      } else if (npc.offer === 'lore') {
        narrative.innerHTML += `<div class="lore-line">"${npc.lore}"</div>`;
        expStats.lore++;
        addChoice('Continue', 'primary', () => advanceNode());
      }
      addChoice('Walk Away', 'secondary', () => advanceNode());
      break;
    }
    case 'hazard': {
      const haz = pick(HAZARD_EVENTS[zone]);
      narrative.innerHTML = `<div class="event-title">${haz.name}</div>
        <div class="event-desc">${haz.desc}</div>`;
      expNodeObject = { type:'hazard' };
      addChoice('Push Through', 'primary', () => {
        if (Math.random() < 0.5) {
          playerMonster.currentHP = Math.max(1, playerMonster.currentHP - haz.damage);
          narrative.innerHTML = `<div class="event-title">${haz.name}</div>
            <div class="danger-line">You take ${haz.damage} damage pushing through!</div>
            <div class="event-desc">HP: ${playerMonster.currentHP}/${playerMonster.stats.hp}</div>`;
        } else {
          narrative.innerHTML = `<div class="event-title">${haz.name}</div>
            <div class="event-desc">${haz.avoid}</div>`;
        }
        choices.innerHTML = '';
        addChoice('Continue', 'primary', () => advanceNode());
      });
      addChoice('Go Around (slower)', 'secondary', () => {
        narrative.innerHTML = `<div class="event-desc">You take a longer route around the danger...</div>`;
        choices.innerHTML = '';
        addChoice('Continue', 'primary', () => advanceNode());
      });
      break;
    }
    case 'landmark': {
      const lm = pick(LANDMARK_LORE[zone]);
      narrative.innerHTML = `<div class="event-title">${lm.name}</div>
        <div class="event-desc">${lm.desc}</div>
        <div class="lore-line">${lm.lore}</div>`;
      expNodeObject = { type:'landmark' };
      expStats.lore++;
      addChoice('Continue', 'primary', () => advanceNode());
      break;
    }
    case 'fork': {
      const fork = pick(FORK_OPTIONS[zone]);
      narrative.innerHTML = `<div class="event-title">Fork in the Path</div>
        <div class="event-desc">The trail splits in two. Which way?</div>`;
      expNodeObject = { type:'signpost' };
      addChoice(fork.a.label, 'primary', () => {
        // Insert the risk+reward nodes after current step
        expedition.splice(expStep + 1, 0, { type:fork.a.risk, zone }, { type:fork.a.reward, zone });
        narrative.innerHTML = `<div class="event-desc">You take the ${fork.a.label}. ${fork.a.desc}.</div>`;
        choices.innerHTML = '';
        addChoice('Continue', 'primary', () => advanceNode());
      }, fork.a.desc);
      addChoice(fork.b.label, 'blue', () => {
        expedition.splice(expStep + 1, 0, { type:fork.b.risk, zone }, { type:fork.b.reward, zone });
        narrative.innerHTML = `<div class="event-desc">You take the ${fork.b.label}. ${fork.b.desc}.</div>`;
        choices.innerHTML = '';
        addChoice('Continue', 'primary', () => advanceNode());
      }, fork.b.desc);
      break;
    }
    case 'boss': {
      enemyMonster = generateBoss(zone);
      narrative.innerHTML = `<div class="event-title" style="color:var(--accent)">Boss Encounter!</div>
        <div class="event-desc">A massive <strong>${enemyMonster.name}</strong> (Lv${enemyMonster.level}) guards the way! There's no sneaking past this one.</div>`;
      expNodeObject = { type:'monster', data:enemyMonster, boss:true };
      addChoice('Fight!', 'primary', () => {
        expStats.battles++;
        triggerEncounterFromExpedition();
      });
      break;
    }
  }
}

function addChoice(label, style, handler, sub) {
  const btn = document.createElement('button');
  btn.className = 'choice-btn ' + style;
  btn.innerHTML = label + (sub ? `<span class="choice-sub">${sub}</span>` : '');
  btn.addEventListener('click', handler);
  btn.addEventListener('touchend', e => { e.preventDefault(); handler(); });
  document.getElementById('choicesWrap').appendChild(btn);
}

function advanceNode() {
  expStep++;
  if (expStep >= expedition.length) {
    endExpedition();
    return;
  }
  // Walking animation
  expWalking = true;
  expWalkT = 0;
  document.getElementById('choicesWrap').innerHTML = '';
  document.getElementById('narrativeBox').innerHTML = '<div class="event-desc">Walking...</div>';
  expNodeObject = null;
}

function triggerEncounterFromExpedition() {
  // Flash + shake then start battle
  const flash = document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 150);
  sceneCanvas.parentElement.classList.add('shake');
  setTimeout(() => sceneCanvas.parentElement.classList.remove('shake'), 300);

  document.getElementById('expeditionUI').classList.remove('active');
  setTimeout(() => startBattle(), 500);
}

function generateBoss(zone) {
  const boss = generateEnemy();
  boss.level = rng(12, 18);
  boss.stats.hp = 80 + boss.level * 8;
  boss.stats.atk = 25 + boss.level * 4;
  boss.stats.def = 15 + boss.level * 3;
  boss.currentHP = boss.stats.hp;
  boss.body.size = (boss.body?.size || 1) * 1.3;
  boss.body.bulk = (boss.body?.bulk || 1) * 1.2;
  boss.moves.forEach(m => m.damage = Math.floor(m.damage * 1.3));
  // Boss names
  const bossNames = {
    beach:['Tidecrusher','Reefmaw','Stormcaller','Wavejaw'],
    forest:['Thornking','Rootwarden','Mossfang','Canopyclaw'],
    deepwoods:['Gloomfang','Mistwalker','Rotcrown','Nightthorn'],
    cave:['Deepjaw','Crystalrend','Magmaclaw','Cavewyrm'],
  };
  boss.name = pick(bossNames[zone] || bossNames.forest);
  return boss;
}

function endExpedition() {
  gameState = 'explore';
  expedition = null;

  // Show summary
  const content = document.getElementById('summaryContent');
  content.innerHTML = `
    <div class="summary-line">Battles fought: <span>${expStats.battles}</span></div>
    <div class="summary-line">Items found: <span>${expStats.loot.length}</span></div>
    <div class="summary-line">Gold earned: <span>${expStats.gold}</span></div>
    <div class="summary-line">HP restored: <span>${expStats.healed}</span></div>
    <div class="summary-line">Lore discovered: <span>${expStats.lore}</span></div>
    ${expStats.loot.map(l => `<div class="summary-line" style="color:var(--gold);font-size:11px">  ${l.name}</div>`).join('')}
  `;
  document.getElementById('expeditionUI').classList.remove('active');
  document.getElementById('expSummary').classList.add('active');
}

function dismissSummary() {
  document.getElementById('expSummary').classList.remove('active');
  document.getElementById('exploreUI').style.display = '';
  document.getElementById('zones').style.display = '';
  document.getElementById('exploreBtn').classList.remove('walking');
  document.getElementById('exploreBtn').innerHTML = '<span class="shimmer"></span>Set Out';
  document.getElementById('exploreStatus').textContent = '';
  expNodeObject = null;
  expScrollX = 0;
  playerMonster.currentHP = playerMonster.stats.hp;
}

function abandonExpedition() {
  if (confirm('Abandon expedition? You\'ll keep items found so far.')) {
    endExpedition();
  }
}

// ---- CANVAS DRAWING FOR EXPEDITION OBJECTS ----
function drawExpeditionObject(groundY) {
  if (!expNodeObject) return;

  const ox = W * 0.65;
  const oy = groundY - 5;

  switch (expNodeObject.type) {
    case 'chest':
    case 'chestOpen': {
      const open = expNodeObject.type === 'chestOpen';
      // chest body
      ctx.fillStyle = '#8B6914';
      ctx.strokeStyle = '#5a4510';
      ctx.lineWidth = 2;
      const cw = 28, ch = 20;
      ctx.beginPath();
      ctx.roundRect(ox - cw/2, oy - ch, cw, ch, 3);
      ctx.fill(); ctx.stroke();
      // lid
      ctx.fillStyle = '#a07818';
      if (open) {
        ctx.save();
        ctx.translate(ox - cw/2, oy - ch);
        ctx.rotate(-0.5);
        ctx.fillRect(0, -6, cw, 6);
        ctx.strokeRect(0, -6, cw, 6);
        ctx.restore();
        // glow from inside
        ctx.save();
        ctx.globalAlpha = 0.4 + Math.sin(animT * 0.08) * 0.15;
        const glow = ctx.createRadialGradient(ox, oy - ch, 0, ox, oy - ch, 25);
        glow.addColorStop(0, '#ffdd44');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(ox, oy - ch, 25, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      } else {
        ctx.fillRect(ox - cw/2, oy - ch - 6, cw, 6);
        ctx.strokeRect(ox - cw/2, oy - ch - 6, cw, 6);
      }
      // clasp
      ctx.fillStyle = '#daa520';
      ctx.beginPath(); ctx.arc(ox, oy - ch, 3, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'campfire': {
      // stones
      ctx.fillStyle = '#444';
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(ox + Math.cos(a) * 12, oy + Math.sin(a) * 5, 4, 0, Math.PI * 2);
        ctx.fill();
      }
      // flames
      for (let i = 0; i < 4; i++) {
        const fx = ox + (Math.random() - 0.5) * 10;
        const fh = 12 + Math.sin(animT * 0.1 + i * 2) * 6;
        ctx.fillStyle = i % 2 ? '#ff6600' : '#ffcc00';
        ctx.globalAlpha = 0.7 + Math.sin(animT * 0.15 + i) * 0.2;
        ctx.beginPath();
        ctx.moveTo(fx, oy - 3);
        ctx.quadraticCurveTo(fx + 5, oy - 3 - fh * 0.5, fx + 2, oy - 3 - fh);
        ctx.quadraticCurveTo(fx - 3, oy - 3 - fh * 0.6, fx, oy - 3);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      // glow
      ctx.save();
      ctx.globalAlpha = 0.15 + Math.sin(animT * 0.06) * 0.05;
      const fg = ctx.createRadialGradient(ox, oy - 8, 0, ox, oy - 8, 40);
      fg.addColorStop(0, '#ff8800');
      fg.addColorStop(1, 'transparent');
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.arc(ox, oy - 8, 40, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      break;
    }
    case 'npc': {
      // Simple humanoid figure
      const nx = ox, ny = oy - 18;
      ctx.save();
      ctx.translate(nx, ny);
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(0, 18, 10, 4, 0, 0, Math.PI * 2); ctx.fill();
      // body
      ctx.fillStyle = '#556688';
      ctx.beginPath(); ctx.ellipse(0, 0, 7, 9, 0, 0, Math.PI * 2); ctx.fill();
      // head
      ctx.fillStyle = '#d4b896';
      ctx.beginPath(); ctx.arc(0, -12, 6, 0, Math.PI * 2); ctx.fill();
      // hat/hood
      ctx.fillStyle = '#3a5a3a';
      ctx.beginPath();
      ctx.moveTo(-8, -12); ctx.lineTo(0, -22); ctx.lineTo(8, -12);
      ctx.closePath(); ctx.fill();
      // arms
      ctx.strokeStyle = '#556688'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      const armWave = Math.sin(animT * 0.05) * 0.2;
      ctx.beginPath(); ctx.moveTo(-7, -2); ctx.lineTo(-14, 6 + Math.sin(animT * 0.08) * 3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(7, -2); ctx.lineTo(14, 4); ctx.stroke();
      ctx.restore();
      break;
    }
    case 'hazard': {
      // Warning triangle
      ctx.save();
      ctx.translate(ox, oy - 20);
      ctx.fillStyle = '#cc3300';
      ctx.strokeStyle = '#ffcc00';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -15); ctx.lineTo(15, 12); ctx.lineTo(-15, 12);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 16px serif';
      ctx.textAlign = 'center';
      ctx.fillText('!', 0, 8);
      ctx.restore();
      // danger particles
      ctx.save();
      ctx.globalAlpha = 0.3;
      for (let i = 0; i < 5; i++) {
        const px = ox + Math.sin(animT * 0.05 + i * 1.3) * 20;
        const py = oy - 5 + Math.cos(animT * 0.04 + i * 1.7) * 10;
        ctx.fillStyle = '#cc3300';
        ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
      break;
    }
    case 'landmark': {
      // Ruined pillar
      ctx.fillStyle = '#667788';
      ctx.strokeStyle = '#445566';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(ox - 10, oy); ctx.lineTo(ox - 8, oy - 40);
      ctx.lineTo(ox + 8, oy - 35); ctx.lineTo(ox + 10, oy);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // cracks
      ctx.strokeStyle = '#445566'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(ox - 3, oy - 10); ctx.lineTo(ox + 2, oy - 20); ctx.lineTo(ox - 1, oy - 30); ctx.stroke();
      // glow runes
      ctx.save();
      ctx.globalAlpha = 0.4 + Math.sin(animT * 0.04) * 0.2;
      ctx.fillStyle = '#8888cc';
      ctx.font = '8px serif';
      ctx.fillText('*', ox - 4, oy - 15);
      ctx.fillText('*', ox + 2, oy - 25);
      ctx.restore();
      break;
    }
    case 'signpost': {
      // Wooden signpost
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(ox - 2, oy - 35, 4, 35);
      ctx.fillStyle = '#6b4a22';
      ctx.strokeStyle = '#3a2a0f';
      ctx.lineWidth = 1;
      // signs pointing left/right
      ctx.beginPath();
      ctx.moveTo(ox - 20, oy - 30); ctx.lineTo(ox + 3, oy - 30);
      ctx.lineTo(ox + 3, oy - 22); ctx.lineTo(ox - 20, oy - 22);
      ctx.lineTo(ox - 24, oy - 26);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ox + 20, oy - 34); ctx.lineTo(ox - 3, oy - 34);
      ctx.lineTo(ox - 3, oy - 26); ctx.lineTo(ox + 20, oy - 26);
      ctx.lineTo(ox + 24, oy - 30);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    }
    case 'monster': {
      // Monster is drawn by the regular creature drawing system
      if (expNodeObject.data) {
        const bossScale = expNodeObject.boss ? 0.65 : 0.5;
        drawCreatureOnScene(expNodeObject.data, ox, oy - 5, bossScale, false);
        // Boss aura
        if (expNodeObject.boss) {
          ctx.save();
          ctx.globalAlpha = 0.12 + Math.sin(animT * 0.05) * 0.06;
          const bg = ctx.createRadialGradient(ox, oy - 20, 0, ox, oy - 20, 50);
          bg.addColorStop(0, '#ff3300');
          bg.addColorStop(1, 'transparent');
          ctx.fillStyle = bg;
          ctx.beginPath(); ctx.arc(ox, oy - 20, 50, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }
      }
      break;
    }
  }
}

// ---- BATTLE ANIMATION STATE ----
const battleAnim = {
  playerX: 0, playerY: 0,   // offset from base position
  enemyX: 0, enemyY: 0,
  playerFlash: 0,            // 0-1, white flash on hit
  enemyFlash: 0,
  playerShake: 0,            // shake intensity
  enemyShake: 0,
  cameraZoom: 1,             // zoom punch on big hits
  impactEffects: [],         // {x,y,type,t,maxT,color}
  enemySlideIn: 0,           // 0-1, slide in from right on encounter
  playerSlideIn: 0,
  enemyDeath: 0,             // 0-1, shrink/fade on death
};

function resetBattleAnim() {
  battleAnim.playerX = 0; battleAnim.playerY = 0;
  battleAnim.enemyX = 0; battleAnim.enemyY = 0;
  battleAnim.playerFlash = 0; battleAnim.enemyFlash = 0;
  battleAnim.playerShake = 0; battleAnim.enemyShake = 0;
  battleAnim.cameraZoom = 1;
  battleAnim.impactEffects = [];
  battleAnim.enemySlideIn = 0; battleAnim.playerSlideIn = 0;
  battleAnim.enemyDeath = 0;
}

function tweenTo(obj, prop, target, speed) {
  obj[prop] += (target - obj[prop]) * speed;
  if (Math.abs(obj[prop] - target) < 0.01) obj[prop] = target;
}

function updateBattleAnims() {
  // decay flashes
  battleAnim.playerFlash *= 0.85;
  battleAnim.enemyFlash *= 0.85;
  if (battleAnim.playerFlash < 0.01) battleAnim.playerFlash = 0;
  if (battleAnim.enemyFlash < 0.01) battleAnim.enemyFlash = 0;

  // decay shakes
  battleAnim.playerShake *= 0.8;
  battleAnim.enemyShake *= 0.8;

  // return offsets to 0
  tweenTo(battleAnim, 'playerX', 0, 0.12);
  tweenTo(battleAnim, 'playerY', 0, 0.12);
  tweenTo(battleAnim, 'enemyX', 0, 0.12);
  tweenTo(battleAnim, 'enemyY', 0, 0.12);

  // camera zoom back to 1
  tweenTo(battleAnim, 'cameraZoom', 1, 0.08);

  // slide-in
  if (battleAnim.enemySlideIn < 1) battleAnim.enemySlideIn += 0.04;
  if (battleAnim.playerSlideIn < 1) battleAnim.playerSlideIn += 0.05;

  // update impact effects
  battleAnim.impactEffects = battleAnim.impactEffects.filter(e => {
    e.t++;
    return e.t < e.maxT;
  });
}

function triggerAttackAnim(attacker, moveType) {
  const lungeX = W * 0.12;
  if (attacker === 'player') {
    battleAnim.playerX = lungeX;  // lunge right toward enemy
    battleAnim.playerY = -8;
    // delay hit effect
    setTimeout(() => {
      battleAnim.enemyFlash = 1;
      battleAnim.enemyShake = 8;
      battleAnim.cameraZoom = 1.04;
      spawnImpactEffect(W * 0.62, H * 0.42, moveType);
    }, 120);
  } else {
    battleAnim.enemyX = -lungeX;
    battleAnim.enemyY = -6;
    setTimeout(() => {
      battleAnim.playerFlash = 1;
      battleAnim.playerShake = 8;
      battleAnim.cameraZoom = 1.04;
      spawnImpactEffect(W * 0.22, H * 0.52, moveType);
    }, 120);
  }
}

function spawnImpactEffect(x, y, type) {
  const colors = {
    fire: ['#ff6600','#ffcc00','#ff3300'],
    water: ['#3399ff','#66bbff','#ffffff'],
    earth: ['#88cc44','#ccaa55','#887744'],
    electric: ['#ffee00','#ffffff','#aaddff'],
    shadow: ['#aa66cc','#663399','#4411aa'],
    ice: ['#88ddff','#ffffff','#bbddff'],
    toxic: ['#99cc33','#ccff44','#667722']
  };
  const c = colors[type] || colors.earth;

  // slash lines
  for (let i = 0; i < 3; i++) {
    const angle = -0.5 + Math.random() * 1;
    battleAnim.impactEffects.push({
      x, y, type: 'slash', t: 0, maxT: 18,
      angle, len: 20 + Math.random() * 25,
      color: c[i % c.length]
    });
  }

  // burst particles
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    battleAnim.impactEffects.push({
      x, y, type: 'particle', t: 0, maxT: 22 + Math.random() * 10,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      size: 2 + Math.random() * 4,
      color: c[Math.floor(Math.random() * c.length)]
    });
  }

  // type-specific
  if (type === 'fire') {
    for (let i = 0; i < 6; i++) {
      battleAnim.impactEffects.push({
        x: x + (Math.random()-0.5)*30, y: y + (Math.random()-0.5)*20,
        type: 'flame', t: 0, maxT: 25,
        size: 8 + Math.random() * 12,
        color: i%2 ? '#ffcc00' : '#ff4400'
      });
    }
  } else if (type === 'electric') {
    for (let i = 0; i < 4; i++) {
      battleAnim.impactEffects.push({
        x, y, type: 'lightning', t: 0, maxT: 12,
        points: generateLightningBolt(x, y - 40, x + (Math.random()-0.5)*50, y + 20),
        color: '#ffee44'
      });
    }
  } else if (type === 'water') {
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      battleAnim.impactEffects.push({
        x, y, type: 'droplet', t: 0, maxT: 28,
        vx: Math.cos(angle) * (1+Math.random()*3),
        vy: Math.sin(angle) * 3 - 4,
        size: 3 + Math.random() * 4,
        color: c[Math.floor(Math.random()*c.length)]
      });
    }
  } else if (type === 'shadow') {
    battleAnim.impactEffects.push({
      x, y, type: 'voidCircle', t: 0, maxT: 30,
      size: 35, color: '#663399'
    });
  } else if (type === 'ice') {
    for (let i = 0; i < 5; i++) {
      battleAnim.impactEffects.push({
        x: x + (Math.random()-0.5)*40, y: y + (Math.random()-0.5)*30,
        type: 'crystal', t: 0, maxT: 30,
        size: 6 + Math.random() * 10,
        angle: Math.random() * Math.PI,
        color: c[i%c.length]
      });
    }
  }
}

function generateLightningBolt(x1, y1, x2, y2) {
  const pts = [{x:x1, y:y1}];
  const segments = 5;
  for (let i = 1; i < segments; i++) {
    const t = i / segments;
    pts.push({
      x: lerp(x1, x2, t) + (Math.random()-0.5) * 25,
      y: lerp(y1, y2, t) + (Math.random()-0.5) * 10
    });
  }
  pts.push({x:x2, y:y2});
  return pts;
}

function drawImpactEffects() {
  for (const e of battleAnim.impactEffects) {
    const progress = e.t / e.maxT;
    const alpha = 1 - progress;

    ctx.save();
    ctx.globalAlpha = alpha;

    switch (e.type) {
      case 'slash': {
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 3 * (1 - progress);
        ctx.lineCap = 'round';
        const ext = e.len * Math.min(1, e.t / 5);
        ctx.beginPath();
        ctx.moveTo(e.x - Math.cos(e.angle) * ext * 0.5, e.y - Math.sin(e.angle) * ext * 0.5);
        ctx.lineTo(e.x + Math.cos(e.angle) * ext * 0.5, e.y + Math.sin(e.angle) * ext * 0.5);
        ctx.stroke();
        break;
      }
      case 'particle': {
        e.x += e.vx; e.y += e.vy; e.vy += 0.15;
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size * (1 - progress * 0.5), 0, Math.PI * 2);
        ctx.fill();
        break;
      }
      case 'flame': {
        const s = e.size * (1 - progress * 0.7);
        const fy = e.y - e.t * 1.5;
        ctx.fillStyle = e.color;
        ctx.globalAlpha = alpha * 0.7;
        ctx.beginPath();
        ctx.moveTo(e.x, fy - s);
        ctx.quadraticCurveTo(e.x + s * 0.6, fy - s * 0.3, e.x + s * 0.3, fy + s * 0.5);
        ctx.quadraticCurveTo(e.x, fy + s * 0.2, e.x - s * 0.3, fy + s * 0.5);
        ctx.quadraticCurveTo(e.x - s * 0.6, fy - s * 0.3, e.x, fy - s);
        ctx.fill();
        break;
      }
      case 'lightning': {
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 2.5 * (1 - progress);
        ctx.shadowColor = e.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        e.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.stroke();
        ctx.shadowBlur = 0;
        break;
      }
      case 'droplet': {
        e.x += e.vx; e.y += e.vy; e.vy += 0.2;
        ctx.fillStyle = e.color;
        ctx.globalAlpha = alpha * 0.6;
        ctx.beginPath();
        ctx.ellipse(e.x, e.y, e.size * 0.6, e.size, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      }
      case 'voidCircle': {
        const r = e.size * progress;
        const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
        grad.addColorStop(0, e.color + '88');
        grad.addColorStop(0.6, e.color + '44');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
        ctx.fill();
        break;
      }
      case 'crystal': {
        const s = e.size * (1 - progress * 0.3);
        ctx.fillStyle = e.color;
        ctx.globalAlpha = alpha * 0.8;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.rotate(e.angle);
        ctx.beginPath();
        ctx.moveTo(0, -s); ctx.lineTo(s*0.35, 0); ctx.lineTo(0, s*0.6); ctx.lineTo(-s*0.35, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        break;
      }
    }
    ctx.restore();
  }
}
