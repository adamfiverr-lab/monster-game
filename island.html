<script>
// ---- UTILS ----
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[rng(0,a.length-1)]}
function pickN(a,n){return[...a].sort(()=>Math.random()-0.5).slice(0,n)}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('')}
function lighten(h,a){const c=hexToRgb(h);return rgbToHex(c.r+(255-c.r)*a,c.g+(255-c.g)*a,c.b+(255-c.b)*a)}
function darken(h,a){const c=hexToRgb(h);return rgbToHex(c.r*(1-a),c.g*(1-a),c.b*(1-a))}

// ---- CANVAS SETUP ----
const sceneCanvas = document.getElementById('scene');
let ctx = sceneCanvas.getContext('2d');
let W, H;
function resizeCanvas(){
  const r = window.devicePixelRatio || 1;
  const rect = sceneCanvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  sceneCanvas.width = W * r; sceneCanvas.height = H * r;
  sceneCanvas.style.width = W + 'px'; sceneCanvas.style.height = H + 'px';
  ctx.setTransform(r,0,0,r,0,0);
  lightCanvas.width = W; lightCanvas.height = H;
}
// Offscreen lighting canvas
const lightCanvas = document.createElement('canvas');
const lightCtx = lightCanvas.getContext('2d');

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ---- GAME STATE ----
let gameState = 'explore'; // 'explore' | 'expedition' | 'walking' | 'encounter' | 'battle'
let animT = 0;
let currentZone = 'beach';
let walkProgress = 0;
let encounterTimer = 0;
let scrollOffset = 0;

// ---- MONSTER COLLECTION ----
let caughtMonsters = []; // array of full monster objects
let catchTarget = null; // the monster we're trying to catch in battle

// ---- TOP-DOWN FREE-ROAM EXPLORATION ----
const MAP_W = 64, MAP_H = 64;
const TILE_PX = 48;
const VIEW_RAD = 7;
const ENCOUNTER_CHANCE = 0.16;
const MOVE_SPEED = 5;

// Mode 7 camera constants
const CAM_HEIGHT = 120;
const CAM_BEHIND = 60;
const CAM_FOV_FACTOR = 0.8;
const VIEW_RAD_3D = 14;

// Virtual joystick state
let joyActive = false, joyDx = 0, joyDy = 0;
const JOY_RADIUS = 45, JOY_DEAD = 6;

// Tile types
const T = { VOID:0, GRASS:1, TALL:2, PATH:3, TREE:4, WATER:5, ROCK:6, WALL:7, SAND:8 };

const map = {
  tiles: null, seen: null, objects: [], // {gx,gy,type,data,done}
  px:0, py:0, gx:0, gy:0, // player pixel + grid pos
  tgx:-1, tgy:-1, // target (for tap marker)
  path:[], moving:false, facing:1, // 0=up 1=right 2=down 3=left
  camX:0, camY:0,
  angle: Math.PI / 2, // player facing direction (radians)
  tapPing:0, // 0-1 ping animation at target
  particles:[], // ambient map particles
  footsteps:[], // {x,y,t} footprint trail
};
let expStats = { battles:0, loot:[], healed:0, lore:0, gold:0 };
let expToastTimer = null;
let mapInteracting = false;

const ITEMS = {
  beach: [
    { name:'Sea Crystal', effect:'heal', value:20 },
    { name:'Pearl Shard', effect:'gold', value:30 },
    { name:'Coral Crown', effect:'heal', value:40 },
  ],
  forest: [
    { name:'Verdant Root', effect:'heal', value:25 },
    { name:'Hunter\'s Coin', effect:'gold', value:25 },
    { name:'Sylvan Tear', effect:'heal', value:45 },
  ],
  deepwoods: [
    { name:'Shadow Moss', effect:'heal', value:30 },
    { name:'Cursed Doubloon', effect:'gold', value:40 },
    { name:'Heartwood Sap', effect:'heal', value:50 },
  ],
  cave: [
    { name:'Glowstone', effect:'heal', value:25 },
    { name:'Vein Gold', effect:'gold', value:45 },
    { name:'Dragon Scale', effect:'heal', value:50 },
  ],
};

// Zone tile colors
const ZONE_TILES = {
  beach:    { base:T.SAND, block:T.ROCK, grass:['#c2a67a','#b89a6e','#d4b88a'], tall:['#6a8a3a','#5a7a2a'], path:['#a89060','#9a8050'], block_c:'#888877', tree_c:['#8B6914','#3a8a2e'], water:['#1a6688','#2277aa'] },
  forest:   { base:T.GRASS, block:T.TREE, grass:['#3a6a2a','#2d5a20','#4a7a34'], tall:['#2a5a1a','#1d4a10'], path:['#6a5a3a','#5a4a2a'], block_c:'#2a5a1a', tree_c:['#3a2818','#2a6a1a'], water:['#1a5566','#1a6688'] },
  deepwoods:{ base:T.GRASS, block:T.TREE, grass:['#1a3a14','#15301a','#224a1e'], tall:['#102a0a','#0d2208'], path:['#3a3020','#2a2010'], block_c:'#1a3a10', tree_c:['#2a1808','#183a0a'], water:['#0d3344','#104455'] },
  cave:     { base:T.GRASS, block:T.WALL, grass:['#2a2a30','#252530','#333340'], tall:['#1a1a28','#18182a'], path:['#3a3a40','#333338'], block_c:'#1a1a22', tree_c:['#3a3a44','#444450'], water:['#0a1a2a','#0d2030'] },
};

function isWalkable(t) { return t===T.GRASS||t===T.TALL||t===T.PATH||t===T.SAND; }
function tileAt(gx,gy) { return (gx<0||gx>=MAP_W||gy<0||gy>=MAP_H) ? T.VOID : map.tiles[gy*MAP_W+gx]; }

// ---- MAP GENERATION ----
function generateMap(zone) {
  const tiles = new Uint8Array(MAP_W*MAP_H);
  const zt = ZONE_TILES[zone];

  // Fill with blocking
  tiles.fill(zt.block);

  // Organic boundary — define a soft oval boundary using distance from center
  // Tiles outside this boundary stay blocking, creating natural edges
  const cxMap = MAP_W/2, cyMap = MAP_H/2;
  const radiusX = MAP_W*0.42, radiusY = MAP_H*0.42;

  function inBounds(x,y) {
    const dx = (x-cxMap)/radiusX, dy = (y-cyMap)/radiusY;
    const d = dx*dx+dy*dy;
    // Jagged boundary: add noise based on angle
    const angle = Math.atan2(dy,dx);
    const noise = Math.sin(angle*5)*0.08 + Math.sin(angle*11)*0.04;
    return d < (1+noise)*(1+noise);
  }

  // Random walks to carve open space (more walkers, longer walks for bigger map)
  for (let w = 0; w < 14; w++) {
    let cx = Math.floor(MAP_W/2) + rng(-8,8);
    let cy = Math.floor(MAP_H/2) + rng(-8,8);
    for (let s = 0; s < 300; s++) {
      for (let dx = -1; dx <= 1; dx++)
        for (let dy = -1; dy <= 1; dy++) {
          const nx=cx+dx, ny=cy+dy;
          if (nx>1&&nx<MAP_W-2&&ny>1&&ny<MAP_H-2 && inBounds(nx,ny))
            tiles[ny*MAP_W+nx] = zt.base;
        }
      const d = rng(0,3);
      if(d===0&&cy>3)cy--; if(d===1&&cy<MAP_H-4)cy++;
      if(d===2&&cx>3)cx--; if(d===3&&cx<MAP_W-4)cx++;
    }
  }

  // Cellular automata smoothing (3 passes for bigger map)
  for (let pass=0; pass<3; pass++) {
    const copy = new Uint8Array(tiles);
    for (let y=2;y<MAP_H-2;y++) for (let x=2;x<MAP_W-2;x++) {
      if (!inBounds(x,y)) continue;
      let open=0;
      for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
        if (isWalkable(copy[(y+dy)*MAP_W+(x+dx)])) open++;
      }
      tiles[y*MAP_W+x] = open>=5 ? zt.base : zt.block;
    }
  }

  // Carve winding paths across the map
  for (let p=0; p<rng(2,3); p++) {
    let px = rng(Math.floor(MAP_W*0.3), Math.floor(MAP_W*0.7));
    let py = MAP_H-rng(6,10);
    const targetY = rng(5,10);
    while (py > targetY) {
      if (inBounds(px,py)) tiles[py*MAP_W+px] = T.PATH;
      const r = Math.random();
      if (r<0.5&&py>3) py--;
      else if (r<0.75&&px<MAP_W-5) px++;
      else if (px>4) px--;
      if (Math.random()<0.3 && inBounds(px+1,py)) tiles[py*MAP_W+px+1]=T.PATH;
      if (Math.random()<0.3 && inBounds(px-1,py) && px>1) tiles[py*MAP_W+px-1]=T.PATH;
    }
  }

  // Scatter tall grass (20% of open tiles)
  for (let i=0;i<tiles.length;i++) {
    if (tiles[i]===zt.base && Math.random()<0.20) tiles[i]=T.TALL;
  }

  // Add water pools (scaled for bigger map)
  for (let w=0;w<rng(5,10);w++) {
    const wx=rng(8,MAP_W-9), wy=rng(8,MAP_H-9);
    if (!inBounds(wx,wy)) continue;
    const pr = rng(1,3);
    for (let dy=-pr;dy<=pr;dy++) for (let dx=-pr;dx<=pr;dx++) {
      if (dx*dx+dy*dy>pr*pr+1) continue;
      const tx=wx+dx, ty=wy+dy;
      if (tx>1&&tx<MAP_W-2&&ty>1&&ty<MAP_H-2 && inBounds(tx,ty) && Math.random()<0.75 && tiles[ty*MAP_W+tx]!==T.PATH)
        tiles[ty*MAP_W+tx]=T.WATER;
    }
  }

  map.tiles = tiles;
  map.seen = new Uint8Array(MAP_W*MAP_H);

  // Spawn near center-bottom of the playable area
  map.gx = Math.floor(MAP_W/2); map.gy = Math.floor(MAP_H*0.7);
  // Ensure spawn is walkable
  for (let dx=-1;dx<=1;dx++) for (let dy=-1;dy<=1;dy++) {
    tiles[(map.gy+dy)*MAP_W+(map.gx+dx)] = T.PATH;
  }
  map.px = map.gx*TILE_PX+TILE_PX/2;
  map.py = map.gy*TILE_PX+TILE_PX/2;
  map.path = []; map.moving = false;

  // Place objects on open tiles away from spawn
  map.objects = [];
  const placedSpots = new Set();
  placedSpots.add(map.gx+','+map.gy);

  function findSpot(minDist) {
    for (let tries=0;tries<400;tries++) {
      const gx=rng(4,MAP_W-5), gy=rng(4,MAP_H-5);
      if (!inBounds(gx,gy)) continue;
      if (!isWalkable(tiles[gy*MAP_W+gx])) continue;
      const key=gx+','+gy;
      if (placedSpots.has(key)) continue;
      const dx=gx-map.gx, dy=gy-map.gy;
      if (Math.sqrt(dx*dx+dy*dy)<minDist) continue;
      let tooClose = false;
      for (const k of placedSpots) {
        const [ox,oy]=k.split(',').map(Number);
        if (Math.abs(gx-ox)+Math.abs(gy-oy)<3) { tooClose=true; break; }
      }
      if (tooClose) continue;
      placedSpots.add(key);
      return {gx,gy};
    }
    return null;
  }

  // Chests (scaled for bigger map)
  for (let i=0;i<rng(7,12);i++) {
    const s=findSpot(3);
    if(s) map.objects.push({...s,type:'chest',data:pick(ITEMS[zone]),done:false});
  }
  // Campfires
  for (let i=0;i<rng(4,7);i++) {
    const s=findSpot(5);
    if(s) map.objects.push({...s,type:'campfire',done:false});
  }
  // NPCs
  for (let i=0;i<rng(2,5);i++) {
    const s=findSpot(5); if(s) map.objects.push({...s,type:'npc',done:false});
  }
  // Visible monsters (more for bigger map)
  for (let i=0;i<rng(16,26);i++) {
    const s=findSpot(3);
    if(s) map.objects.push({...s,type:'monster',data:generateEnemy(),done:false});
  }
  // Bosses (2 for bigger map)
  for (let b=0;b<2;b++) {
    const s=findSpot(12); if(s) {
      const boss = generateEnemy();
      boss.level = rng(12,18);
      boss.stats.hp = 80+boss.level*8; boss.stats.atk = 25+boss.level*4; boss.stats.def = 15+boss.level*3;
      boss.currentHP = boss.stats.hp;
      boss.body.size = (boss.body?.size||1)*1.3; boss.body.bulk = (boss.body?.bulk||1)*1.2;
      boss.moves.forEach(m => m.damage = Math.floor(m.damage*1.3));
      const names = {beach:['Tidecrusher','Reefmaw'],forest:['Thornking','Mossfang'],
        deepwoods:['Gloomfang','Rotcrown'],cave:['Deepjaw','Cavewyrm']};
      boss.name = pick(names[zone]||names.forest);
      map.objects.push({...s,type:'boss',data:boss,done:false});
    }
  }

  revealAround(map.gx, map.gy);

  // Generate zone-specific ambient particles
  map.particles = [];
  const pCount = 45;
  for (let i=0;i<pCount;i++) {
    const base = {
      x:rng(0,MAP_W*TILE_PX), y:rng(0,MAP_H*TILE_PX),
      phase:Math.random()*Math.PI*2,
    };
    if (zone==='beach') {
      Object.assign(base, { ptype:'sparkle', vx:(Math.random()-0.5)*0.5, vy:0,
        size:Math.random()*1.5+0.5, alpha:Math.random()*0.5+0.2, color:'#ffe8a0' });
    } else if (zone==='forest') {
      Object.assign(base, { ptype:'firefly', vx:(Math.random()-0.5)*0.15, vy:0,
        size:Math.random()*2+1, alpha:0, color:'#ffcc44', glowRad:8+Math.random()*4 });
    } else if (zone==='deepwoods') {
      Object.assign(base, { ptype:'spore', vx:(Math.random()-0.5)*0.1, vy:-Math.random()*0.15-0.05,
        size:Math.random()*2.5+1, alpha:Math.random()*0.3+0.1, color:'#88cc66' });
    } else {
      Object.assign(base, { ptype:'crystal', vx:0, vy:0,
        size:Math.random()*1.5+0.5, alpha:Math.random()*0.4+0.2, color:'#8866cc',
        altColor:'#6688cc' });
    }
    map.particles.push(base);
  }
  map.footsteps = [];
}

function revealAround(gx,gy) {
  for (let dy=-VIEW_RAD;dy<=VIEW_RAD;dy++)
    for (let dx=-VIEW_RAD;dx<=VIEW_RAD;dx++) {
      if (dx*dx+dy*dy>VIEW_RAD*VIEW_RAD) continue;
      const tx=gx+dx, ty=gy+dy;
      if (tx>=0&&tx<MAP_W&&ty>=0&&ty<MAP_H) map.seen[ty*MAP_W+tx]=1;
    }
}

// ---- A* PATHFINDING ----
function findPath(sx,sy,ex,ey) {
  if (sx===ex&&sy===ey) return [];
  if (!isWalkable(tileAt(ex,ey))) return [];

  const open = [{x:sx,y:sy,g:0,f:0,p:null}];
  const closed = new Set();
  const key = (x,y)=>y*MAP_W+x;

  while (open.length>0) {
    open.sort((a,b)=>a.f-b.f);
    const cur = open.shift();
    const ck = key(cur.x,cur.y);
    if (closed.has(ck)) continue;
    closed.add(ck);

    if (cur.x===ex&&cur.y===ey) {
      const path=[];
      let n=cur;
      while(n.p) { path.unshift({x:n.x,y:n.y}); n=n.p; }
      return path;
    }

    for (const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx=cur.x+dx, ny=cur.y+dy;
      if (nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) continue;
      if (!isWalkable(tileAt(nx,ny))) continue;
      const nk=key(nx,ny);
      if (closed.has(nk)) continue;
      // Also allow walking onto object tiles (they're walkable tiles with objects on them)
      const g=cur.g+1;
      const h=Math.abs(nx-ex)+Math.abs(ny-ey);
      open.push({x:nx,y:ny,g,f:g+h,p:cur});
    }

    if (closed.size > 3000) return []; // safety limit for 64x64 map
  }
  return [];
}

// ---- EXPEDITION LIFECYCLE ----
function startExpedition() {
  if (gameState !== 'explore') return;
  generateMap(currentZone);

  expStats = { battles:0, loot:[], healed:0, lore:0, gold:0 };
  mapInteracting = false;
  gameState = 'expedition';

  document.getElementById('exploreUI').style.display = 'none';
  document.getElementById('zones').style.display = 'none';
  document.getElementById('expeditionUI').classList.add('active');
  document.getElementById('expWalkPrompt').textContent = 'Tap to move';
  document.body.classList.add('in-expedition');
  map.angle = Math.PI / 2;
  updateExpUI();
  showWalkPrompt();

  setupCanvasTapHandler();
}

// ---- VIRTUAL JOYSTICK ----
let joystickBound = false;
function setupJoystick() {
  if (joystickBound) return;
  joystickBound = true;
  const joy = document.getElementById('joystick');
  const inner = document.getElementById('joystickInner');

  function onStart(e) {
    e.preventDefault();
    if (mapInteracting) return;
    joyActive = true;
    inner.classList.add('active');
    onMove(e);
  }
  function onMove(e) {
    e.preventDefault();
    if (!joyActive) return;
    const touch = e.touches ? e.touches[0] : e;
    const rect = joy.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    let dx = touch.clientX - cx;
    let dy = touch.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > JOY_RADIUS) { dx = dx/dist*JOY_RADIUS; dy = dy/dist*JOY_RADIUS; }
    inner.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    if (dist < JOY_DEAD) { joyDx = 0; joyDy = 0; }
    else {
      const clamped = Math.min(dist, JOY_RADIUS);
      joyDx = (dx/dist) * (clamped/JOY_RADIUS);
      joyDy = (dy/dist) * (clamped/JOY_RADIUS);
    }
  }
  function onEnd(e) {
    e.preventDefault();
    joyActive = false; joyDx = 0; joyDy = 0;
    inner.classList.remove('active');
    inner.style.transform = 'translate(-50%,-50%)';
  }

  joy.addEventListener('touchstart', onStart, {passive:false});
  joy.addEventListener('touchmove', onMove, {passive:false});
  joy.addEventListener('touchend', onEnd, {passive:false});
  joy.addEventListener('touchcancel', onEnd, {passive:false});
  // Mouse fallback for desktop testing
  joy.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', e => { if(joyActive) onMove(e); });
  window.addEventListener('mouseup', e => { if(joyActive) onEnd(e); });
}

function updateExpUI() {
  // Count explored %
  let seen=0;
  if(map.seen) for(let i=0;i<map.seen.length;i++) if(map.seen[i]) seen++;
  const pct = map.seen ? Math.floor(seen/(MAP_W*MAP_H)*100) : 0;
  document.getElementById('expStepLabel').textContent = pct+'%';
  document.getElementById('expProgressBar').style.width = pct+'%';
  document.getElementById('expHPMini').textContent = `${playerMonster.currentHP}/${playerMonster.stats.hp}`;
  document.getElementById('expHPMini').style.color =
    playerMonster.currentHP > playerMonster.stats.hp*0.5 ? 'var(--hp-green)' :
    playerMonster.currentHP > playerMonster.stats.hp*0.2 ? 'var(--hp-yellow)' : 'var(--hp-red)';
}

function showWalkPrompt() {
  document.getElementById('expWalkPrompt').style.display = '';
  document.getElementById('expEventBar').classList.remove('active');
}
function hideWalkPrompt() {
  document.getElementById('expWalkPrompt').style.display = 'none';
}

function showEventUI(title, sub, choices) {
  hideWalkPrompt();
  mapInteracting = true;
  const bar = document.getElementById('expEventBar');
  document.getElementById('expEventText').textContent = title;
  document.getElementById('expEventSub').textContent = sub || '';
  const wrap = document.getElementById('expChoices');
  wrap.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'exp-btn ' + (c.style || 'walk');
    btn.textContent = c.label;
    btn.addEventListener('click', ev => { ev.preventDefault(); c.action(); });
    wrap.appendChild(btn);
  });
  bar.classList.add('active');
}

function resumeMapExplore() {
  mapInteracting = false;
  showWalkPrompt();
  updateExpUI();
}

function showToast(text) {
  const t = document.getElementById('expToast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(expToastTimer);
  expToastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ---- TILE ARRIVAL & INTERACTIONS ----
function handleTileArrival(gx, gy) {
  // Check object on this tile
  const obj = map.objects.find(o => o.gx===gx && o.gy===gy && !o.done);
  if (obj) {
    map.moving = false;
    handleObjectInteraction(obj);
  }
}

function handleObjectInteraction(obj) {
  switch (obj.type) {
    case 'chest':
      showEventUI('Treasure found!', obj.data.name, [
        { label:'Take', style:'loot', action:() => {
          expStats.loot.push(obj.data);
          if (obj.data.effect==='heal') {
            playerMonster.currentHP = Math.min(playerMonster.stats.hp, playerMonster.currentHP+obj.data.value);
            expStats.healed += obj.data.value;
            showToast(obj.data.name+' +'+obj.data.value+' HP');
          } else {
            expStats.gold += obj.data.value;
            showToast(obj.data.name+' +'+obj.data.value+' Gold');
          }
          obj.done = true;
          resumeMapExplore();
        }},
        { label:'Leave', style:'walk', action:() => resumeMapExplore() },
      ]);
      break;

    case 'campfire':
      showEventUI('Campfire', 'Rest and recover?', [
        { label:'Rest', style:'heal', action:() => {
          const heal = Math.floor(playerMonster.stats.hp*0.4);
          playerMonster.currentHP = Math.min(playerMonster.stats.hp, playerMonster.currentHP+heal);
          expStats.healed += heal;
          showToast('+'+heal+' HP restored');
          obj.done = true;
          resumeMapExplore();
        }},
        { label:'Skip', style:'walk', action:() => resumeMapExplore() },
      ]);
      break;

    case 'npc':
      showEventUI('Wandering Traveler', '"Rest a moment, friend."', [
        { label:'Accept aid', style:'heal', action:() => {
          const heal = rng(15,35);
          playerMonster.currentHP = Math.min(playerMonster.stats.hp, playerMonster.currentHP+heal);
          expStats.healed += heal;
          showToast('+'+heal+' HP');
          obj.done = true;
          resumeMapExplore();
        }},
        { label:'Move on', style:'walk', action:() => resumeMapExplore() },
      ]);
      break;

    case 'monster':
    case 'boss':
      showEventUI('Wild '+obj.data.name+'!', 'Lv'+obj.data.level+(obj.type==='boss'?' BOSS':''), [
        { label:'Fight', style:'fight', action:() => {
          enemyMonster = obj.data;
          expStats.battles++;
          obj.done = true;
          const flash = document.getElementById('flash');
          flash.classList.add('active');
          setTimeout(() => flash.classList.remove('active'), 150);
          document.getElementById('expeditionUI').classList.remove('active');
          mapInteracting = false;
          setTimeout(() => startBattle(), 400);
        }},
        ...(obj.type!=='boss' ? [{ label:'Avoid', style:'walk', action:() => resumeMapExplore() }] : []),
      ]);
      break;
  }
}

// ---- PLAYER MOVEMENT (PATH-FOLLOWING) ----
let footstepCD = 0;
function updatePlayerMovement() {
  if (mapInteracting) { map.moving = false; return; }

  if (map.path.length > 0) {
    const target = map.path[0];
    const targetPx = target.x * TILE_PX + TILE_PX / 2;
    const targetPy = target.y * TILE_PX + TILE_PX / 2;
    const dx = targetPx - map.px;
    const dy = targetPy - map.py;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < MOVE_SPEED + 1) {
      // Reached waypoint
      map.px = targetPx;
      map.py = targetPy;
      map.path.shift();

      const prevGx = map.gx, prevGy = map.gy;
      map.gx = target.x;
      map.gy = target.y;

      if (prevGx !== map.gx || prevGy !== map.gy) {
        revealAround(map.gx, map.gy);
        handleTileArrival(map.gx, map.gy);
        updateExpUI();
      }
    } else {
      // Move toward waypoint
      map.px += (dx / dist) * MOVE_SPEED;
      map.py += (dy / dist) * MOVE_SPEED;
    }

    // Smooth angle rotation toward movement direction
    const moveAngle = Math.atan2(dy, dx);
    let angleDiff = moveAngle - map.angle;
    // Wrap to [-PI, PI]
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    map.angle += angleDiff * 0.12;

    // Update facing (for compatibility)
    const facingAngle = map.angle % (Math.PI * 2);
    if (facingAngle < Math.PI * 0.25 || facingAngle > Math.PI * 1.75) map.facing = 1;
    else if (facingAngle < Math.PI * 0.75) map.facing = 2;
    else if (facingAngle < Math.PI * 1.25) map.facing = 3;
    else map.facing = 0;

    // Footstep particles every 6 frames
    footstepCD--;
    if (footstepCD <= 0) {
      map.footsteps.push({ x: map.px, y: map.py, t: 50 });
      if (map.footsteps.length > 30) map.footsteps.shift();
      footstepCD = 6;
    }

    map.moving = true;
  } else {
    map.moving = false;
  }
}

// ---- TAP-TO-WALK INPUT ----
let tapHandlerBound = false;
function setupCanvasTapHandler() {
  if (tapHandlerBound) return;
  tapHandlerBound = true;
  const canvas = document.getElementById('scene');

  function handleTap(clientX, clientY) {
    if (mapInteracting) return;
    if (gameState !== 'expedition') return;

    const rect = canvas.getBoundingClientRect();
    const r = window.devicePixelRatio || 1;
    const screenX = (clientX - rect.left) * (canvas.width / rect.width) / r;
    const screenY = (clientY - rect.top) * (canvas.height / rect.height) / r;

    // Check if tapping player character area (stop walking)
    const playerScreenX = map.px - map.camX;
    const playerScreenY = map.py - map.camY;
    const dx = screenX - playerScreenX;
    const dy = screenY - playerScreenY;
    if (dx * dx + dy * dy < 30 * 30) {
      map.path = [];
      map.moving = false;
      return;
    }

    // Convert screen tap to world coordinates (simple 2D offset)
    const worldX = screenX + map.camX;
    const worldY = screenY + map.camY;

    const tgx = Math.floor(worldX / TILE_PX);
    const tgy = Math.floor(worldY / TILE_PX);

    if (tgx < 0 || tgx >= MAP_W || tgy < 0 || tgy >= MAP_H) return;
    if (!isWalkable(tileAt(tgx, tgy))) return;

    const path = findPath(map.gx, map.gy, tgx, tgy);
    if (path.length > 0) {
      map.path = path;
      map.tgx = tgx;
      map.tgy = tgy;
      map.tapPing = 1;
      map.moving = true;
    }
  }

  canvas.addEventListener('touchstart', (e) => {
    if (gameState !== 'expedition') return;
    e.preventDefault();
    const touch = e.touches[0];
    handleTap(touch.clientX, touch.clientY);
  }, { passive: false });

  canvas.addEventListener('click', (e) => {
    if (gameState !== 'expedition') return;
    handleTap(e.clientX, e.clientY);
  });
}

function updateMapCamera() {
  const targetX = map.px - W/2;
  const targetY = map.py - H*0.45; // slightly above center for 2.5D perspective
  map.camX += (targetX-map.camX)*0.14;
  map.camY += (targetY-map.camY)*0.14;
  const margin = TILE_PX * 3;
  map.camX = clamp(map.camX, -margin, Math.max(0, MAP_W*TILE_PX-W+margin));
  map.camY = clamp(map.camY, -margin, Math.max(0, MAP_H*TILE_PX-H+margin));
}

// ---- EXPEDITION END ----
function endExpedition() {
  gameState = 'explore';
  document.body.classList.remove('in-expedition');
  joyActive = false; joyDx = 0; joyDy = 0;
  map.moving = false;

  const content = document.getElementById('summaryContent');
  content.innerHTML = `
    <div class="summary-line">Battles: <span>${expStats.battles}</span></div>
    <div class="summary-line">Items: <span>${expStats.loot.length}</span></div>
    <div class="summary-line">Gold: <span>${expStats.gold}</span></div>
    <div class="summary-line">HP restored: <span>${expStats.healed}</span></div>
  `;
  document.getElementById('expeditionUI').classList.remove('active');
  document.getElementById('expSummary').classList.add('active');
}

function dismissSummary() {
  document.getElementById('expSummary').classList.remove('active');
  document.getElementById('exploreUI').style.display = '';
  document.getElementById('zones').style.display = '';
  document.getElementById('exploreBtn').innerHTML = '<span class="shimmer"></span>Set Out';
  document.body.classList.remove('in-expedition');
  map.tiles = null; map.seen = null; map.objects = [];
  map.particles = []; map.footsteps = [];
  playerMonster.currentHP = playerMonster.stats.hp;
}

// ---- TOP-DOWN TILE RENDERING ----
const TP = TILE_PX; // shorthand
function drawTile(type, sx, sy, gx, gy, zone) {
  const zt = ZONE_TILES[zone];
  const v = ((gx*7+gy*13)&7); // variation 0-7
  const hash = (gx*31+gy*17)&255; // deterministic per-tile hash

  switch(type) {
    case T.GRASS: case T.SAND: {
      ctx.fillStyle = zt.grass[v%zt.grass.length];
      ctx.fillRect(sx,sy,TP,TP);
      // Grass tufts / pebbles scattered
      ctx.save();
      ctx.globalAlpha=0.25;
      ctx.strokeStyle=lighten(zt.grass[(v+1)%zt.grass.length],0.15);
      ctx.lineWidth=1; ctx.lineCap='round';
      const tufts = 2+((hash>>2)&1);
      for(let i=0;i<tufts;i++){
        const tx2=sx+6+((hash>>(i*2))&1)*16+i*8;
        const ty2=sy+TP-4;
        ctx.beginPath(); ctx.moveTo(tx2,ty2); ctx.lineTo(tx2+1,ty2-6-((hash>>4)&3)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(tx2+3,ty2); ctx.lineTo(tx2+2,ty2-5-((hash>>6)&3)); ctx.stroke();
      }
      // Occasional small flower or pebble
      if((hash&15)===0){
        ctx.globalAlpha=0.5;
        ctx.fillStyle=zone==='beach'?'#e8d8b8':['#dd6688','#eebb44','#aaccee'][hash%3];
        ctx.beginPath(); ctx.arc(sx+10+(hash%18),sy+8+(hash%16),zone==='beach'?1.5:2,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
      break;
    }
    case T.TALL: {
      ctx.fillStyle = zt.grass[v%zt.grass.length];
      ctx.fillRect(sx,sy,TP,TP);
      // Dense swaying tall grass
      ctx.save();
      const sw = Math.sin(animT*0.05+gx*1.7+gy*0.9)*3;
      const bladeCount = 6+((hash>>1)&3);
      for (let b=0;b<bladeCount;b++) {
        const bx = sx+3+((b*5+hash)%Math.floor(TP-6));
        const by = sy+TP-1;
        const bh = 12+((hash+b*7)%8);
        ctx.strokeStyle = zt.tall[b%zt.tall.length];
        ctx.lineWidth = 1.2+((b&1)*0.4);
        ctx.lineCap = 'round';
        ctx.globalAlpha = 0.6+((b&1)*0.2);
        ctx.beginPath(); ctx.moveTo(bx,by);
        ctx.quadraticCurveTo(bx+sw*0.5,by-bh*0.5,bx+sw*1.3,by-bh);
        ctx.stroke();
      }
      ctx.restore();
      break;
    }
    case T.PATH: {
      ctx.fillStyle = zt.path[v%zt.path.length];
      ctx.fillRect(sx,sy,TP,TP);
      // Path edge darkening
      ctx.save(); ctx.globalAlpha=0.08; ctx.fillStyle='#000';
      ctx.fillRect(sx,sy,TP,2); ctx.fillRect(sx,sy+TP-2,TP,2);
      ctx.fillRect(sx,sy,2,TP); ctx.fillRect(sx+TP-2,sy,2,TP);
      // Pebbles and dirt details
      ctx.globalAlpha=0.2;
      const pebbles = 2+((hash>>3)&1);
      for(let i=0;i<pebbles;i++){
        const px2=sx+5+((hash+i*11)%(TP-10));
        const py2=sy+5+((hash+i*17)%(TP-10));
        ctx.beginPath(); ctx.arc(px2,py2,1+((hash>>5)&1)*0.5,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
      break;
    }
    case T.TREE: {
      ctx.fillStyle = zt.grass[0]; ctx.fillRect(sx,sy,TP,TP);
      const tcx=sx+TP/2+((hash&3)-1.5)*2, tcy=sy+TP/2;
      // Shadow
      ctx.save(); ctx.globalAlpha=0.15; ctx.fillStyle='#000';
      ctx.beginPath(); ctx.ellipse(tcx+3,tcy+8,10,5,0.2,0,Math.PI*2); ctx.fill(); ctx.restore();
      // Trunk
      ctx.fillStyle = zt.tree_c[0]; ctx.strokeStyle=darken(zt.tree_c[0],0.3); ctx.lineWidth=0.8;
      ctx.fillRect(tcx-3,tcy-2,6,TP/2+2); ctx.strokeRect(tcx-3,tcy-2,6,TP/2+2);
      // Main canopy
      const canR = 12+((hash>>2)&3);
      ctx.fillStyle = zt.tree_c[1];
      ctx.beginPath(); ctx.arc(tcx,tcy-4,canR,0,Math.PI*2); ctx.fill();
      // Highlight lobe
      ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle=lighten(zt.tree_c[1],0.25);
      ctx.beginPath(); ctx.arc(tcx-4,tcy-8,canR*0.55,0,Math.PI*2); ctx.fill(); ctx.restore();
      // Dark edge
      ctx.save(); ctx.globalAlpha=0.2; ctx.strokeStyle=darken(zt.tree_c[1],0.3); ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(tcx,tcy-4,canR,0,Math.PI*2); ctx.stroke(); ctx.restore();
      // Leaf sway
      ctx.save(); ctx.globalAlpha=0.15;
      const leafSw = Math.sin(animT*0.03+gx+gy)*1.5;
      ctx.fillStyle=lighten(zt.tree_c[1],0.3);
      ctx.beginPath(); ctx.arc(tcx+leafSw+canR*0.6,tcy-6,3,0,Math.PI*2); ctx.fill();
      ctx.restore();
      break;
    }
    case T.ROCK: {
      ctx.fillStyle = zt.grass[0]; ctx.fillRect(sx,sy,TP,TP);
      const rcx=sx+TP/2, rcy=sy+TP/2;
      // Shadow
      ctx.save(); ctx.globalAlpha=0.12; ctx.fillStyle='#000';
      ctx.beginPath(); ctx.ellipse(rcx+2,rcy+6,12,5,0.15,0,Math.PI*2); ctx.fill(); ctx.restore();
      // Main rock body
      ctx.fillStyle = zt.block_c;
      ctx.beginPath();
      ctx.moveTo(rcx-10,rcy+6); ctx.quadraticCurveTo(rcx-12,rcy-4,rcx-4,rcy-10);
      ctx.quadraticCurveTo(rcx+2,rcy-12,rcx+10,rcy-6);
      ctx.quadraticCurveTo(rcx+12,rcy+2,rcx+8,rcy+8);
      ctx.quadraticCurveTo(rcx,rcy+10,rcx-10,rcy+6);
      ctx.fill();
      // Highlight
      ctx.save(); ctx.globalAlpha=0.2; ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(rcx-3,rcy-5,4,0,Math.PI*2); ctx.fill(); ctx.restore();
      // Crack
      ctx.save(); ctx.globalAlpha=0.3; ctx.strokeStyle='#000'; ctx.lineWidth=0.6;
      ctx.beginPath(); ctx.moveTo(rcx-2,rcy-3); ctx.lineTo(rcx+4,rcy+3); ctx.stroke(); ctx.restore();
      break;
    }
    case T.WALL: {
      ctx.fillStyle = zt.block_c;
      ctx.fillRect(sx,sy,TP,TP);
      // Brick pattern
      ctx.save(); ctx.globalAlpha=0.15; ctx.strokeStyle=lighten(zt.block_c,0.15); ctx.lineWidth=0.6;
      const brickH=TP/3;
      for(let r=0;r<3;r++){
        const ry=sy+r*brickH;
        ctx.strokeRect(sx+1,ry+1,TP/2-1,brickH-1);
        ctx.strokeRect(sx+TP/2,ry+brickH/2+1,TP/2-1,brickH-1);
      }
      ctx.restore();
      // Top edge highlight
      ctx.save(); ctx.globalAlpha=0.1; ctx.fillStyle='#fff';
      ctx.fillRect(sx,sy,TP,2); ctx.restore();
      break;
    }
    case T.WATER: {
      // Animated water
      const wt = animT*0.03+gx*0.7+gy*0.5;
      const wc1 = zt.water[0], wc2 = zt.water[1];
      ctx.fillStyle = (Math.sin(wt)>0) ? wc1 : wc2;
      ctx.fillRect(sx,sy,TP,TP);
      // Ripple waves
      ctx.save(); ctx.globalAlpha=0.15; ctx.strokeStyle='#aaddff'; ctx.lineWidth=0.8;
      for(let w=0;w<3;w++){
        const wy=sy+8+w*12+Math.sin(wt+w*2)*3;
        ctx.beginPath();
        ctx.moveTo(sx,wy);
        ctx.quadraticCurveTo(sx+TP*0.25,wy-3+Math.sin(wt+w)*2, sx+TP*0.5,wy);
        ctx.quadraticCurveTo(sx+TP*0.75,wy+3+Math.sin(wt+w+1)*2, sx+TP,wy);
        ctx.stroke();
      }
      // Shimmer spots
      ctx.globalAlpha=0.08+Math.sin(wt*2)*0.04;
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(sx+12+(hash%16),sy+10+(hash%12),2,0,Math.PI*2); ctx.fill();
      // Foam edges along adjacent land tiles
      ctx.globalAlpha=0.35+Math.sin(wt*1.5)*0.1;
      ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.5; ctx.lineCap='round';
      const foamOff = Math.sin(wt*2)*2;
      // Top edge
      if (gy>0 && map.tiles && map.tiles[(gy-1)*MAP_W+gx]!==T.WATER && map.tiles[(gy-1)*MAP_W+gx]!==T.VOID) {
        ctx.beginPath(); ctx.moveTo(sx+2,sy+2+foamOff);
        ctx.quadraticCurveTo(sx+TP*0.3,sy+4+foamOff*0.5,sx+TP*0.5,sy+2+foamOff);
        ctx.quadraticCurveTo(sx+TP*0.7,sy+foamOff*0.8,sx+TP-2,sy+3+foamOff);
        ctx.stroke();
      }
      // Bottom edge
      if (gy<MAP_H-1 && map.tiles && map.tiles[(gy+1)*MAP_W+gx]!==T.WATER && map.tiles[(gy+1)*MAP_W+gx]!==T.VOID) {
        ctx.beginPath(); ctx.moveTo(sx+2,sy+TP-3-foamOff);
        ctx.quadraticCurveTo(sx+TP*0.4,sy+TP-5-foamOff*0.5,sx+TP*0.6,sy+TP-2-foamOff);
        ctx.quadraticCurveTo(sx+TP*0.8,sy+TP-4-foamOff*0.7,sx+TP-2,sy+TP-3-foamOff);
        ctx.stroke();
      }
      // Left edge
      if (gx>0 && map.tiles && map.tiles[gy*MAP_W+gx-1]!==T.WATER && map.tiles[gy*MAP_W+gx-1]!==T.VOID) {
        ctx.beginPath(); ctx.moveTo(sx+2+foamOff,sy+2);
        ctx.quadraticCurveTo(sx+4+foamOff*0.5,sy+TP*0.5,sx+3+foamOff,sy+TP-2);
        ctx.stroke();
      }
      // Right edge
      if (gx<MAP_W-1 && map.tiles && map.tiles[gy*MAP_W+gx+1]!==T.WATER && map.tiles[gy*MAP_W+gx+1]!==T.VOID) {
        ctx.beginPath(); ctx.moveTo(sx+TP-3-foamOff,sy+2);
        ctx.quadraticCurveTo(sx+TP-5-foamOff*0.5,sy+TP*0.5,sx+TP-2-foamOff,sy+TP-2);
        ctx.stroke();
      }
      ctx.restore();
      break;
    }
  }
}

function drawMapObject(obj, sx, sy) {
  const cx = sx+TP/2, cy = sy+TP/2;
  if (obj.done && obj.type!=='campfire') return;

  switch (obj.type) {
    case 'chest':
      if(obj.done) {
        ctx.save(); ctx.globalAlpha=0.4;
        ctx.fillStyle='#5a4510'; ctx.fillRect(cx-9,cy-2,18,10); ctx.restore();
      } else {
        // Golden ground glow
        ctx.save(); ctx.globalAlpha=0.08;
        const chestGlow=ctx.createRadialGradient(cx,cy+4,0,cx,cy+4,20);
        chestGlow.addColorStop(0,'#ffdd44'); chestGlow.addColorStop(1,'transparent');
        ctx.fillStyle=chestGlow; ctx.beginPath(); ctx.arc(cx,cy+4,20,0,Math.PI*2); ctx.fill();
        ctx.restore();
        // Chest body
        ctx.fillStyle='#8B6914'; ctx.strokeStyle='#5a4510'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.roundRect(cx-9,cy-4,18,12,2); ctx.fill(); ctx.stroke();
        // Metallic bands
        ctx.save(); ctx.strokeStyle='#b8960f'; ctx.lineWidth=1;
        ctx.globalAlpha=0.5;
        ctx.beginPath(); ctx.moveTo(cx-9,cy); ctx.lineTo(cx+9,cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx-9,cy+4); ctx.lineTo(cx+9,cy+4); ctx.stroke();
        ctx.restore();
        // Lid
        ctx.fillStyle='#a07818';
        ctx.beginPath(); ctx.roundRect(cx-9,cy-9,18,6,2); ctx.fill(); ctx.stroke();
        // Keyhole
        ctx.fillStyle='#3a2a05';
        ctx.beginPath(); ctx.moveTo(cx-1.5,cy-2); ctx.lineTo(cx+1.5,cy-2);
        ctx.lineTo(cx+2,cy+1); ctx.lineTo(cx-2,cy+1); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.arc(cx,cy-3,2,0,Math.PI*2); ctx.fill();
        // Lock highlight
        ctx.fillStyle='#daa520'; ctx.beginPath(); ctx.arc(cx,cy-3,1.5,0,Math.PI*2); ctx.fill();
        // Sparkle particles orbiting
        ctx.save();
        for(let i=0;i<3;i++){
          const sa=animT*0.08+i*2.1;
          const sr=10+Math.sin(animT*0.05+i)*3;
          ctx.globalAlpha=0.3+Math.sin(animT*0.1+i)*0.2;
          ctx.fillStyle='#ffdd44';
          ctx.beginPath(); ctx.arc(cx+Math.cos(sa)*sr,cy-4+Math.sin(sa)*sr*0.5,1.5,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }
      break;
    case 'campfire': {
      // Log base
      ctx.fillStyle='#5a3a1a';
      ctx.save(); ctx.translate(cx,cy+4);
      ctx.rotate(-0.3); ctx.fillRect(-10,-2,20,4); ctx.restore();
      ctx.save(); ctx.translate(cx,cy+5);
      ctx.rotate(0.25); ctx.fillRect(-9,-2,18,3.5); ctx.restore();
      // Stone ring
      ctx.fillStyle='#555';
      for(let i=0;i<7;i++){
        const a=(i/7)*Math.PI*2;
        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*10,cy+Math.sin(a)*7,3,0,Math.PI*2); ctx.fill();
      }
      if(!obj.done) {
        // Flames (bigger, more dynamic)
        for(let i=0;i<5;i++){
          const fh=8+Math.sin(animT*0.12+i*1.8)*5;
          ctx.fillStyle=['#ff4400','#ff6600','#ffaa00','#ffcc00','#ff8800'][i];
          ctx.save(); ctx.globalAlpha=0.6+Math.sin(animT*0.15+i*0.7)*0.2;
          const fx=cx-5+i*2.5;
          ctx.beginPath(); ctx.moveTo(fx,cy+3);
          ctx.quadraticCurveTo(fx+3,cy-fh*0.4,fx+1,cy-fh);
          ctx.quadraticCurveTo(fx-2,cy-fh*0.5,fx,cy+3); ctx.fill(); ctx.restore();
        }
        // Warm glow (bigger radius)
        ctx.save(); ctx.globalAlpha=0.15;
        const fg=ctx.createRadialGradient(cx,cy-2,0,cx,cy-2,45);
        fg.addColorStop(0,'#ff6600'); fg.addColorStop(0.5,'rgba(255,100,0,0.3)'); fg.addColorStop(1,'transparent');
        ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(cx,cy-2,45,0,Math.PI*2); ctx.fill(); ctx.restore();
        // Smoke circles rising
        ctx.save();
        for(let i=0;i<4;i++){
          const st=animT*0.025+i*1.8;
          const smokeY=cy-14-((st*12)%30);
          const smokeX=cx+Math.sin(st*2+i)*6;
          const smokeSize=2+((st*12)%30)/10;
          ctx.globalAlpha=Math.max(0,0.15-((st*12)%30)/50);
          ctx.fillStyle='rgba(160,160,160,0.5)';
          ctx.beginPath(); ctx.arc(smokeX,smokeY,smokeSize,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
        // Ember particles
        ctx.save();
        for(let i=0;i<3;i++){
          const et=animT*0.04+i*2.5;
          const ey=cy-10-((et*15)%25);
          const ex=cx+Math.sin(et*3+i)*8;
          ctx.globalAlpha=Math.max(0,0.5-((et*15)%25)/25);
          ctx.fillStyle='#ff8844'; ctx.beginPath(); ctx.arc(ex,ey,1,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }
      break;
    }
    case 'npc': {
      // Mystical glow at feet
      ctx.save(); ctx.globalAlpha=0.08+Math.sin(animT*0.03)*0.04;
      const npcGlow=ctx.createRadialGradient(cx,cy+6,0,cx,cy+6,18);
      npcGlow.addColorStop(0,'#66aaff'); npcGlow.addColorStop(1,'transparent');
      ctx.fillStyle=npcGlow; ctx.beginPath(); ctx.arc(cx,cy+6,18,0,Math.PI*2); ctx.fill();
      ctx.restore();
      // Shadow
      ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(cx,cy+8,8,4,0,0,Math.PI*2); ctx.fill();
      // Staff/walking stick
      ctx.save(); ctx.strokeStyle='#6a5a3a'; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(cx+10,cy-14); ctx.lineTo(cx+12,cy+10); ctx.stroke();
      // Staff orb
      ctx.fillStyle='#88ccff'; ctx.globalAlpha=0.6+Math.sin(animT*0.06)*0.3;
      ctx.beginPath(); ctx.arc(cx+10,cy-15,2.5,0,Math.PI*2); ctx.fill();
      ctx.restore();
      // Body with breathing
      const breathe = 1+Math.sin(animT*0.04)*0.03;
      ctx.save(); ctx.translate(cx,cy+1); ctx.scale(breathe,breathe); ctx.translate(-cx,-(cy+1));
      ctx.fillStyle='#556688'; ctx.beginPath(); ctx.ellipse(cx,cy+1,7,8,0,0,Math.PI*2); ctx.fill();
      // Cloak
      ctx.save(); ctx.globalAlpha=0.5; ctx.fillStyle='#3a5a3a';
      ctx.beginPath(); ctx.ellipse(cx,cy+2,8,7,0,0.3,Math.PI-0.3); ctx.fill(); ctx.restore();
      ctx.restore();
      // Head
      ctx.fillStyle='#d4b896'; ctx.beginPath(); ctx.arc(cx,cy-8,5.5,0,Math.PI*2); ctx.fill();
      // Hat
      ctx.fillStyle='#3a5a3a';
      ctx.beginPath(); ctx.moveTo(cx-8,cy-8); ctx.lineTo(cx,cy-18); ctx.lineTo(cx+8,cy-8); ctx.closePath(); ctx.fill();
      // "?" bubble
      ctx.save();
      ctx.globalAlpha=0.6+Math.sin(animT*0.05)*0.3;
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.beginPath(); ctx.roundRect(cx+6,cy-22,14,14,4); ctx.fill();
      ctx.fillStyle='#ffcc00'; ctx.font='bold 11px serif'; ctx.textAlign='center';
      ctx.fillText('?',cx+13,cy-12);
      ctx.restore();
      break;
    }
    case 'monster':
    case 'boss': {
      if(!obj.done && obj.data) {
        ctx.save();
        // Shadow
        const ms=obj.type==='boss'?12:9;
        ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath();
        ctx.ellipse(cx,cy+6,ms,ms*0.4,0,0,Math.PI*2); ctx.fill();
        // Creature
        const sc = obj.type==='boss'?0.45:0.3;
        drawCreatureOnScene(obj.data, cx, cy-2, sc, false);
        // Boss aura
        if(obj.type==='boss') {
          ctx.globalAlpha=0.1+Math.sin(animT*0.04)*0.06;
          const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,25);
          bg.addColorStop(0,'#ff3300'); bg.addColorStop(1,'transparent');
          ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,25,0,Math.PI*2); ctx.fill();
        }
        // Idle bounce
        ctx.restore();
      }
      break;
    }
  }
}

function drawPlayerTopDown(sx, sy) {
  const moving = map.moving && map.path.length>0;
  const bob = moving ? Math.sin(animT*0.2)*2.5 : Math.sin(animT*0.03)*0.5;
  const step = moving ? animT*0.2 : 0;
  const twist = moving ? Math.sin(step)*0.08 : 0; // torso twist

  ctx.save();
  ctx.translate(sx, sy+bob);
  ctx.scale(1.3,1.3); // scaled up

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0,12,10,4.5,0,0,Math.PI*2); ctx.fill();

  // Legs (behind body)
  ctx.strokeStyle='#2a2a3a'; ctx.lineWidth=2.5; ctx.lineCap='round';
  if(moving) {
    const ls = Math.sin(step)*5;
    ctx.beginPath(); ctx.moveTo(-3,6); ctx.lineTo(-3+ls,14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3,6); ctx.lineTo(3-ls,14); ctx.stroke();
    ctx.fillStyle='#2a1a0a';
    ctx.beginPath(); ctx.arc(-3+ls,14,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(3-ls,14,2.5,0,Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.moveTo(-3,6); ctx.lineTo(-3,13); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3,6); ctx.lineTo(3,13); ctx.stroke();
    ctx.fillStyle='#2a1a0a';
    ctx.beginPath(); ctx.arc(-3,13,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(3,13,2.5,0,Math.PI*2); ctx.fill();
  }

  // Cape with flowing animation
  ctx.save();
  const capeFlutter = moving ? Math.sin(animT*0.15)*4 : Math.sin(animT*0.04)*1;
  ctx.fillStyle='#8b2020'; ctx.globalAlpha=0.75;
  ctx.beginPath();
  ctx.moveTo(-7,-2);
  ctx.quadraticCurveTo(-8+capeFlutter*0.5,6+capeFlutter*0.3,-5+capeFlutter*0.3,14);
  ctx.lineTo(5-capeFlutter*0.3,14);
  ctx.quadraticCurveTo(8-capeFlutter*0.5,6-capeFlutter*0.3,7,-2);
  ctx.closePath(); ctx.fill();
  // Cape highlight
  ctx.globalAlpha=0.15; ctx.fillStyle='#cc4444';
  ctx.beginPath(); ctx.ellipse(capeFlutter*0.2,5,4,5,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Body with twist
  ctx.save();
  ctx.rotate(twist);
  ctx.fillStyle='#3a3a5a';
  ctx.beginPath(); ctx.ellipse(0,0,9,10,0,0,Math.PI*2); ctx.fill();

  // Shoulder pads
  ctx.fillStyle='#4a4a6a';
  ctx.beginPath(); ctx.arc(-8,-1,3.5,Math.PI*0.8,Math.PI*1.8); ctx.fill();
  ctx.beginPath(); ctx.arc(8,-1,3.5,Math.PI*1.2,Math.PI*2.2); ctx.fill();
  ctx.restore();

  // Sword scabbard on back (visible when facing up or sideways)
  if (map.facing===0||map.facing===1||map.facing===3) {
    ctx.save();
    ctx.strokeStyle='#5a4a2a'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(4,-6); ctx.lineTo(6,8); ctx.stroke();
    // Hilt
    ctx.strokeStyle='#8a7a3a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(2,-7); ctx.lineTo(6,-5); ctx.stroke();
    ctx.restore();
  }

  // Arms
  ctx.strokeStyle='#3a3a5a'; ctx.lineWidth=2.5;
  if(moving) {
    const as = Math.sin(step+Math.PI)*3;
    ctx.beginPath(); ctx.moveTo(-7,0); ctx.lineTo(-10,as+5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(7,0); ctx.lineTo(10,-as+5); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(-7,1); ctx.lineTo(-9,7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(7,1); ctx.lineTo(9,7); ctx.stroke();
  }

  // Head
  ctx.fillStyle='#d4b896';
  ctx.beginPath(); ctx.arc(0,-10,7,0,Math.PI*2); ctx.fill();

  // Hair
  ctx.fillStyle='#4a2a1a';
  ctx.beginPath(); ctx.arc(0,-12,7,Math.PI*0.85,Math.PI*2.15); ctx.fill();

  // Eyes (direction-aware)
  const fAngle = [Math.PI*1.5, 0, Math.PI*0.5, Math.PI][map.facing];
  const eyeOff = {x:Math.cos(fAngle)*1.5, y:Math.sin(fAngle)*1};
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(-2.5+eyeOff.x,-10+eyeOff.y,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2.5+eyeOff.x,-10+eyeOff.y,1.2,0,Math.PI*2); ctx.fill();

  // Idle glow ring
  if(!moving) {
    ctx.save(); ctx.globalAlpha=0.06+Math.sin(animT*0.04)*0.03;
    ctx.strokeStyle='#88aaff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(0,2,16,0,Math.PI*2); ctx.stroke(); ctx.restore();
  }

  ctx.restore();
}

function drawFog(startX, startY, endX, endY) {
  for (let gy=startY;gy<endY;gy++) {
    for (let gx=startX;gx<endX;gx++) {
      if (gx<0||gx>=MAP_W||gy<0||gy>=MAP_H) continue;
      const sx = gx*TP-map.camX, sy = gy*TP-map.camY;
      if (!map.seen[gy*MAP_W+gx]) {
        ctx.fillStyle='#0b0e17';
        ctx.fillRect(sx,sy,TP+1,TP+1);
      } else {
        const dx=gx-map.gx, dy=gy-map.gy;
        const d2=dx*dx+dy*dy;
        const vr2=VIEW_RAD*VIEW_RAD;
        if (d2 > vr2) {
          // Dim gradient: farther = darker
          const dimAlpha = Math.min(0.45, 0.2+Math.sqrt(d2-vr2)*0.02);
          ctx.save(); ctx.globalAlpha=dimAlpha; ctx.fillStyle='#0b0e17';
          ctx.fillRect(sx,sy,TP+1,TP+1); ctx.restore();
        } else if (d2 > vr2*0.7) {
          // Soft edge at visibility boundary
          ctx.save(); ctx.globalAlpha=0.08; ctx.fillStyle='#0b0e17';
          ctx.fillRect(sx,sy,TP+1,TP+1); ctx.restore();
        }
      }
    }
  }
}

function isBlocking(t) { return t===T.TREE||t===T.ROCK||t===T.WALL; }

function drawLighting(startX, startY, endX, endY) {
  // Zone-specific darkness level
  const darkness = {beach:0.15, forest:0.3, deepwoods:0.5, cave:0.7}[currentZone]||0.3;

  // Fill light canvas with darkness
  lightCtx.clearRect(0,0,W,H);
  lightCtx.fillStyle = `rgba(0,0,0,${darkness})`;
  lightCtx.fillRect(0,0,W,H);

  // Punch light holes with destination-out
  lightCtx.globalCompositeOperation = 'destination-out';

  // Player light
  const plx = map.px - map.camX, ply = map.py - map.camY;
  const lightRad = VIEW_RAD * TP * 0.8;
  const playerLight = lightCtx.createRadialGradient(plx,ply,0,plx,ply,lightRad);
  playerLight.addColorStop(0,'rgba(255,255,255,1)');
  playerLight.addColorStop(0.4,'rgba(255,255,255,0.6)');
  playerLight.addColorStop(1,'rgba(255,255,255,0)');
  lightCtx.fillStyle = playerLight;
  lightCtx.beginPath(); lightCtx.arc(plx,ply,lightRad,0,Math.PI*2); lightCtx.fill();

  // Campfire lights
  for (const obj of map.objects) {
    if (obj.type !== 'campfire' || obj.done) continue;
    const cfx = obj.gx*TP+TP/2-map.camX, cfy = obj.gy*TP+TP/2-map.camY;
    if (cfx < -200 || cfx > W+200 || cfy < -200 || cfy > H+200) continue;
    const cfRad = TP * 3;
    const cfGrad = lightCtx.createRadialGradient(cfx,cfy-4,0,cfx,cfy-4,cfRad);
    cfGrad.addColorStop(0,'rgba(255,200,100,0.9)');
    cfGrad.addColorStop(0.5,'rgba(255,160,60,0.4)');
    cfGrad.addColorStop(1,'rgba(255,100,30,0)');
    lightCtx.fillStyle = cfGrad;
    lightCtx.beginPath(); lightCtx.arc(cfx,cfy-4,cfRad,0,Math.PI*2); lightCtx.fill();
  }

  lightCtx.globalCompositeOperation = 'source-over';

  // Composite lighting onto main canvas
  ctx.drawImage(lightCanvas,0,0);

  // Hard fog of war for unseen tiles
  for (let gy=startY;gy<endY;gy++) {
    for (let gx=startX;gx<endX;gx++) {
      if (gx<0||gx>=MAP_W||gy<0||gy>=MAP_H) continue;
      if (!map.seen[gy*MAP_W+gx]) {
        const sx = gx*TP-map.camX, sy = gy*TP-map.camY;
        ctx.fillStyle='#0b0e17';
        ctx.fillRect(sx,sy,TP+1,TP+1);
      }
    }
  }
}

function drawBlockingShadows(startX, startY, endX, endY) {
  ctx.save();
  for (let gy=startY;gy<endY;gy++) {
    for (let gx=startX;gx<endX;gx++) {
      if (gx<0||gx>=MAP_W||gy<0||gy>=MAP_H) continue;
      const t = map.tiles[gy*MAP_W+gx];
      if (!isWalkable(t) || t===T.WATER) continue;
      if (!map.seen[gy*MAP_W+gx]) continue;
      const sx = gx*TP-map.camX, sy = gy*TP-map.camY;
      // Check top neighbor
      if (gy>0 && isBlocking(map.tiles[(gy-1)*MAP_W+gx])) {
        const grad = ctx.createLinearGradient(sx,sy,sx,sy+TP*0.4);
        grad.addColorStop(0,'rgba(0,0,0,0.2)');
        grad.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=grad; ctx.fillRect(sx,sy,TP,TP*0.4);
      }
      // Check left neighbor
      if (gx>0 && isBlocking(map.tiles[gy*MAP_W+gx-1])) {
        const grad = ctx.createLinearGradient(sx,sy,sx+TP*0.3,sy);
        grad.addColorStop(0,'rgba(0,0,0,0.15)');
        grad.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=grad; ctx.fillRect(sx,sy,TP*0.3,TP);
      }
      // Check right neighbor
      if (gx<MAP_W-1 && isBlocking(map.tiles[gy*MAP_W+gx+1])) {
        const grad = ctx.createLinearGradient(sx+TP,sy,sx+TP-TP*0.3,sy);
        grad.addColorStop(0,'rgba(0,0,0,0.15)');
        grad.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=grad; ctx.fillRect(sx+TP-TP*0.3,sy,TP*0.3,TP);
      }
    }
  }
  ctx.restore();
}

// ---- MODE 7 PROJECTION ----
let _camCos = 1, _camSin = 0; // cached per frame

function projectToScreen(worldX, worldY) {
  // World position relative to camera
  const dx = worldX - map.px;
  const dy = worldY - map.py;
  // Rotate into camera space (camera looks along map.angle)
  const rx = dx * _camCos + dy * _camSin;   // forward/back
  const ry = -dx * _camSin + dy * _camCos;  // left/right

  const dist = rx + CAM_BEHIND; // distance from camera along view axis
  if (dist < 1) return null; // behind camera

  const horizonY = H * 0.35;
  const fov = W * CAM_FOV_FACTOR;
  const screenX = W / 2 + (ry * fov) / dist;
  const screenY = horizonY + (CAM_HEIGHT * fov) / dist;

  return { x: screenX, y: screenY, dist: dist };
}

function screenToWorld(screenX, screenY) {
  const horizonY = H * 0.35;
  if (screenY <= horizonY) return null; // above horizon

  const fov = W * CAM_FOV_FACTOR;
  const dist = (CAM_HEIGHT * fov) / (screenY - horizonY);
  const ry = (screenX - W / 2) * dist / fov;
  const rx = dist - CAM_BEHIND;

  // Rotate back to world space
  const worldX = map.px + rx * _camCos - ry * _camSin;
  const worldY = map.py + rx * _camSin + ry * _camCos;
  return { x: worldX, y: worldY };
}

// ---- MODE 7 3D DRAW ----
function drawMode7Map() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0b0e17';
  ctx.fillRect(0, 0, W, H);

  // Cache trig
  _camCos = Math.cos(map.angle);
  _camSin = Math.sin(map.angle);

  // Decay tap ping
  if (map.tapPing > 0) map.tapPing = Math.max(0, map.tapPing - 0.02);

  // Decay footsteps
  for (let i = map.footsteps.length - 1; i >= 0; i--) {
    map.footsteps[i].t--;
    if (map.footsteps[i].t <= 0) map.footsteps.splice(i, 1);
  }

  const b = BIOMES[currentZone];
  const horizonY = H * 0.35;

  // --- SKY ---
  const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
  b.sky.forEach((c, i) => skyGrad.addColorStop(i / (b.sky.length - 1), c));
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, horizonY + 1);

  // --- DISTANT TERRAIN with rotational parallax ---
  ctx.save();
  scrollOffset = map.angle * 200;
  drawDistantTerrain(b);
  drawMidTerrain(b);
  ctx.restore();

  // --- GROUND TILES ---
  const zt = ZONE_TILES[currentZone];
  const fov = W * CAM_FOV_FACTOR;

  // Collect visible tiles, project, and sort back-to-front
  const tileQuads = [];
  for (let dy = -VIEW_RAD_3D; dy <= VIEW_RAD_3D; dy++) {
    for (let dx = -VIEW_RAD_3D; dx <= VIEW_RAD_3D; dx++) {
      const gx = map.gx + dx;
      const gy = map.gy + dy;
      if (gx < 0 || gx >= MAP_W || gy < 0 || gy >= MAP_H) continue;
      if (!map.seen[gy * MAP_W + gx]) continue;

      // Center of tile in world coords
      const wcx = gx * TILE_PX + TILE_PX / 2;
      const wcy = gy * TILE_PX + TILE_PX / 2;
      const center = projectToScreen(wcx, wcy);
      if (!center) continue;
      if (center.y < horizonY - 10 || center.y > H + 50) continue;
      if (center.x < -200 || center.x > W + 200) continue;

      // Project 4 corners
      const half = TILE_PX / 2 + 0.5; // slight expand to avoid gaps
      const c0 = projectToScreen(gx * TILE_PX - 0.5, gy * TILE_PX - 0.5);
      const c1 = projectToScreen((gx + 1) * TILE_PX + 0.5, gy * TILE_PX - 0.5);
      const c2 = projectToScreen((gx + 1) * TILE_PX + 0.5, (gy + 1) * TILE_PX + 0.5);
      const c3 = projectToScreen(gx * TILE_PX - 0.5, (gy + 1) * TILE_PX + 0.5);

      if (!c0 || !c1 || !c2 || !c3) continue;

      tileQuads.push({ gx, gy, center, corners: [c0, c1, c2, c3], dist: center.dist, tile: map.tiles[gy * MAP_W + gx] });
    }
  }

  // Sort back-to-front (far tiles first)
  tileQuads.sort((a, b) => b.dist - a.dist);

  // Draw tile quads
  for (const q of tileQuads) {
    const t = q.tile;
    const v = ((q.gx * 7 + q.gy * 13) & 7);
    const [c0, c1, c2, c3] = q.corners;

    // Pick tile color
    let color;
    if (t === T.WATER) {
      const wt2 = animT * 0.03 + q.gx * 0.7 + q.gy * 0.5;
      color = (Math.sin(wt2) > 0) ? zt.water[0] : zt.water[1];
    } else if (t === T.GRASS || t === T.SAND) {
      color = zt.grass[v % zt.grass.length];
    } else if (t === T.TALL) {
      color = zt.tall ? zt.tall[v % zt.tall.length] : zt.grass[v % zt.grass.length];
    } else if (t === T.PATH) {
      color = zt.path[v % zt.path.length];
    } else if (t === T.TREE || t === T.WALL || t === T.ROCK) {
      color = zt.grass[0]; // ground under blocking tile
    } else {
      continue;
    }

    // Distance darkening
    const maxDist = VIEW_RAD_3D * TILE_PX;
    const distFactor = Math.max(0, 1 - (q.dist - CAM_BEHIND) / maxDist * 0.6);

    ctx.save();
    ctx.globalAlpha = distFactor;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(c0.x, c0.y);
    ctx.lineTo(c1.x, c1.y);
    ctx.lineTo(c2.x, c2.y);
    ctx.lineTo(c3.x, c3.y);
    ctx.closePath();
    ctx.fill();

    // Water ripple effect
    if (t === T.WATER && q.dist < maxDist * 0.7) {
      ctx.globalAlpha = distFactor * 0.15;
      ctx.strokeStyle = '#aaddff';
      ctx.lineWidth = 0.8;
      const midY = (c0.y + c2.y) / 2;
      const midX = (c0.x + c1.x) / 2;
      ctx.beginPath();
      ctx.moveTo(c0.x, midY);
      ctx.quadraticCurveTo(midX, midY - 2 + Math.sin(animT * 0.03 + q.gx) * 2, c1.x, midY);
      ctx.stroke();
    }

    ctx.restore();
  }

  // --- 3D FEATURES (blocking tiles as billboards) ---
  // Re-sort close tiles front (for drawing on top)
  const featureQuads = tileQuads.filter(q =>
    (q.tile === T.TREE || q.tile === T.WALL || q.tile === T.ROCK) && q.dist < VIEW_RAD_3D * TILE_PX * 0.8
  );
  featureQuads.sort((a, b) => b.dist - a.dist); // back-to-front

  for (const q of featureQuads) {
    const [c0, c1, c2, c3] = q.corners;
    const baseY = Math.min(c2.y, c3.y);
    const midX = (c0.x + c1.x + c2.x + c3.x) / 4;
    const tileScreenW = Math.abs(c1.x - c0.x);
    const featureH = tileScreenW * 1.2;
    const topY = baseY - featureH;

    const maxDist = VIEW_RAD_3D * TILE_PX;
    const distFactor = Math.max(0, 1 - (q.dist - CAM_BEHIND) / maxDist * 0.6);

    ctx.save();
    ctx.globalAlpha = distFactor;

    if (q.tile === T.TREE) {
      // Trunk
      ctx.fillStyle = zt.tree_c[0];
      const tw = tileScreenW * 0.15;
      ctx.fillRect(midX - tw, baseY - featureH * 0.6, tw * 2, featureH * 0.6);
      // Canopy
      ctx.fillStyle = zt.tree_c[1];
      const canR = tileScreenW * 0.4;
      ctx.beginPath();
      ctx.arc(midX, topY + canR * 0.5, canR, 0, Math.PI * 2);
      ctx.fill();
      // Canopy highlight
      ctx.globalAlpha = distFactor * 0.3;
      ctx.fillStyle = lighten(zt.tree_c[1], 0.25);
      ctx.beginPath();
      ctx.arc(midX - canR * 0.3, topY + canR * 0.2, canR * 0.5, 0, Math.PI * 2);
      ctx.fill();
    } else if (q.tile === T.ROCK) {
      ctx.fillStyle = zt.block_c;
      ctx.beginPath();
      const rw = tileScreenW * 0.45;
      const rh = featureH * 0.5;
      ctx.ellipse(midX, baseY - rh * 0.5, rw, rh * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      // Highlight
      ctx.globalAlpha = distFactor * 0.2;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(midX - rw * 0.3, baseY - rh * 0.7, rw * 0.3, 0, Math.PI * 2);
      ctx.fill();
    } else if (q.tile === T.WALL) {
      ctx.fillStyle = zt.block_c;
      const ww = tileScreenW;
      ctx.fillRect(midX - ww / 2, topY, ww, featureH);
      // Brick lines
      ctx.globalAlpha = distFactor * 0.15;
      ctx.strokeStyle = lighten(zt.block_c, 0.15);
      ctx.lineWidth = 0.6;
      for (let r = 0; r < 3; r++) {
        const ry = topY + r * (featureH / 3);
        ctx.strokeRect(midX - ww / 2 + 1, ry + 1, ww / 2 - 1, featureH / 3 - 1);
      }
    }

    ctx.restore();
  }

  // --- FOOTSTEPS ---
  ctx.save();
  for (const fs of map.footsteps) {
    const fp = projectToScreen(fs.x, fs.y);
    if (!fp) continue;
    if (fp.x < -20 || fp.x > W + 20 || fp.y < horizonY || fp.y > H + 20) continue;
    ctx.globalAlpha = fs.t / 60 * 0.15;
    ctx.fillStyle = 'rgba(180,160,130,0.5)';
    const sz = Math.max(1, 3 * (200 / fp.dist));
    ctx.beginPath();
    ctx.arc(fp.x, fp.y, sz, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // --- PATH PREVIEW DOTS ---
  if (map.path.length > 0 && map.moving) {
    ctx.save();
    for (let i = 0; i < map.path.length; i++) {
      const p = map.path[i];
      const pp = projectToScreen(p.x * TILE_PX + TILE_PX / 2, p.y * TILE_PX + TILE_PX / 2);
      if (!pp) continue;
      if (pp.x < -20 || pp.x > W + 20 || pp.y < horizonY) continue;
      const pulse = Math.sin(animT * 0.1 + i * 0.5) * 0.5 + 0.5;
      ctx.globalAlpha = 0.1 + pulse * 0.15;
      ctx.fillStyle = '#88aaff';
      const sz = Math.max(1.5, (2.5 + pulse) * (200 / pp.dist));
      ctx.beginPath();
      ctx.arc(pp.x, pp.y, sz, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // --- SPRITES (map objects) ---
  const visibleObjs = [];
  for (const obj of map.objects) {
    if (obj.done && obj.type !== 'campfire') continue;
    if (!map.seen[obj.gy * MAP_W + obj.gx]) continue;
    const dx2 = obj.gx - map.gx, dy2 = obj.gy - map.gy;
    if (dx2 * dx2 + dy2 * dy2 > VIEW_RAD_3D * VIEW_RAD_3D) continue;
    const op = projectToScreen(obj.gx * TILE_PX + TILE_PX / 2, obj.gy * TILE_PX + TILE_PX / 2);
    if (!op) continue;
    if (op.x < -50 || op.x > W + 50 || op.y < horizonY) continue;
    visibleObjs.push({ obj, proj: op });
  }
  visibleObjs.sort((a, b) => b.proj.dist - a.proj.dist); // back-to-front

  for (const { obj, proj } of visibleObjs) {
    const scale = Math.max(0.3, 200 / proj.dist);
    ctx.save();
    ctx.translate(proj.x, proj.y);
    ctx.scale(scale, scale);
    ctx.translate(-TILE_PX / 2, -TILE_PX / 2);
    drawMapObject(obj, 0, 0);
    ctx.restore();
  }

  // --- PLAYER CHARACTER (back view at fixed screen position) ---
  drawPlayerBackView();

  // --- TAP DESTINATION PING ---
  if (map.tapPing > 0 && map.tgx >= 0) {
    const tp = projectToScreen(map.tgx * TILE_PX + TILE_PX / 2, map.tgy * TILE_PX + TILE_PX / 2);
    if (tp && tp.y > horizonY) {
      ctx.save();
      const r = (1 - map.tapPing) * 20 + 4;
      const pingScale = Math.max(0.5, 200 / tp.dist);
      ctx.globalAlpha = map.tapPing * 0.5;
      ctx.strokeStyle = '#88aaff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, r * pingScale, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = map.tapPing * 0.6;
      ctx.fillStyle = '#88aaff';
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, 3 * pingScale, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // --- AMBIENT PARTICLES (project from world to screen) ---
  ctx.save();
  for (const p of map.particles) {
    p.x += p.vx + Math.sin(animT * 0.02 + p.phase) * 0.3;
    p.y += p.vy;
    if (p.y < 0) { p.y = MAP_H * TILE_PX; p.x = rng(0, MAP_W * TILE_PX); }
    // Project world particle to screen
    const pp = projectToScreen(p.x, p.y);
    if (!pp) continue;
    if (pp.x < -10 || pp.x > W + 10 || pp.y < horizonY || pp.y > H + 10) continue;
    const pScale = Math.max(0.3, 150 / pp.dist);
    ctx.globalAlpha = (p.alpha || 0.3) * (0.5 + Math.sin(animT * 0.03 + p.phase) * 0.5) * Math.min(1, pScale);
    ctx.fillStyle = currentZone === 'cave' ? '#6666aa' : '#ffffff';
    ctx.beginPath();
    ctx.arc(pp.x, pp.y, p.size * pScale, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // --- VIGNETTE ---
  ctx.save();
  const vig = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.6);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(11,14,23,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // --- MINIMAP ---
  drawMinimap();
}

// ---- BACK-VIEW PLAYER ----
function drawPlayerBackView() {
  const moving = map.moving && map.path.length > 0;
  const bob = moving ? Math.sin(animT * 0.2) * 2 : Math.sin(animT * 0.03) * 0.5;
  const step = moving ? animT * 0.2 : 0;

  // Fixed position: lower center of screen
  const px = W / 2;
  const py = H * 0.72;

  ctx.save();
  ctx.translate(px, py + bob);

  // Shadow ellipse on ground
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 12, 12, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs with walk cycle
  const legSwing = moving ? Math.sin(step) * 6 : 0;
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  // Left leg
  ctx.beginPath();
  ctx.moveTo(-4, 6);
  ctx.lineTo(-4 + legSwing, 16);
  ctx.stroke();
  // Right leg
  ctx.beginPath();
  ctx.moveTo(4, 6);
  ctx.lineTo(4 - legSwing, 16);
  ctx.stroke();
  // Boots
  ctx.fillStyle = '#2a1a0a';
  ctx.beginPath();
  ctx.arc(-4 + legSwing, 16, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(4 - legSwing, 16, 3, 0, Math.PI * 2);
  ctx.fill();

  // Body/torso
  ctx.fillStyle = '#3a3a5a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 10, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // Red cloak/cape (back view - prominent)
  const capeFlutter = moving ? Math.sin(animT * 0.15) * 3 : Math.sin(animT * 0.04) * 0.5;
  ctx.fillStyle = '#8b2020';
  ctx.beginPath();
  ctx.moveTo(-9, -4);
  ctx.quadraticCurveTo(-10 + capeFlutter, 8, -6 + capeFlutter * 0.5, 14);
  ctx.lineTo(6 - capeFlutter * 0.5, 14);
  ctx.quadraticCurveTo(10 - capeFlutter, 8, 9, -4);
  ctx.closePath();
  ctx.fill();

  // Cape highlight
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#cc4444';
  ctx.beginPath();
  ctx.ellipse(0 + capeFlutter * 0.3, 4, 5, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Arms swinging opposite to legs
  const armSwing = moving ? Math.sin(step + Math.PI) * 4 : 0;
  ctx.strokeStyle = '#3a3a5a';
  ctx.lineWidth = 3;
  // Left arm
  ctx.beginPath();
  ctx.moveTo(-8, -1);
  ctx.lineTo(-10, armSwing + 6);
  ctx.stroke();
  // Right arm
  ctx.beginPath();
  ctx.moveTo(8, -1);
  ctx.lineTo(10, -armSwing + 6);
  ctx.stroke();

  // Head (back view)
  ctx.fillStyle = '#d4b896';
  ctx.beginPath();
  ctx.arc(0, -11, 7, 0, Math.PI * 2);
  ctx.fill();

  // Hair (back view - covers most of head)
  ctx.fillStyle = '#4a2a1a';
  ctx.beginPath();
  ctx.arc(0, -12, 7.5, Math.PI * 0.7, Math.PI * 2.3);
  ctx.fill();
  // Hair back/ponytail
  ctx.beginPath();
  ctx.moveTo(-3, -5);
  ctx.quadraticCurveTo(0, -3 + capeFlutter * 0.2, 3, -5);
  ctx.lineTo(2, -8);
  ctx.lineTo(-2, -8);
  ctx.closePath();
  ctx.fill();

  // Idle glow ring
  if (!moving) {
    ctx.save();
    ctx.globalAlpha = 0.06 + Math.sin(animT * 0.04) * 0.03;
    ctx.strokeStyle = '#88aaff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 2, 16, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

// ---- TOP-DOWN MAP DRAW ----
function drawTopDownMap() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0b0e17'; ctx.fillRect(0,0,W,H);

  updateMapCamera();

  // Decay tap ping
  if(map.tapPing>0) map.tapPing = Math.max(0, map.tapPing-0.02);

  // Decay footsteps
  for(let i=map.footsteps.length-1;i>=0;i--){
    map.footsteps[i].t--;
    if(map.footsteps[i].t<=0) map.footsteps.splice(i,1);
  }

  const startX = Math.max(0, Math.floor((map.camX-TP)/TP));
  const startY = Math.max(0, Math.floor((map.camY-TP)/TP));
  const endX = Math.min(MAP_W, startX+Math.ceil(W/TP)+3);
  const endY = Math.min(MAP_H, startY+Math.ceil(H/TP)+4);

  // Draw tiles
  for (let gy=startY;gy<endY;gy++) {
    for (let gx=startX;gx<endX;gx++) {
      if (gx<0||gx>=MAP_W||gy<0||gy>=MAP_H) continue;
      if (!map.seen[gy*MAP_W+gx]) continue;
      const sx = gx*TP-map.camX, sy = gy*TP-map.camY;
      drawTile(map.tiles[gy*MAP_W+gx], sx, sy, gx, gy, currentZone);
    }
  }

  // Draw 2.5D height on blocking tiles (trees/walls/rocks get a front face)
  const heightPx = Math.floor(TP*0.35);
  for (let gy=startY;gy<endY;gy++) {
    for (let gx=startX;gx<endX;gx++) {
      if (gx<0||gx>=MAP_W||gy<0||gy>=MAP_H) continue;
      if (!map.seen[gy*MAP_W+gx]) continue;
      const t = map.tiles[gy*MAP_W+gx];
      if (t===T.TREE||t===T.WALL||t===T.ROCK) {
        const sx = gx*TP-map.camX, sy = gy*TP-map.camY;
        // Check if tile below is visible/walkable — show front face
        const below = (gy+1<MAP_H) ? map.tiles[(gy+1)*MAP_W+gx] : T.VOID;
        if (isWalkable(below) || below===T.WATER) {
          const zt = ZONE_TILES[currentZone];
          ctx.fillStyle = darken(t===T.TREE?zt.tree_c[1]:zt.block_c, 0.35);
          ctx.fillRect(sx, sy+TP, TP, heightPx);
          // Slight gradient on the face
          ctx.save(); ctx.globalAlpha=0.15;
          ctx.fillStyle='#000';
          ctx.fillRect(sx, sy+TP+heightPx-3, TP, 3);
          ctx.restore();
        }
      }
    }
  }

  // Blocking tile edge shadows
  drawBlockingShadows(startX, startY, endX, endY);

  // Draw footstep trail
  ctx.save();
  for(const fs of map.footsteps){
    const fsx=fs.x-map.camX, fsy=fs.y-map.camY;
    ctx.globalAlpha=fs.t/60*0.15;
    ctx.fillStyle='rgba(180,160,130,0.5)';
    ctx.beginPath(); ctx.arc(fsx,fsy,2.5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Draw path preview dots (remaining path)
  if(map.path.length>0 && map.moving) {
    ctx.save(); ctx.globalAlpha=0.25;
    for(let i=0;i<map.path.length;i++){
      const p=map.path[i];
      const psx=p.x*TP+TP/2-map.camX, psy=p.y*TP+TP/2-map.camY;
      const pulse = Math.sin(animT*0.1+i*0.5)*0.5+0.5;
      ctx.globalAlpha = 0.1+pulse*0.15;
      ctx.fillStyle='#88aaff';
      ctx.beginPath(); ctx.arc(psx,psy,2.5+pulse,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // Draw objects (sorted by Y for proper depth ordering)
  const visibleObjects = map.objects.filter(obj => {
    if (!map.seen[obj.gy*MAP_W+obj.gx]) return false;
    const sx = obj.gx*TP-map.camX, sy = obj.gy*TP-map.camY;
    return sx>-TP*2&&sx<W+TP*2&&sy>-TP*2&&sy<H+TP*2;
  });
  visibleObjects.sort((a,b) => a.gy - b.gy);

  // Draw objects that are behind the player
  for (const obj of visibleObjects) {
    if (obj.gy >= map.gy) continue;
    const sx = obj.gx*TP-map.camX, sy = obj.gy*TP-map.camY;
    drawMapObject(obj, sx, sy);
  }

  // Draw player
  const psx = map.px-map.camX, psy = map.py-map.camY;
  drawPlayerTopDown(psx, psy);

  // Draw objects that are in front of or at player Y
  for (const obj of visibleObjects) {
    if (obj.gy < map.gy) continue;
    const sx = obj.gx*TP-map.camX, sy = obj.gy*TP-map.camY;
    drawMapObject(obj, sx, sy);
  }

  // Tap destination ping
  if(map.tapPing>0 && map.tgx>=0) {
    const tpx=map.tgx*TP+TP/2-map.camX, tpy=map.tgy*TP+TP/2-map.camY;
    ctx.save();
    const r = (1-map.tapPing)*20+4;
    ctx.globalAlpha=map.tapPing*0.5;
    ctx.strokeStyle='#88aaff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(tpx,tpy,r,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=map.tapPing*0.6;
    ctx.fillStyle='#88aaff';
    ctx.beginPath(); ctx.arc(tpx,tpy,3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Dynamic lighting (replaces fog)
  drawLighting(Math.max(0,startX-1), Math.max(0,startY-1), Math.min(MAP_W,endX+1), Math.min(MAP_H,endY+1));

  // Zone-specific ambient particles
  ctx.save();
  for(const p of map.particles) {
    // Update position
    if (p.ptype==='sparkle') {
      p.x += p.vx + Math.sin(animT*0.02+p.phase)*0.4;
      p.y += Math.sin(animT*0.03+p.phase*2)*0.2;
    } else if (p.ptype==='firefly') {
      p.x += p.vx + Math.sin(animT*0.015+p.phase)*0.6;
      p.y += Math.sin(animT*0.012+p.phase*1.3)*0.5;
      p.alpha = Math.max(0, Math.sin(animT*0.02+p.phase)*0.5+0.5);
    } else if (p.ptype==='spore') {
      p.x += p.vx + Math.sin(animT*0.01+p.phase)*0.2;
      p.y += p.vy;
      if(p.y<0) { p.y=MAP_H*TP; p.x=rng(0,MAP_W*TP); }
    } else if (p.ptype==='crystal') {
      // Stationary but flickers
    }
    const psx2=p.x-map.camX, psy2=p.y-map.camY;
    if(psx2<-20||psx2>W+20||psy2<-20||psy2>H+20) continue;

    if (p.ptype==='firefly') {
      // Warm glow halo
      const gAlpha = p.alpha*0.5;
      if (gAlpha > 0.01) {
        ctx.globalAlpha=gAlpha*0.3;
        const glow = ctx.createRadialGradient(psx2,psy2,0,psx2,psy2,p.glowRad);
        glow.addColorStop(0,'rgba(255,204,68,0.6)');
        glow.addColorStop(1,'rgba(255,204,68,0)');
        ctx.fillStyle=glow;
        ctx.beginPath(); ctx.arc(psx2,psy2,p.glowRad,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=gAlpha;
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(psx2,psy2,p.size,0,Math.PI*2); ctx.fill();
      }
    } else if (p.ptype==='sparkle') {
      const twinkle = Math.sin(animT*0.15+p.phase)*0.5+0.5;
      ctx.globalAlpha=p.alpha*twinkle;
      ctx.fillStyle=p.color;
      // Diamond shape
      ctx.beginPath();
      ctx.moveTo(psx2,psy2-p.size*1.5);
      ctx.lineTo(psx2+p.size,psy2);
      ctx.lineTo(psx2,psy2+p.size*1.5);
      ctx.lineTo(psx2-p.size,psy2);
      ctx.closePath(); ctx.fill();
    } else if (p.ptype==='spore') {
      ctx.globalAlpha=p.alpha*(0.4+Math.sin(animT*0.02+p.phase)*0.3);
      // Soft circle with faint glow
      const sg = ctx.createRadialGradient(psx2,psy2,0,psx2,psy2,p.size*3);
      sg.addColorStop(0,p.color); sg.addColorStop(1,'rgba(136,204,102,0)');
      ctx.fillStyle=sg;
      ctx.beginPath(); ctx.arc(psx2,psy2,p.size*3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(psx2,psy2,p.size,0,Math.PI*2); ctx.fill();
    } else if (p.ptype==='crystal') {
      const flicker = Math.sin(animT*0.1+p.phase)*0.5+0.5;
      ctx.globalAlpha=p.alpha*flicker;
      ctx.fillStyle = (Math.floor(animT*0.05+p.phase)%2===0) ? p.color : p.altColor;
      // Point + star cross
      ctx.beginPath(); ctx.arc(psx2,psy2,p.size,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=ctx.fillStyle; ctx.lineWidth=0.6;
      ctx.beginPath(); ctx.moveTo(psx2-p.size*2,psy2); ctx.lineTo(psx2+p.size*2,psy2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(psx2,psy2-p.size*2); ctx.lineTo(psx2,psy2+p.size*2); ctx.stroke();
    }
  }
  ctx.restore();

  // Zone color grading
  const colorWash = {beach:'rgba(255,204,136,0.06)',forest:'rgba(68,170,68,0.06)',
    deepwoods:'rgba(34,68,34,0.06)',cave:'rgba(68,68,170,0.06)'}[currentZone];
  if (colorWash) {
    ctx.save(); ctx.fillStyle=colorWash; ctx.fillRect(0,0,W,H); ctx.restore();
  }

  // Vignette
  ctx.save();
  const vig = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3, W/2,H/2,Math.max(W,H)*0.6);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(11,14,23,0.5)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  ctx.restore();

  // Minimap (drawn in screen space)
  drawMinimap();
}

function drawMinimap() {
  const mw=80, mh=80;
  const mx=W-mw-10, my=10;
  const ts=mw/MAP_W;

  ctx.save();
  ctx.globalAlpha=0.7;
  ctx.fillStyle='rgba(11,14,23,0.85)';
  ctx.fillRect(mx-2,my-2,mw+4,mh+4);
  ctx.strokeStyle='var(--border)'; ctx.lineWidth=1;
  ctx.strokeRect(mx-2,my-2,mw+4,mh+4);

  for (let y=0;y<MAP_H;y++) for (let x=0;x<MAP_W;x++) {
    if (!map.seen[y*MAP_W+x]) continue;
    const t=map.tiles[y*MAP_W+x];
    if(t===T.WATER) ctx.fillStyle='#1a5566';
    else if(isWalkable(t)) ctx.fillStyle=t===T.TALL?'#2a5a1a':'#3a5a2a';
    else ctx.fillStyle='#1a1a22';
    ctx.fillRect(mx+x*ts,my+y*ts,ts+0.5,ts+0.5);
  }

  // Objects on minimap
  for (const obj of map.objects) {
    if (!map.seen[obj.gy*MAP_W+obj.gx]||obj.done) continue;
    if(obj.type==='chest') ctx.fillStyle='#daa520';
    else if(obj.type==='campfire') ctx.fillStyle='#ff6600';
    else if(obj.type==='npc') ctx.fillStyle='#4488ff';
    else if(obj.type==='boss') ctx.fillStyle='#ff2200';
    else ctx.fillStyle='#cc3333';
    ctx.fillRect(mx+obj.gx*ts,my+obj.gy*ts,ts+1,ts+1);
  }

  // Player dot with facing direction
  const pdx = mx+map.gx*ts+ts/2, pdy = my+map.gy*ts+ts/2;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(pdx,pdy,2,0,Math.PI*2); ctx.fill();
  // Direction line
  ctx.strokeStyle='#88aaff'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(pdx, pdy);
  ctx.lineTo(pdx + Math.cos(map.angle)*6, pdy + Math.sin(map.angle)*6);
  ctx.stroke();

  ctx.restore();
}

function resetBattleAnim() {
  battleAnim.playerX = 0; battleAnim.playerY = 0;
  battleAnim.enemyX = 0; battleAnim.enemyY = 0;
  battleAnim.playerFlash = 0; battleAnim.enemyFlash = 0;
  battleAnim.playerShake = 0; battleAnim.enemyShake = 0;
  battleAnim.cameraZoom = 1;
  battleAnim.impactEffects = [];
  battleAnim.enemySlideIn = 0; battleAnim.playerSlideIn = 0;
  battleAnim.enemyDeath = 0;
  const ca = battleAnim.catchAnim;
  ca.active = false; ca.phase = 'none'; ca.t = 0;
  ca.wobbleCount = 0; ca.success = false; ca.containScale = 0;
  ca.sparkles = []; ca.shards = []; ca.crystalAlpha = 1;
  ca.enemyScale = 1; ca.glowRadius = 0; ca.ringAngle = 0;
}

function tweenTo(obj, prop, target, speed) {
  obj[prop] += (target - obj[prop]) * speed;
  if (Math.abs(obj[prop] - target) < 0.01) obj[prop] = target;
}

function updateBattleAnims() {
  // decay flashes
  battleAnim.playerFlash *= 0.85;
  battleAnim.enemyFlash *= 0.85;
  if (battleAnim.playerFlash < 0.01) battleAnim.playerFlash = 0;
  if (battleAnim.enemyFlash < 0.01) battleAnim.enemyFlash = 0;

  // decay shakes
  battleAnim.playerShake *= 0.8;
  battleAnim.enemyShake *= 0.8;

  // return offsets to 0
  tweenTo(battleAnim, 'playerX', 0, 0.12);
  tweenTo(battleAnim, 'playerY', 0, 0.12);
  tweenTo(battleAnim, 'enemyX', 0, 0.12);
  tweenTo(battleAnim, 'enemyY', 0, 0.12);

  // camera zoom back to 1
  tweenTo(battleAnim, 'cameraZoom', 1, 0.08);

  // slide-in
  if (battleAnim.enemySlideIn < 1) battleAnim.enemySlideIn += 0.04;
  if (battleAnim.playerSlideIn < 1) battleAnim.playerSlideIn += 0.05;

  // update impact effects
  battleAnim.impactEffects = battleAnim.impactEffects.filter(e => {
    e.t++;
    return e.t < e.maxT;
  });

  // update catch animation
  const ca = battleAnim.catchAnim;
  if (ca.active) {
    ca.t++;
    ca.ringAngle += 0.08;

    if (ca.phase === 'throw') {
      // Crystal flies in an arc from player to enemy
      const dur = 28; // frames
      const p = Math.min(1, ca.t / dur);
      const ease = p < 0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2; // easeInOutQuad
      ca.crystalX = ca.startX + (ca.targetX - ca.startX) * ease;
      ca.crystalY = ca.startY + (ca.targetY - ca.startY) * ease - Math.sin(p * Math.PI) * 80;
      if (ca.t >= dur) {
        ca.phase = 'impact'; ca.t = 0;
        battleAnim.enemyFlash = 1;
        battleAnim.cameraZoom = 1.06;
        battleAnim.enemyShake = 6;
      }
    } else if (ca.phase === 'impact') {
      ca.glowRadius = Math.min(60, ca.t * 4);
      if (ca.t >= 15) {
        ca.phase = 'contain'; ca.t = 0;
      }
    } else if (ca.phase === 'contain') {
      // Energy rings close in, enemy shrinks into crystal
      ca.containScale = Math.min(1, ca.t / 30);
      ca.enemyScale = Math.max(0.15, 1 - ca.containScale * 0.85);
      ca.glowRadius = 60 - ca.containScale * 30;
      if (ca.t >= 35) {
        ca.phase = 'wobble'; ca.t = 0; ca.wobbleCount = 0; ca.wobbleDir = 1;
      }
    } else if (ca.phase === 'wobble') {
      // 3 wobbles, each takes ~30 frames (wobble + pause)
      const wobbleFrame = ca.t % 30;
      if (wobbleFrame < 12) {
        // Active wobble
        const wP = wobbleFrame / 12;
        const wobbleAngle = Math.sin(wP * Math.PI * 2) * 15 * ca.wobbleDir * (1 - wP * 0.3);
        ca.crystalX = ca.targetX + wobbleAngle;
        battleAnim.enemyShake = Math.abs(wobbleAngle) * 0.3;
      } else if (wobbleFrame === 12) {
        ca.crystalX = ca.targetX;
        battleAnim.enemyShake = 0;
        ca.wobbleDir *= -1;
      }
      // After pause, increment wobble count
      if (wobbleFrame === 29) {
        ca.wobbleCount++;
        if (ca.wobbleCount >= 3) {
          ca.phase = 'result'; ca.t = 0;
        }
      }
    } else if (ca.phase === 'result') {
      if (ca.success) {
        // Success: sparkle burst, crystal fades with stars
        if (ca.t === 1) {
          battleAnim.cameraZoom = 1.03;
          for (let i = 0; i < 20; i++) {
            const ang = (i / 20) * Math.PI * 2 + Math.random() * 0.3;
            const spd = 2 + Math.random() * 4;
            ca.sparkles.push({
              x: ca.targetX, y: ca.targetY,
              vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 1,
              size: 2 + Math.random() * 3,
              life: 40 + Math.random() * 20,
              t: 0,
              color: ['#22c55e','#88ffaa','#ffffff','#ffdd44','#44ffcc'][i % 5],
            });
          }
        }
        ca.crystalAlpha = Math.max(0, 1 - ca.t / 25);
        ca.enemyScale = Math.max(0, 0.15 - ca.t / 60);
        ca.glowRadius = ca.t * 2;
        // Update sparkles
        for (const s of ca.sparkles) {
          s.x += s.vx; s.y += s.vy; s.vy += 0.08; s.t++;
        }
        ca.sparkles = ca.sparkles.filter(s => s.t < s.life);
        if (ca.t >= 50) { ca.active = false; }
      } else {
        // Failure: crystal shatters, enemy bursts back
        if (ca.t === 1) {
          battleAnim.cameraZoom = 1.05;
          battleAnim.enemyShake = 12;
          for (let i = 0; i < 14; i++) {
            const ang = (i / 14) * Math.PI * 2 + Math.random() * 0.5;
            const spd = 3 + Math.random() * 5;
            ca.shards.push({
              x: ca.targetX, y: ca.targetY,
              vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 2,
              size: 3 + Math.random() * 4,
              rot: Math.random() * Math.PI * 2,
              rotSpd: (Math.random() - 0.5) * 0.3,
              life: 30 + Math.random() * 15,
              t: 0,
              color: ['#aa44ff','#ff4466','#ff8844','#cc66ff'][i % 4],
            });
          }
        }
        ca.enemyScale = Math.min(1, 0.15 + ca.t / 12);
        ca.crystalAlpha = Math.max(0, 1 - ca.t / 8);
        // Update shards
        for (const s of ca.shards) {
          s.x += s.vx; s.y += s.vy; s.vy += 0.15; s.rot += s.rotSpd; s.t++;
        }
        ca.shards = ca.shards.filter(s => s.t < s.life);
        if (ca.t >= 40) { ca.active = false; }
      }
    }
  }
}
