<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verdantia — Explore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --abyss: #0b0e17;
    --deep: #111827;
    --panel: #151c2c;
    --card: #1a2236;
    --border: #263046;
    --muted: #4a5568;
    --text: #c9d1d9;
    --bright: #e2e8f0;
    --accent: #ef4444;
    --accent-glow: #f87171;
    --gold: #f59e0b;
    --gold-dim: #92690a;
    --hp-green: #22c55e;
    --hp-yellow: #eab308;
    --hp-red: #ef4444;
    --mana: #3b82f6;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:var(--abyss); color:var(--text); font-family:'Fira Code',monospace; }
  body { display:flex; flex-direction:column; }

  /* ---- SCENE CANVAS ---- */
  #sceneWrap {
    position:relative; flex:1 1 60%; min-height:0;
    overflow:hidden;
    border-bottom: 2px solid var(--border);
    perspective: 700px;
  }
  body.in-battle #sceneWrap { flex: 1 1 65%; }
  body.in-battle #sceneWrap { perspective: none; }
  body.in-expedition #scene {
    transform: rotateX(22deg);
    transform-origin: center 82%;
  }

  /* Virtual joystick */
  #joystick {
    position:absolute; bottom:18px; left:18px;
    width:90px; height:90px; border-radius:50%;
    background:rgba(255,255,255,0.06);
    border:2px solid rgba(255,255,255,0.12);
    display:none; z-index:10;
    touch-action:none;
    -webkit-user-select:none; user-select:none;
  }
  body.in-expedition #joystick { display:none; }
  #joystickInner {
    position:absolute; width:36px; height:36px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.12) 100%);
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
    transition: width 0.1s, height 0.1s;
  }
  #joystickInner.active { width:32px; height:32px; background:radial-gradient(circle, rgba(136,170,255,0.5) 0%, rgba(136,170,255,0.15) 100%); }

  /* HP bars overlaid on canvas */
  #hpOverlay {
    position:absolute; left:0; right:0; top:0;
    padding:10px 10px 0;
    pointer-events:none; display:none;
    z-index:5;
  }
  #hpOverlay.active { display:flex; flex-direction:column; gap:4px; }
  #scene { width:100%; height:100%; display:block; }

  /* Encounter flash overlay */
  #flash {
    position:absolute; inset:0;
    background: white;
    opacity:0; pointer-events:none;
    transition: opacity 0.08s;
  }
  #flash.active { opacity:0.85; }

  /* Zone name overlay */
  #zoneBadge {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    font-family:'Cinzel',serif; font-weight:700; font-size:15px;
    color:var(--bright); letter-spacing:2px; text-transform:uppercase;
    background: linear-gradient(180deg, rgba(11,14,23,0.85) 0%, rgba(11,14,23,0.4) 100%);
    padding:6px 18px 5px; border-radius:20px;
    border:1px solid var(--border);
    text-shadow:0 1px 6px rgba(0,0,0,0.9);
    white-space:nowrap;
  }

  /* ---- BOTTOM UI ---- */
  #ui {
    flex:0 0 auto;
    background: var(--deep);
    display:flex; flex-direction:column;
    padding:0 0 var(--safe-bottom);
    max-height:45%;
    border-top:1px solid var(--border);
  }

  /* Zone selector */
  #zones {
    display:flex; gap:6px;
    padding:10px 12px 6px;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  #zones::-webkit-scrollbar { display:none; }
  .zone-pill {
    flex:0 0 auto;
    padding:7px 16px; border-radius:20px;
    font-family:'Cinzel',serif; font-weight:500; font-size:12px;
    letter-spacing:1px; text-transform:uppercase;
    background:var(--card); color:var(--muted);
    border:1px solid var(--border);
    cursor:pointer; transition:all 0.2s;
  }
  .zone-pill.active {
    background: linear-gradient(135deg, var(--accent) 0%, #b91c1c 100%);
    color:#fff; border-color:var(--accent);
    box-shadow:0 0 12px rgba(239,68,68,0.3);
  }

  /* Explore mode */
  #exploreUI { padding:12px 16px 16px; text-align:center; }
  #exploreBtn {
    width:100%; max-width:320px;
    padding:18px 0; border:none; border-radius:14px;
    font-family:'Cinzel',serif; font-weight:900; font-size:18px;
    letter-spacing:3px; text-transform:uppercase;
    background: linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow: 0 4px 20px rgba(239,68,68,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: transform 0.1s, box-shadow 0.2s;
    position:relative; overflow:hidden;
  }
  #exploreBtn:active { transform:scale(0.97); box-shadow:0 2px 10px rgba(239,68,68,0.25); }
  #exploreBtn.walking {
    background: linear-gradient(135deg, var(--muted) 0%, #374151 100%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    pointer-events:none;
  }
  #exploreBtn .shimmer {
    position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
    animation: shimmer 2.5s infinite;
  }
  @keyframes shimmer { 0%{left:-100%} 100%{left:100%} }
  #exploreStatus {
    margin-top:10px; font-size:11px; color:var(--muted);
    letter-spacing:1px; min-height:16px;
  }

  /* Battle mode — only moves + flee at bottom */
  #battleUI { display:none; padding:6px 10px 8px; }
  #battleUI.active { display:flex; flex-direction:column; gap:6px; }

  /* HP bars */
  .hp-section {
    display:flex; align-items:center; gap:6px;
    padding:4px 8px; background:rgba(17,24,39,0.85); border-radius:8px;
    border:1px solid var(--border);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  .hp-name {
    font-family:'Cinzel',serif; font-weight:700; font-size:11px;
    color:var(--bright); min-width:0; flex:0 0 auto;
    max-width:72px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .hp-bar-wrap {
    flex:1; height:8px; background:var(--abyss);
    border-radius:4px; overflow:hidden; position:relative;
    border:1px solid var(--border);
  }
  .hp-bar {
    height:100%; border-radius:4px;
    transition:width 0.5s ease, background 0.3s;
    position:relative;
  }
  .hp-bar::after {
    content:''; position:absolute; top:0; left:0; right:0; height:40%;
    background:linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%);
    border-radius:4px 4px 0 0;
  }
  .hp-text {
    font-size:10px; color:var(--muted); flex:0 0 auto;
    font-variant-numeric: tabular-nums;
    min-width:46px; text-align:right;
  }
  .hp-lv {
    font-size:9px; color:var(--gold-dim); flex:0 0 auto;
  }

  /* Moves grid */
  #movesGrid {
    display:grid; grid-template-columns:1fr 1fr; gap:6px;
  }
  .move-btn {
    padding:10px 6px; border:none; border-radius:10px;
    font-family:'Fira Code',monospace; font-size:11px; font-weight:600;
    cursor:pointer; text-align:center;
    background: var(--card);
    color:var(--bright);
    border:1px solid var(--border);
    transition: transform 0.1s, border-color 0.15s;
    position:relative; overflow:hidden;
  }
  .move-btn:active { transform:scale(0.95); }
  .move-btn .mv-name { display:block; margin-bottom:1px; font-size:11px; }
  .move-btn .mv-dmg { display:block; font-size:9px; color:var(--muted); }
  .move-btn.type-fire { border-color:#cc330066; background:linear-gradient(135deg, #1a0a0a 0%, var(--card) 100%); }
  .move-btn.type-water { border-color:#1166cc66; background:linear-gradient(135deg, #0a0a1a 0%, var(--card) 100%); }
  .move-btn.type-earth { border-color:#55772266; background:linear-gradient(135deg, #0a1a0a 0%, var(--card) 100%); }
  .move-btn.type-electric { border-color:#cc990066; background:linear-gradient(135deg, #1a1a0a 0%, var(--card) 100%); }
  .move-btn.type-shadow { border-color:#44226666; background:linear-gradient(135deg, #10061a 0%, var(--card) 100%); }
  .move-btn.type-ice { border-color:#4488aa66; background:linear-gradient(135deg, #0a1218 0%, var(--card) 100%); }
  .move-btn.type-toxic { border-color:#44661166; background:linear-gradient(135deg, #0e1a06 0%, var(--card) 100%); }

  #battleBottom {
    display:flex; gap:6px;
  }
  #catchBtn {
    flex:0 0 auto;
    padding:10px 14px; border:none; border-radius:10px;
    font-family:'Cinzel',serif; font-weight:700; font-size:11px;
    letter-spacing:1px; text-transform:uppercase;
    background:linear-gradient(135deg, #1a6633 0%, #22aa55 100%);
    color:#fff; cursor:pointer;
    border:1px solid #22aa55;
    box-shadow:0 2px 8px rgba(34,170,85,0.2);
    transition: transform 0.1s;
  }
  #catchBtn:active { transform:scale(0.97); }
  #catchBtn.disabled { background:var(--card); color:var(--muted); border-color:var(--border); box-shadow:none; pointer-events:none; }
  #runBtn {
    flex:0 0 auto;
    padding:10px 14px; border:none; border-radius:10px;
    font-family:'Cinzel',serif; font-weight:700; font-size:11px;
    letter-spacing:1px; text-transform:uppercase;
    background:var(--card); color:var(--muted);
    border:1px solid var(--border); cursor:pointer;
    transition: transform 0.1s;
  }
  #runBtn:active { transform:scale(0.97); }

  /* Battle log */
  #battleLog {
    flex:1;
    font-size:10px; color:var(--muted); text-align:center;
    display:flex; align-items:center; justify-content:center;
    min-height:14px; padding:0;
    letter-spacing:0.5px;
  }
  #battleLog.hit { color:var(--accent-glow); }
  #battleLog.heal { color:var(--hp-green); }

  /* Damage popup on canvas */
  .dmg-float {
    position:absolute; pointer-events:none;
    font-family:'Cinzel',serif; font-weight:900; font-size:28px;
    color:var(--accent-glow); text-shadow:0 2px 8px rgba(0,0,0,0.8);
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity:1; transform:translateY(0) scale(1.2); }
    100% { opacity:0; transform:translateY(-50px) scale(0.8); }
  }

  /* Victory / defeat overlay */
  #resultOverlay {
    position:fixed; inset:0; background:rgba(11,14,23,0.92);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; z-index:100;
  }
  #resultOverlay.active { display:flex; }
  #resultTitle {
    font-family:'Cinzel',serif; font-weight:900; font-size:32px;
    letter-spacing:4px; text-transform:uppercase; margin-bottom:8px;
  }
  #resultSub { font-size:13px; color:var(--muted); margin-bottom:24px; letter-spacing:1px; }
  #resultBtn {
    padding:16px 48px; border:none; border-radius:12px;
    font-family:'Cinzel',serif; font-weight:700; font-size:16px;
    letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow:0 4px 20px rgba(239,68,68,0.3);
  }
  #resultBtn:active { transform:scale(0.96); }

  /* Screen shake */
  .shake { animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100%{transform:translate(0)} 20%{transform:translate(-4px,2px)} 40%{transform:translate(4px,-2px)} 60%{transform:translate(-3px,3px)} 80%{transform:translate(3px,-1px)}
  }

  /* ---- EXPEDITION UI ---- */
  #expeditionUI { display:none; padding:0; }
  #expeditionUI.active { display:flex; flex-direction:column; }

  #expTopBar {
    display:flex; align-items:center; gap:8px;
    padding:8px 12px 4px;
  }
  #expStepLabel {
    font-family:'Cinzel',serif; font-weight:700; font-size:10px;
    color:var(--gold); letter-spacing:1px; text-transform:uppercase;
    flex:0 0 auto;
  }
  #expProgressWrap {
    flex:1; height:5px; background:var(--abyss);
    border-radius:3px; overflow:hidden; border:1px solid var(--border);
  }
  #expProgressBar {
    height:100%; background:var(--gold); border-radius:3px;
    transition: width 0.5s ease;
  }
  #expHPMini {
    font-size:9px; color:var(--hp-green); flex:0 0 auto;
    font-family:'Fira Code',monospace;
  }

  #expEventBar {
    display:none; padding:4px 12px 8px;
  }
  #expEventBar.active { display:flex; flex-direction:column; gap:6px; }
  #expEventText {
    font-size:12px; color:var(--bright);
    font-family:'Cinzel',serif; font-weight:700;
    letter-spacing:0.5px;
    text-align:center;
  }
  #expEventSub {
    font-size:10px; color:var(--muted); text-align:center;
    letter-spacing:0.3px;
  }
  #expChoices {
    display:flex; gap:6px;
  }
  .exp-btn {
    flex:1; padding:12px 6px; border:none; border-radius:10px;
    font-family:'Cinzel',serif; font-weight:700; font-size:12px;
    letter-spacing:1px; text-transform:uppercase;
    cursor:pointer; transition:transform 0.1s;
    text-align:center; color:#fff;
  }
  .exp-btn:active { transform:scale(0.96); }
  .exp-btn.fight { background:linear-gradient(135deg, var(--accent) 0%, #991b1b 100%); box-shadow:0 3px 10px rgba(239,68,68,0.3); }
  .exp-btn.loot { background:linear-gradient(135deg, #92690a 0%, #b8860b 100%); box-shadow:0 3px 10px rgba(245,158,11,0.2); }
  .exp-btn.heal { background:linear-gradient(135deg, #166534 0%, #15803d 100%); }
  .exp-btn.info { background:var(--card); border:1px solid var(--border); color:var(--text); }
  .exp-btn.walk { background:linear-gradient(135deg, #334155 0%, #475569 100%); }

  #expWalkPrompt {
    text-align:center; padding:6px 12px 10px;
    font-size:11px; color:var(--muted); letter-spacing:1px;
    font-family:'Cinzel',serif;
  }

  /* Toast notification on canvas */
  #expToast {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    background:rgba(11,14,23,0.9); border:1px solid var(--border);
    padding:6px 16px; border-radius:12px;
    font-size:11px; color:var(--gold);
    font-family:'Cinzel',serif; font-weight:700;
    letter-spacing:1px; white-space:nowrap;
    pointer-events:none; opacity:0;
    transition:opacity 0.3s;
    z-index:4;
  }
  #expToast.show { opacity:1; }

  /* Collection button */
  #collectionBtn {
    display:inline-block; margin-top:10px;
    padding:10px 20px; border:none; border-radius:10px;
    font-family:'Cinzel',serif; font-weight:700; font-size:12px;
    letter-spacing:1px; text-transform:uppercase;
    background:var(--card); color:var(--text);
    border:1px solid var(--border); cursor:pointer;
    transition: transform 0.1s;
  }
  #collectionBtn:active { transform:scale(0.97); }
  #collectionBtn #collCount {
    display:inline-block; min-width:18px; height:18px; line-height:18px;
    text-align:center; border-radius:9px; font-size:10px;
    background:var(--accent); color:#fff; margin-left:4px;
    vertical-align:middle;
  }

  /* Collection overlay */
  #collectionOverlay {
    position:fixed; inset:0; background:rgba(11,14,23,0.96);
    display:none; flex-direction:column; align-items:center;
    z-index:100; padding:20px 16px;
    overflow-y:auto; -webkit-overflow-scrolling:touch;
    transition: background 0.3s;
  }
  #collectionOverlay.active { display:flex; }
  #collectionOverlay h2 {
    font-family:'Cinzel',serif; font-weight:900; font-size:22px;
    color:var(--gold); letter-spacing:3px; text-transform:uppercase;
    margin-bottom:16px; flex:0 0 auto;
  }
  #collGrid {
    display:grid; grid-template-columns:repeat(2, 1fr); gap:10px;
    width:100%; max-width:360px; flex:1 1 auto;
  }
  .coll-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:8px; text-align:center; position:relative;
  }
  .coll-card canvas {
    width:100%; aspect-ratio:13/12; border-radius:8px;
    background:var(--abyss);
  }
  .coll-card .coll-name {
    font-family:'Cinzel',serif; font-weight:700; font-size:11px;
    color:var(--bright); margin-top:4px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .coll-card .coll-info {
    font-size:9px; color:var(--muted); letter-spacing:0.5px;
  }
  #collectionOverlay > button {
    flex:0 0 auto; margin-top:16px;
    padding:14px 40px; border:none; border-radius:12px;
    font-family:'Cinzel',serif; font-weight:700; font-size:15px;
    letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow:0 4px 20px rgba(239,68,68,0.3);
  }
  #collEmpty {
    color:var(--muted); font-size:13px; letter-spacing:0.5px;
    padding:40px 0; text-align:center;
    font-family:'Cinzel',serif;
    grid-column: 1 / -1;
  }

  /* My Monster panel at top of collection */
  #myMonsterPanel {
    flex:0 0 auto; width:100%; max-width:360px;
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:12px; text-align:center;
    position:relative; overflow:hidden;
  }
  #myMonsterPanel::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at center 40%, rgba(245,158,11,0.06) 0%, transparent 70%);
    pointer-events:none;
  }
  #myMonsterLabel {
    font-family:'Cinzel',serif; font-weight:700; font-size:10px;
    color:var(--gold); letter-spacing:2px; text-transform:uppercase;
    margin-bottom:4px;
  }
  #myMonsterCanvas {
    width:180px; height:150px; display:block; margin:0 auto;
    border-radius:8px; background:var(--abyss);
  }
  #myMonsterName {
    font-family:'Cinzel',serif; font-weight:900; font-size:16px;
    color:var(--bright); margin-top:6px; letter-spacing:1px;
  }
  #myMonsterStats {
    font-size:11px; color:var(--gold-dim); letter-spacing:0.5px;
    margin-top:2px;
  }
  #myMonsterDetails {
    font-size:10px; color:var(--muted); margin-top:4px;
    letter-spacing:0.3px;
  }
  #absorbLabel {
    flex:0 0 auto; font-family:'Cinzel',serif; font-weight:700;
    font-size:11px; color:var(--muted); letter-spacing:1px;
    text-transform:uppercase; padding:10px 0 4px;
  }
  .coll-card.absorb-ready {
    cursor:pointer; border-color:var(--gold-dim);
  }
  .coll-card.absorb-ready:active {
    transform:scale(0.96);
    border-color:var(--gold);
    box-shadow:0 0 12px rgba(245,158,11,0.3);
  }
  /* Absorb animation */
  @keyframes absorbPulse {
    0% { box-shadow:0 0 0 rgba(245,158,11,0); }
    50% { box-shadow:0 0 30px rgba(245,158,11,0.5); }
    100% { box-shadow:0 0 0 rgba(245,158,11,0); }
  }
  #myMonsterPanel.absorbing {
    animation: absorbPulse 0.6s ease;
  }

  /* Catch shake animation */
  @keyframes catchShake {
    0%,100% { transform:translate(0,0) rotate(0deg); }
    15% { transform:translate(-6px,0) rotate(-5deg); }
    30% { transform:translate(6px,0) rotate(5deg); }
    45% { transform:translate(-4px,0) rotate(-3deg); }
    60% { transform:translate(4px,0) rotate(3deg); }
    75% { transform:translate(-2px,0) rotate(-1deg); }
  }

  /* Expedition summary overlay */
  #expSummary {
    position:fixed; inset:0; background:rgba(11,14,23,0.95);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; z-index:100; padding:20px;
  }
  #expSummary.active { display:flex; }
  #expSummary h2 {
    font-family:'Cinzel',serif; font-weight:900; font-size:24px;
    color:var(--gold); letter-spacing:3px; text-transform:uppercase;
    margin-bottom:16px;
  }
  .summary-line {
    font-size:12px; color:var(--text); margin-bottom:6px;
    letter-spacing:0.5px;
  }
  .summary-line span { color:var(--gold); font-weight:600; }
  #expSummary button {
    margin-top:20px;
    padding:14px 40px; border:none; border-radius:12px;
    font-family:'Cinzel',serif; font-weight:700; font-size:15px;
    letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow:0 4px 20px rgba(239,68,68,0.3);
  }
</style>
</head>
<body>

<div id="sceneWrap">
  <canvas id="scene"></canvas>
  <div id="flash"></div>
  <div id="joystick"><div id="joystickInner"></div></div>
  <div id="expToast"></div>
  <div id="zoneBadge">Verdantia — Beach</div>
  <div id="hpOverlay">
    <div class="hp-section" id="enemyHP">
      <span class="hp-name" id="enemyName">???</span>
      <span class="hp-lv" id="enemyLv">Lv5</span>
