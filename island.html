<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verdantia — Explore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --abyss: #0b0e17;
    --deep: #111827;
    --panel: #151c2c;
    --card: #1a2236;
    --border: #263046;
    --muted: #4a5568;
    --text: #c9d1d9;
    --bright: #e2e8f0;
    --accent: #ef4444;
    --accent-glow: #f87171;
    --gold: #f59e0b;
    --gold-dim: #92690a;
    --hp-green: #22c55e;
    --hp-yellow: #eab308;
    --hp-red: #ef4444;
    --mana: #3b82f6;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:var(--abyss); color:var(--text); font-family:'Fira Code',monospace; }
  body { display:flex; flex-direction:column; }

  /* ---- SCENE CANVAS ---- */
  #sceneWrap {
    position:relative; flex:1 1 60%; min-height:0;
    overflow:hidden;
    border-bottom: 2px solid var(--border);
  }
  body.in-battle #sceneWrap { flex: 1 1 65%; }

  /* HP bars overlaid on canvas */
  #hpOverlay {
    position:absolute; left:0; right:0; top:0;
    padding:10px 10px 0;
    pointer-events:none; display:none;
    z-index:5;
  }
  #hpOverlay.active { display:flex; flex-direction:column; gap:4px; }
  #scene { width:100%; height:100%; display:block; }

  /* Encounter flash overlay */
  #flash {
    position:absolute; inset:0;
    background: white;
    opacity:0; pointer-events:none;
    transition: opacity 0.08s;
  }
  #flash.active { opacity:0.85; }

  /* Zone name overlay */
  #zoneBadge {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    font-family:'Cinzel',serif; font-weight:700; font-size:15px;
    color:var(--bright); letter-spacing:2px; text-transform:uppercase;
    background: linear-gradient(180deg, rgba(11,14,23,0.85) 0%, rgba(11,14,23,0.4) 100%);
    padding:6px 18px 5px; border-radius:20px;
    border:1px solid var(--border);
    text-shadow:0 1px 6px rgba(0,0,0,0.9);
    white-space:nowrap;
  }

  /* ---- BOTTOM UI ---- */
  #ui {
    flex:0 0 auto;
    background: var(--deep);
    display:flex; flex-direction:column;
    padding:0 0 var(--safe-bottom);
    max-height:45%;
    border-top:1px solid var(--border);
  }

  /* Zone selector */
  #zones {
    display:flex; gap:6px;
    padding:10px 12px 6px;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  #zones::-webkit-scrollbar { display:none; }
  .zone-pill {
    flex:0 0 auto;
    padding:7px 16px; border-radius:20px;
    font-family:'Cinzel',serif; font-weight:500; font-size:12px;
    letter-spacing:1px; text-transform:uppercase;
    background:var(--card); color:var(--muted);
    border:1px solid var(--border);
    cursor:pointer; transition:all 0.2s;
  }
  .zone-pill.active {
    background: linear-gradient(135deg, var(--accent) 0%, #b91c1c 100%);
    color:#fff; border-color:var(--accent);
    box-shadow:0 0 12px rgba(239,68,68,0.3);
  }

  /* Explore mode */
  #exploreUI { padding:12px 16px 16px; text-align:center; }
  #exploreBtn {
    width:100%; max-width:320px;
    padding:18px 0; border:none; border-radius:14px;
    font-family:'Cinzel',serif; font-weight:900; font-size:18px;
    letter-spacing:3px; text-transform:uppercase;
    background: linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow: 0 4px 20px rgba(239,68,68,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: transform 0.1s, box-shadow 0.2s;
    position:relative; overflow:hidden;
  }
  #exploreBtn:active { transform:scale(0.97); box-shadow:0 2px 10px rgba(239,68,68,0.25); }
  #exploreBtn.walking {
    background: linear-gradient(135deg, var(--muted) 0%, #374151 100%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    pointer-events:none;
  }
  #exploreBtn .shimmer {
    position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
    animation: shimmer 2.5s infinite;
  }
  @keyframes shimmer { 0%{left:-100%} 100%{left:100%} }
  #exploreStatus {
    margin-top:10px; font-size:11px; color:var(--muted);
    letter-spacing:1px; min-height:16px;
  }

  /* Battle mode — only moves + flee at bottom */
  #battleUI { display:none; padding:6px 10px 8px; }
  #battleUI.active { display:flex; flex-direction:column; gap:6px; }

  /* HP bars */
  .hp-section {
    display:flex; align-items:center; gap:6px;
    padding:4px 8px; background:rgba(17,24,39,0.85); border-radius:8px;
    border:1px solid var(--border);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  .hp-name {
    font-family:'Cinzel',serif; font-weight:700; font-size:11px;
    color:var(--bright); min-width:0; flex:0 0 auto;
    max-width:72px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .hp-bar-wrap {
    flex:1; height:8px; background:var(--abyss);
    border-radius:4px; overflow:hidden; position:relative;
    border:1px solid var(--border);
  }
  .hp-bar {
    height:100%; border-radius:4px;
    transition:width 0.5s ease, background 0.3s;
    position:relative;
  }
  .hp-bar::after {
    content:''; position:absolute; top:0; left:0; right:0; height:40%;
    background:linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%);
    border-radius:4px 4px 0 0;
  }
  .hp-text {
    font-size:10px; color:var(--muted); flex:0 0 auto;
    font-variant-numeric: tabular-nums;
    min-width:46px; text-align:right;
  }
  .hp-lv {
    font-size:9px; color:var(--gold-dim); flex:0 0 auto;
  }

  /* Moves grid */
  #movesGrid {
    display:grid; grid-template-columns:1fr 1fr; gap:6px;
  }
  .move-btn {
    padding:10px 6px; border:none; border-radius:10px;
    font-family:'Fira Code',monospace; font-size:11px; font-weight:600;
    cursor:pointer; text-align:center;
    background: var(--card);
    color:var(--bright);
    border:1px solid var(--border);
    transition: transform 0.1s, border-color 0.15s;
    position:relative; overflow:hidden;
  }
  .move-btn:active { transform:scale(0.95); }
  .move-btn .mv-name { display:block; margin-bottom:1px; font-size:11px; }
  .move-btn .mv-dmg { display:block; font-size:9px; color:var(--muted); }
  .move-btn.type-fire { border-color:#cc330066; background:linear-gradient(135deg, #1a0a0a 0%, var(--card) 100%); }
  .move-btn.type-water { border-color:#1166cc66; background:linear-gradient(135deg, #0a0a1a 0%, var(--card) 100%); }
  .move-btn.type-earth { border-color:#55772266; background:linear-gradient(135deg, #0a1a0a 0%, var(--card) 100%); }
  .move-btn.type-electric { border-color:#cc990066; background:linear-gradient(135deg, #1a1a0a 0%, var(--card) 100%); }
  .move-btn.type-shadow { border-color:#44226666; background:linear-gradient(135deg, #10061a 0%, var(--card) 100%); }
  .move-btn.type-ice { border-color:#4488aa66; background:linear-gradient(135deg, #0a1218 0%, var(--card) 100%); }
  .move-btn.type-toxic { border-color:#44661166; background:linear-gradient(135deg, #0e1a06 0%, var(--card) 100%); }

  #battleBottom {
    display:flex; gap:6px;
  }
  #runBtn {
    flex:0 0 auto;
    padding:10px 16px; border:none; border-radius:10px;
    font-family:'Cinzel',serif; font-weight:700; font-size:11px;
    letter-spacing:1px; text-transform:uppercase;
    background:var(--card); color:var(--muted);
    border:1px solid var(--border); cursor:pointer;
    transition: transform 0.1s;
  }
  #runBtn:active { transform:scale(0.97); }

  /* Battle log */
  #battleLog {
    flex:1;
    font-size:10px; color:var(--muted); text-align:center;
    display:flex; align-items:center; justify-content:center;
    min-height:14px; padding:0;
    letter-spacing:0.5px;
  }
  #battleLog.hit { color:var(--accent-glow); }
  #battleLog.heal { color:var(--hp-green); }

  /* Damage popup on canvas */
  .dmg-float {
    position:absolute; pointer-events:none;
    font-family:'Cinzel',serif; font-weight:900; font-size:28px;
    color:var(--accent-glow); text-shadow:0 2px 8px rgba(0,0,0,0.8);
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity:1; transform:translateY(0) scale(1.2); }
    100% { opacity:0; transform:translateY(-50px) scale(0.8); }
  }

  /* Victory / defeat overlay */
  #resultOverlay {
    position:fixed; inset:0; background:rgba(11,14,23,0.92);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; z-index:100;
  }
  #resultOverlay.active { display:flex; }
  #resultTitle {
    font-family:'Cinzel',serif; font-weight:900; font-size:32px;
    letter-spacing:4px; text-transform:uppercase; margin-bottom:8px;
  }
  #resultSub { font-size:13px; color:var(--muted); margin-bottom:24px; letter-spacing:1px; }
  #resultBtn {
    padding:16px 48px; border:none; border-radius:12px;
    font-family:'Cinzel',serif; font-weight:700; font-size:16px;
    letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(135deg, var(--accent) 0%, #991b1b 100%);
    color:#fff; cursor:pointer;
    box-shadow:0 4px 20px rgba(239,68,68,0.3);
  }
  #resultBtn:active { transform:scale(0.96); }

  /* Screen shake */
  .shake { animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100%{transform:translate(0)} 20%{transform:translate(-4px,2px)} 40%{transform:translate(4px,-2px)} 60%{transform:translate(-3px,3px)} 80%{transform:translate(3px,-1px)}
  }
  #scene3d {
    display:none; width:100%; height:100%;
    position:absolute; top:0; left:0; z-index:1;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="sceneWrap">
  <canvas id="scene"></canvas>
  <canvas id="scene3d"></canvas>
  <div id="flash"></div>
  <div id="zoneBadge">Verdantia — Forest</div>
  <div id="hpOverlay">
    <div class="hp-section" id="enemyHP">
      <span class="hp-name" id="enemyName">???</span>
      <span class="hp-lv" id="enemyLv">Lv5</span>
      <div class="hp-bar-wrap"><div class="hp-bar" id="enemyBar" style="width:100%;background:var(--hp-green)"></div></div>
      <span class="hp-text" id="enemyHPText">80/80</span>
    </div>
    <div class="hp-section" id="playerHP">
      <span class="hp-name" id="playerName">???</span>
      <span class="hp-lv" id="playerLv">Lv5</span>
      <div class="hp-bar-wrap"><div class="hp-bar" id="playerBar" style="width:100%;background:var(--hp-green)"></div></div>
      <span class="hp-text" id="playerHPText">100/100</span>
    </div>
  </div>
</div>

<div id="ui">
  <div id="zones">
    <div class="zone-pill active" data-zone="beach">Beach</div>
    <div class="zone-pill" data-zone="forest">Forest</div>
    <div class="zone-pill" data-zone="deepwoods">Deep Woods</div>
    <div class="zone-pill" data-zone="cave">Cave</div>
  </div>

  <div id="exploreUI">
    <button id="exploreBtn">
      <span class="shimmer"></span>
      Explore
    </button>
    <div id="exploreStatus"></div>
  </div>

  <div id="battleUI">
    <div id="movesGrid"></div>
    <div id="battleBottom">
      <button id="runBtn" ontouchend="runFromBattle()" onclick="runFromBattle()">Flee</button>
      <div id="battleLog">&nbsp;</div>
    </div>
  </div>
</div>

<div id="resultOverlay">
  <div id="resultTitle">Victory</div>
  <div id="resultSub">+35 XP gained</div>
  <button id="resultBtn" ontouchend="dismissResult()" onclick="dismissResult()">Continue</button>
</div>

<script>
// ---- UTILS ----
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[rng(0,a.length-1)]}
function pickN(a,n){return[...a].sort(()=>Math.random()-0.5).slice(0,n)}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('')}
function lighten(h,a){const c=hexToRgb(h);return rgbToHex(c.r+(255-c.r)*a,c.g+(255-c.g)*a,c.b+(255-c.b)*a)}
function darken(h,a){const c=hexToRgb(h);return rgbToHex(c.r*(1-a),c.g*(1-a),c.b*(1-a))}

// ---- CANVAS SETUP ----
const sceneCanvas = document.getElementById('scene');
const ctx = sceneCanvas.getContext('2d');
let W, H;
function resizeCanvas(){
  const r = window.devicePixelRatio || 1;
  const rect = sceneCanvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  sceneCanvas.width = W * r; sceneCanvas.height = H * r;
  sceneCanvas.style.width = W + 'px'; sceneCanvas.style.height = H + 'px';
  ctx.setTransform(r,0,0,r,0,0);
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); resize3D(); });

// ---- GAME STATE ----
let gameState = 'explore'; // 'explore' | 'walking' | 'encounter' | 'battle'
let animT = 0;
let currentZone = 'beach';
let walkProgress = 0;
let encounterTimer = 0;

// Player monster (starter)
const playerMonster = {
  name: 'Kaelfang',
  type: 'earth',
  level: 8,
  archetype: 'beast',
  stats: { hp: 95, atk: 42, def: 38, spd: 55 },
  currentHP: 95,
  moves: [
    { name:'Stone Fang', damage:28, type:'earth' },
    { name:'Tremor Slam', damage:35, type:'earth' },
    { name:'Root Crush', damage:22, type:'earth' },
    { name:'Earthshatter', damage:45, type:'earth' }
  ],
  colors: { pri:'#557722', sec:'#88cc44', hi:'#ccaa55', dark:'#334411', skin:'#669933' },
  head:{shape:'wolf',size:1}, neck:{length:0.4,thick:0.35}, body:{size:0.85,bulk:1.1},
  legs:{count:4,style:'plantigrade',clawSize:0.7}, wings:{style:'none',span:1,membrane:false},
  tail:{style:'whip',length:1.1,thick:0.25}, horns:{style:'none',size:0.5},
  armor:'fur', spines:false, fangs:true, eyeGlow:true, breathEffect:false, scarred:false
};

let enemyMonster = null;
let battleTurn = 'player';
let battleBusy = false;

// ---- THREE.JS 3D BATTLE SYSTEM ----
const scene3dCanvas = document.getElementById('scene3d');
let renderer3d, scene3d, camera3d;
let playerMesh, enemyMesh;
let arenaLights = [];
let battleParticles3d = [];
let impactLights = [];

// 3D animation state
const b3d = {
  playerBasePos: new THREE.Vector3(-2.2, 0, 1.8),
  enemyBasePos: new THREE.Vector3(2.2, 0, -0.8),
  playerTargetPos: null,
  enemyTargetPos: null,
  playerShake: 0,
  enemyShake: 0,
  playerFlash: 0,
  enemyFlash: 0,
  cameraShake: 0,
  enemySlideProgress: 0,
  playerSlideProgress: 0,
  enemyDeathProgress: 0,
  originalMaterials: new Map(),
  clock: new THREE.Clock(),
};

function init3DRenderer() {
  if (renderer3d) return;
  renderer3d = new THREE.WebGLRenderer({
    canvas: scene3dCanvas,
    antialias: true,
    alpha: false,
    powerPreference: 'high-performance'
  });
  renderer3d.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer3d.setClearColor(0x0a0e18);
  renderer3d.shadowMap.enabled = false;
  renderer3d.outputEncoding = THREE.sRGBEncoding;
}

function resize3D() {
  if (!renderer3d) return;
  const rect = scene3dCanvas.parentElement.getBoundingClientRect();
  renderer3d.setSize(rect.width, rect.height);
  if (camera3d) {
    camera3d.aspect = rect.width / rect.height;
    camera3d.updateProjectionMatrix();
  }
}

function hexToThreeColor(hex) {
  return new THREE.Color(hex);
}

function makeMonsterMat(hex, flat) {
  return new THREE.MeshPhongMaterial({
    color: hexToThreeColor(hex),
    flatShading: flat !== false,
    shininess: 18,
    specular: 0x222222,
  });
}

function makeEmissiveMat(hex, intensity) {
  return new THREE.MeshPhongMaterial({
    color: hexToThreeColor(hex),
    emissive: hexToThreeColor(hex),
    emissiveIntensity: intensity || 0.7,
    flatShading: true,
  });
}

// ---- PROCEDURAL 3D MONSTER BUILDER ----
function buildMonsterMesh(data) {
  const g = new THREE.Group();
  const col = data.colors;
  const S = (data.body?.size || 0.9);
  const bulk = (data.body?.bulk || 1);
  const skinMat = makeMonsterMat(col.skin);
  const darkMat = makeMonsterMat(col.dark);
  const priMat = makeMonsterMat(col.pri);
  const bellyMat = makeMonsterMat(lighten(col.skin, 0.2));

  // Body
  const bodySeg = 6;
  const bodyGeo = new THREE.SphereGeometry(1, bodySeg, bodySeg - 1);
  const body = new THREE.Mesh(bodyGeo, skinMat);
  body.scale.set(S * 1.1, S * 0.7 * bulk, S * 0.75);
  body.position.set(0, S * 0.7, 0);
  g.add(body);

  // Belly highlight
  const bellyGeo = new THREE.SphereGeometry(0.7, 5, 4, 0, Math.PI * 2, Math.PI * 0.4, Math.PI * 0.4);
  const belly = new THREE.Mesh(bellyGeo, bellyMat);
  belly.scale.copy(body.scale).multiplyScalar(0.85);
  belly.position.copy(body.position);
  belly.position.y -= S * 0.1;
  g.add(belly);

  // Neck
  const nLen = (data.neck?.length || 0.5) * 1.5 * S;
  const nThick = (data.neck?.thick || 0.3) * S;
  const neckGeo = new THREE.CylinderGeometry(nThick * 0.6, nThick, nLen, 5, 1);
  const neck = new THREE.Mesh(neckGeo, skinMat);
  neck.position.set(-S * 0.7, S * 0.9 + nLen * 0.35, 0);
  neck.rotation.z = 0.5;
  g.add(neck);

  // Head
  const headGroup = new THREE.Group();
  const hs = (data.head?.size || 0.9) * S;
  const shape = data.head?.shape || 'dragon';

  // Cranium
  const cranGeo = new THREE.SphereGeometry(hs * 0.55, 5, 4);
  const cran = new THREE.Mesh(cranGeo, skinMat);
  cran.scale.set(1, 0.8, 0.9);
  headGroup.add(cran);

  // Snout
  const snoutLen = shape === 'raptor' ? hs * 0.9 : shape === 'flat' ? hs * 0.4 : hs * 0.7;
  const snoutGeo = new THREE.ConeGeometry(hs * 0.3, snoutLen, 5);
  const snout = new THREE.Mesh(snoutGeo, skinMat);
  snout.rotation.z = Math.PI / 2;
  snout.position.set(-snoutLen * 0.5, -hs * 0.05, 0);
  headGroup.add(snout);

  // Jaw
  const jawGeo = new THREE.BoxGeometry(snoutLen * 0.7, hs * 0.15, hs * 0.35);
  const jaw = new THREE.Mesh(jawGeo, new THREE.MeshPhongMaterial({
    color: hexToThreeColor(darken(col.skin, 0.1)),
    flatShading: true, shininess: 12
  }));
  jaw.position.set(-snoutLen * 0.25, -hs * 0.25, 0);
  headGroup.add(jaw);

  // Eyes
  const eyeMat = data.eyeGlow ? makeEmissiveMat(col.hi, 0.9) : makeMonsterMat('#ddddaa');
  const pupilMat = new THREE.MeshPhongMaterial({ color: 0x111111, flatShading: true });
  [-1, 1].forEach(side => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(hs * 0.12, 5, 4), eyeMat);
    eye.position.set(-hs * 0.05, hs * 0.12, side * hs * 0.3);
    headGroup.add(eye);
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(hs * 0.05, 4, 3), pupilMat);
    pupil.position.set(-hs * 0.14, hs * 0.12, side * hs * 0.32);
    headGroup.add(pupil);
  });

  // Fangs
  if (data.fangs) {
    const fangMat = makeMonsterMat('#eee8dd');
    [0.15, -0.15, 0].forEach((z, i) => {
      const fLen = i === 2 ? hs * 0.2 : hs * 0.14;
      const fang = new THREE.Mesh(new THREE.ConeGeometry(hs * 0.04, fLen, 4), fangMat);
      fang.position.set(-snoutLen * 0.3, -hs * 0.35, z);
      fang.rotation.x = Math.PI;
      headGroup.add(fang);
    });
  }

  // Horns
  if (data.horns?.style && data.horns.style !== 'none') {
    const hornMat = makeMonsterMat(darken(col.skin, 0.3));
    const hornSize = (data.horns.size || 0.7) * hs;
    [-1, 1].forEach(side => {
      const horn = new THREE.Mesh(new THREE.ConeGeometry(hornSize * 0.12, hornSize * 0.8, 5), hornMat);
      if (data.horns.style === 'curved') {
        horn.position.set(hs * 0.1, hs * 0.35, side * hs * 0.25);
        horn.rotation.z = side * 0.4;
        horn.rotation.x = side * 0.3;
      } else if (data.horns.style === 'ram') {
        horn.position.set(hs * 0.05, hs * 0.25, side * hs * 0.35);
        horn.rotation.z = side * 0.8;
      } else {
        horn.position.set(hs * 0.1, hs * 0.4, side * hs * 0.2);
        horn.rotation.z = side * 0.2;
      }
      headGroup.add(horn);
    });
  }

  headGroup.position.set(-S * 0.7 + Math.cos(0.5) * nLen * 0.7, S * 0.9 + nLen * 0.35 + Math.sin(0.5) * nLen * 0.5, 0);
  headGroup.rotation.z = 0.2;
  g.add(headGroup);

  // Legs
  const legCount = data.legs?.count || 0;
  const clawMat = makeMonsterMat(darken(col.skin, 0.2));
  if (legCount >= 2) {
    const legPositions = legCount === 4
      ? [[-S*0.5, 0, S*0.4], [-S*0.5, 0, -S*0.4], [S*0.5, 0, S*0.35], [S*0.5, 0, -S*0.35]]
      : [[-S*0.15, 0, S*0.4], [-S*0.15, 0, -S*0.4]];

    legPositions.forEach(([lx, ly, lz], i) => {
      const legGroup = new THREE.Group();
      const legThick = S * 0.16;
      const legLen = S * 0.65;

      // upper leg
      const upperGeo = new THREE.CylinderGeometry(legThick * 0.7, legThick, legLen * 0.55, 5);
      const upper = new THREE.Mesh(upperGeo, i >= 2 ? makeMonsterMat(darken(col.skin, 0.1)) : skinMat);
      upper.position.y = -legLen * 0.25;
      legGroup.add(upper);

      // lower leg
      const digi = data.legs?.style === 'digitigrade';
      const lowerGeo = new THREE.CylinderGeometry(legThick * 0.45, legThick * 0.65, legLen * 0.5, 5);
      const lower = new THREE.Mesh(lowerGeo, skinMat);
      lower.position.set(digi ? S*0.1 : 0, -legLen * 0.6, 0);
      if (digi) lower.rotation.z = -0.3;
      legGroup.add(lower);

      // foot
      const footGeo = new THREE.BoxGeometry(S * 0.18, S * 0.06, S * 0.22);
      const foot = new THREE.Mesh(footGeo, skinMat);
      foot.position.set(digi ? S*0.15 : 0, -legLen * 0.82, 0);
      legGroup.add(foot);

      // claws
      for (let c = -1; c <= 1; c++) {
        const claw = new THREE.Mesh(new THREE.ConeGeometry(S * 0.025, S * 0.1, 4), clawMat);
        claw.position.set((digi ? S*0.15 : 0) - S*0.06, -legLen * 0.88, c * S * 0.07);
        claw.rotation.z = 0.6;
        legGroup.add(claw);
      }

      legGroup.position.set(lx, S * 0.5, lz);
      g.add(legGroup);
    });
  }

  // Wings
  if (data.wings?.style && data.wings.style !== 'none') {
    const wingSpan = (data.wings.span || 1) * S * 2;
    const isSkeletal = data.wings.style === 'skeletal';
    const isFeathered = data.wings.style === 'feathered';

    [-1, 1].forEach(side => {
      const wingGroup = new THREE.Group();

      // wing arm bones
      const boneMat = makeMonsterMat(col.skin);
      const bone1 = new THREE.Mesh(new THREE.CylinderGeometry(S * 0.04, S * 0.06, wingSpan * 0.4, 4), boneMat);
      bone1.rotation.z = side * 1.2;
      bone1.position.set(0, wingSpan * 0.15, 0);
      wingGroup.add(bone1);

      const bone2 = new THREE.Mesh(new THREE.CylinderGeometry(S * 0.03, S * 0.04, wingSpan * 0.35, 4), boneMat);
      bone2.position.set(side * wingSpan * 0.28, wingSpan * 0.25, 0);
      bone2.rotation.z = side * 0.5;
      wingGroup.add(bone2);

      // membrane or feathers
      if (!isSkeletal) {
        const memShape = new THREE.Shape();
        memShape.moveTo(0, 0);
        memShape.lineTo(side * wingSpan * 0.15, wingSpan * 0.3);
        memShape.lineTo(side * wingSpan * 0.4, wingSpan * 0.2);
        memShape.lineTo(side * wingSpan * 0.38, wingSpan * 0.05);
        memShape.lineTo(side * wingSpan * 0.25, -wingSpan * 0.05);
        memShape.lineTo(0, -wingSpan * 0.02);
        const memGeo = new THREE.ShapeGeometry(memShape);
        const memMat = new THREE.MeshPhongMaterial({
          color: hexToThreeColor(col.pri),
          flatShading: true,
          transparent: true,
          opacity: isFeathered ? 0.85 : 0.5,
          side: THREE.DoubleSide,
          shininess: 8,
        });
        const membrane = new THREE.Mesh(memGeo, memMat);
        wingGroup.add(membrane);
      }

      // finger bones
      for (let f = 0; f < 3; f++) {
        const fBone = new THREE.Mesh(new THREE.CylinderGeometry(S*0.015, S*0.025, wingSpan*0.15, 4), boneMat);
        fBone.position.set(side * (wingSpan*0.3 + f*wingSpan*0.05), wingSpan*(0.2 - f*0.06), 0);
        fBone.rotation.z = side * (0.8 + f * 0.3);
        wingGroup.add(fBone);
      }

      wingGroup.position.set(0, S * 0.9, side * S * 0.3);
      wingGroup.rotation.x = side * 0.15;
      g.add(wingGroup);
    });
  }

  // Tail
  const tailLen = (data.tail?.length || 1) * S * 1.5;
  const tailThick = (data.tail?.thick || 0.25) * S;
  const tailSegs = 6;
  for (let i = 0; i < tailSegs; i++) {
    const t = i / tailSegs;
    const segSize = tailThick * (1 - t * 0.8);
    const segGeo = new THREE.SphereGeometry(segSize, 4, 3);
    const seg = new THREE.Mesh(segGeo, skinMat);
    const curve = Math.sin(t * Math.PI) * tailLen * 0.12;
    seg.position.set(S * 0.8 + t * tailLen * 0.8, S * 0.4 - t * S * 0.15 + curve, Math.sin(t * 3) * S * 0.1);
    g.add(seg);
  }

  // Tail tip
  const tipStyle = data.tail?.style || 'whip';
  if (tipStyle === 'spiked' || tipStyle === 'bladed' || tipStyle === 'barbed') {
    const tip = new THREE.Mesh(new THREE.ConeGeometry(tailThick * 0.5, tailThick * 2, 4), priMat);
    tip.position.set(S * 0.8 + tailLen * 0.85, S * 0.25, 0);
    tip.rotation.z = -Math.PI / 2;
    g.add(tip);
  } else if (tipStyle === 'club') {
    const club = new THREE.Mesh(new THREE.SphereGeometry(tailThick * 0.8, 5, 4), priMat);
    club.position.set(S * 0.8 + tailLen * 0.85, S * 0.25, 0);
    g.add(club);
  } else if (tipStyle === 'flame') {
    const flameTip = new THREE.Mesh(new THREE.ConeGeometry(tailThick * 0.4, tailThick * 1.5, 5),
      makeEmissiveMat(col.hi, 0.6));
    flameTip.position.set(S * 0.8 + tailLen * 0.85, S * 0.25, 0);
    flameTip.rotation.z = -Math.PI / 2;
    g.add(flameTip);
  }

  // Spines along back
  if (data.spines) {
    for (let i = 0; i < 6; i++) {
      const t = i / 5;
      const sx = -S * 0.5 + t * S * 1.4;
      const sy = S * (0.9 + Math.sin(t * Math.PI) * 0.3 * bulk);
      const spineH = S * (0.12 + Math.sin(t * Math.PI) * 0.15);
      const spine = new THREE.Mesh(new THREE.ConeGeometry(S * 0.04, spineH, 4), priMat);
      spine.position.set(sx, sy, 0);
      g.add(spine);
    }
  }

  // Ground shadow disc
  const shadowGeo = new THREE.CircleGeometry(S * 1.5, 16);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25 });
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.02;
  g.add(shadow);

  return g;
}

// ---- 3D ARENA ----
function buildBattleArena(biome) {
  scene3d = new THREE.Scene();
  scene3d.fog = new THREE.FogExp2(0x0a0e18, biome === 'deepwoods' ? 0.14 : biome === 'cave' ? 0.1 : 0.06);

  // ground
  const groundColors = { beach: 0x9e8560, forest: 0x2a4a1a, deepwoods: 0x1a2e12, cave: 0x1a1a22 };
  const groundGeo = new THREE.CircleGeometry(8, 32);
  const groundMat = new THREE.MeshPhongMaterial({
    color: groundColors[biome] || 0x2a4a1a,
    flatShading: true, shininess: 5,
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene3d.add(ground);

  // ground ring markings
  for (let i = 1; i <= 3; i++) {
    const ringGeo = new THREE.RingGeometry(i * 2 - 0.05, i * 2 + 0.05, 32);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 0.04, side: THREE.DoubleSide,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.01;
    scene3d.add(ring);
  }

  // Ambient
  const ambient = new THREE.AmbientLight(0x334455, biome === 'cave' ? 0.25 : 0.4);
  scene3d.add(ambient);
  arenaLights.push(ambient);

  // Key light
  const key = new THREE.DirectionalLight(0xffeedd, biome === 'cave' ? 0.35 : 0.7);
  key.position.set(-4, 6, 3);
  scene3d.add(key);
  arenaLights.push(key);

  // Fill light (cool)
  const fill = new THREE.DirectionalLight(0x6688bb, 0.2);
  fill.position.set(3, 4, -2);
  scene3d.add(fill);
  arenaLights.push(fill);

  // Rim light from behind
  const rim = new THREE.DirectionalLight(0xffffff, 0.15);
  rim.position.set(0, 2, -5);
  scene3d.add(rim);

  // Biome-specific atmosphere
  if (biome === 'cave') {
    // crystal point lights
    const crystalColors = [0x4488cc, 0x66aadd, 0x5599bb, 0x88bbee];
    for (let i = 0; i < 4; i++) {
      const cl = new THREE.PointLight(crystalColors[i], 0.3, 6);
      const angle = (i / 4) * Math.PI * 2;
      cl.position.set(Math.cos(angle) * 5, 0.5, Math.sin(angle) * 5);
      scene3d.add(cl);
      // crystal mesh
      const crystGeo = new THREE.OctahedronGeometry(0.2 + Math.random() * 0.2, 0);
      const crystMat = makeEmissiveMat('#' + crystalColors[i].toString(16).padStart(6, '0'), 0.5);
      const cryst = new THREE.Mesh(crystGeo, crystMat);
      cryst.position.copy(cl.position);
      cryst.position.y = 0.1;
      cryst.scale.y = 2;
      scene3d.add(cryst);
    }
  } else if (biome === 'forest' || biome === 'deepwoods') {
    // distant tree silhouettes
    const treeMat = new THREE.MeshPhongMaterial({
      color: biome === 'deepwoods' ? 0x0a1a0a : 0x1a3a18,
      flatShading: true, shininess: 0,
    });
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.3;
      const dist = 5.5 + Math.random() * 2;
      const treeH = 2 + Math.random() * 2;
      // trunk
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, treeH * 0.6, 4), treeMat);
      trunk.position.set(Math.cos(angle) * dist, treeH * 0.3, Math.sin(angle) * dist);
      scene3d.add(trunk);
      // canopy
      const canopy = new THREE.Mesh(new THREE.SphereGeometry(0.5 + Math.random() * 0.4, 5, 4), treeMat);
      canopy.position.set(Math.cos(angle) * dist, treeH * 0.7, Math.sin(angle) * dist);
      canopy.scale.y = 1.3;
      scene3d.add(canopy);
    }
  } else if (biome === 'beach') {
    // sand dunes, water plane in distance
    const waterGeo = new THREE.PlaneGeometry(20, 10);
    const waterMat = new THREE.MeshPhongMaterial({
      color: 0x1a5566, transparent: true, opacity: 0.7,
      flatShading: true, shininess: 60,
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    water.position.set(0, -0.05, -8);
    scene3d.add(water);
  }

  // Camera
  camera3d = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);
  camera3d.position.set(-1, 3.5, 5.5);
  camera3d.lookAt(0, 0.8, 0);
}

// ---- 3D PARTICLE SYSTEM ----
function spawn3DParticles(position, type, count) {
  const typeColors = {
    fire: [0xff6600, 0xffcc00, 0xff3300],
    water: [0x3399ff, 0x66bbff, 0xaaddff],
    earth: [0x88cc44, 0xccaa55, 0x887744],
    electric: [0xffee00, 0xffffff, 0xaaddff],
    shadow: [0xaa66cc, 0x663399, 0x4411aa],
    ice: [0x88ddff, 0xffffff, 0xbbddff],
    toxic: [0x99cc33, 0xccff44, 0x667722],
  };
  const colors = typeColors[type] || typeColors.earth;

  for (let i = 0; i < (count || 15); i++) {
    const geo = new THREE.SphereGeometry(0.04 + Math.random() * 0.06, 4, 3);
    const mat = new THREE.MeshBasicMaterial({
      color: colors[Math.floor(Math.random() * colors.length)],
      transparent: true, opacity: 1,
    });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(position);
    const angle = Math.random() * Math.PI * 2;
    const upAngle = Math.random() * Math.PI * 0.6;
    const speed = 0.08 + Math.random() * 0.12;
    p.userData.vel = new THREE.Vector3(
      Math.cos(angle) * Math.sin(upAngle) * speed,
      Math.cos(upAngle) * speed + 0.05,
      Math.sin(angle) * Math.sin(upAngle) * speed,
    );
    p.userData.life = 1;
    p.userData.decay = 0.015 + Math.random() * 0.02;
    p.userData.gravity = type === 'ice' ? 0.0005 : type === 'fire' ? -0.001 : 0.002;
    scene3d.add(p);
    battleParticles3d.push(p);
  }

  // Type-specific effects
  if (type === 'electric') {
    // Lightning bolt line
    for (let b = 0; b < 3; b++) {
      const pts = [];
      const start = position.clone().add(new THREE.Vector3(0, 1.5, 0));
      const end = position.clone();
      for (let s = 0; s <= 5; s++) {
        const t = s / 5;
        pts.push(new THREE.Vector3(
          lerp(start.x, end.x, t) + (Math.random() - 0.5) * 0.5,
          lerp(start.y, end.y, t) + (Math.random() - 0.5) * 0.3,
          lerp(start.z, end.z, t) + (Math.random() - 0.5) * 0.5,
        ));
      }
      const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
      const lineMat = new THREE.LineBasicMaterial({ color: 0xffee44, linewidth: 2, transparent: true, opacity: 1 });
      const line = new THREE.Line(lineGeo, lineMat);
      line.userData.life = 1;
      line.userData.decay = 0.08;
      scene3d.add(line);
      battleParticles3d.push(line);
    }
  } else if (type === 'fire') {
    // Extra fire particles rising
    for (let i = 0; i < 8; i++) {
      const geo = new THREE.ConeGeometry(0.06, 0.15, 4);
      const mat = new THREE.MeshBasicMaterial({
        color: i % 2 ? 0xffcc00 : 0xff4400,
        transparent: true, opacity: 0.9,
      });
      const flame = new THREE.Mesh(geo, mat);
      flame.position.copy(position).add(new THREE.Vector3((Math.random()-0.5)*0.5, Math.random()*0.3, (Math.random()-0.5)*0.5));
      flame.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.02, 0.06 + Math.random()*0.04, (Math.random()-0.5)*0.02);
      flame.userData.life = 1;
      flame.userData.decay = 0.025;
      flame.userData.gravity = -0.002;
      scene3d.add(flame);
      battleParticles3d.push(flame);
    }
  } else if (type === 'shadow') {
    // Void sphere
    const voidGeo = new THREE.SphereGeometry(0.01, 8, 6);
    const voidMat = new THREE.MeshBasicMaterial({ color: 0x663399, transparent: true, opacity: 0.6 });
    const voidSphere = new THREE.Mesh(voidGeo, voidMat);
    voidSphere.position.copy(position);
    voidSphere.userData.life = 1;
    voidSphere.userData.decay = 0.02;
    voidSphere.userData.isVoid = true;
    scene3d.add(voidSphere);
    battleParticles3d.push(voidSphere);
  } else if (type === 'ice') {
    // Ice crystals
    for (let i = 0; i < 5; i++) {
      const geo = new THREE.OctahedronGeometry(0.08 + Math.random() * 0.08, 0);
      const mat = new THREE.MeshPhongMaterial({
        color: colors[i % colors.length],
        transparent: true, opacity: 0.8,
        flatShading: true, shininess: 80,
      });
      const cryst = new THREE.Mesh(geo, mat);
      cryst.position.copy(position).add(new THREE.Vector3((Math.random()-0.5)*0.6, Math.random()*0.5, (Math.random()-0.5)*0.6));
      cryst.userData.life = 1;
      cryst.userData.decay = 0.012;
      cryst.userData.vel = new THREE.Vector3(0, 0, 0);
      cryst.userData.gravity = 0;
      cryst.userData.spin = Math.random() * 0.1;
      scene3d.add(cryst);
      battleParticles3d.push(cryst);
    }
  }

  // Impact flash light
  const flashColors = {
    fire: 0xff6600, water: 0x3399ff, earth: 0x88cc44,
    electric: 0xffee00, shadow: 0xaa66cc, ice: 0x88ddff, toxic: 0x99cc33,
  };
  const flashLight = new THREE.PointLight(flashColors[type] || 0xffffff, 3, 5);
  flashLight.position.copy(position);
  flashLight.userData.life = 1;
  flashLight.userData.decay = 0.06;
  scene3d.add(flashLight);
  impactLights.push(flashLight);
}

function updateParticles3D() {
  battleParticles3d = battleParticles3d.filter(p => {
    p.userData.life -= p.userData.decay;
    if (p.userData.life <= 0) {
      scene3d.remove(p);
      if (p.geometry) p.geometry.dispose();
      if (p.material) p.material.dispose();
      return false;
    }
    if (p.material) p.material.opacity = p.userData.life;
    if (p.userData.vel) {
      p.position.add(p.userData.vel);
      p.userData.vel.y -= (p.userData.gravity || 0.002);
    }
    if (p.userData.isVoid) {
      const s = (1 - p.userData.life) * 1.5 + 0.1;
      p.scale.set(s, s, s);
    }
    if (p.userData.spin) {
      p.rotation.y += p.userData.spin;
      p.rotation.x += p.userData.spin * 0.7;
    }
    return true;
  });

  impactLights = impactLights.filter(l => {
    l.userData.life -= l.userData.decay;
    if (l.userData.life <= 0) {
      scene3d.remove(l);
      return false;
    }
    l.intensity = l.userData.life * 3;
    return true;
  });
}

// ---- 3D ATTACK ANIMATIONS ----
function triggerAttackAnim3D(attacker, moveType) {
  if (attacker === 'player' && playerMesh) {
    const target = b3d.enemyBasePos.clone().lerp(b3d.playerBasePos, 0.35);
    target.y = 0.3;
    b3d.playerTargetPos = target;

    setTimeout(() => {
      b3d.enemyFlash = 1;
      b3d.enemyShake = 0.15;
      b3d.cameraShake = 0.08;
      const impactPos = b3d.enemyBasePos.clone();
      impactPos.y = 0.8;
      spawn3DParticles(impactPos, moveType, 18);
      b3d.playerTargetPos = null;
    }, 150);
  } else if (attacker === 'enemy' && enemyMesh) {
    const target = b3d.playerBasePos.clone().lerp(b3d.enemyBasePos, 0.35);
    target.y = 0.2;
    b3d.enemyTargetPos = target;

    setTimeout(() => {
      b3d.playerFlash = 1;
      b3d.playerShake = 0.15;
      b3d.cameraShake = 0.08;
      const impactPos = b3d.playerBasePos.clone();
      impactPos.y = 0.6;
      spawn3DParticles(impactPos, moveType, 18);
      b3d.enemyTargetPos = null;
    }, 150);
  }
}

function flashMonsterWhite(mesh, intensity) {
  if (!mesh) return;
  mesh.traverse(child => {
    if (child.isMesh && child.material) {
      if (!b3d.originalMaterials.has(child.uuid)) {
        b3d.originalMaterials.set(child.uuid, child.material);
      }
      if (intensity > 0.1) {
        child.material = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: intensity,
        });
      } else {
        const orig = b3d.originalMaterials.get(child.uuid);
        if (orig) child.material = orig;
      }
    }
  });
}

function update3DBattle() {
  const dt = 0.016;

  // Slide-in
  if (b3d.enemySlideProgress < 1) {
    b3d.enemySlideProgress = Math.min(1, b3d.enemySlideProgress + 0.035);
  }
  if (b3d.playerSlideProgress < 1) {
    b3d.playerSlideProgress = Math.min(1, b3d.playerSlideProgress + 0.04);
  }

  // Smooth easing for slide
  const easeOut = t => 1 - Math.pow(1 - t, 3);

  // Player position
  if (playerMesh) {
    let targetPos = b3d.playerTargetPos || b3d.playerBasePos;
    const slideOffset = (1 - easeOut(b3d.playerSlideProgress)) * -6;
    const baseWithSlide = b3d.playerBasePos.clone();
    baseWithSlide.x += slideOffset;

    if (!b3d.playerTargetPos) targetPos = baseWithSlide;

    playerMesh.position.lerp(targetPos, 0.15);

    // Shake
    if (b3d.playerShake > 0.005) {
      playerMesh.position.x += (Math.random() - 0.5) * b3d.playerShake;
      playerMesh.position.z += (Math.random() - 0.5) * b3d.playerShake;
      b3d.playerShake *= 0.88;
    }

    // Flash
    if (b3d.playerFlash > 0.05) {
      flashMonsterWhite(playerMesh, b3d.playerFlash);
      b3d.playerFlash *= 0.88;
    } else if (b3d.playerFlash > 0) {
      flashMonsterWhite(playerMesh, 0);
      b3d.playerFlash = 0;
    }

    // Breathing idle
    const breathe = Math.sin(animT * 0.03) * 0.02;
    playerMesh.scale.y = 1 + breathe;
    playerMesh.rotation.y = Math.PI * 0.3 + Math.sin(animT * 0.015) * 0.03;
  }

  // Enemy position
  if (enemyMesh) {
    let targetPos = b3d.enemyTargetPos || b3d.enemyBasePos;
    const slideOffset = (1 - easeOut(b3d.enemySlideProgress)) * 6;
    const baseWithSlide = b3d.enemyBasePos.clone();
    baseWithSlide.x += slideOffset;

    if (!b3d.enemyTargetPos) targetPos = baseWithSlide;

    enemyMesh.position.lerp(targetPos, 0.15);

    // Death animation
    if (b3d.enemyDeathProgress > 0) {
      const d = b3d.enemyDeathProgress;
      enemyMesh.scale.set(1 - d * 0.7, 1 - d * 0.7, 1 - d * 0.7);
      enemyMesh.position.y = -d * 0.5;
      enemyMesh.rotation.y += 0.05 * d;
      enemyMesh.traverse(child => {
        if (child.isMesh && child.material && child.material.transparent !== undefined) {
          child.material.transparent = true;
          child.material.opacity = 1 - d;
        }
      });
    } else {
      // Shake
      if (b3d.enemyShake > 0.005) {
        enemyMesh.position.x += (Math.random() - 0.5) * b3d.enemyShake;
        enemyMesh.position.z += (Math.random() - 0.5) * b3d.enemyShake;
        b3d.enemyShake *= 0.88;
      }

      // Flash
      if (b3d.enemyFlash > 0.05) {
        flashMonsterWhite(enemyMesh, b3d.enemyFlash);
        b3d.enemyFlash *= 0.88;
      } else if (b3d.enemyFlash > 0) {
        flashMonsterWhite(enemyMesh, 0);
        b3d.enemyFlash = 0;
      }

      // Breathing idle
      const breathe = Math.sin(animT * 0.03 + 1) * 0.025;
      enemyMesh.scale.y = 1 + breathe;
      enemyMesh.rotation.y = -Math.PI * 0.3 + Math.sin(animT * 0.012 + 2) * 0.04;
    }
  }

  // Camera shake
  const camBase = new THREE.Vector3(-1, 3.5, 5.5);
  const camLookAt = new THREE.Vector3(0, 0.8, 0);
  if (b3d.cameraShake > 0.003) {
    camera3d.position.set(
      camBase.x + (Math.random() - 0.5) * b3d.cameraShake,
      camBase.y + (Math.random() - 0.5) * b3d.cameraShake * 0.5,
      camBase.z + (Math.random() - 0.5) * b3d.cameraShake,
    );
    b3d.cameraShake *= 0.9;
  } else {
    camera3d.position.lerp(camBase, 0.05);
  }
  camera3d.lookAt(camLookAt);

  // Update particles
  updateParticles3D();

  // Render
  renderer3d.render(scene3d, camera3d);
}

function reset3DBattle() {
  b3d.playerShake = 0;
  b3d.enemyShake = 0;
  b3d.playerFlash = 0;
  b3d.enemyFlash = 0;
  b3d.cameraShake = 0;
  b3d.playerTargetPos = null;
  b3d.enemyTargetPos = null;
  b3d.enemySlideProgress = 0;
  b3d.playerSlideProgress = 0;
  b3d.enemyDeathProgress = 0;
  b3d.originalMaterials.clear();
  battleParticles3d = [];
  impactLights = [];
}

function cleanup3DScene() {
  if (!scene3d) return;
  // Dispose all objects
  scene3d.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
      else obj.material.dispose();
    }
  });
  while (scene3d.children.length) scene3d.remove(scene3d.children[0]);
  playerMesh = null;
  enemyMesh = null;
  arenaLights = [];
  battleParticles3d = [];
  impactLights = [];
}

// Helper: project 3D position to screen coordinates for damage floats
function worldToScreen(worldPos) {
  if (!camera3d) return { x: W * 0.5, y: H * 0.5 };
  const v = worldPos.clone().project(camera3d);
  return {
    x: (v.x * 0.5 + 0.5) * W,
    y: (-v.y * 0.5 + 0.5) * H,
  };
}

// ---- SCENE ELEMENTS (seeded per zone) ----
let particles = [];
function genParticles(zone) {
  particles = [];
  for(let i=0;i<30;i++){
    particles.push({
      x: Math.random()*W, y: Math.random()*H*0.7,
      size: 1 + Math.random()*3,
      speed: 0.1 + Math.random()*0.4,
      drift: (Math.random()-0.5)*0.3,
      phase: Math.random()*Math.PI*2,
      type: zone==='cave'?'spark':(zone==='beach'?'sand':'leaf')
    });
  }
}
genParticles(currentZone);

// ---- SCENE DRAWING ----
function drawScene() {
  const b = BIOMES[currentZone];
  ctx.clearRect(0,0,W,H);

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0,0,0,H*0.65);
  b.sky.forEach((c,i) => skyGrad.addColorStop(i/(b.sky.length-1), c));
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,W,H);

  // Distant mountains/hills
  drawDistantTerrain(b);

  // Mid-ground terrain
  drawMidTerrain(b);

  // Ground
  const groundY = H * 0.72;
  const gGrad = ctx.createLinearGradient(0, groundY, 0, H);
  gGrad.addColorStop(0, b.ground || '#2a3a1a');
  gGrad.addColorStop(1, b.groundDark || '#1a2a0f');
  ctx.fillStyle = gGrad;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  // rolling ground
  for(let x=0; x<=W; x+=20){
    const undulation = Math.sin(x*0.015 + animT*0.005)*6 + Math.sin(x*0.008)*10;
    ctx.lineTo(x, groundY + undulation);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // ground texture
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = lighten(b.ground||'#2a3a1a', 0.1);
  ctx.lineWidth = 0.8;
  for(let i=0;i<20;i++){
    const gx = (i/20)*W + Math.sin(animT*0.01+i)*5;
    const gy = groundY + 10 + (i%3)*15;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.quadraticCurveTo(gx+8, gy-4, gx+16, gy+2);
    ctx.stroke();
  }
  ctx.restore();

  // Feature-specific drawing
  if(b.features==='beach') drawBeachFeatures(groundY);
  if(b.features==='cave') drawCaveFeatures(groundY);

  // Trees
  if(b.trees) b.trees.forEach(t => drawTree(t.x * W, groundY, t.s, b));

  // Foreground plants
  drawForegroundPlants(groundY, b);

  // Particles
  drawParticles();

  // Walking character
  if(gameState==='walking') drawWalker(groundY);

  // Enemy creature on 2D canvas during encounter (before 3D swap)
  if(gameState==='encounter' && enemyMonster) {
    drawCreatureOnScene(enemyMonster, W*0.65, groundY - 10, 0.55, false);
  }

  // Atmospheric overlay (vignette)
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(5,5,12,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,W,H);

  // Fog for deep woods
  if(currentZone==='deepwoods'){
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#88aa88';
    for(let i=0;i<5;i++){
      const fx = (i*W/4 + animT*0.15*(i%2?1:-1)) % (W+200) - 100;
      const fy = H*0.4 + Math.sin(animT*0.008+i)*20;
      ctx.beginPath();
      ctx.ellipse(fx, fy, 120+i*20, 30+i*5, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawDistantTerrain(b) {
  const baseY = H * 0.45;
  ctx.save();
  ctx.globalAlpha = 0.4;

  // Layer 1 — far mountains
  ctx.fillStyle = b.sky[2] || '#1a3030';
  ctx.beginPath();
  ctx.moveTo(0, baseY + 40);
  for(let x=0; x<=W; x+=3){
    const h = Math.sin(x*0.008)*35 + Math.sin(x*0.02)*15 + Math.sin(x*0.003+1)*25;
    ctx.lineTo(x, baseY - h + Math.sin(animT*0.003)*2);
  }
  ctx.lineTo(W, baseY+60); ctx.lineTo(0, baseY+60);
  ctx.closePath();
  ctx.fill();

  // Layer 2 — mid hills
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = darken(b.sky[2]||'#1a3030', 0.2);
  ctx.beginPath();
  ctx.moveTo(0, baseY + 60);
  for(let x=0; x<=W; x+=3){
    const h = Math.sin(x*0.012+2)*25 + Math.sin(x*0.025)*12;
    ctx.lineTo(x, baseY + 20 - h + Math.sin(animT*0.004+1)*1.5);
  }
  ctx.lineTo(W, baseY+80); ctx.lineTo(0, baseY+80);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawMidTerrain(b){
  const baseY = H * 0.62;
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = darken(b.ground||'#2a4a1a', 0.3);
  ctx.beginPath();
  ctx.moveTo(0, baseY);
  for(let x=0; x<=W; x+=4){
    const h = Math.sin(x*0.01+0.5)*18 + Math.sin(x*0.03)*8;
    ctx.lineTo(x, baseY - h);
  }
  ctx.lineTo(W, baseY+30); ctx.lineTo(0, baseY+30);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawTree(x, groundY, scale, b) {
  const s = 30 * scale;
  const ty = groundY - 5;

  // trunk
  ctx.fillStyle = '#3a2818';
  ctx.strokeStyle = '#2a1a0c';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - s*0.08, ty);
  ctx.lineTo(x - s*0.06, ty - s*1.2);
  ctx.lineTo(x + s*0.06, ty - s*1.3);
  ctx.lineTo(x + s*0.1, ty);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // canopy layers
  const greens = currentZone==='deepwoods'
    ? ['#1a3818','#1e4420','#1a3015']
    : ['#2a5a22','#3a7a2e','#286828'];
  const sway = Math.sin(animT*0.02 + x*0.1) * 2;

  for(let i=0;i<3;i++){
    ctx.fillStyle = greens[i];
    ctx.beginPath();
    const cy = ty - s*(0.8 + i*0.35);
    const cr = s*(0.45 - i*0.08);
    const cx2 = x + sway*(1+i*0.3) + (i-1)*s*0.15;
    ctx.arc(cx2, cy, cr, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawBeachFeatures(groundY) {
  // water
  const waterY = groundY + 15;
  ctx.save();
  ctx.fillStyle = '#1a5566';
  ctx.fillRect(0, waterY, W, H - waterY);

  // waves
  ctx.strokeStyle = '#88bbcc';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.3;
  for(let w=0;w<3;w++){
    ctx.beginPath();
    const wy = waterY + w*12;
    for(let x=0;x<=W;x+=5){
      const wave = Math.sin(x*0.03 + animT*0.03 + w)*4;
      if(x===0) ctx.moveTo(x, wy+wave);
      else ctx.lineTo(x, wy+wave);
    }
    ctx.stroke();
  }

  // foam line
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#ccddee';
  ctx.beginPath();
  for(let x=0;x<=W;x+=3){
    const foamY = waterY - 2 + Math.sin(x*0.04+animT*0.02)*3;
    if(x===0)ctx.moveTo(x,foamY);else ctx.lineTo(x,foamY);
  }
  ctx.lineTo(W,waterY+5);ctx.lineTo(0,waterY+5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();

  // shells
  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#d4c4a8';
  const shells = [0.15,0.35,0.55,0.8];
  shells.forEach(sx => {
    ctx.beginPath();
    ctx.arc(sx*W, groundY+6, 3, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.restore();
}

function drawCaveFeatures(groundY) {
  // stalactites from top
  ctx.fillStyle = '#1e1e28';
  for(let i=0;i<8;i++){
    const sx = (i/8)*W + 20;
    const sl = 30 + Math.sin(i*2.5)*20;
    ctx.beginPath();
    ctx.moveTo(sx-8, 0);
    ctx.lineTo(sx, sl);
    ctx.lineTo(sx+8, 0);
    ctx.closePath();
    ctx.fill();
  }

  // stalagmites from ground
  ctx.fillStyle = '#222230';
  for(let i=0;i<6;i++){
    const sx = (i/6)*W + 40;
    const sl = 15 + Math.sin(i*3)*10;
    ctx.beginPath();
    ctx.moveTo(sx-6, groundY);
    ctx.lineTo(sx, groundY-sl);
    ctx.lineTo(sx+6, groundY);
    ctx.closePath();
    ctx.fill();
  }

  // glowing crystals
  ctx.save();
  for(let i=0;i<4;i++){
    const cx = W*(0.15+i*0.25);
    const cy = groundY - 8 - i*5;
    const glow = 0.3 + Math.sin(animT*0.04+i*2)*0.15;
    const hue = 200 + i*40;
    ctx.fillStyle = `hsla(${hue},70%,60%,${glow})`;
    ctx.beginPath();
    ctx.moveTo(cx, cy); ctx.lineTo(cx+5, cy+12); ctx.lineTo(cx-5, cy+12);
    ctx.closePath();
    ctx.fill();
    // glow
    const g = ctx.createRadialGradient(cx,cy+4,0,cx,cy+4,20);
    g.addColorStop(0,`hsla(${hue},70%,60%,${glow*0.3})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(cx,cy+4,20,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawForegroundPlants(groundY, b) {
  if(currentZone==='cave') return;
  ctx.save();
  ctx.globalAlpha = 0.6;
  // grass blades
  const grassColor = currentZone==='beach' ? '#6a8a4a' : (currentZone==='deepwoods' ? '#1a3a18' : '#3a6a28');
  ctx.strokeStyle = grassColor;
  ctx.lineWidth = 1.5;
  for(let i=0;i<25;i++){
    const gx = (i/25)*W;
    const gy = groundY + Math.sin(i*1.3)*3;
    const sway = Math.sin(animT*0.025+i*0.7)*3;
    const gh = 8 + (i%4)*5;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.quadraticCurveTo(gx+sway, gy-gh*0.6, gx+sway*1.5, gy-gh);
    ctx.stroke();
  }
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p => {
    p.x += p.drift + Math.sin(animT*0.01+p.phase)*0.3;
    p.y += p.speed;
    if(p.y > H*0.85) { p.y = -5; p.x = Math.random()*W; }
    if(p.x < -10) p.x = W+10;
    if(p.x > W+10) p.x = -10;

    ctx.save();
    if(p.type==='leaf'){
      ctx.fillStyle = '#4a8a2a';
      ctx.globalAlpha = 0.3 + Math.sin(animT*0.03+p.phase)*0.1;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size*1.5, p.size*0.7, animT*0.02+p.phase, 0, Math.PI*2);
      ctx.fill();
    } else if(p.type==='spark'){
      ctx.fillStyle = `hsla(${200+p.phase*30},70%,70%,${0.4+Math.sin(animT*0.05+p.phase)*0.2})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*0.6, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#c8b88a';
      ctx.globalAlpha = 0.2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*0.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}

function drawWalker(groundY) {
  const wx = W * 0.3 + walkProgress * W * 0.1;
  const wy = groundY - 18;
  const bobY = Math.sin(animT * 0.15) * 2;
  const stepAnim = animT * 0.15;

  ctx.save();
  ctx.translate(wx, wy + bobY);

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 18, 10, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // legs
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  const legSwing = Math.sin(stepAnim) * 6;
  ctx.beginPath(); ctx.moveTo(-3, 5); ctx.lineTo(-3+legSwing, 16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3, 5); ctx.lineTo(3-legSwing, 16); ctx.stroke();

  // body
  ctx.fillStyle = '#3a3a5a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 9, 0, 0, Math.PI*2);
  ctx.fill();

  // head
  ctx.fillStyle = '#d4b896';
  ctx.beginPath();
  ctx.arc(0, -12, 6, 0, Math.PI*2);
  ctx.fill();

  // cloak
  ctx.fillStyle = '#8b2020';
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(-7, -4);
  ctx.quadraticCurveTo(-9, 8, -5-legSwing*0.3, 14);
  ctx.lineTo(5+legSwing*0.3, 14);
  ctx.quadraticCurveTo(9, 8, 7, -4);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ---- CREATURE DRAWING (simplified for scene) ----
function drawCreatureOnScene(r, cx, cy, scale, flipped) {
  ctx.save();
  ctx.translate(cx, cy);
  if(flipped) ctx.scale(-1, 1);
  ctx.scale(scale, scale);

  const S = 40 * (r.body?.size || 0.9);
  const col = r.colors;
  const breathe = Math.sin(animT*0.04)*1.5;
  const bx=0, by=0;

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(bx, by+S*1.5+5, S*2, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // tail
  drawTailSimple(bx,by,S,r,col);

  // wings behind
  if(r.wings?.style && r.wings.style!=='none') drawWingSimple(bx,by,S,r,col,-1);

  // back legs
  if((r.legs?.count||0)>=4){
    drawLegSimple(bx+S*0.6,by+S*0.5,S,r,col,1,true);
    drawLegSimple(bx-S*0.3,by+S*0.5,S,r,col,-1,true);
  }

  // body
  ctx.fillStyle=col.skin; ctx.strokeStyle=col.dark; ctx.lineWidth=2;
  const bulk=r.body?.bulk||1;
  ctx.beginPath();
  ctx.moveTo(bx-S*0.9,by-S*0.2);
  ctx.bezierCurveTo(bx-S*1,by-S*0.8*bulk,bx+S*0.3,by-S*bulk,bx+S*0.7,by-S*0.5*bulk);
  ctx.bezierCurveTo(bx+S*1.2,by-S*0.2,bx+S*1.2,by+S*0.6,bx+S*0.8,by+S*0.8);
  ctx.bezierCurveTo(bx+S*0.3,by+S*1.1,bx-S*0.5,by+S*1,bx-S*0.9,by+S*0.6);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // belly
  ctx.fillStyle=lighten(col.skin,0.2);
  ctx.beginPath();
  ctx.moveTo(bx-S*0.4,by+S*0.15);
  ctx.bezierCurveTo(bx-S*0.3,by+S*0.6,bx+S*0.4,by+S*0.7,bx+S*0.5,by+S*0.15);
  ctx.bezierCurveTo(bx+S*0.2,by+S*0.4,bx-S*0.1,by+S*0.4,bx-S*0.4,by+S*0.15);
  ctx.fill();

  // spines
  if(r.spines){
    ctx.fillStyle=col.pri; ctx.strokeStyle=col.dark; ctx.lineWidth=1;
    for(let i=0;i<6;i++){
      const t=i/5;
      const sx2=bx-S*0.6+t*S*1.4;
      const sy2=by-S*0.3-Math.sin(t*Math.PI)*S*0.5*bulk;
      const sh=S*(0.15+Math.sin(t*Math.PI)*0.2);
      ctx.beginPath();
      ctx.moveTo(sx2-S*0.03,sy2);ctx.lineTo(sx2,sy2-sh);ctx.lineTo(sx2+S*0.03,sy2);
      ctx.closePath();ctx.fill();ctx.stroke();
    }
  }

  // front legs
  if((r.legs?.count||0)>=2){
    drawLegSimple(bx+S*0.8,by+S*0.4,S,r,col,1,false);
    drawLegSimple(bx-S*0.5,by+S*0.4,S,r,col,-1,false);
  }

  // neck + head
  const neckLen=S*(r.neck?.length||0.5)*1.5;
  const neckAngle=-Math.PI*0.35-breathe*0.005;
  const headX2=bx-S*0.4+Math.cos(neckAngle)*neckLen;
  const headY2=by-S*0.3+Math.sin(neckAngle)*neckLen+breathe;

  // neck
  const thick=S*(r.neck?.thick||0.3);
  ctx.fillStyle=col.skin; ctx.strokeStyle=col.dark; ctx.lineWidth=2;
  const dx=headX2-(bx-S*0.4), dy=headY2-(by-S*0.3);
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len, ny=dx/len;
  ctx.beginPath();
  ctx.moveTo(bx-S*0.4+nx*thick, by-S*0.3+ny*thick);
  ctx.quadraticCurveTo((bx-S*0.4+headX2)/2+nx*thick*1.1,(by-S*0.3+headY2)/2+ny*thick*1.1, headX2+nx*thick*0.6,headY2+ny*thick*0.6);
  ctx.lineTo(headX2-nx*thick*0.6,headY2-ny*thick*0.6);
  ctx.quadraticCurveTo((bx-S*0.4+headX2)/2-nx*thick*0.8,(by-S*0.3+headY2)/2-ny*thick*0.8, bx-S*0.4-nx*thick,by-S*0.3-ny*thick);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // head
  ctx.save();
  ctx.translate(headX2,headY2);
  ctx.rotate(neckAngle+Math.PI*0.1);
  const hs=S*(r.head?.size||0.9);

  // horns
  if(r.horns?.style && r.horns.style!=='none'){
    ctx.fillStyle=darken(col.skin,0.3);ctx.strokeStyle=col.dark;ctx.lineWidth=1.5;
    const hornS=hs*(r.horns.size||0.7);
    ctx.beginPath();
    ctx.moveTo(-hs*0.05,-hs*0.35);
    ctx.quadraticCurveTo(-hornS*0.5,-hornS*1.3,-hornS*0.9,-hornS*0.5);
    ctx.quadraticCurveTo(-hornS*0.4,-hornS*0.9,hs*0.05,-hs*0.3);
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(hs*0.05,-hs*0.4);
    ctx.quadraticCurveTo(-hornS*0.3,-hornS*1.5,-hornS*0.7,-hornS*0.8);
    ctx.quadraticCurveTo(-hornS*0.2,-hornS*1.1,hs*0.15,-hs*0.35);
    ctx.closePath();ctx.fill();ctx.stroke();
  }

  // skull
  ctx.fillStyle=col.skin;ctx.strokeStyle=col.dark;ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(-hs*0.3,-hs*0.5);
  ctx.bezierCurveTo(-hs*0.1,-hs*0.7,hs*0.5,-hs*0.6,hs*1.1,-hs*0.25);
  ctx.bezierCurveTo(hs*1.3,-hs*0.1,hs*1.3,hs*0.15,hs*1.1,hs*0.25);
  ctx.bezierCurveTo(hs*0.5,hs*0.5,-hs*0.1,hs*0.5,-hs*0.3,hs*0.4);
  ctx.closePath();ctx.fill();ctx.stroke();

  // eye
  const eyeX2=hs*0.35,eyeY2=-hs*0.2;
  ctx.fillStyle=col.dark;ctx.globalAlpha=0.3;
  ctx.beginPath();ctx.ellipse(eyeX2,eyeY2,hs*0.24,hs*0.19,-0.1,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle=r.eyeGlow?col.hi:'#ddddaa';
  ctx.beginPath();ctx.ellipse(eyeX2,eyeY2,hs*0.18,hs*0.12,-0.1,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=col.dark;ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(eyeX2+hs*0.02,eyeY2,hs*0.04,hs*0.1,0,0,Math.PI*2);ctx.fill();
  if(r.eyeGlow){
    const eg=ctx.createRadialGradient(eyeX2,eyeY2,0,eyeX2,eyeY2,hs*0.4);
    eg.addColorStop(0,col.hi+'44');eg.addColorStop(1,'transparent');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(eyeX2,eyeY2,hs*0.4,0,Math.PI*2);ctx.fill();
  }

  // fangs
  if(r.fangs){
    ctx.fillStyle='#eee8dd';ctx.strokeStyle=col.dark;ctx.lineWidth=1;
    [0.3,0.5,0.7].forEach(t=>{
      const tx2=hs*t, ts=t===0.5?hs*0.15:hs*0.1;
      ctx.beginPath();ctx.moveTo(tx2-hs*0.025,hs*0.18);
      ctx.lineTo(tx2,hs*0.18+ts);ctx.lineTo(tx2+hs*0.025,hs*0.18);
      ctx.closePath();ctx.fill();ctx.stroke();
    });
  }

  // jaw
  ctx.strokeStyle=col.dark;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(hs*0.05,hs*0.2);
  ctx.bezierCurveTo(hs*0.3,hs*0.32,hs*0.7,hs*0.3,hs*1,hs*0.15);
  ctx.stroke();

  ctx.restore(); // head transform

  // front wing
  if(r.wings?.style && r.wings.style!=='none') drawWingSimple(bx,by,S,r,col,1);

  ctx.restore(); // main transform
}

function drawLegSimple(lx,ly,S,r,col,dir,back){
  ctx.save();
  ctx.fillStyle=back?darken(col.skin,0.15):col.skin;
  ctx.strokeStyle=col.dark;ctx.lineWidth=2;
  const legLen=S*0.8, thick=S*0.18;
  const kneeX=lx+dir*S*0.08, kneeY=ly+legLen*0.5;
  const footX=kneeX+dir*S*0.12, footY=ly+legLen;
  ctx.beginPath();
  ctx.moveTo(lx-thick*0.6,ly);
  ctx.quadraticCurveTo(lx+dir*thick,ly+legLen*0.25,kneeX+thick*0.4,kneeY);
  ctx.lineTo(kneeX-thick*0.4,kneeY);
  ctx.quadraticCurveTo(lx-dir*thick*0.2,ly+legLen*0.25,lx+thick*0.25,ly);
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(kneeX-thick*0.25,kneeY);
  ctx.lineTo(footX-thick*0.15,footY);ctx.lineTo(footX+thick*0.15,footY);
  ctx.lineTo(kneeX+thick*0.25,kneeY);
  ctx.closePath();ctx.fill();ctx.stroke();
  // claws
  ctx.fillStyle=darken(col.skin,0.2);
  for(let c=0;c<3;c++){
    const cx2=footX+(c-1)*S*0.06;
    ctx.beginPath();ctx.moveTo(cx2-2,footY);ctx.lineTo(cx2+dir*3,footY+S*0.08);ctx.lineTo(cx2+2,footY);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

function drawWingSimple(bx,by,S,r,col,side){
  ctx.save();
  const span=S*(r.wings?.span||1)*1.8;
  const wx=bx+side*S*0.3, wy=by-S*0.4;
  const elbowX=wx+side*span*0.4, elbowY=wy-span*0.4;
  const tipX=wx+side*span*0.8, tipY=wy-span*0.2;
  const f1X=tipX+side*span*0.12, f1Y=tipY+span*0.25;
  const f2X=tipX+side*span*0.04, f2Y=tipY+span*0.45;

  ctx.fillStyle=col.pri+'55';ctx.strokeStyle=col.dark;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(wx,wy);
  ctx.quadraticCurveTo(elbowX*0.8+wx*0.2,elbowY,elbowX,elbowY);
  ctx.lineTo(tipX,tipY);ctx.lineTo(f1X,f1Y);ctx.lineTo(f2X,f2Y);
  ctx.quadraticCurveTo(wx+side*span*0.15,by+S*0.2,wx,by+S*0.15);
  ctx.closePath();ctx.fill();ctx.stroke();

  ctx.strokeStyle=col.skin;ctx.lineWidth=S*0.1;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(elbowX,elbowY);ctx.lineTo(tipX,tipY);ctx.stroke();
  ctx.strokeStyle=col.dark;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(elbowX,elbowY);ctx.lineTo(tipX,tipY);ctx.stroke();
  ctx.restore();
}

function drawTailSimple(bx,by,S,r,col){
  ctx.save();
  const len=S*(r.tail?.length||1)*1.8;
  const thick=S*(r.tail?.thick||0.25);
  const tx=bx+S*0.7,ty=by+S*0.3;
  const endX=tx+len,endY=ty+len*0.15;

  ctx.fillStyle=col.skin;ctx.strokeStyle=col.dark;ctx.lineWidth=1.5;
  const steps=16;
  ctx.beginPath();
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const x=lerp(tx,endX,t)+Math.sin(t*Math.PI)*len*0.15;
    const y=lerp(ty,endY,t)+Math.sin(t*Math.PI*2)*len*0.08;
    const w=thick*(1-t*0.85);
    if(i===0)ctx.moveTo(x,y-w);else ctx.lineTo(x,y-w);
  }
  for(let i=steps;i>=0;i--){
    const t=i/steps;
    const x=lerp(tx,endX,t)+Math.sin(t*Math.PI)*len*0.15;
    const y=lerp(ty,endY,t)+Math.sin(t*Math.PI*2)*len*0.08;
    const w=thick*(1-t*0.85);
    ctx.lineTo(x,y+w);
  }
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.restore();
}

};
const NAME_PRE=['Ignath','Veyrak','Drak','Thorn','Skael','Orm','Gor','Ven','Xar','Kael','Malth','Zeph','Nyx','Ash','Cryx','Fen','Krag','Pyrr','Rax','Draug'];
const NAME_SUF=['thor','gon','ax','rok','ith','vex','claw','maw','fang','bane','fury','storm','wyrm','drake','rend','bite','horn','rage','talon','doom'];

function generateEnemy(){
  const types=ZONE_TYPES[currentZone]||['earth'];
  const type=pick(types);
  const col=TYPE_COLORS[type];
  const level=rng(3,12);
  return {
    name:pick(NAME_PRE)+pick(NAME_SUF),
    type, level,
    archetype:pick(['dragon','wyvern','beast','raptor','demon']),
    colors:col,
    head:{shape:pick(['dragon','wolf','raptor','horned','flat']),size:0.8+Math.random()*0.4},
    neck:{length:0.4+Math.random()*0.6,thick:0.3+Math.random()*0.2},
    body:{size:0.8+Math.random()*0.5,bulk:0.8+Math.random()*0.4},
    legs:{count:pick([0,2,4]),style:pick(['digitigrade','plantigrade']),clawSize:0.5+Math.random()*0.6},
    wings:{style:Math.random()>0.4?pick(['bat','feathered','skeletal']):'none',span:0.8+Math.random()*0.8,membrane:true},
    tail:{style:pick(['spiked','bladed','whip','club','flame','barbed']),length:0.8+Math.random()*1,thick:0.2+Math.random()*0.2},
    horns:{style:Math.random()>0.4?pick(['curved','straight','ram','crown']):'none',size:0.5+Math.random()*0.8},
    armor:pick(['scales','plates','smooth','rocky','fur']),
    spines:Math.random()>0.4, fangs:Math.random()>0.3, eyeGlow:Math.random()>0.3,
    breathEffect:false, scarred:Math.random()>0.7,
    stats:{hp:40+level*5, atk:15+level*3, def:10+level*2, spd:15+level*2},
    currentHP: 40+level*5,
    moves:pickN(MOVE_NAMES[type],4).map(n=>({name:n,damage:rng(12,35+level*2),type}))
  };
}

// ---- GAME LOGIC ----
const exploreBtn = document.getElementById('exploreBtn');
const exploreStatus = document.getElementById('exploreStatus');
const flash = document.getElementById('flash');
const zoneBadge = document.getElementById('zoneBadge');
const exploreUI = document.getElementById('exploreUI');
const battleUI = document.getElementById('battleUI');
const resultOverlay = document.getElementById('resultOverlay');

// Zone switching
document.querySelectorAll('.zone-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    if(gameState!=='explore') return;
    document.querySelector('.zone-pill.active').classList.remove('active');
    pill.classList.add('active');
    currentZone = pill.dataset.zone;
    zoneBadge.textContent = 'Verdantia — ' + BIOMES[currentZone].label;
    genParticles(currentZone);
  });
});

// Explore button
exploreBtn.addEventListener('click', startExplore);
exploreBtn.addEventListener('touchend', e => { e.preventDefault(); startExplore(); });

function startExplore() {
  if(gameState !== 'explore') return;
  gameState = 'walking';
  walkProgress = 0;
  exploreBtn.classList.add('walking');
  exploreBtn.textContent = 'Exploring...';

  const steps = ['Searching the area...', 'You hear rustling...', 'Something is near...'];
  let stepIdx = 0;
  exploreStatus.textContent = steps[0];

  encounterTimer = setInterval(() => {
    stepIdx++;
    if(stepIdx < steps.length) {
      exploreStatus.textContent = steps[stepIdx];
    }
  }, 900);

  setTimeout(() => {
    clearInterval(encounterTimer);
    triggerEncounter();
  }, 2500 + Math.random() * 1000);
}

function triggerEncounter() {
  gameState = 'encounter';
  enemyMonster = generateEnemy();

  // flash
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 150);

  // shake
  sceneCanvas.parentElement.classList.add('shake');
  setTimeout(() => sceneCanvas.parentElement.classList.remove('shake'), 300);

  exploreStatus.textContent = 'A wild ' + enemyMonster.name + ' appeared!';

  setTimeout(() => startBattle(), 800);
}

function startBattle() {
  gameState = 'battle';
  battleBusy = false;
  battleTurn = 'player';
  playerMonster.currentHP = playerMonster.stats.hp; // heal for demo

  // Init 3D
  init3DRenderer();
  resize3D();
  reset3DBattle();
  buildBattleArena(currentZone);

  // Build 3D monsters
  playerMesh = buildMonsterMesh(playerMonster);
  playerMesh.position.copy(b3d.playerBasePos).add(new THREE.Vector3(-6, 0, 0));
  playerMesh.rotation.y = Math.PI * 0.3;
  scene3d.add(playerMesh);

  enemyMesh = buildMonsterMesh(enemyMonster);
  enemyMesh.position.copy(b3d.enemyBasePos).add(new THREE.Vector3(6, 0, 0));
  enemyMesh.rotation.y = -Math.PI * 0.3;
  scene3d.add(enemyMesh);

  // Type-colored rim lights on each monster
  const typeColors3d = {
    fire: 0xff4400, water: 0x2288cc, earth: 0x66aa33,
    electric: 0xddaa00, shadow: 0x8844cc, ice: 0x66bbdd, toxic: 0x88aa22,
  };
  const pLight = new THREE.PointLight(typeColors3d[playerMonster.type] || 0x66aa33, 0.4, 4);
  pLight.position.copy(b3d.playerBasePos).add(new THREE.Vector3(0, 1.5, 0));
  scene3d.add(pLight);
  const eLight = new THREE.PointLight(typeColors3d[enemyMonster.type] || 0xff4400, 0.4, 4);
  eLight.position.copy(b3d.enemyBasePos).add(new THREE.Vector3(0, 1.5, 0));
  scene3d.add(eLight);

  // Swap canvases: show 3D, hide 2D
  sceneCanvas.style.display = 'none';
  scene3dCanvas.style.display = 'block';

  // switch UI
  document.body.classList.add('in-battle');
  exploreUI.style.display = 'none';
  document.getElementById('zones').style.display = 'none';
  document.getElementById('hpOverlay').classList.add('active');
  battleUI.classList.add('active');

  updateBattleUI();
  renderMoves();

  document.getElementById('battleLog').textContent = 'What will you do?';
  document.getElementById('battleLog').className = 'battle-log';
}

function updateBattleUI(){
  // Enemy
  document.getElementById('enemyName').textContent = enemyMonster.name;
  document.getElementById('enemyLv').textContent = 'Lv' + enemyMonster.level;
  const ePct = Math.max(0, enemyMonster.currentHP / enemyMonster.stats.hp * 100);
  const eBar = document.getElementById('enemyBar');
  eBar.style.width = ePct + '%';
  eBar.style.background = ePct > 50 ? 'var(--hp-green)' : ePct > 20 ? 'var(--hp-yellow)' : 'var(--hp-red)';
  document.getElementById('enemyHPText').textContent = Math.max(0,enemyMonster.currentHP) + '/' + enemyMonster.stats.hp;

  // Player
  document.getElementById('playerName').textContent = playerMonster.name;
  document.getElementById('playerLv').textContent = 'Lv' + playerMonster.level;
  const pPct = Math.max(0, playerMonster.currentHP / playerMonster.stats.hp * 100);
  const pBar = document.getElementById('playerBar');
  pBar.style.width = pPct + '%';
  pBar.style.background = pPct > 50 ? 'var(--hp-green)' : pPct > 20 ? 'var(--hp-yellow)' : 'var(--hp-red)';
  document.getElementById('playerHPText').textContent = Math.max(0,playerMonster.currentHP) + '/' + playerMonster.stats.hp;
}

function renderMoves(){
  const grid = document.getElementById('movesGrid');
  grid.innerHTML = '';
  playerMonster.moves.forEach((move, i) => {
    const btn = document.createElement('button');
    btn.className = 'move-btn type-' + move.type;
    btn.innerHTML = `<span class="mv-name">${move.name}</span><span class="mv-dmg">${move.damage} DMG</span>`;
    btn.addEventListener('click', () => playerAttack(i));
    btn.addEventListener('touchend', e => { e.preventDefault(); playerAttack(i); });
    grid.appendChild(btn);
  });
}

function playerAttack(moveIdx) {
  if(battleBusy || gameState !== 'battle') return;
  battleBusy = true;
  const move = playerMonster.moves[moveIdx];

  // calc damage
  const baseDmg = move.damage;
  const atkMod = playerMonster.stats.atk / 50;
  const defMod = enemyMonster.stats.def / 100;
  const variance = 0.85 + Math.random() * 0.3;
  const dmg = Math.max(1, Math.floor(baseDmg * atkMod * (1 - defMod * 0.5) * variance));

  // trigger 3D attack animation
  triggerAttackAnim3D('player', move.type);

  enemyMonster.currentHP -= dmg;
  updateBattleUI();

  // damage float projected from 3D
  const eDmgPos = worldToScreen(b3d.enemyBasePos.clone().add(new THREE.Vector3(0, 1.5, 0)));
  showDmgFloat(dmg, eDmgPos.x, eDmgPos.y);

  const log = document.getElementById('battleLog');
  log.textContent = `${playerMonster.name} used ${move.name}! -${dmg} HP`;
  log.className = 'hit';

  if(enemyMonster.currentHP <= 0) {
    // 3D death animation
    const deathInterval = setInterval(() => {
      b3d.enemyDeathProgress += 0.03;
      if(b3d.enemyDeathProgress >= 1) {
        clearInterval(deathInterval);
        b3d.enemyDeathProgress = 1;
      }
    }, 30);
    setTimeout(() => endBattle('victory'), 1000);
    return;
  }

  // enemy turn
  setTimeout(() => {
    const eMove = pick(enemyMonster.moves);
    const eAtkMod = enemyMonster.stats.atk / 50;
    const eDefMod = playerMonster.stats.def / 100;
    const eVar = 0.85 + Math.random() * 0.3;
    const eDmg = Math.max(1, Math.floor(eMove.damage * eAtkMod * (1 - eDefMod * 0.5) * eVar));

    triggerAttackAnim3D('enemy', eMove.type);

    playerMonster.currentHP -= eDmg;
    updateBattleUI();

    const pDmgPos = worldToScreen(b3d.playerBasePos.clone().add(new THREE.Vector3(0, 1.2, 0)));
    showDmgFloat(eDmg, pDmgPos.x, pDmgPos.y);

    log.textContent = `${enemyMonster.name} used ${eMove.name}! -${eDmg} HP`;

    if(playerMonster.currentHP <= 0) {
      setTimeout(() => endBattle('defeat'), 600);
      return;
    }

    battleBusy = false;
  }, 700);
}

function showDmgFloat(dmg, x, y) {
  const el = document.createElement('div');
  el.className = 'dmg-float';
  el.textContent = '-' + dmg;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.getElementById('sceneWrap').appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function runFromBattle() {
  if(battleBusy) return;
  const log = document.getElementById('battleLog');
  if(Math.random() > 0.4) {
    endBattle('fled');
  } else {
    log.textContent = 'Failed to escape!';
    battleBusy = true;
    setTimeout(() => {
      const eMove = pick(enemyMonster.moves);
      const eDmg = Math.max(1, Math.floor(eMove.damage * (enemyMonster.stats.atk/50) * (1 - playerMonster.stats.def/200) * (0.85+Math.random()*0.3)));
      triggerAttackAnim3D('enemy', eMove.type);
      playerMonster.currentHP -= eDmg;
      updateBattleUI();
      const pPos = worldToScreen(b3d.playerBasePos.clone().add(new THREE.Vector3(0, 1.2, 0)));
      showDmgFloat(eDmg, pPos.x, pPos.y);
      log.textContent = `${enemyMonster.name} attacks! -${eDmg} HP`;
      if(playerMonster.currentHP <= 0) {
        setTimeout(() => endBattle('defeat'), 600);
      } else {
        battleBusy = false;
      }
    }, 500);
  }
}

function endBattle(result) {
  const title = document.getElementById('resultTitle');
  const sub = document.getElementById('resultSub');

  if(result === 'victory') {
    const xp = enemyMonster.level * 8 + rng(5,15);
    title.textContent = 'Victory';
    title.style.color = 'var(--gold)';
    sub.textContent = `${enemyMonster.name} defeated! +${xp} XP`;
  } else if(result === 'defeat') {
    title.textContent = 'Defeated';
    title.style.color = 'var(--accent)';
    sub.textContent = `${playerMonster.name} has fainted...`;
  } else {
    title.textContent = 'Escaped';
    title.style.color = 'var(--text)';
    sub.textContent = 'Got away safely.';
  }

  resultOverlay.classList.add('active');
}

function dismissResult() {
  resultOverlay.classList.remove('active');
  battleUI.classList.remove('active');
  document.getElementById('hpOverlay').classList.remove('active');
  document.body.classList.remove('in-battle');
  document.getElementById('zones').style.display = '';
  exploreUI.style.display = '';
  exploreBtn.classList.remove('walking');
  exploreBtn.innerHTML = '<span class="shimmer"></span>Explore';
  exploreStatus.textContent = '';
  playerMonster.currentHP = playerMonster.stats.hp;

  // Swap back from 3D to 2D
  cleanup3DScene();
  scene3dCanvas.style.display = 'none';
  sceneCanvas.style.display = 'block';

  gameState = 'explore';
  enemyMonster = null;
}

// ---- MAIN LOOP ----
function loop() {
  animT++;
  if(gameState === 'walking') {
    walkProgress += 0.003;
  }
  if(gameState === 'battle' && renderer3d && scene3d && camera3d) {
    update3DBattle();
  } else {
    drawScene();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
