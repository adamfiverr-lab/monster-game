function spawnImpactEffect(x, y, type) {
  const colors = {
    fire: ['#ff6600','#ffcc00','#ff3300'],
    water: ['#3399ff','#66bbff','#ffffff'],
    earth: ['#88cc44','#ccaa55','#887744'],
    electric: ['#ffee00','#ffffff','#aaddff'],
    shadow: ['#aa66cc','#663399','#4411aa'],
    ice: ['#88ddff','#ffffff','#bbddff'],
    toxic: ['#99cc33','#ccff44','#667722']
  };
  const c = colors[type] || colors.earth;

  // slash lines
  for (let i = 0; i < 3; i++) {
    const angle = -0.5 + Math.random() * 1;
    battleAnim.impactEffects.push({
      x, y, type: 'slash', t: 0, maxT: 18,
      angle, len: 20 + Math.random() * 25,
      color: c[i % c.length]
    });
  }

  // burst particles
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    battleAnim.impactEffects.push({
      x, y, type: 'particle', t: 0, maxT: 22 + Math.random() * 10,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      size: 2 + Math.random() * 4,
      color: c[Math.floor(Math.random() * c.length)]
    });
  }

  // type-specific
  if (type === 'fire') {
    for (let i = 0; i < 6; i++) {
      battleAnim.impactEffects.push({
        x: x + (Math.random()-0.5)*30, y: y + (Math.random()-0.5)*20,
        type: 'flame', t: 0, maxT: 25,
        size: 8 + Math.random() * 12,
        color: i%2 ? '#ffcc00' : '#ff4400'
      });
    }
  } else if (type === 'electric') {
    for (let i = 0; i < 4; i++) {
      battleAnim.impactEffects.push({
        x, y, type: 'lightning', t: 0, maxT: 12,
        points: generateLightningBolt(x, y - 40, x + (Math.random()-0.5)*50, y + 20),
        color: '#ffee44'
      });
    }
  } else if (type === 'water') {
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      battleAnim.impactEffects.push({
        x, y, type: 'droplet', t: 0, maxT: 28,
        vx: Math.cos(angle) * (1+Math.random()*3),
        vy: Math.sin(angle) * 3 - 4,
        size: 3 + Math.random() * 4,
        color: c[Math.floor(Math.random()*c.length)]
      });
    }
  } else if (type === 'shadow') {
    battleAnim.impactEffects.push({
      x, y, type: 'voidCircle', t: 0, maxT: 30,
      size: 35, color: '#663399'
    });
  } else if (type === 'ice') {
    for (let i = 0; i < 5; i++) {
      battleAnim.impactEffects.push({
        x: x + (Math.random()-0.5)*40, y: y + (Math.random()-0.5)*30,
        type: 'crystal', t: 0, maxT: 30,
        size: 6 + Math.random() * 10,
        angle: Math.random() * Math.PI,
        color: c[i%c.length]
      });
    }
  }
}

function generateLightningBolt(x1, y1, x2, y2) {
  const pts = [{x:x1, y:y1}];
  const segments = 5;
  for (let i = 1; i < segments; i++) {
    const t = i / segments;
    pts.push({
      x: lerp(x1, x2, t) + (Math.random()-0.5) * 25,
      y: lerp(y1, y2, t) + (Math.random()-0.5) * 10
    });
  }
  pts.push({x:x2, y:y2});
  return pts;
}

function drawImpactEffects() {
  for (const e of battleAnim.impactEffects) {
    const progress = e.t / e.maxT;
    const alpha = 1 - progress;

    ctx.save();
    ctx.globalAlpha = alpha;

    switch (e.type) {
      case 'slash': {
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 3 * (1 - progress);
        ctx.lineCap = 'round';
        const ext = e.len * Math.min(1, e.t / 5);
        ctx.beginPath();
        ctx.moveTo(e.x - Math.cos(e.angle) * ext * 0.5, e.y - Math.sin(e.angle) * ext * 0.5);
        ctx.lineTo(e.x + Math.cos(e.angle) * ext * 0.5, e.y + Math.sin(e.angle) * ext * 0.5);
        ctx.stroke();
        break;
      }
      case 'particle': {
        e.x += e.vx; e.y += e.vy; e.vy += 0.15;
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size * (1 - progress * 0.5), 0, Math.PI * 2);
        ctx.fill();
        break;
      }
      case 'flame': {
        const s = e.size * (1 - progress * 0.7);
        const fy = e.y - e.t * 1.5;
        ctx.fillStyle = e.color;
        ctx.globalAlpha = alpha * 0.7;
        ctx.beginPath();
        ctx.moveTo(e.x, fy - s);
        ctx.quadraticCurveTo(e.x + s * 0.6, fy - s * 0.3, e.x + s * 0.3, fy + s * 0.5);
        ctx.quadraticCurveTo(e.x, fy + s * 0.2, e.x - s * 0.3, fy + s * 0.5);
        ctx.quadraticCurveTo(e.x - s * 0.6, fy - s * 0.3, e.x, fy - s);
        ctx.fill();
        break;
      }
      case 'lightning': {
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 2.5 * (1 - progress);
        ctx.shadowColor = e.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        e.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.stroke();
        ctx.shadowBlur = 0;
        break;
      }
      case 'droplet': {
        e.x += e.vx; e.y += e.vy; e.vy += 0.2;
        ctx.fillStyle = e.color;
        ctx.globalAlpha = alpha * 0.6;
        ctx.beginPath();
        ctx.ellipse(e.x, e.y, e.size * 0.6, e.size, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      }
      case 'voidCircle': {
        const r = e.size * progress;
        const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
        grad.addColorStop(0, e.color + '88');
        grad.addColorStop(0.6, e.color + '44');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
        ctx.fill();
        break;
      }
      case 'crystal': {
        const s = e.size * (1 - progress * 0.3);
        ctx.fillStyle = e.color;
        ctx.globalAlpha = alpha * 0.8;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.rotate(e.angle);
        ctx.beginPath();
        ctx.moveTo(0, -s); ctx.lineTo(s*0.35, 0); ctx.lineTo(0, s*0.6); ctx.lineTo(-s*0.35, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        break;
      }
    }
    ctx.restore();
  }
}

// ---- CATCH ANIMATION RENDERING ----
function drawCatchAnim() {
  const ca = battleAnim.catchAnim;
  if (!ca.active) return;

  ctx.save();

  // Crystal projectile
  if (ca.crystalAlpha > 0.01 && (ca.phase === 'throw' || ca.phase === 'impact' || ca.phase === 'contain' || ca.phase === 'wobble' || ca.phase === 'result')) {
    const cx = ca.crystalX, cy = ca.crystalY;
    ctx.save();
    ctx.globalAlpha = ca.crystalAlpha;

    // Crystal glow
    if (ca.phase !== 'throw') {
      const glowR = ca.phase === 'wobble' ? 18 + Math.sin(ca.t * 0.3) * 5 : 15 + ca.glowRadius * 0.3;
      ctx.save();
      ctx.globalAlpha = ca.crystalAlpha * 0.3;
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
      glow.addColorStop(0, 'rgba(170,100,255,0.8)');
      glow.addColorStop(0.5, 'rgba(130,60,220,0.3)');
      glow.addColorStop(1, 'rgba(100,40,200,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(cx, cy, glowR, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // Crystal body — diamond shape
    ctx.translate(cx, cy);
    const cRot = ca.phase === 'throw' ? ca.t * 0.15 : ca.phase === 'wobble' ? (ca.crystalX - ca.targetX) * 0.03 : 0;
    ctx.rotate(cRot);
    const cSize = ca.phase === 'throw' ? 8 : 10;

    // Outer diamond
    ctx.fillStyle = '#aa66ff';
    ctx.beginPath();
    ctx.moveTo(0, -cSize * 1.4); ctx.lineTo(cSize, 0);
    ctx.lineTo(0, cSize * 1.4); ctx.lineTo(-cSize, 0);
    ctx.closePath(); ctx.fill();

    // Inner facet highlight
    ctx.fillStyle = '#cc99ff';
    ctx.globalAlpha = ca.crystalAlpha * 0.7;
    ctx.beginPath();
    ctx.moveTo(0, -cSize * 0.9); ctx.lineTo(cSize * 0.5, 0);
    ctx.lineTo(0, cSize * 0.5); ctx.lineTo(-cSize * 0.5, -cSize * 0.2);
    ctx.closePath(); ctx.fill();

    // Bright point
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = ca.crystalAlpha * 0.8;
    ctx.beginPath(); ctx.arc(-cSize * 0.2, -cSize * 0.4, 2, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }

  // Energy containment rings
  if ((ca.phase === 'contain' || ca.phase === 'wobble') && ca.containScale > 0) {
    const tx = ca.targetX, ty = ca.targetY;
    ctx.save();
    ctx.globalAlpha = 0.5 + Math.sin(ca.t * 0.2) * 0.2;

    // Ring 1 — horizontal orbit
    const r1 = 40 * (1 - ca.containScale * 0.5);
    ctx.strokeStyle = '#aa66ff'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(tx, ty, r1, r1 * 0.3, ca.ringAngle, 0, Math.PI * 2);
    ctx.stroke();

    // Ring 2 — vertical orbit
    ctx.strokeStyle = '#6644cc'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(tx, ty, r1 * 0.3, r1, ca.ringAngle + Math.PI / 3, 0, Math.PI * 2);
    ctx.stroke();

    // Ring 3 — diagonal
    ctx.strokeStyle = '#cc88ff'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(tx, ty, r1 * 0.7, r1 * 0.5, -ca.ringAngle * 0.7, 0, Math.PI * 2);
    ctx.stroke();

    // Energy particles orbiting
    for (let i = 0; i < 6; i++) {
      const a = ca.ringAngle * 2 + i * Math.PI / 3;
      const orbitR = r1 * 0.8;
      const px = tx + Math.cos(a) * orbitR;
      const py = ty + Math.sin(a) * orbitR * 0.4;
      ctx.fillStyle = i % 2 === 0 ? '#cc88ff' : '#8855ee';
      ctx.globalAlpha = 0.6;
      ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  // Glow during impact
  if (ca.phase === 'impact' && ca.glowRadius > 0) {
    ctx.save();
    ctx.globalAlpha = 0.4 * (1 - ca.t / 15);
    const ig = ctx.createRadialGradient(ca.targetX, ca.targetY, 0, ca.targetX, ca.targetY, ca.glowRadius);
    ig.addColorStop(0, '#ffffff');
    ig.addColorStop(0.3, '#cc88ff');
    ig.addColorStop(1, 'rgba(170,100,255,0)');
    ctx.fillStyle = ig;
    ctx.beginPath(); ctx.arc(ca.targetX, ca.targetY, ca.glowRadius, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Success sparkles
  for (const s of ca.sparkles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - s.t / s.life);
    ctx.fillStyle = s.color;
    // Star shape
    ctx.translate(s.x, s.y);
    ctx.rotate(s.t * 0.1);
    const sz = s.size * (1 - s.t / s.life * 0.5);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
      const r = i % 2 === 0 ? sz : sz * 0.4;
      if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    for (let i = 5; i < 10; i++) {
      const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
      const r = i % 2 === 0 ? sz : sz * 0.4;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // Failure shards
  for (const s of ca.shards) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - s.t / s.life);
    ctx.fillStyle = s.color;
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    // Jagged shard shape
    const sz = s.size * (1 - s.t / s.life * 0.3);
    ctx.beginPath();
    ctx.moveTo(0, -sz); ctx.lineTo(sz * 0.4, -sz * 0.2);
    ctx.lineTo(sz * 0.3, sz * 0.5); ctx.lineTo(-sz * 0.3, sz * 0.3);
    ctx.lineTo(-sz * 0.5, -sz * 0.1);
    ctx.closePath(); ctx.fill();
    // Glow on shard
    ctx.globalAlpha *= 0.3;
    ctx.shadowColor = s.color; ctx.shadowBlur = 6;
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

// ---- SCENE DRAWING ----
function drawScene() {
  // Mode 7 3D map takes over entire canvas during expedition
  if (gameState === 'expedition' && map.tiles) {
    drawTopDownMap();
    return;
  }
  const b = BIOMES[currentZone];
  scrollOffset = 0;
  ctx.clearRect(0,0,W,H);

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0,0,0,H*0.65);
  b.sky.forEach((c,i) => skyGrad.addColorStop(i/(b.sky.length-1), c));
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,W,H);

  // Distant mountains/hills
  drawDistantTerrain(b);

  // Mid-ground terrain
  drawMidTerrain(b);

  // Ground
  const groundY = H * 0.72;
  const gGrad = ctx.createLinearGradient(0, groundY, 0, H);
  gGrad.addColorStop(0, b.ground || '#2a3a1a');
  gGrad.addColorStop(1, b.groundDark || '#1a2a0f');
  ctx.fillStyle = gGrad;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  // rolling ground
  for(let x=0; x<=W; x+=20){
    const undulation = Math.sin((x+scrollOffset*0.2)*0.015 + animT*0.005)*6 + Math.sin((x+scrollOffset*0.2)*0.008)*10;
    ctx.lineTo(x, groundY + undulation);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // ground texture
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = lighten(b.ground||'#2a3a1a', 0.1);
  ctx.lineWidth = 0.8;
  for(let i=0;i<20;i++){
    const gx = (i/20)*W + Math.sin(animT*0.01+i)*5;
    const gy = groundY + 10 + (i%3)*15;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.quadraticCurveTo(gx+8, gy-4, gx+16, gy+2);
    ctx.stroke();
  }
  ctx.restore();

  // Feature-specific drawing
  if(b.features==='beach') drawBeachFeatures(groundY);
  if(b.features==='cave') drawCaveFeatures(groundY);

  // Trees
  if(b.trees) b.trees.forEach(t => drawTree(t.x * W, groundY, t.s, b));

  // Foreground plants
  drawForegroundPlants(groundY, b);

  // Particles
  drawParticles();

  // Walking character
  if(gameState==='walking') drawWalker(groundY);

  // Battle creatures with 2.5D animations
  if(gameState==='battle' || gameState==='encounter') {
    // 2.5D battle arena ground plane
    if(gameState==='battle') {
      ctx.save();
      // perspective ground shadow/gradient
      const arenaY = groundY - 5;
      const arenaGrad = ctx.createLinearGradient(0, arenaY, 0, arenaY + 40);
      arenaGrad.addColorStop(0, 'rgba(0,0,0,0.15)');
      arenaGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = arenaGrad;
      ctx.beginPath();
      ctx.ellipse(W*0.5, arenaY + 5, W*0.55, 25, 0, 0, Math.PI*2);
      ctx.fill();
      // ground line
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(W*0.5, arenaY + 5, W*0.55, 25, 0, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();

      // camera zoom
      if(battleAnim.cameraZoom !== 1) {
        ctx.save();
        ctx.translate(W/2, H*0.5);
        ctx.scale(battleAnim.cameraZoom, battleAnim.cameraZoom);
        ctx.translate(-W/2, -H*0.5);
      }
    }

    // Enemy creature with animation offsets
    if(enemyMonster) {
      const eSlide = gameState==='encounter' ? 0.5 : Math.min(1, battleAnim.enemySlideIn);
      const eBaseX = W*0.65;
      const eBaseY = groundY - 10;
      const eOffX = (1 - eSlide) * W * 0.5; // slide in from right
      const eShakeX = battleAnim.enemyShake ? (Math.random()-0.5) * battleAnim.enemyShake : 0;
      const eShakeY = battleAnim.enemyShake ? (Math.random()-0.5) * battleAnim.enemyShake * 0.5 : 0;
      const eDeath = battleAnim.enemyDeath;
      const ca = battleAnim.catchAnim;
      const cScale = ca.active ? ca.enemyScale : 1;

      ctx.save();
      if(eDeath > 0) {
        ctx.globalAlpha = 1 - eDeath;
        ctx.translate(eBaseX + battleAnim.enemyX + eOffX + eShakeX, eBaseY + battleAnim.enemyY + eShakeY + eDeath * 20);
        ctx.scale(1 - eDeath * 0.5, 1 - eDeath * 0.5);
        ctx.translate(-(eBaseX + battleAnim.enemyX + eOffX + eShakeX), -(eBaseY + battleAnim.enemyY + eShakeY + eDeath * 20));
      } else if (cScale < 1) {
        // Catch containment shrink — scale toward crystal position
        const cx2 = ca.targetX || eBaseX;
        const cy2 = ca.targetY || eBaseY;
        ctx.translate(cx2, cy2);
        ctx.scale(cScale, cScale);
        ctx.translate(-cx2, -cy2);
        // Purple tint during containment
        if (ca.phase === 'contain' || ca.phase === 'wobble') {
          ctx.globalAlpha = 0.6 + cScale * 0.4;
        }
      }

      drawCreatureOnScene(enemyMonster,
        eBaseX + battleAnim.enemyX + eOffX + eShakeX,
        eBaseY + battleAnim.enemyY + eShakeY + (eDeath > 0 ? eDeath * 20 : 0),
        0.55, false);

      // white flash overlay on hit
      if(battleAnim.enemyFlash > 0.05) {
        ctx.globalAlpha = battleAnim.enemyFlash * 0.6;
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.ellipse(eBaseX + battleAnim.enemyX + eOffX, eBaseY - 15, 40, 50, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
      }
      ctx.restore();
    }

    // Player creature with animation offsets
    if(gameState==='battle') {
      const pSlide = Math.min(1, battleAnim.playerSlideIn);
      const pBaseX = W*0.2;
      const pBaseY = groundY + 5;
      const pOffX = (1 - pSlide) * -W * 0.4; // slide in from left
      const pShakeX = battleAnim.playerShake ? (Math.random()-0.5) * battleAnim.playerShake : 0;
      const pShakeY = battleAnim.playerShake ? (Math.random()-0.5) * battleAnim.playerShake * 0.5 : 0;

      ctx.save();
      drawCreatureOnScene(playerMonster,
        pBaseX + battleAnim.playerX + pOffX + pShakeX,
        pBaseY + battleAnim.playerY + pShakeY,
        getPlayerBattleScale(), true);

      // white flash overlay on hit
      if(battleAnim.playerFlash > 0.05) {
        ctx.globalAlpha = battleAnim.playerFlash * 0.6;
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.ellipse(pBaseX + battleAnim.playerX + pOffX, pBaseY - 10, 30, 40, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
      }
      ctx.restore();
    }

    // Draw impact effects on top of creatures
    drawImpactEffects();

    // Draw catch animation overlays
    drawCatchAnim();

    // restore camera zoom
    if(gameState==='battle' && battleAnim.cameraZoom !== 1) {
      ctx.restore();
    }
  }

  // Atmospheric overlay (vignette)
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(5,5,12,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,W,H);

  // Fog for deep woods
  if(currentZone==='deepwoods'){
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#88aa88';
    for(let i=0;i<5;i++){
      const fx = (i*W/4 + animT*0.15*(i%2?1:-1)) % (W+200) - 100;
      const fy = H*0.4 + Math.sin(animT*0.008+i)*20;
      ctx.beginPath();
      ctx.ellipse(fx, fy, 120+i*20, 30+i*5, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawDistantTerrain(b) {
  const baseY = H * 0.45;
  const s1 = scrollOffset * 0.05; // slow parallax for far layer
  const s2 = scrollOffset * 0.1;  // slightly faster for mid layer
  ctx.save();
  ctx.globalAlpha = 0.4;

  // Layer 1 — far mountains
  ctx.fillStyle = b.sky[2] || '#1a3030';
  ctx.beginPath();
  ctx.moveTo(0, baseY + 40);
  for(let x=0; x<=W; x+=3){
    const h = Math.sin((x+s1)*0.008)*35 + Math.sin((x+s1)*0.02)*15 + Math.sin((x+s1)*0.003+1)*25;
    ctx.lineTo(x, baseY - h + Math.sin(animT*0.003)*2);
  }
  ctx.lineTo(W, baseY+60); ctx.lineTo(0, baseY+60);
  ctx.closePath();
  ctx.fill();

  // Layer 2 — mid hills
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = darken(b.sky[2]||'#1a3030', 0.2);
  ctx.beginPath();
  ctx.moveTo(0, baseY + 60);
  for(let x=0; x<=W; x+=3){
    const h = Math.sin((x+s2)*0.012+2)*25 + Math.sin((x+s2)*0.025)*12;
    ctx.lineTo(x, baseY + 20 - h + Math.sin(animT*0.004+1)*1.5);
  }
  ctx.lineTo(W, baseY+80); ctx.lineTo(0, baseY+80);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawMidTerrain(b){
  const baseY = H * 0.62;
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = darken(b.ground||'#2a4a1a', 0.3);
  ctx.beginPath();
  ctx.moveTo(0, baseY);
  for(let x=0; x<=W; x+=4){
    const h = Math.sin(x*0.01+0.5)*18 + Math.sin(x*0.03)*8;
    ctx.lineTo(x, baseY - h);
  }
  ctx.lineTo(W, baseY+30); ctx.lineTo(0, baseY+30);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawTree(x, groundY, scale, b) {
  const s = 30 * scale;
  const ty = groundY - 5;

  // trunk
  ctx.fillStyle = '#3a2818';
  ctx.strokeStyle = '#2a1a0c';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - s*0.08, ty);
  ctx.lineTo(x - s*0.06, ty - s*1.2);
  ctx.lineTo(x + s*0.06, ty - s*1.3);
  ctx.lineTo(x + s*0.1, ty);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // canopy layers
  const greens = currentZone==='deepwoods'
    ? ['#1a3818','#1e4420','#1a3015']
    : ['#2a5a22','#3a7a2e','#286828'];
  const sway = Math.sin(animT*0.02 + x*0.1) * 2;

  for(let i=0;i<3;i++){
    ctx.fillStyle = greens[i];
    ctx.beginPath();
    const cy = ty - s*(0.8 + i*0.35);
    const cr = s*(0.45 - i*0.08);
    const cx2 = x + sway*(1+i*0.3) + (i-1)*s*0.15;
    ctx.arc(cx2, cy, cr, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawBeachFeatures(groundY) {
  // water
  const waterY = groundY + 15;
  ctx.save();
  ctx.fillStyle = '#1a5566';
  ctx.fillRect(0, waterY, W, H - waterY);

  // waves
  ctx.strokeStyle = '#88bbcc';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.3;
  for(let w=0;w<3;w++){
    ctx.beginPath();
    const wy = waterY + w*12;
    for(let x=0;x<=W;x+=5){
      const wave = Math.sin(x*0.03 + animT*0.03 + w)*4;
      if(x===0) ctx.moveTo(x, wy+wave);
      else ctx.lineTo(x, wy+wave);
    }
    ctx.stroke();
  }

  // foam line
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#ccddee';
  ctx.beginPath();
  for(let x=0;x<=W;x+=3){
    const foamY = waterY - 2 + Math.sin(x*0.04+animT*0.02)*3;
    if(x===0)ctx.moveTo(x,foamY);else ctx.lineTo(x,foamY);
  }
  ctx.lineTo(W,waterY+5);ctx.lineTo(0,waterY+5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();

  // shells
  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#d4c4a8';
  const shells = [0.15,0.35,0.55,0.8];
  shells.forEach(sx => {
    ctx.beginPath();
    ctx.arc(sx*W, groundY+6, 3, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.restore();
}

function drawCaveFeatures(groundY) {
  // stalactites from top
  ctx.fillStyle = '#1e1e28';
  for(let i=0;i<8;i++){
    const sx = (i/8)*W + 20;
    const sl = 30 + Math.sin(i*2.5)*20;
    ctx.beginPath();
    ctx.moveTo(sx-8, 0);
    ctx.lineTo(sx, sl);
    ctx.lineTo(sx+8, 0);
    ctx.closePath();
    ctx.fill();
  }

  // stalagmites from ground
  ctx.fillStyle = '#222230';
  for(let i=0;i<6;i++){
    const sx = (i/6)*W + 40;
    const sl = 15 + Math.sin(i*3)*10;
    ctx.beginPath();
    ctx.moveTo(sx-6, groundY);
    ctx.lineTo(sx, groundY-sl);
    ctx.lineTo(sx+6, groundY);
    ctx.closePath();
    ctx.fill();
  }

  // glowing crystals
  ctx.save();
  for(let i=0;i<4;i++){
    const cx = W*(0.15+i*0.25);
    const cy = groundY - 8 - i*5;
    const glow = 0.3 + Math.sin(animT*0.04+i*2)*0.15;
    const hue = 200 + i*40;
    ctx.fillStyle = `hsla(${hue},70%,60%,${glow})`;
    ctx.beginPath();
    ctx.moveTo(cx, cy); ctx.lineTo(cx+5, cy+12); ctx.lineTo(cx-5, cy+12);
    ctx.closePath();
    ctx.fill();
    // glow
    const g = ctx.createRadialGradient(cx,cy+4,0,cx,cy+4,20);
    g.addColorStop(0,`hsla(${hue},70%,60%,${glow*0.3})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(cx,cy+4,20,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawForegroundPlants(groundY, b) {
  if(currentZone==='cave') return;
  ctx.save();
  ctx.globalAlpha = 0.6;
  // grass blades
  const grassColor = currentZone==='beach' ? '#6a8a4a' : (currentZone==='deepwoods' ? '#1a3a18' : '#3a6a28');
  ctx.strokeStyle = grassColor;
  ctx.lineWidth = 1.5;
  for(let i=0;i<25;i++){
    const gx = (i/25)*W;
    const gy = groundY + Math.sin(i*1.3)*3;
    const sway = Math.sin(animT*0.025+i*0.7)*3;
    const gh = 8 + (i%4)*5;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.quadraticCurveTo(gx+sway, gy-gh*0.6, gx+sway*1.5, gy-gh);
    ctx.stroke();
  }
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p => {
    p.x += p.drift + Math.sin(animT*0.01+p.phase)*0.3;
    p.y += p.speed;
    if(p.y > H*0.85) { p.y = -5; p.x = Math.random()*W; }
    if(p.x < -10) p.x = W+10;
    if(p.x > W+10) p.x = -10;

    ctx.save();
    if(p.type==='leaf'){
      ctx.fillStyle = '#4a8a2a';
      ctx.globalAlpha = 0.3 + Math.sin(animT*0.03+p.phase)*0.1;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size*1.5, p.size*0.7, animT*0.02+p.phase, 0, Math.PI*2);
      ctx.fill();
    } else if(p.type==='spark'){
      ctx.fillStyle = `hsla(${200+p.phase*30},70%,70%,${0.4+Math.sin(animT*0.05+p.phase)*0.2})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*0.6, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#c8b88a';
      ctx.globalAlpha = 0.2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*0.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}

function drawWalker(groundY) {
  const wx = W * 0.3 + walkProgress * W * 0.1;
  const wy = groundY - 18;
  const bobY = Math.sin(animT * 0.15) * 2;
  const stepAnim = animT * 0.15;

  ctx.save();
  ctx.translate(wx, wy + bobY);

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 18, 10, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // legs
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  const legSwing = Math.sin(stepAnim) * 6;
  ctx.beginPath(); ctx.moveTo(-3, 5); ctx.lineTo(-3+legSwing, 16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3, 5); ctx.lineTo(3-legSwing, 16); ctx.stroke();

  // body
  ctx.fillStyle = '#3a3a5a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 9, 0, 0, Math.PI*2);
  ctx.fill();

  // head
  ctx.fillStyle = '#d4b896';
  ctx.beginPath();
  ctx.arc(0, -12, 6, 0, Math.PI*2);
  ctx.fill();

  // cloak
  ctx.fillStyle = '#8b2020';
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(-7, -4);
  ctx.quadraticCurveTo(-9, 8, -5-legSwing*0.3, 14);
  ctx.lineTo(5+legSwing*0.3, 14);
  ctx.quadraticCurveTo(9, 8, 7, -4);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ---- CREATURE DRAWING (simplified for scene) ----
function drawCreatureOnScene(r, cx, cy, scale, flipped) {
  ctx.save();
  ctx.translate(cx, cy);
  if(flipped) ctx.scale(-1, 1);
  ctx.scale(scale, scale);

  const S = 40 * (r.body?.size || 0.9);
  const col = r.colors;
  const breathe = Math.sin(animT*0.04)*1.5;
  const bx=0, by=0;

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(bx, by+S*1.5+5, S*2, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // tail
  drawTailSimple(bx,by,S,r,col);

  // wings behind
  if(r.wings?.style && r.wings.style!=='none') drawWingSimple(bx,by,S,r,col,-1);

  // back legs
  if((r.legs?.count||0)>=4){
    drawLegSimple(bx+S*0.6,by+S*0.5,S,r,col,1,true);
    drawLegSimple(bx-S*0.3,by+S*0.5,S,r,col,-1,true);
  }

  // body
  ctx.fillStyle=col.skin; ctx.strokeStyle=col.dark; ctx.lineWidth=2;
  const bulk=r.body?.bulk||1;
  ctx.beginPath();
  ctx.moveTo(bx-S*0.9,by-S*0.2);
  ctx.bezierCurveTo(bx-S*1,by-S*0.8*bulk,bx+S*0.3,by-S*bulk,bx+S*0.7,by-S*0.5*bulk);
  ctx.bezierCurveTo(bx+S*1.2,by-S*0.2,bx+S*1.2,by+S*0.6,bx+S*0.8,by+S*0.8);
  ctx.bezierCurveTo(bx+S*0.3,by+S*1.1,bx-S*0.5,by+S*1,bx-S*0.9,by+S*0.6);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // belly
  ctx.fillStyle=lighten(col.skin,0.2);
  ctx.beginPath();
  ctx.moveTo(bx-S*0.4,by+S*0.15);
  ctx.bezierCurveTo(bx-S*0.3,by+S*0.6,bx+S*0.4,by+S*0.7,bx+S*0.5,by+S*0.15);
  ctx.bezierCurveTo(bx+S*0.2,by+S*0.4,bx-S*0.1,by+S*0.4,bx-S*0.4,by+S*0.15);
  ctx.fill();

  // spines
  if(r.spines){
    ctx.fillStyle=col.pri; ctx.strokeStyle=col.dark; ctx.lineWidth=1;
    for(let i=0;i<6;i++){
      const t=i/5;
      const sx2=bx-S*0.6+t*S*1.4;
      const sy2=by-S*0.3-Math.sin(t*Math.PI)*S*0.5*bulk;
      const sh=S*(0.15+Math.sin(t*Math.PI)*0.2);
      ctx.beginPath();
      ctx.moveTo(sx2-S*0.03,sy2);ctx.lineTo(sx2,sy2-sh);ctx.lineTo(sx2+S*0.03,sy2);
      ctx.closePath();ctx.fill();ctx.stroke();
    }
  }

  // front legs
  if((r.legs?.count||0)>=2){
    drawLegSimple(bx+S*0.8,by+S*0.4,S,r,col,1,false);
    drawLegSimple(bx-S*0.5,by+S*0.4,S,r,col,-1,false);
  }

  // neck + head
  const neckLen=S*(r.neck?.length||0.5)*1.5;
  const neckAngle=-Math.PI*0.35-breathe*0.005;
  const headX2=bx-S*0.4+Math.cos(neckAngle)*neckLen;
  const headY2=by-S*0.3+Math.sin(neckAngle)*neckLen+breathe;

  // neck
  const thick=S*(r.neck?.thick||0.3);
  ctx.fillStyle=col.skin; ctx.strokeStyle=col.dark; ctx.lineWidth=2;
  const dx=headX2-(bx-S*0.4), dy=headY2-(by-S*0.3);
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len, ny=dx/len;
  ctx.beginPath();
  ctx.moveTo(bx-S*0.4+nx*thick, by-S*0.3+ny*thick);
  ctx.quadraticCurveTo((bx-S*0.4+headX2)/2+nx*thick*1.1,(by-S*0.3+headY2)/2+ny*thick*1.1, headX2+nx*thick*0.6,headY2+ny*thick*0.6);
  ctx.lineTo(headX2-nx*thick*0.6,headY2-ny*thick*0.6);
  ctx.quadraticCurveTo((bx-S*0.4+headX2)/2-nx*thick*0.8,(by-S*0.3+headY2)/2-ny*thick*0.8, bx-S*0.4-nx*thick,by-S*0.3-ny*thick);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // head
  ctx.save();
  ctx.translate(headX2,headY2);
  ctx.rotate(neckAngle+Math.PI*0.1);
  const hs=S*(r.head?.size||0.9);

  // horns
  if(r.horns?.style && r.horns.style!=='none'){
    ctx.fillStyle=darken(col.skin,0.3);ctx.strokeStyle=col.dark;ctx.lineWidth=1.5;
    const hornS=hs*(r.horns.size||0.7);
    ctx.beginPath();
    ctx.moveTo(-hs*0.05,-hs*0.35);
    ctx.quadraticCurveTo(-hornS*0.5,-hornS*1.3,-hornS*0.9,-hornS*0.5);
    ctx.quadraticCurveTo(-hornS*0.4,-hornS*0.9,hs*0.05,-hs*0.3);
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(hs*0.05,-hs*0.4);
    ctx.quadraticCurveTo(-hornS*0.3,-hornS*1.5,-hornS*0.7,-hornS*0.8);
    ctx.quadraticCurveTo(-hornS*0.2,-hornS*1.1,hs*0.15,-hs*0.35);
    ctx.closePath();ctx.fill();ctx.stroke();
  }

  // skull
  ctx.fillStyle=col.skin;ctx.strokeStyle=col.dark;ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(-hs*0.3,-hs*0.5);
  ctx.bezierCurveTo(-hs*0.1,-hs*0.7,hs*0.5,-hs*0.6,hs*1.1,-hs*0.25);
  ctx.bezierCurveTo(hs*1.3,-hs*0.1,hs*1.3,hs*0.15,hs*1.1,hs*0.25);
  ctx.bezierCurveTo(hs*0.5,hs*0.5,-hs*0.1,hs*0.5,-hs*0.3,hs*0.4);
  ctx.closePath();ctx.fill();ctx.stroke();

  // eye
  const eyeX2=hs*0.35,eyeY2=-hs*0.2;
  ctx.fillStyle=col.dark;ctx.globalAlpha=0.3;
  ctx.beginPath();ctx.ellipse(eyeX2,eyeY2,hs*0.24,hs*0.19,-0.1,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle=r.eyeGlow?col.hi:'#ddddaa';
  ctx.beginPath();ctx.ellipse(eyeX2,eyeY2,hs*0.18,hs*0.12,-0.1,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=col.dark;ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(eyeX2+hs*0.02,eyeY2,hs*0.04,hs*0.1,0,0,Math.PI*2);ctx.fill();
  if(r.eyeGlow){
    const eg=ctx.createRadialGradient(eyeX2,eyeY2,0,eyeX2,eyeY2,hs*0.4);
    eg.addColorStop(0,col.hi+'44');eg.addColorStop(1,'transparent');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(eyeX2,eyeY2,hs*0.4,0,Math.PI*2);ctx.fill();
  }

  // fangs
  if(r.fangs){
    ctx.fillStyle='#eee8dd';ctx.strokeStyle=col.dark;ctx.lineWidth=1;
    [0.3,0.5,0.7].forEach(t=>{
      const tx2=hs*t, ts=t===0.5?hs*0.15:hs*0.1;
      ctx.beginPath();ctx.moveTo(tx2-hs*0.025,hs*0.18);
      ctx.lineTo(tx2,hs*0.18+ts);ctx.lineTo(tx2+hs*0.025,hs*0.18);
      ctx.closePath();ctx.fill();ctx.stroke();
    });
  }

  // jaw
  ctx.strokeStyle=col.dark;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(hs*0.05,hs*0.2);
  ctx.bezierCurveTo(hs*0.3,hs*0.32,hs*0.7,hs*0.3,hs*1,hs*0.15);
  ctx.stroke();

  ctx.restore(); // head transform

  // front wing
  if(r.wings?.style && r.wings.style!=='none') drawWingSimple(bx,by,S,r,col,1);

  ctx.restore(); // main transform
}

function drawLegSimple(lx,ly,S,r,col,dir,back){
  ctx.save();
  ctx.fillStyle=back?darken(col.skin,0.15):col.skin;
  ctx.strokeStyle=col.dark;ctx.lineWidth=2;
  const legLen=S*0.8, thick=S*0.18;
  const kneeX=lx+dir*S*0.08, kneeY=ly+legLen*0.5;
  const footX=kneeX+dir*S*0.12, footY=ly+legLen;
  ctx.beginPath();
  ctx.moveTo(lx-thick*0.6,ly);
  ctx.quadraticCurveTo(lx+dir*thick,ly+legLen*0.25,kneeX+thick*0.4,kneeY);
  ctx.lineTo(kneeX-thick*0.4,kneeY);
  ctx.quadraticCurveTo(lx-dir*thick*0.2,ly+legLen*0.25,lx+thick*0.25,ly);
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(kneeX-thick*0.25,kneeY);
  ctx.lineTo(footX-thick*0.15,footY);ctx.lineTo(footX+thick*0.15,footY);
  ctx.lineTo(kneeX+thick*0.25,kneeY);
  ctx.closePath();ctx.fill();ctx.stroke();
  // claws
  ctx.fillStyle=darken(col.skin,0.2);
  for(let c=0;c<3;c++){
    const cx2=footX+(c-1)*S*0.06;
    ctx.beginPath();ctx.moveTo(cx2-2,footY);ctx.lineTo(cx2+dir*3,footY+S*0.08);ctx.lineTo(cx2+2,footY);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

function drawWingSimple(bx,by,S,r,col,side){
  ctx.save();
  const span=S*(r.wings?.span||1)*1.8;
  const wx=bx+side*S*0.3, wy=by-S*0.4;
  const elbowX=wx+side*span*0.4, elbowY=wy-span*0.4;
  const tipX=wx+side*span*0.8, tipY=wy-span*0.2;
  const f1X=tipX+side*span*0.12, f1Y=tipY+span*0.25;
  const f2X=tipX+side*span*0.04, f2Y=tipY+span*0.45;

  ctx.fillStyle=col.pri+'55';ctx.strokeStyle=col.dark;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(wx,wy);
  ctx.quadraticCurveTo(elbowX*0.8+wx*0.2,elbowY,elbowX,elbowY);
  ctx.lineTo(tipX,tipY);ctx.lineTo(f1X,f1Y);ctx.lineTo(f2X,f2Y);
  ctx.quadraticCurveTo(wx+side*span*0.15,by+S*0.2,wx,by+S*0.15);
  ctx.closePath();ctx.fill();ctx.stroke();

  ctx.strokeStyle=col.skin;ctx.lineWidth=S*0.1;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(elbowX,elbowY);ctx.lineTo(tipX,tipY);ctx.stroke();
  ctx.strokeStyle=col.dark;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(elbowX,elbowY);ctx.lineTo(tipX,tipY);ctx.stroke();
  ctx.restore();
}

function drawTailSimple(bx,by,S,r,col){
  ctx.save();
  const len=S*(r.tail?.length||1)*1.8;
  const thick=S*(r.tail?.thick||0.25);
  const tx=bx+S*0.7,ty=by+S*0.3;
  const endX=tx+len,endY=ty+len*0.15;

  ctx.fillStyle=col.skin;ctx.strokeStyle=col.dark;ctx.lineWidth=1.5;
  const steps=16;
  ctx.beginPath();
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const x=lerp(tx,endX,t)+Math.sin(t*Math.PI)*len*0.15;
    const y=lerp(ty,endY,t)+Math.sin(t*Math.PI*2)*len*0.08;
    const w=thick*(1-t*0.85);
    if(i===0)ctx.moveTo(x,y-w);else ctx.lineTo(x,y-w);
  }
  for(let i=steps;i>=0;i--){
    const t=i/steps;
    const x=lerp(tx,endX,t)+Math.sin(t*Math.PI)*len*0.15;
    const y=lerp(ty,endY,t)+Math.sin(t*Math.PI*2)*len*0.08;
    const w=thick*(1-t*0.85);
    ctx.lineTo(x,y+w);
  }
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.restore();
}

// Explore button
exploreBtn.addEventListener('click', startExpedition);

function startBattle() {
  gameState = 'battle';
  battleBusy = false;
  battleTurn = 'player';
  playerMonster.currentHP = playerMonster.stats.hp; // heal for demo
  catchTarget = enemyMonster; // for catching

  // init battle animations — slide in from offscreen
  resetBattleAnim();
  battleAnim.enemySlideIn = 0;
  battleAnim.playerSlideIn = 0;

  // switch UI — remove expedition perspective, add battle mode
  document.body.classList.remove('in-expedition');
  document.body.classList.add('in-battle');
  exploreUI.style.display = 'none';
  document.getElementById('zones').style.display = 'none';
  document.getElementById('hpOverlay').classList.add('active');
  battleUI.classList.add('active');

  // Enable catch button
  const catchBtn = document.getElementById('catchBtn');
  catchBtn.classList.remove('disabled');
  catchBtn.textContent = 'Catch';

  updateBattleUI();
  renderMoves();

  document.getElementById('battleLog').textContent = 'What will you do?';
  document.getElementById('battleLog').className = 'battle-log';
}

function updateBattleUI(){
  // Enemy
  document.getElementById('enemyName').textContent = enemyMonster.name;
  document.getElementById('enemyLv').textContent = 'Lv' + enemyMonster.level;
  const ePct = Math.max(0, enemyMonster.currentHP / enemyMonster.stats.hp * 100);
  const eBar = document.getElementById('enemyBar');
  eBar.style.width = ePct + '%';
  eBar.style.background = ePct > 50 ? 'var(--hp-green)' : ePct > 20 ? 'var(--hp-yellow)' : 'var(--hp-red)';
  document.getElementById('enemyHPText').textContent = Math.max(0,enemyMonster.currentHP) + '/' + enemyMonster.stats.hp;

  // Player
  document.getElementById('playerName').textContent = playerMonster.name;
  document.getElementById('playerLv').textContent = 'Lv' + playerMonster.level;
  const pPct = Math.max(0, playerMonster.currentHP / playerMonster.stats.hp * 100);
  const pBar = document.getElementById('playerBar');
  pBar.style.width = pPct + '%';
  pBar.style.background = pPct > 50 ? 'var(--hp-green)' : pPct > 20 ? 'var(--hp-yellow)' : 'var(--hp-red)';
  document.getElementById('playerHPText').textContent = Math.max(0,playerMonster.currentHP) + '/' + playerMonster.stats.hp;
}

function renderMoves(){
  const grid = document.getElementById('movesGrid');
  grid.innerHTML = '';
  playerMonster.moves.forEach((move, i) => {
    const btn = document.createElement('button');
    btn.className = 'move-btn type-' + move.type;
    btn.innerHTML = `<span class="mv-name">${move.name}</span><span class="mv-dmg">${move.damage} DMG</span>`;
    btn.addEventListener('click', () => playerAttack(i));
    grid.appendChild(btn);
  });
}

function playerAttack(moveIdx) {
  if(battleBusy || gameState !== 'battle') return;
  battleBusy = true;
  const move = playerMonster.moves[moveIdx];

  // calc damage
  const baseDmg = move.damage;
  const atkMod = playerMonster.stats.atk / 50;
  const defMod = enemyMonster.stats.def / 100;
  const variance = 0.85 + Math.random() * 0.3;
  const dmg = Math.max(1, Math.floor(baseDmg * atkMod * (1 - defMod * 0.5) * variance));

  // trigger attack animation
  triggerAttackAnim('player', move.type);

  enemyMonster.currentHP -= dmg;
  updateBattleUI();

  // damage float
  showDmgFloat(dmg, W*0.65, H*0.3);

  const log = document.getElementById('battleLog');
  log.textContent = `${playerMonster.name} used ${move.name}! -${dmg} HP`;
  log.className = 'hit';

  if(enemyMonster.currentHP <= 0) {
    // death animation — shrink/fade
    const deathAnim = setInterval(() => {
      battleAnim.enemyDeath += 0.04;
      if(battleAnim.enemyDeath >= 1) {
        clearInterval(deathAnim);
        battleAnim.enemyDeath = 1;
      }
    }, 30);
    setTimeout(() => endBattle('victory'), 800);
    return;
  }

  // enemy turn
  setTimeout(() => {
    const eMove = pick(enemyMonster.moves);
    const eAtkMod = enemyMonster.stats.atk / 50;
    const eDefMod = playerMonster.stats.def / 100;
    const eVar = 0.85 + Math.random() * 0.3;
    const eDmg = Math.max(1, Math.floor(eMove.damage * eAtkMod * (1 - eDefMod * 0.5) * eVar));

    triggerAttackAnim('enemy', eMove.type);

    playerMonster.currentHP -= eDmg;
    updateBattleUI();

    showDmgFloat(eDmg, W*0.2, H*0.45);

    log.textContent = `${enemyMonster.name} used ${eMove.name}! -${eDmg} HP`;

    if(playerMonster.currentHP <= 0) {
      setTimeout(() => endBattle('defeat'), 600);
      return;
    }

    battleBusy = false;
  }, 700);
}

function showDmgFloat(dmg, x, y) {
  const el = document.createElement('div');
  el.className = 'dmg-float';
  el.textContent = '-' + dmg;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.getElementById('sceneWrap').appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function runFromBattle() {
  if(battleBusy) return;
  const log = document.getElementById('battleLog');
  if(Math.random() > 0.4) {
    endBattle('fled');
  } else {
    log.textContent = 'Failed to escape!';
    battleBusy = true;
    setTimeout(() => {
      const eMove = pick(enemyMonster.moves);
      const eDmg = Math.max(1, Math.floor(eMove.damage * (enemyMonster.stats.atk/50) * (1 - playerMonster.stats.def/200) * (0.85+Math.random()*0.3)));
      playerMonster.currentHP -= eDmg;
      updateBattleUI();
      log.textContent = `${enemyMonster.name} attacks! -${eDmg} HP`;
      if(playerMonster.currentHP <= 0) {
        setTimeout(() => endBattle('defeat'), 600);
      } else {
        battleBusy = false;
      }
    }, 500);
  }
}

function endBattle(result) {
  const title = document.getElementById('resultTitle');
  const sub = document.getElementById('resultSub');

  if(result === 'caught') {
    title.textContent = 'Caught!';
    title.style.color = '#22c55e';
    sub.textContent = `${catchTarget.name} joined your team!`;
    // Add to collection
    caughtMonsters.push(JSON.parse(JSON.stringify(catchTarget)));
    document.getElementById('collCount').textContent = caughtMonsters.length;
    // Save to localStorage
    saveCaughtMonsters();
  } else if(result === 'victory') {
    const xp = enemyMonster.level * 8 + rng(5,15);
    title.textContent = 'Victory';
    title.style.color = 'var(--gold)';
    sub.textContent = `${enemyMonster.name} defeated! +${xp} XP`;
  } else if(result === 'defeat') {
    title.textContent = 'Defeated';
    title.style.color = 'var(--accent)';
    sub.textContent = `${playerMonster.name} has fainted...`;
    // Defeat ends the expedition
    if (map.tiles) {
      sub.textContent += ' Expedition over.';
      map.tiles = null; map.seen = null; map.objects = [];
      map.particles = []; map.footsteps = [];
    }
  } else {
    title.textContent = 'Escaped';
    title.style.color = 'var(--text)';
    sub.textContent = 'Got away safely.';
  }

  catchTarget = null;
  resultOverlay.classList.add('active');
}

function dismissResult() {
  resultOverlay.classList.remove('active');
  battleUI.classList.remove('active');
  document.getElementById('hpOverlay').classList.remove('active');
  document.body.classList.remove('in-battle');

  // Return to expedition if one is active
  if (map.tiles) {
    gameState = 'expedition';
    document.body.classList.add('in-expedition');
    document.getElementById('expeditionUI').classList.add('active');
    enemyMonster = null;
    resumeMapExplore();
  } else {
    document.body.classList.remove('in-expedition');
    document.getElementById('zones').style.display = '';
    exploreUI.style.display = '';
    exploreBtn.classList.remove('walking');
    exploreBtn.innerHTML = '<span class="shimmer"></span>Set Out';
    exploreStatus.textContent = '';
    playerMonster.currentHP = playerMonster.stats.hp;
    gameState = 'explore';
    enemyMonster = null;
  }
}

// ---- CATCH MECHANIC ----
function attemptCatch() {
  if(battleBusy || gameState !== 'battle' || !catchTarget) return;
  battleBusy = true;

  const log = document.getElementById('battleLog');
  const hpPct = catchTarget.currentHP / catchTarget.stats.hp;

  // Catch chance: lower HP = higher chance. At full HP ~15%, at 1HP ~90%
  const baseChance = 0.15;
  const hpBonus = (1 - hpPct) * 0.75;
  const catchChance = Math.min(0.95, baseChance + hpBonus);
  const success = Math.random() < catchChance;

  log.textContent = 'Throwing capture crystal...';
  log.className = '';

  // Compute enemy screen position for crystal target
  const groundY = H * 0.72;
  const eBaseX = W * 0.65;
  const eBaseY = groundY - 10;
  const pBaseX = W * 0.2;
  const pBaseY = groundY + 5;

  // Initialize catch animation
  const ca = battleAnim.catchAnim;
  ca.active = true;
  ca.phase = 'throw';
  ca.t = 0;
  ca.startX = pBaseX + 15;
  ca.startY = pBaseY - 20;
  ca.targetX = eBaseX;
  ca.targetY = eBaseY - 10;
  ca.crystalX = ca.startX;
  ca.crystalY = ca.startY;
  ca.crystalAlpha = 1;
  ca.enemyScale = 1;
  ca.containScale = 0;
  ca.glowRadius = 0;
  ca.wobbleCount = 0;
  ca.wobbleDir = 1;
  ca.ringAngle = 0;
  ca.success = success;
  ca.sparkles = [];
  ca.shards = [];

  // Phase timeline callbacks
  // throw: ~28 frames (~470ms)
  // impact: ~15 frames (~250ms)
  // contain: ~35 frames (~580ms)
  // wobble: ~90 frames (~1500ms) — 3 wobbles x 30 frames
  // result: ~50 frames (~830ms)
  // Total: ~3.6 seconds

  const throwMs = 500;
  const impactMs = 280;
  const containMs = 620;
  const wobbleMs = 1550;

  // Update log text at key moments
  setTimeout(() => {
    log.textContent = 'Crystal activated!';
  }, throwMs);

  setTimeout(() => {
    log.textContent = 'Containing...';
  }, throwMs + impactMs);

  // Wobble tension text
  for (let w = 0; w < 3; w++) {
    setTimeout(() => {
      log.textContent = ['Wobble...', 'Wobble...!', '...!!'][w];
    }, throwMs + impactMs + containMs + w * 510);
  }

  // Result
  setTimeout(() => {
    if (success) {
      log.textContent = `${catchTarget.name} was caught!`;
      log.className = 'heal';

      const catchBtn = document.getElementById('catchBtn');
      catchBtn.classList.add('disabled');
      catchBtn.textContent = 'Caught!';

      setTimeout(() => endBattle('caught'), 900);
    } else {
      log.textContent = `${catchTarget.name} broke free!`;
      log.className = 'hit';

      // Enemy retaliates after breaking free
      setTimeout(() => {
        const eMove = pick(enemyMonster.moves);
        const eDmg = Math.max(1, Math.floor(eMove.damage * (enemyMonster.stats.atk/50) * (1 - playerMonster.stats.def/200) * (0.85+Math.random()*0.3)));
        triggerAttackAnim('enemy', eMove.type);
        playerMonster.currentHP -= eDmg;
        updateBattleUI();
        showDmgFloat(eDmg, W*0.2, H*0.45);
        log.textContent = `${enemyMonster.name} used ${eMove.name}! -${eDmg} HP`;

        if(playerMonster.currentHP <= 0) {
          setTimeout(() => endBattle('defeat'), 600);
          return;
        }
        battleBusy = false;
      }, 700);
    }
  }, throwMs + impactMs + containMs + wobbleMs + 100);
}

// ---- MONSTER COLLECTION ----
function saveCaughtMonsters() {
  try {
    localStorage.setItem('verdantia_monsters', JSON.stringify(caughtMonsters));
  } catch(e) {}
}

function loadCaughtMonsters() {
  try {
    const data = localStorage.getItem('verdantia_monsters');
    if (data) {
      caughtMonsters = JSON.parse(data);
      document.getElementById('collCount').textContent = caughtMonsters.length;
    }
  } catch(e) {}
}

function showCollection() {
  const overlay = document.getElementById('collectionOverlay');
  drawMyMonster();
  updateMyMonsterInfo();
  rebuildCollectionGrid();
  overlay.classList.add('active');
}

function drawMyMonster() {
  const cvs = document.getElementById('myMonsterCanvas');
  const dpr = window.devicePixelRatio || 1;
  const w = 180, h = 150;
  cvs.width = w * dpr; cvs.height = h * dpr;
  cvs.style.width = w + 'px'; cvs.style.height = h + 'px';
  const c = cvs.getContext('2d');
  c.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Compute scale to fit creature in canvas
  // drawCreatureOnScene uses S = 40 * body.size, extends ~S*2.5 wide, ~S*4 tall
  const S = 40 * (playerMonster.body?.size || 0.55);
  const estW = S * 2.8;
  const estH = S * 4.5;
  const fitScale = Math.min(w * 0.75 / estW, h * 0.75 / estH);

  drawCreatureOnCanvas(c, playerMonster, w/2 + 10, h*0.6, fitScale, false);
}

function updateMyMonsterInfo() {
  document.getElementById('myMonsterName').textContent = playerMonster.name;
  document.getElementById('myMonsterStats').textContent =
    `Lv${playerMonster.level} · ${playerMonster.fusions} fusion${playerMonster.fusions!==1?'s':''}`;
  document.getElementById('myMonsterDetails').textContent =
    `HP ${playerMonster.stats.hp} · ATK ${playerMonster.stats.atk} · DEF ${playerMonster.stats.def} · SPD ${playerMonster.stats.spd}`;
}

function rebuildCollectionGrid() {
  const grid = document.getElementById('collGrid');
  grid.innerHTML = '';

  if (caughtMonsters.length === 0) {
    grid.innerHTML = '<div id="collEmpty">No monsters caught yet.<br>Catch them and absorb to grow stronger!</div>';
    document.getElementById('absorbLabel').textContent = 'No monsters to absorb';
    return;
  }

  document.getElementById('absorbLabel').textContent = 'Tap a monster to absorb it';

  caughtMonsters.forEach((mon, idx) => {
    const card = document.createElement('div');
    card.className = 'coll-card absorb-ready';

    const cvs = document.createElement('canvas');
    const cw = 130, ch = 120;
    const dpr = window.devicePixelRatio || 1;
    cvs.width = cw * dpr;
    cvs.height = ch * dpr;
    cvs.style.width = cw + 'px';
    cvs.style.height = ch + 'px';
    const c = cvs.getContext('2d');
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    // Scale to fit creature in card
    const monS = 40 * (mon.body?.size || 0.9);
    const monFitScale = Math.min(cw * 0.7 / (monS*2.8), ch * 0.7 / (monS*4.5));
    drawCreatureOnCanvas(c, mon, cw/2 + 8, ch*0.58, monFitScale, false);

    const nameDiv = document.createElement('div');
    nameDiv.className = 'coll-name';
    nameDiv.textContent = mon.name;

    const infoDiv = document.createElement('div');
    infoDiv.className = 'coll-info';
    infoDiv.textContent = `Lv${mon.level} · ${mon.type} · HP+${Math.floor(mon.stats.hp*0.3)} ATK+${Math.floor(mon.stats.atk*0.3)}`;

    card.addEventListener('click', () => absorbMonster(idx));
    card.appendChild(cvs);
    card.appendChild(nameDiv);
    card.appendChild(infoDiv);
    grid.appendChild(card);
  });
}

function absorbMonster(idx) {
  if (idx < 0 || idx >= caughtMonsters.length) return;
  const prey = caughtMonsters[idx];
  const p = playerMonster;

  // ---- STAT GROWTH ----
  p.fusions++;
  p.level = Math.max(p.level, prey.level) + 1;

  // Stats: add ~30% of the absorbed monster's stats
  const boost = 0.3;
  p.stats.hp += Math.floor(prey.stats.hp * boost);
  p.stats.atk += Math.floor(prey.stats.atk * boost);
  p.stats.def += Math.floor(prey.stats.def * boost);
  p.stats.spd += Math.floor(prey.stats.spd * boost);
  p.currentHP = p.stats.hp;

  // ---- MOVES: replace weakest move if prey has a stronger one ----
  const preyBest = prey.moves.reduce((a,b) => a.damage > b.damage ? a : b);
  const myWorst = p.moves.reduce((a,b) => a.damage < b.damage ? a : b);
  if (preyBest.damage > myWorst.damage) {
    const worstIdx = p.moves.indexOf(myWorst);
    p.moves[worstIdx] = { name: preyBest.name, damage: Math.floor(preyBest.damage * 1.1), type: preyBest.type };
  }
  // Boost all move damage slightly with each fusion
  p.moves.forEach(m => m.damage = Math.floor(m.damage * 1.05));

  // ---- VISUAL GROWTH ----
  // Body grows bigger
  p.body.size = Math.min(2.2, (p.body.size||0.55) + 0.08);
  p.body.bulk = Math.min(2.0, (p.body.bulk||0.7) + 0.06);

  // Head grows
  p.head.size = Math.min(1.6, (p.head.size||0.7) + 0.04);

  // Neck thickens
  p.neck.length = Math.min(1.0, (p.neck.length||0.3) + 0.03);
  p.neck.thick = Math.min(0.6, (p.neck.thick||0.25) + 0.02);

  // Legs bulk up
  p.legs.clawSize = Math.min(1.2, (p.legs.clawSize||0.4) + 0.04);

  // Tail grows
  p.tail.length = Math.min(2.0, (p.tail.length||0.6) + 0.06);
  p.tail.thick = Math.min(0.5, (p.tail.thick||0.15) + 0.02);

  // ---- INHERIT VISUAL TRAITS from prey ----
  // Gain wings if prey has them and we don't
  if (prey.wings && prey.wings.style !== 'none' && p.wings.style === 'none') {
    p.wings = { ...prey.wings };
  } else if (p.wings.style !== 'none') {
    p.wings.span = Math.min(2.0, p.wings.span + 0.05);
  }

  // Gain horns if prey has them and we don't
  if (prey.horns && prey.horns.style !== 'none' && p.horns.style === 'none') {
    p.horns = { ...prey.horns };
  } else if (p.horns.style !== 'none') {
    p.horns.size = Math.min(1.5, p.horns.size + 0.05);
  }

  // Gain spines/fangs/eyeGlow from prey
  if (prey.spines) p.spines = true;
  if (prey.fangs) p.fangs = true;
  if (prey.eyeGlow) p.eyeGlow = true;

  // Tail style can change to prey's if it's cooler
  const coolTails = ['flame','bladed','spiked','barbed'];
  if (coolTails.indexOf(prey.tail.style) > coolTails.indexOf(p.tail.style)) {
    p.tail.style = prey.tail.style;
  }

  // Armor can upgrade
  const armorTier = ['smooth','fur','scales','plates','rocky'];
  if (armorTier.indexOf(prey.armor) > armorTier.indexOf(p.armor)) {
    p.armor = prey.armor;
  }

  // Legs count can increase
  if ((prey.legs?.count||0) > (p.legs?.count||0)) {
    p.legs.count = prey.legs.count;
  }

  // Type can shift if absorbed monster is different
  if (prey.type !== p.type && p.fusions % 3 === 0) {
    p.type = prey.type;
    p.colors = { ...prey.colors };
    // Recolor moves to new type
    p.moves.forEach(m => m.type = p.type);
  }

  // ---- NAME EVOLUTION ----
  // Every few fusions, the name evolves
  if (p.fusions <= 1) {
    // Keep original name
  } else if (p.fusions <= 3) {
    // Add prey syllable
    const mid = Math.floor(prey.name.length / 2);
    p.name = p.name.slice(0, Math.ceil(p.name.length*0.6)) + prey.name.slice(mid);
  } else {
    // More dramatic name changes at higher fusion counts
    const pre = p.name.slice(0, Math.min(4, Math.ceil(p.name.length/2)));
    const suf = prey.name.slice(Math.floor(prey.name.length/2));
    p.name = pre + suf;
  }

  // ---- REMOVE ABSORBED MONSTER ----
  caughtMonsters.splice(idx, 1);
  saveCaughtMonsters();
  savePlayerMonster();
  document.getElementById('collCount').textContent = caughtMonsters.length;

  // ---- ABSORB ANIMATION ----
  const panel = document.getElementById('myMonsterPanel');
  panel.classList.add('absorbing');
  document.getElementById('absorbLabel').textContent = `Absorbed ${prey.name}!`;

  // Flash overlay gold
  const overlay = document.getElementById('collectionOverlay');
  overlay.style.background = 'rgba(245,158,11,0.2)';

  setTimeout(() => {
    overlay.style.background = '';
    panel.classList.remove('absorbing');
    drawMyMonster();
    updateMyMonsterInfo();
    rebuildCollectionGrid();
  }, 600);
}

function hideCollection() {
  document.getElementById('collectionOverlay').classList.remove('active');
}

// Draw creature on any canvas context (reusable for collection)
// Draws creature on any canvas context using the full battle renderer
function drawCreatureOnCanvas(targetCtx, recipe, cx, cy, scale, flipped) {
  const savedCtx = ctx;
  ctx = targetCtx;
  drawCreatureOnScene(recipe, cx, cy, scale, flipped);
  ctx = savedCtx;
}

// Load saved monsters on startup
loadCaughtMonsters();

// ---- MAIN LOOP ----
function loop() {
  animT++;
  if(gameState === 'walking') {
    walkProgress += 0.003;
  }
  if(gameState === 'battle' || gameState === 'encounter') {
    updateBattleAnims();
  }
  // Top-down map movement
  if(gameState === 'expedition' && map.tiles) {
    updatePlayerMovement();
  }
  drawScene();
  requestAnimationFrame(loop);
}
loop();
</script>
